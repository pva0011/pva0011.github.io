<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotebookLM - Quiz Export</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

        :root {
            --bg: #f6f1e7;
            --bg-deep: #efe4d6;
            --ink: #171717;
            --muted: #5b5b5b;
            --accent: #d3542c;
            --accent-light: #ff8f5a;
            --accent-dark: #b14320;
            --teal: #1f6f78;
            --card: #fff7ef;
            --stroke: #e3d6c5;
            --shadow: 0 18px 40px rgba(23, 23, 23, 0.12);
            --radius-sm: 10px;
            --radius-md: 12px;
            --radius-lg: 14px;
            --radius-xl: 18px;
            --radius-2xl: 22px;
            --space-1: 6px;
            --space-2: 8px;
            --space-3: 10px;
            --space-4: 12px;
            --space-5: 14px;
            --space-6: 16px;
            --space-7: 18px;
            --space-8: 20px;
            --space-9: 24px;
            --space-10: 32px;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'IBM Plex Sans', sans-serif;
            --error: #b54832;
        }

        body {
            font-family: var(--font-body);
            background:
                radial-gradient(240px 140px at 10% -10%, #ffd2b9 0%, transparent 70%),
                radial-gradient(220px 160px at 90% 0%, #cfe7e6 0%, transparent 65%),
                linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
            color: var(--ink);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            width: 100%;
            max-width: 800px;
            padding: var(--space-10) var(--space-8);
            box-sizing: border-box;
            background: var(--card);
            border-radius: var(--radius-2xl);
            border: 1px solid var(--stroke);
            box-shadow: var(--shadow);
        }

        .progress-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .progress-text {
            color: var(--muted);
            font-size: 0.9em;
        }

        .status-bar {
            display: flex;
            gap: 16px;
            font-size: 0.9em;
            font-weight: 500;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-correct { color: var(--teal); }
        .status-wrong { color: var(--error); }

        .question-text {
            font-family: var(--font-display);
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .options-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-item {
            background-color: #fff;
            border: 1px solid var(--stroke);
            padding: var(--space-4) var(--space-6);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option-item:hover:not(.selected) {
            background-color: var(--card);
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .option-item.selected.correct {
            background-color: rgba(31, 111, 120, 0.12);
            border-color: var(--teal);
        }

        .option-item.selected.incorrect {
            background-color: rgba(181, 72, 50, 0.12);
            border-color: var(--error);
        }

        .option-item.revealed-correct {
            border-color: rgba(31, 111, 120, 0.5);
            box-shadow: inset 0 0 0 1px rgba(31, 111, 120, 0.16);
        }

        .option-label {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .feedback-state {
            font-weight: bold;
            font-size: 0.9em;
            display: none;
        }

        .selected .feedback-state {
            display: block;
        }

        .revealed-correct .feedback-state {
            display: block;
        }

        .correct .feedback-state { color: var(--teal); }
        .incorrect .feedback-state { color: var(--error); }
        .revealed-correct .feedback-state { color: var(--teal); }

        .rationale {
            font-size: 0.95em;
            color: var(--muted);
            margin-top: 4px;
            line-height: 1.5;
            display: none;
        }

        .selected .rationale {
            display: block;
        }

        .revealed-correct .rationale {
            display: block;
        }
        .hint-toggle {
            border: 1px solid var(--stroke);
            color: var(--muted);
            cursor: pointer;
            padding: var(--space-2) var(--space-6);
            border-radius: var(--radius-md);
            background-color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .hint-toggle:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .hint-content {
            margin-top: 32px;
            padding: var(--space-6);
            background-color: #fff;
            border: 1px solid var(--stroke);
            border-radius: var(--radius-lg);
            font-size: 0.95em;
            color: var(--muted);
            display: none;
            align-items: flex-start;
            gap: 16px;
        }

        .hint-content.active {
            display: flex;
        }

        .hint-icon-box {
            color: var(--accent-dark);
            font-size: 1.2em;
            margin-top: -2px;
        }

        .navigation {
            margin-top: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            border-radius: var(--radius-md);
            padding: var(--space-2) var(--space-7);
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-prev {
            background-color: #fff;
            color: var(--ink);
            border-color: var(--stroke);
        }

        .btn-prev:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn-next {
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            color: #fff;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .results-screen {
            display: flex;
            flex-direction: column;
            gap: var(--space-8);
        }

        .results-title {
            font-family: var(--font-display);
            font-size: 2.1em;
            margin: 0;
        }

        .results-subtitle {
            color: var(--muted);
            margin: 0;
            font-size: 1em;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-6);
        }

        .result-card {
            padding: var(--space-6);
            border-radius: var(--radius-xl);
            background: #fff;
            border: 1px solid var(--stroke);
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        .result-label {
            color: var(--muted);
            font-size: 0.95em;
        }

        .result-value {
            font-size: 2em;
            font-family: var(--font-display);
        }

        .result-metrics {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
            color: var(--muted);
            font-size: 0.95em;
        }

        .results-actions {
            display: flex;
            gap: var(--space-4);
            flex-wrap: wrap;
        }

        .btn-ghost {
            background-color: transparent;
            border: 1px solid var(--stroke);
            color: var(--ink);
        }

        .hidden { display: none; }

        @media (max-width: 900px) {
            .quiz-container {
                margin: var(--space-8);
                max-width: 100%;
            }
        }

        @media (max-width: 720px) {
            .quiz-container {
                padding: var(--space-8) var(--space-6);
            }

            .question-text {
                font-size: 1.3em;
            }

            .option-item {
                padding: var(--space-4);
            }
        }

        @media (max-width: 520px) {
            body {
                align-items: flex-start;
            }

            .quiz-container {
                margin: var(--space-6);
                padding: var(--space-7) var(--space-5);
            }

            .progress-container {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-3);
            }

            .navigation {
                flex-direction: column;
                align-items: stretch;
                gap: var(--space-4);
            }

            .nav-buttons {
                width: 100%;
            }

            .btn {
                width: 100%;
            }

            .hint-toggle {
                justify-content: space-between;
            }

            .results-actions {
                flex-direction: column;
            }
        }
    
    [data-theme="dark"] {
      --bg: #1a1612;
      --bg-deep: #141210;
      --ink: #f0ebe0;
      --muted: #9a9080;
      --accent: #e8673a;
      --accent-light: #ff9a6a;
      --accent-dark: #c45528;
      --teal: #2a9aa8;
      --card: #221e18;
      --stroke: #3a3028;
      --shadow: 0 18px 40px rgba(0,0,0,0.4);
      --error: #e06050;
    }
    [data-theme="dark"] body {
      background:
        radial-gradient(240px 140px at 10% -10%, #3a1a08 0%, transparent 70%),
        radial-gradient(220px 160px at 90% 0%, #0a2a2e 0%, transparent 65%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
    }
    [data-theme="dark"] .option-item { background-color: var(--card); }
    [data-theme="dark"] .hint-toggle,
    [data-theme="dark"] .hint-content,
    [data-theme="dark"] .btn-prev { background-color: var(--card); color: var(--ink); }
    [data-theme="dark"] .result-card { background: var(--card); }
    [data-theme="dark"] .btn-next {
      background: linear-gradient(90deg, #e8673a, #f28c5e);
      box-shadow: 0 4px 20px rgba(232, 103, 58, 0.35);
      color: #fff;
    }
    [data-theme="dark"] .btn-next:hover:not(:disabled) {
      box-shadow: 0 6px 24px rgba(232, 103, 58, 0.5);
    }
    
    /* quiz-mobile-v3 */
    @media (max-width: 640px) {
      body {
        height: 100dvh;
        overflow: hidden;
        align-items: flex-start;
        padding: 0;
      }
      .quiz-container {
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        margin: 0;
        border-radius: 0;
        border-left: none;
        border-right: none;
        border-top: none;
        padding-bottom: 0;
      }
      #quiz-content,
      #results-content {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        min-height: 0;
        padding-bottom: 8px;
      }
      #hint-box { flex-shrink: 0; }
      .navigation {
        flex-shrink: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        margin-top: 0;
        background: var(--card);
        border-top: 1px solid var(--stroke);
      }
    }
    </style>
</head>
<body>
    <div class="quiz-container">

    <div class="quiz-heading" style="margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--stroke)">
      <a href="../index.html" style="font-size:0.82em;color:var(--muted);text-decoration:none;font-family:var(--font-body)">← Índice</a>
      <h1 style="font-family:var(--font-display);font-size:1.1em;font-weight:700;color:var(--ink);margin-top:8px;padding-right:44px">Itinerario Personal para la Empleabilidad · Quiz 1</h1>
    </div>
        <div id="quiz-content">
            <!-- Dynamic Content -->
        </div>
        <div id="results-content" class="hidden"></div>

        <div id="hint-box" class="hint-content">
            <div class="hint-icon-box">💡</div>
            <div id="hint-text"></div>
        </div>

        <div class="navigation">
            <button id="hint-toggle" class="hint-toggle">
                <span>Pista</span>
                <span id="hint-icon-arrow">▼</span>
            </button>
            <div class="nav-buttons">
                <button id="prev-btn" class="btn btn-prev">Anterior</button>
                <button id="next-btn" class="btn btn-next">Siguiente</button>
            </div>
        </div>
    </div>

    <script>
        let quizData = [{"answerOptions":[{"isCorrect":false,"rationale":"Se define por el uso de la tecnología como base del negocio, no por la situación personal del emprendedor.","text":"Emprendimiento tecnológico"},{"isCorrect":true,"rationale":"Este tipo surge cuando el emprendedor se ve obligado a crear su propio negocio ante la falta de opciones laborales externas.","text":"Emprendimiento por necesidad"},{"isCorrect":false,"rationale":"Este se basa en la identificación de una laguna en el mercado o una idea innovadora, no en la falta de alternativas laborales.","text":"Emprendimiento por oportunidad"},{"isCorrect":false,"rationale":"Se refiere a modelos de negocio con potencial de crecimiento exponencial, independientemente de la motivación inicial.","text":"Emprendimiento escalable"}],"hint":"Relaciona la situación de desempleo con la causa que empuja a iniciar la actividad.","question":"Si una persona decide emprender porque ha perdido su empleo y no encuentra alternativas en el mercado laboral, ¿qué tipo de emprendimiento está llevando a cabo según la clasificación por motivación?"},{"answerOptions":[{"isCorrect":true,"rationale":"Es una estructura donde dos o más personas comparten la titularidad de un bien sin constituir una entidad independiente de los socios.","text":"Comunidad de bienes"},{"isCorrect":false,"rationale":"Tiene personalidad jurídica y está pensada para grandes volúmenes de capital y cotización en bolsa.","text":"Sociedad Anónima"},{"isCorrect":false,"rationale":"Esta forma sí posee personalidad jurídica y limita la responsabilidad al capital aportado.","text":"Sociedad de Responsabilidad Limitada"},{"isCorrect":false,"rationale":"Es una entidad con personalidad jurídica propia y estructura democrática.","text":"Sociedad Cooperativa"}],"hint":"Busca la opción donde el negocio y la persona física no se distinguen legalmente.","question":"¿Cuál de las siguientes formas jurídicas carece de personalidad jurídica propia, respondiendo los socios con su patrimonio personal?"},{"answerOptions":[{"isCorrect":false,"rationale":"Es un tributo local por el ejercicio de la actividad, pero no grava directamente el beneficio neto obtenido.","text":"Impuesto sobre Actividades Económicas (IAE)"},{"isCorrect":true,"rationale":"Al no tener personalidad jurídica independiente, el autónomo tributa sus beneficios como renta personal.","text":"Impuesto sobre la Renta de las Personas Físicas (IRPF)"},{"isCorrect":false,"rationale":"Es un impuesto indirecto sobre el consumo, no un impuesto sobre los beneficios o rentas del empresario.","text":"Impuesto sobre el Valor Añadido (IVA)"},{"isCorrect":false,"rationale":"Este impuesto se aplica a entidades con personalidad jurídica, como las sociedades mercantiles.","text":"Impuesto de Sociedades"}],"hint":"Considera que el autónomo no es una entidad separada de la persona física ante Hacienda.","question":"¿A través de qué impuesto tributan los rendimientos económicos de un empresario individual (autónomo) en España?"},{"answerOptions":[{"isCorrect":false,"rationale":"Las sociedades capitalistas siempre requieren una aportación mínima obligatoria para su constitución.","text":"No existe mínimo legal"},{"isCorrect":false,"rationale":"Es el capital mínimo actual para constituir una Sociedad de Responsabilidad Limitada.","text":"$1$ €"},{"isCorrect":true,"rationale":"Es el requisito mínimo de capital para esta forma jurídica, la cual divide su capital en acciones.","text":"$60.000$ €"},{"isCorrect":false,"rationale":"Esta cifra era el mínimo histórico para las S. L., pero no aplica a las Sociedades Anónimas.","text":"$3.000$ €"}],"hint":"Es una cifra elevada destinada a empresas de gran tamaño.","question":"En la constitución de una Sociedad Anónima (S. A.), ¿cuál es el capital social mínimo legalmente exigido?"},{"answerOptions":[{"isCorrect":false,"rationale":"Este término se asocia comúnmente a las Sociedades Cooperativas según sus estatutos.","text":"Cuotas sociales"},{"isCorrect":false,"rationale":"Son instrumentos financieros de deuda, no representan la división del capital social fundacional.","text":"Bonos convertibles"},{"isCorrect":false,"rationale":"Las acciones son propias de las Sociedades Anónimas y suelen ser de libre transmisión.","text":"Acciones"},{"isCorrect":true,"rationale":"En las S. L., el capital se divide en participaciones cuya venta suele requerir el permiso de los demás socios.","text":"Participaciones sociales"}],"hint":"Es un término que refleja una estructura de propiedad más cerrada que las acciones.","question":"¿Cómo se denominan las partes alícuotas e indivisibles en las que se divide el capital de una Sociedad de Responsabilidad Limitada?"},{"answerOptions":[{"isCorrect":false,"rationale":"Es un número superior al mínimo legal requerido para iniciar la actividad cooperativa.","text":"Cinco socios"},{"isCorrect":false,"rationale":"Dos socios es el mínimo para una Sociedad Civil o Comunidad de Bienes, pero no para una Cooperativa.","text":"Dos socios"},{"isCorrect":false,"rationale":"Aunque existen sociedades unipersonales (S.L.U.), las cooperativas requieren pluralidad para su fin social.","text":"Un socio"},{"isCorrect":true,"rationale":"La ley establece que se necesitan al menos tres personas para formar esta entidad de estructura democrática.","text":"Tres socios"}],"hint":"Es un número impar pequeño que fomenta la colaboración grupal.","question":"Para la constitución de una Sociedad Cooperativa, ¿cuál es el número mínimo de socios exigido por norma general?"},{"answerOptions":[{"isCorrect":true,"rationale":"Es la declaración censal ante la Agencia Tributaria para informar del inicio de la actividad económica.","text":"Alta en el censo de empresarios, profesionales y retenedores"},{"isCorrect":false,"rationale":"Se trata de un trámite administrativo municipal para ratificar la idoneidad del local.","text":"Solicitud de la licencia de apertura en el Ayuntamiento"},{"isCorrect":false,"rationale":"Pertenece al ámbito de la gestión laboral y de protección social, no al sistema tributario puro.","text":"Afiliación de los trabajadores"},{"isCorrect":false,"rationale":"Este es un trámite laboral necesario para poder contratar trabajadores o cotizar.","text":"Inscripción de la empresa en la Seguridad Social"}],"hint":"Identifica el proceso que vincula directamente a la empresa con las obligaciones de Hacienda.","question":"¿Cuál de los siguientes trámites se considera de carácter fiscal para la puesta en marcha de una empresa?"},{"answerOptions":[{"isCorrect":false,"rationale":"Se centra en procesos y normas rígidas de gestión, sin enfocarse prioritariamente en el sistema de intercambio de incentivos.","text":"Administrativo"},{"isCorrect":false,"rationale":"Este estilo se basa en la personalidad inspiradora del líder y su visión, no necesariamente en premios y castigos.","text":"Carismático"},{"isCorrect":true,"rationale":"Se basa en el intercambio o 'transacción' entre líder y subordinado según el rendimiento y las reglas establecidas.","text":"Transaccional"},{"isCorrect":false,"rationale":"Fomenta la toma de decisiones conjunta, mientras que el transaccional es más directivo y contractual.","text":"Participativo"}],"hint":"Piensa en un modelo basado en el 'premio-castigo' por resultados.","question":"Un líder que motiva a su equipo mediante un sistema de incentivos y recompensas por objetivos cumplidos, pero también aplica sanciones, ejerce un liderazgo:"},{"answerOptions":[{"isCorrect":false,"rationale":"Estas acciones describen el ciclo de negocio, pero no la herramienta de pensamiento lateral mencionada.","text":"Solucionar, Crear, Avanzar, Monetizar, Posicionar, Ejecutar, Rentabilizar"},{"isCorrect":false,"rationale":"Mezcla términos de análisis financiero con creatividad, lo cual es incorrecto para esta técnica.","text":"Sustituir, Calcular, Agrupar, Maximizar, Proyectar, Estudiar, Resolver"},{"isCorrect":true,"rationale":"Cada letra representa una acción o pregunta para transformar un producto o idea existente en algo nuevo.","text":"Sustituir, Combinar, Adaptar, Modificar, Poner otros usos, Eliminar, Reordenar"},{"isCorrect":false,"rationale":"Aunque son pasos lógicos de gestión, no corresponden a la metodología de ideación SCAMPER.","text":"Segmentar, Clasificar, Analizar, Medir, Planificar, Evaluar, Revisar"}],"hint":"Es una lista de verbos de acción para rediseñar procesos o productos.","question":"¿A qué se refieren las siglas de la técnica creativa SCAMPER?"},{"answerOptions":[{"isCorrect":true,"rationale":"Permite mostrar la seriedad y viabilidad del proyecto a terceros para obtener financiación o apoyo.","text":"Funcionar como tarjeta de presentación ante inversores y bancos"},{"isCorrect":false,"rationale":"El plan de empresa no tiene validez legal como documento de constitución ante notario.","text":"Sustituir a las escrituras de constitución"},{"isCorrect":false,"rationale":"Esa es su función interna, orientada a que el propio emprendedor no pierda el rumbo.","text":"Servir como guía interna de gestión diaria"},{"isCorrect":false,"rationale":"Es una herramienta de planificación, pero no puede eliminar los riesgos inherentes al mercado.","text":"Garantizar el éxito económico inmediato"}],"hint":"Piensa en cómo se proyecta el negocio hacia las instituciones que aportan recursos.","question":"Desde el punto de vista externo, ¿qué función principal cumple el plan de empresa?"},{"answerOptions":[{"isCorrect":false,"rationale":"Es una herramienta para diseñar la lógica interna del modelo de negocio, no para el análisis del macroentorno.","text":"Modelo Canvas"},{"isCorrect":false,"rationale":"Se centra en elementos cercanos como clientes, proveedores y competencia directa.","text":"Análisis del Microentorno"},{"isCorrect":false,"rationale":"Se utiliza para medir la rentabilidad financiera de una inversión específica.","text":"Matriz de ROI"},{"isCorrect":true,"rationale":"Analiza factores Políticos, Económicos, Sociale r dentro de una Sociedad Anónima"},{"isCorrect":false,"rationale":"El coste no define el tipo de innovación, sino el efecto que produce en el mercado.","text":"Requiere siempre de una inversión de $60.000$ €"},{"isCorrect":true,"rationale":"La disruptiva rompe con lo anterior, mientras que la incremental solo mejora lo que ya existe.","text":"Crea un nuevo mercado y desplaza a los líderes establecidos"},{"isCorrect":false,"rationale":"Esa es la definición de innovación incremental, que busca optimizar el producto actual.","text":"Se realiza poco a poco mediante pequeñas mejoras"}],"hint":"Piensa en algo que 'rompe' las reglas del juego actuales.","question":"¿Cuál es la característica principal de la innovación disruptiva frente a la incremental?"}];

        let mode = 'quiz';

        function getStats() {

            const wrong = state.filter((s, i) => s.selectedIndex !== null && !quizData[i].answerOptions[s.selectedIndex].isCorrect).length;
            const skipped = quizData.length - answered;
            const accuracy = answered > 0 ? Math.round((correct / answered) * 100) : 0;
            return { answered, correct, wrong, skipped, accuracy };
        }

        function shuffleAnswers() {
            quizData.forEach((q) => {
                for (let i = q.answerOptions.length - 1; i > 0; i -= 1) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [q.answerOptions[i], q.answerOptions[j]] = [q.answerOptions[j], q.answerOptions[i]];
                }
            });
        }

        function shuffleQuestions() {
            for (let i = quizData.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
            }
        }

        function resetState() {
            state = quizData.map(() => ({ selectedIndex: null, hintVisible: false }));

        function fmt(str) {
          if (!str) return str;
          return str
            .replace(/\$\$(.*?)\$\$/gs, function(_,m){return m;})
            .replace(/\$([^$<>]+?)\$/g, function(_,m){return m;})
            .replace(/\*\*(.*?)\*\*/g, function(_,m){return "<strong>"+m+"</strong>";})
            .replace(/\*(.*?)\*/g, function(_,m){return "<em>"+m+"</em>";})
            .replace(/`(.*?)`/g, function(_,m){return "<code>"+m+"</code>";})
        }
        function renderQuestion() {

            q.answerOptions.forEach((opt, idx) => {
                const isSelected = s.selectedIndex === idx;
                const statusClass = isSelected ? (opt.isCorrect ? 'correct' : 'incorrect') : '';
                const selectedClass = isSelected ? 'selected' : '';
                const revealCorrect = (s.selectedIndex !== null && !selectedCorrect && opt.isCorrect) || (mode === 'review' && opt.isCorrect);

                optionsHtml += `

        function selectOption(idx) {
            if (mode !== 'quiz') return;

        function toggleHint() {
            if (mode === 'results') return;

        function saveWrongAnswers() {
          var wrongQuestions = state
            .map(function(s,i){return {s:s,i:i};})
            .filter(function(x){return x.s.selectedIndex !== null && !quizData[x.i].answerOptions[x.s.selectedIndex].isCorrect;})
            .map(function(x){return quizData[x.i].question;});
          var key = 'wrong:' + window.location.pathname.split('/').pop();

  <button id="theme-toggle" title="Cambiar tema" style="position:fixed;top:8px;right:8px;background:var(--card);border:1px solid var(--stroke);border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,0.1);transition:transform 0.2s ease;z-index:100;">🌙</button>
  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.getElementById('theme-toggle').textContent = '☀️';
      }
      document.getElementById('theme-toggle').addEventListener('click', function() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
        this.textContent = isDark ? '🌙' : '☀️';
      });
    })();
  </script>
