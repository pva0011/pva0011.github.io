<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desarrollo de Interface - 8 a 15 - NotebookLM - Quiz Export</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

        :root {
            --bg: #f6f1e7;
            --bg-deep: #efe4d6;
            --ink: #171717;
            --muted: #5b5b5b;
            --accent: #d3542c;
            --accent-light: #ff8f5a;
            --accent-dark: #b14320;
            --teal: #1f6f78;
            --card: #fff7ef;
            --stroke: #e3d6c5;
            --shadow: 0 18px 40px rgba(23, 23, 23, 0.12);
            --radius-sm: 10px;
            --radius-md: 12px;
            --radius-lg: 14px;
            --radius-xl: 18px;
            --radius-2xl: 22px;
            --space-1: 6px;
            --space-2: 8px;
            --space-3: 10px;
            --space-4: 12px;
            --space-5: 14px;
            --space-6: 16px;
            --space-7: 18px;
            --space-8: 20px;
            --space-9: 24px;
            --space-10: 32px;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'IBM Plex Sans', sans-serif;
            --error: #b54832;
        }

        body {
            font-family: var(--font-body);
            background:
                radial-gradient(240px 140px at 10% -10%, #ffd2b9 0%, transparent 70%),
                radial-gradient(220px 160px at 90% 0%, #cfe7e6 0%, transparent 65%),
                linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
            color: var(--ink);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            width: 100%;
            max-width: 800px;
            padding: var(--space-10) var(--space-8);
            box-sizing: border-box;
            background: var(--card);
            border-radius: var(--radius-2xl);
            border: 1px solid var(--stroke);
            box-shadow: var(--shadow);
        }

        .progress-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .progress-text {
            color: var(--muted);
            font-size: 0.9em;
        }

        .status-bar {
            display: flex;
            gap: 16px;
            font-size: 0.9em;
            font-weight: 500;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-correct { color: var(--teal); }
        .status-wrong { color: var(--error); }

        .question-text {
            font-family: var(--font-display);
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .options-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-item {
            background-color: #fff;
            border: 1px solid var(--stroke);
            padding: var(--space-4) var(--space-6);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option-item:hover:not(.selected) {
            background-color: var(--card);
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .option-item.selected.correct {
            background-color: rgba(31, 111, 120, 0.12);
            border-color: var(--teal);
        }

        .option-item.selected.incorrect {
            background-color: rgba(181, 72, 50, 0.12);
            border-color: var(--error);
        }

        .option-item.revealed-correct {
            border-color: rgba(31, 111, 120, 0.5);
            box-shadow: inset 0 0 0 1px rgba(31, 111, 120, 0.16);
        }

        .option-label {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .feedback-state {
            font-weight: bold;
            font-size: 0.9em;
            display: none;
        }

        .selected .feedback-state {
            display: block;
        }

        .revealed-correct .feedback-state {
            display: block;
        }

        .correct .feedback-state { color: var(--teal); }
        .incorrect .feedback-state { color: var(--error); }
        .revealed-correct .feedback-state { color: var(--teal); }

        .rationale {
            font-size: 0.95em;
            color: var(--muted);
            margin-top: 4px;
            line-height: 1.5;
            display: none;
        }

        .selected .rationale {
            display: block;
        }

        .revealed-correct .rationale {
            display: block;
        }
        .hint-toggle {
            border: 1px solid var(--stroke);
            color: var(--muted);
            cursor: pointer;
            padding: var(--space-2) var(--space-6);
            border-radius: var(--radius-md);
            background-color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .hint-toggle:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .hint-content {
            margin-top: 32px;
            padding: var(--space-6);
            background-color: #fff;
            border: 1px solid var(--stroke);
            border-radius: var(--radius-lg);
            font-size: 0.95em;
            color: var(--muted);
            display: none;
            align-items: flex-start;
            gap: 16px;
        }

        .hint-content.active {
            display: flex;
        }

        .hint-icon-box {
            color: var(--accent-dark);
            font-size: 1.2em;
            margin-top: -2px;
        }

        .navigation {
            margin-top: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            border-radius: var(--radius-md);
            padding: var(--space-2) var(--space-7);
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-prev {
            background-color: #fff;
            color: var(--ink);
            border-color: var(--stroke);
        }

        .btn-prev:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn-next {
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            color: #fff;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .results-screen {
            display: flex;
            flex-direction: column;
            gap: var(--space-8);
        }

        .results-title {
            font-family: var(--font-display);
            font-size: 2.1em;
            margin: 0;
        }

        .results-subtitle {
            color: var(--muted);
            margin: 0;
            font-size: 1em;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-6);
        }

        .result-card {
            padding: var(--space-6);
            border-radius: var(--radius-xl);
            background: #fff;
            border: 1px solid var(--stroke);
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        .result-label {
            color: var(--muted);
            font-size: 0.95em;
        }

        .result-value {
            font-size: 2em;
            font-family: var(--font-display);
        }

        .result-metrics {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
            color: var(--muted);
            font-size: 0.95em;
        }

        .results-actions {
            display: flex;
            gap: var(--space-4);
            flex-wrap: wrap;
        }

        .btn-ghost {
            background-color: transparent;
            border: 1px solid var(--stroke);
            color: var(--ink);
        }

        .hidden { display: none; }

        @media (max-width: 900px) {
            .quiz-container {
                margin: var(--space-8);
                max-width: 100%;
            }
        }

        @media (max-width: 720px) {
            .quiz-container {
                padding: var(--space-8) var(--space-6);
            }

            .question-text {
                font-size: 1.3em;
            }

            .option-item {
                padding: var(--space-4);
            }
        }

        @media (max-width: 520px) {
            body {
                align-items: flex-start;
            }

            .quiz-container {
                margin: var(--space-6);
                padding: var(--space-7) var(--space-5);
            }

            .progress-container {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-3);
            }

            .navigation {
                flex-direction: column;
                align-items: stretch;
                gap: var(--space-4);
            }

            .nav-buttons {
                width: 100%;
            }

            .btn {
                width: 100%;
            }

            .hint-toggle {
                justify-content: space-between;
            }

            .results-actions {
                flex-direction: column;
            }
        }
    </style>
</head>

    <script>
        const quizData = [{"answerOptions":[{"isCorrect":false,"rationale":"Esta función corresponde a la vista de información, que es la parte de la interfaz orientada directamente a la interacción del usuario final.","text":"Presentar al usuario el glosario y el buscador de términos clave."},{"isCorrect":false,"rationale":"La compilación es un proceso técnico realizado por herramientas como HTML Help Workshop, no una sección estructural del fichero de ayuda.","text":"Compilar los archivos RTF en un formato ejecutable por Windows."},{"isCorrect":false,"rationale":"Los recursos gráficos suelen gestionarse mediante archivos específicos como .shg en ciertos formatos, no a través del mapa de navegación principal.","text":"Almacenar únicamente los gráficos y recursos multimedia del manual."},{"isCorrect":true,"rationale":"El mapa de navegación actúa como un puente lógico que vincula los índices de ayuda con la ubicación física o digital de la información detallada.","text":"Asociar identificadores de temas con las URL de contenido correspondientes."}],"hint":"Relaciona este concepto con un esquema de direccionamiento interno.","question":"¿Cuál es la función principal del 'mapa de fichero' dentro de la estructura general de un archivo de ayuda digital?"},{"answerOptions":[{"isCorrect":true,"rationale":"El cambio hacia estándares web permitió que el formato CHM fuera más versátil y compatible con los sistemas operativos a partir de Windows Vista.","text":"La utilización de HTML para la generación de la ayuda en lugar de archivos RTF."},{"isCorrect":false,"rationale":"Ambos formatos pueden gestionar estructuras de contenido, pero el archivo .cnt era característico de la tecnología HLP ya en desuso.","text":"La capacidad exclusiva de incluir tablas de contenido mediante archivos .cnt."},{"isCorrect":false,"rationale":"El formato CHM significa 'Ayuda HTML Compilado', por lo que el proceso de compilación sigue siendo un paso necesario en su creación.","text":"La eliminación de la necesidad de compilar el proyecto de ayuda."},{"isCorrect":false,"rationale":"La implementación en Java es característica del sistema JavaHelp, no de los formatos nativos de ayuda de Windows como CHM.","text":"El uso exclusivo de Java para la implementación de su visor interno."}],"hint":"Piensa en el lenguaje de marcado que domina la web moderna.","question":"En el contexto de los formatos de ayuda, ¿qué característica técnica distingue fundamentalmente al formato CHM del antiguo HLP?"},{"answerOptions":[{"isCorrect":false,"rationale":"JavaHelp es un sistema para generar ayuda en línea dentro de aplicaciones Java, no una herramienta de edición para documentos PDF.","text":"JavaHelp"},{"isCorrect":false,"rationale":"Esta herramienta está enfocada en la creación de ficheros .hlp y .chm para Windows, no específicamente en la exportación PDF unitaria.","text":"Help Workshop"},{"isCorrect":true,"rationale":"Esta herramienta destaca por centralizar la información en un solo fichero, facilitando la conversión directa a formatos de documento portátiles.","text":"Help Maker"},{"isCorrect":false,"rationale":"Aunque es un editor sencillo, el material resalta específicamente la característica del fichero único y exportación PDF en Help Maker.","text":"Shalom Help Maker"}],"hint":"Busca la herramienta que se describe como orientada a la creación de archivos únicos organizados.","question":"Si un desarrollador necesita una herramienta que permita exportar toda la documentación en un único documento PDF, ¿cuál de las siguientes opciones es la más adecuada según el material?"},{"answerOptions":[{"isCorrect":false,"rationale":"Una de las pautas de diseño críticas es precisamente no duplicar información para mantener la eficiencia del manual.","text":"Para permitir que se duplique la información en diferentes niveles jerárquicos."},{"isCorrect":true,"rationale":"La autonomía del usuario se garantiza cuando la estructura jerárquica comunica por sí misma la funcionalidad del programa.","text":"Para que el usuario no dependa de otros documentos adicionales para comprender el manual."},{"isCorrect":false,"rationale":"La claridad de los títulos afecta a la comprensión humana, mientras que la indexación técnica depende de los metadatos y el formato del archivo.","text":"Para asegurar que el buscador de temas pueda indexar archivos .shg."},{"isCorrect":false,"rationale":"La ubicación de la tabla al inicio es una convención de diseño estándar, independiente del contenido semántico de los títulos.","text":"Para evitar que la tabla de contenido se sitúe al final del documento."}],"hint":"Considera la autonomía que debe tener el lector al consultar la guía.","question":"Al diseñar una tabla de contenidos, ¿por qué es fundamental que los títulos sean claros y autoexplicativos?"},{"answerOptions":[{"isCorrect":false,"rationale":"El mapa de navegación es un componente técnico de un fichero de ayuda, no un tipo de manual de documentación externa.","text":"Mapa de navegación"},{"isCorrect":true,"rationale":"Este documento es el recurso primario de aprendizaje y soporte para el cliente final, facilitando el uso cotidiano de la aplicación.","text":"Manual de usuario"},{"isCorrect":false,"rationale":"La guía rápida se centra en procedimientos muy concretos y breves, no en una formación exhaustiva o detección de errores complejos.","text":"Guía rápida"},{"isCorrect":false,"rationale":"El manual de explotación suele dirigirse a equipos de soporte técnico o sistemas para el mantenimiento operativo de la aplicación.","text":"Manual de explotación"}],"hint":"Piensa en el recurso más completo destinado a quien maneja la herramienta.","question":"Dentro de la clasificación de manuales, ¿qué documento tiene como objetivo principal formar al usuario y ayudarle a detectar errores?"},{"answerOptions":[{"isCorrect":true,"rationale":"Esta distinción separa la validación de la lógica de programación de la validación del comportamiento de la interfaz y requisitos funcionales.","text":"Las de caja blanca evalúan el código interno, mientras que las de caja negra evalúan la aplicación externamente."},{"isCorrect":false,"rationale":"Normalmente, los usuarios finales no realizan pruebas de caja blanca, ya que estas requieren acceso y conocimiento del código fuente.","text":"Las de caja negra son realizadas por expertos y las de caja blanca por usuarios finales."},{"isCorrect":false,"rationale":"Ambos tipos de pruebas deben realizarse en fases previas a la producción para asegurar la calidad antes del despliegue final.","text":"Las de caja negra solo se ejecutan en fase de producción."},{"isCorrect":false,"rationale":"Es al revés: la caja negra es ideal para probar interfaces sin conocer el código subyacente.","text":"Las de caja blanca se centran en la interfaz y las de caja negra en el rendimiento del servidor."}],"hint":"Considera la visibilidad que tiene el evaluador sobre el código fuente.","question":"En el proceso de pruebas, ¿qué diferencia sustancial existe entre las pruebas de caja negra y las de caja blanca?"},{"answerOptions":[{"isCorrect":true,"rationale":"El objetivo de la regresión es confirmar que los cambios o correcciones no han degradado funcionalidades previamente validadas.","text":"Prueba de regresión"},{"isCorrect":false,"rationale":"Aunque el error se detecte aquí, la prueba de aceptación es el criterio final del cliente, no el método técnico para validar cambios de código.","text":"Prueba de aceptación"},{"isCorrect":false,"rationale":"Las pruebas unitarias validan algoritmos o clases de forma aislada, no el impacto colateral de una corrección en el sistema integrado.","text":"Prueba unitaria"},{"isCorrect":false,"rationale":"Las pruebas de volumen evalúan el comportamiento del software ante grandes cantidades de datos, no la estabilidad tras cambios de código.","text":"Prueba de volumen"}],"hint":"Evoca el concepto de 'volver atrás' para verificar la estabilidad.","question":"Un equipo detecta que un error corregido recientemente ha provocado un fallo en otra parte del sistema que antes funcionaba. ¿Qué tipo de prueba falló?"},{"answerOptions":[{"isCorrect":false,"rationale":"Las pruebas locales se centran en los errores provocados directamente por los cambios en el módulo que se está modificando.","text":"Prueba de regresión local"},{"isCorrect":false,"rationale":"El término 'ascendente' se refiere a una estrategia de integración de módulos, no a una categoría de errores de regresión.","text":"Prueba de regresión ascendente"},{"isCorrect":false,"rationale":"Este tipo ocurre cuando un cambio revela un error preexistente que no tiene relación directa con la modificación realizada.","text":"Prueba de regresión desenmascarada"},{"isCorrect":true,"rationale":"Este fenómeno ocurre específicamente durante la fase de ensamblaje, donde las interacciones entre módulos generan comportamientos imprevistos.","text":"Prueba de regresión remota"}],"hint":"Se refiere a errores que aparecen a 'distancia' del módulo original.","question":"Dentro de la tipología de regresión, ¿cómo se denomina el error que surge cuando la integración de partes individuales revela un fallo que no ocurría por separado?"},{"answerOptions":[{"isCorrect":false,"rationale":"Aunque pueden requerir análisis técnico, estas pruebas suelen considerarse de caja negra al evaluar el comportamiento externo del sistema completo.","text":"Pruebas de caja blanca"},{"isCorrect":false,"rationale":"El rendimiento y la seguridad suelen evaluarse a nivel de sistema completo o integración, no en pequeñas funciones aisladas.","text":"Pruebas unitarias"},{"isCorrect":false,"rationale":"Los errores lógicos son fallos en el diseño del programa, mientras que el rendimiento es un atributo de eficiencia operativa.","text":"Pruebas lógicas"},{"isCorrect":true,"rationale":"Estas pruebas evalúan el comportamiento externo y los atributos de calidad del sistema, más allá de la lógica interna de las tareas.","text":"Pruebas no funcionales"}],"hint":"Diferencia entre 'qué hace el programa' y 'cómo se comporta externamente'.","question":"Según la norma ISO $25010$, ¿en qué categoría se clasifican las pruebas de capacidad, rendimiento y seguridad?"},{"answerOptions":[{"isCorrect":false,"rationale":"Esta descripción corresponde a la integración ascendente, donde se agrupan módulos básicos antes de integrarlos en la estructura superior.","text":"Comienza evaluando los niveles más bajos y requiere un controlador."},{"isCorrect":false,"rationale":"La corrección de sintaxis es parte de la fase de compilación y depuración de código, no de la estrategia de integración de módulos.","text":"Se enfoca exclusivamente en la corrección de errores de sintaxis."},{"isCorrect":true,"rationale":"Este enfoque permite validar primero la arquitectura de control superior antes de profundizar en los detalles de las funciones de bajo nivel.","text":"Se evalúa desde el módulo principal hacia los subordinados."},{"isCorrect":false,"rationale":"La integración puede probarse manual o automáticamente, y JMeter está especializado en carga y rendimiento, no en flujo de módulos.","text":"Solo puede realizarse mediante herramientas automáticas como JMeter."}],"hint":"Visualiza una jerarquía de arriba hacia abajo.","question":"Al realizar pruebas de integración, ¿qué caracteriza a la integración de tipo 'descendente'?"},{"answerOptions":[{"isCorrect":false,"rationale":"Los errores de lógica suelen ser mejor detectados mediante un diseño de pruebas riguroso y, a menudo, depuración manual por parte del desarrollador.","text":"Permiten detectar errores de lógica que las herramientas no ven."},{"isCorrect":true,"rationale":"La automatización permite ejecutar baterías de pruebas extensas en poco tiempo cada vez que se modifica el código, garantizando la estabilidad.","text":"Agilizan y optimizan el proceso de evaluación repetitiva."},{"isCorrect":false,"rationale":"Las pruebas de caja blanca pueden ser manuales (depuración línea a línea) o automáticas (herramientas de análisis estático/unitario).","text":"Son las únicas capaces de realizar pruebas de caja blanca."},{"isCorrect":false,"rationale":"Incluso con pruebas automáticas, es imperativo documentar la estrategia y los resultados para cumplir con los estándares de calidad.","text":"Eliminan la necesidad de documentar la estrategia de pruebas."}],"hint":"Considera el factor tiempo en tareas que deben hacerse una y otra vez.","question":"¿Cuál es la principal ventaja de realizar pruebas automáticas en comparación con las manuales, especialmente en regresión?"},{"answerOptions":[{"isCorrect":false,"rationale":"Ambos tipos de objetos deben definir sus dimensiones para que el sistema sepa cómo renderizarlos en la pantalla.","text":"Solo los objetos 'View' pueden tener atributos de 'layout_width'."},{"isCorrect":false,"rationale":"Es al revés: los layouts son subclases de ViewGroup y su función es precisamente gestionar la posición de sus hijos.","text":"Un 'View' gestiona la posición de los layouts y un 'ViewGroup' no."},{"isCorrect":false,"rationale":"Tanto Views (botones, textos) como ViewGroups (layouts) tienen representación o impacto visual, aunque los contenedores a veces sean transparentes.","text":"El 'View' es un elemento invisible y el 'ViewGroup' es siempre un botón."},{"isCorrect":true,"rationale":"Esta jerarquía permite organizar la interfaz mediante contenedores que gestionan la disposición de los controles básicos.","text":"Un 'ViewGroup' puede contener otros elementos en su interior, mientras que un 'View' es un componente simple."}],"hint":"Analiza la relación de 'contenedor' y 'contenido'.","question":"En el desarrollo de interfaces Android, ¿qué diferencia fundamental existe entre un objeto 'View' y un 'ViewGroup'?"},{"answerOptions":[{"isCorrect":false,"rationale":"El margen define el espacio de separación exterior entre el componente y otros elementos o bordes.","text":"layout_margin"},{"isCorrect":false,"rationale":"Este atributo ajusta el tamaño del componente solo al espacio mínimo necesario para mostrar su contenido interno.","text":"wrap_content"},{"isCorrect":false,"rationale":"Este atributo define la alineación o posicionamiento del elemento, no sus dimensiones de ancho o alto.","text":"layout_gravity"},{"isCorrect":true,"rationale":"Este valor instruye al componente para expandirse hasta los límites definidos por el objeto que lo contiene.","text":"match_parent"}],"hint":"Busca el término que sugiere 'coincidir' con el nivel superior.","question":"¿Qué atributo de layout en Android se utiliza para indicar que un elemento debe ocupar el mismo tamaño que su contenedor padre?"},{"answerOptions":[{"isCorrect":true,"rationale":"Su estructura lineal es ideal para diseños sencillos donde los elementos se apilan o se colocan en fila secuencialmente.","text":"LinearLayout"},{"isCorrect":false,"rationale":"Utiliza una rejilla de líneas horizontales y verticales para posicionar elementos mediante índices, no solo en una dirección única.","text":"GridLayout"},{"isCorrect":false,"rationale":"Este layout se basa en posiciones relativas entre hermanos o respecto al padre, ofreciendo más libertad que una simple línea.","text":"RelativeLayout"},{"isCorrect":false,"rationale":"Este formato organiza los elementos en una rejilla de filas y columnas, similar a una hoja de cálculo.","text":"TableLayout"}],"hint":"El nombre del contenedor describe una progresión unidireccional.","question":"Si se desea alinear componentes uno tras otro en una sola dirección (ya sea horizontal o vertical), ¿qué layout de Android es el más apropiado?"},{"answerOptions":[{"isCorrect":false,"rationale":"Para imágenes se suelen utilizar componentes como ImageView, no controles de selección como el Spinner.","text":"Para mostrar imágenes de fondo que se ajustan al contenedor."},{"isCorrect":false,"rationale":"Esta es la función del ToggleButton, que visualmente representa un interruptor de estado binario.","text":"Para permitir al usuario conmutar entre dos estados (encendido/apagado)."},{"isCorrect":true,"rationale":"El Spinner permite al usuario elegir un valor de un conjunto predefinido sin ocupar espacio permanente en la pantalla.","text":"Para implementar menús desplegables de selección rápida."},{"isCorrect":false,"rationale":"El ingreso de texto se realiza mediante elementos TextField o EditText, no a través de selectores desplegables.","text":"Para introducir múltiples líneas de texto en un formulario."}],"hint":"Relaciónalo con una lista que aparece al tocar un elemento.","question":"¿Para qué sirve específicamente el componente 'Spinner' en una interfaz de usuario Android?"},{"answerOptions":[{"isCorrect":false,"rationale":"Los archivos ya están separados por naturaleza; la vista Split solo afecta a cómo se visualiza un único archivo de diseño.","text":"Separar los archivos de lógica (.kt) de los de diseño (.xml)."},{"isCorrect":true,"rationale":"Esta vista híbrida aumenta la productividad al permitir ver el efecto visual inmediato de los cambios realizados en el código XML.","text":"Mostrar simultáneamente el código de implementación y el lienzo de diseño."},{"isCorrect":false,"rationale":"El término se refiere a la interfaz del editor, no a una partición de la arquitectura del proyecto de software.","text":"Dividir el proyecto en múltiples aplicaciones independientes."},{"isCorrect":false,"rationale":"Aunque ayuda a ver errores de diseño, la depuración técnica suele realizarse en la consola o mediante la vista de código pura.","text":"Permitir la depuración de errores de compilación en tiempo real."}],"hint":"Imagina una pantalla dividida para ver dos facetas del mismo archivo.","question":"Al trabajar en Android Studio, ¿cuál es la función de la vista 'Split' en el editor de archivos XML?"},{"answerOptions":[{"isCorrect":false,"rationale":"Las pruebas de usuario se basan precisamente en observar a personas ajenas al desarrollo para detectar problemas de intuición que los expertos ignoran.","text":"Solo expertos, no se requieren usuarios reales."},{"isCorrect":false,"rationale":"Aunque útil para pruebas rápidas, un grupo tan reducido no garantiza la cobertura total de todos los escenarios de uso posibles.","text":"$5$ usuarios"},{"isCorrect":true,"rationale":"Este volumen de muestra permite cubrir una amplia variedad de comportamientos y detectar fallos que no son evidentes para grupos más pequeños.","text":"$15$ usuarios"},{"isCorrect":false,"rationale":"Aunque es un número excelente, el material establece el umbral de eficiencia estadística para la detección total en quince personas.","text":"$50$ usuarios"}],"hint":"Es una cifra situada entre una decena y una veintena.","question":"En el ciclo de pruebas de usuario, ¿cuál es el número mínimo de participantes recomendado para garantizar una tasa de detección de errores cercana al $100\\%$?"},{"answerOptions":[{"isCorrect":true,"rationale":"Corregir un error en un sistema ya desplegado implica volver a pasar por todas las fases previas, lo que dispara los recursos necesarios.","text":"El coste de solucionarlo aumenta de forma exponencial."},{"isCorrect":false,"rationale":"El mantenimiento previene errores, pero la corrección reactiva en producción es siempre más cara que la prevención temprana.","text":"El coste se mantiene constante gracias al mantenimiento."},{"isCorrect":false,"rationale":"El coste no se refiere solo a licencias, sino al tiempo de los desarrolladores y el posible impacto negativo en el cliente.","text":"No tiene impacto económico si se utiliza software libre."},{"isCorrect":false,"rationale":"Al contrario, descubrir errores tarde obliga a reiniciar la implementación, lo que extiende los plazos del proyecto.","text":"Se reduce el tiempo necesario para la fase de implementación."}],"hint":"Considera la complejidad de arreglar algo que ya está en manos del cliente.","question":"Según el gráfico de costes de pruebas, ¿qué ocurre si un error se detecta en la fase de producción en lugar de la fase de diseño?"},{"answerOptions":[{"isCorrect":false,"rationale":"Las pruebas públicas suelen ser Betas abiertas; las Alfas son restringidas y privadas del entorno de desarrollo.","text":"En un entorno público accesible por cualquier usuario de internet."},{"isCorrect":false,"rationale":"La versión Alfa no está lista para producción; hacerlo supondría un riesgo inaceptable para la operatividad del cliente.","text":"Directamente en los servidores de producción del cliente final."},{"isCorrect":true,"rationale":"Al ser la primera versión completa, se prueba internamente mediante expertos que simulan ser el cliente antes de cualquier entrega externa.","text":"En las propias oficinas de trabajo de los desarrolladores."},{"isCorrect":false,"rationale":"Aunque se usan dispositivos reales, el factor clave es el entorno controlado y simulado por el equipo de desarrollo.","text":"En dispositivos móviles reales seleccionados aleatoriamente."}],"hint":"Piensa en el lugar donde nace el código.","question":"Diferencia entre las versiones Alfa y Beta: ¿En qué entorno se realiza habitualmente la prueba Alfa?"},{"answerOptions":[{"isCorrect":false,"rationale":"Un compilador es un proceso técnico de traducción de código, carente de capacidad para juzgar requisitos funcionales.","text":"El compilador de JavaHelp."},{"isCorrect":false,"rationale":"Bugzilla es una herramienta para gestionar errores, no para definir si las funcionalidades cumplen los deseos del cliente.","text":"Las herramientas automáticas de seguimiento como Bugzilla."},{"isCorrect":false,"rationale":"Los programadores ejecutan pruebas técnicas, pero el criterio de 'aceptación' es un concepto de negocio definido por quien encarga el software.","text":"El equipo de programadores junior."},{"isCorrect":true,"rationale":"Son ellos quienes determinan si el producto cumple con sus necesidades y especificaciones de negocio antes de la implantación definitiva.","text":"Los clientes o usuarios finales."}],"hint":"Identifica a la parte que realiza el encargo del proyecto.","question":"¿Quién tiene la responsabilidad principal de definir los planes y criterios de las pruebas de aceptación?"},{"answerOptions":[{"isCorrect":false,"rationale":"El formato .deb se utiliza para la gestión de paquetes en distribuciones Linux basadas en Debian.","text":".deb"},{"isCorrect":false,"rationale":"Aunque un JAR puede convertirse a EXE mediante herramientas externas, el formato nativo del entorno Java es el .jar.","text":".exe"},{"isCorrect":true,"rationale":"El archivo Java Archive (JAR) permite agrupar múltiples archivos de clase, recursos y metadatos en un solo fichero distribuible.","text":".jar"},{"isCorrect":false,"rationale":"MSI es un formato de instalador específico para sistemas operativos Windows, no es exclusivo de la tecnología Java.","text":".msi"}],"hint":"Es el acrónimo de 'Java Archive'.","question":"En el empaquetado de aplicaciones, ¿cuál es el formato estándar para distribuir programas desarrollados en Java?"},{"answerOptions":[{"isCorrect":false,"rationale":"Este término suele referirse a opciones de configuración visual (pantallas de carga), no es una herramienta de conversión de formato de paquetes.","text":"EnableSplash"},{"isCorrect":false,"rationale":"AptUrl es una herramienta para gestionar la descarga e instalación de paquetes desde un navegador web.","text":"AptUrl"},{"isCorrect":true,"rationale":"Esta utilidad 'envuelve' la aplicación Java en un ejecutable nativo para facilitar su distribución en entornos Windows.","text":"Launch4j"},{"isCorrect":false,"rationale":"JMeter se utiliza para pruebas de carga y rendimiento, no tiene funciones de empaquetado o conversión de archivos.","text":"JMeter"}],"hint":"Su nombre sugiere el lanzamiento o inicio de una aplicación.","question":"¿Qué herramienta permite transformar un paquete de tipo JAR en un ejecutable de Windows (.exe)?"},{"answerOptions":[{"isCorrect":false,"rationale":"La sintaxis es revisada automáticamente por el entorno de desarrollo, notificando al programador de inmediato.","text":"Errores de sintaxis"},{"isCorrect":true,"rationale":"Al no violar la sintaxis ni provocar una parada del sistema, el programa funciona pero entrega resultados incorrectos, requiriendo pruebas exhaustivas.","text":"Errores de lógica"},{"isCorrect":false,"rationale":"Aunque ocurren con el programa en marcha, suelen generar excepciones o mensajes que facilitan la localización del problema.","text":"Errores de ejecución"},{"isCorrect":false,"rationale":"Son fáciles de detectar porque el propio compilador detiene el proceso e indica exactamente dónde falló la sintaxis.","text":"Errores de compilación"}],"hint":"Se trata de un fallo en el razonamiento del diseño.","question":"¿Qué tipo de error de depuración es el más complejo de detectar debido a que no devuelve mensajes de error automáticos?"},{"answerOptions":[{"isCorrect":false,"rationale":"La transparencia se gestiona mediante atributos de color o 'alpha', no a través de la gravedad del layout.","text":"La transparencia del fondo de la aplicación."},{"isCorrect":false,"rationale":"Para gestionar la separación entre componentes se utiliza el atributo 'layout_margin'.","text":"La distancia entre dos componentes adyacentes."},{"isCorrect":true,"rationale":"Este atributo indica hacia dónde debe 'tirar' el componente (izquierda, derecha, centro) dentro del espacio asignado por el ViewGroup.","text":"La posición de un elemento dentro de su contenedor padre."},{"isCorrect":false,"rationale":"Los atributos XML definen propiedades visuales estáticas, no el flujo lógico de ejecución de la aplicación.","text":"El orden cronológico de ejecución del código."}],"hint":"Piensa en la fuerza que atrae a los objetos hacia un lado.","question":"En el diseño de interfaces Android, ¿qué permite controlar específicamente el atributo 'layout_gravity'?"},{"answerOptions":[{"isCorrect":true,"rationale":"Busca encontrar el punto de ruptura del sistema y verificar cómo se comporta cuando se superan sus límites operativos normales.","text":"Evaluar la capacidad de recuperación del software ante una sobrecarga de datos."},{"isCorrect":false,"rationale":"Esto sería una prueba funcional de la documentación, no una evaluación de la robustez del servidor o sistema.","text":"Verificar que los hipervínculos de la ayuda funcionen correctamente."},{"isCorrect":false,"rationale":"La estética es un criterio de diseño de interfaz, no un objetivo técnico de las pruebas de estrés.","text":"Garantizar que la interfaz sea visualmente atractiva para el usuario."},{"isCorrect":false,"rationale":"Esta es la función de las pruebas de rendimiento, que analizan la eficiencia en condiciones de uso normales o controladas.","text":"Medir el tiempo de respuesta y la velocidad de procesamiento."}],"hint":"Considera situaciones extremas de funcionamiento.","question":"¿Cuál es el propósito principal de las pruebas de estrés (stress testing) según la documentación?"},{"answerOptions":[{"isCorrect":false,"rationale":"Es un archivo de configuración global del sistema Android, no el punto de entrada directo para el desarrollo de la interfaz principal.","text":"AndroidManifest.xml"},{"isCorrect":false,"rationale":"Este archivo contiene el diseño visual de la interfaz, pero no es el archivo de lógica que se muestra por defecto al iniciar el proyecto.","text":"activity_main.xml"},{"isCorrect":false,"rationale":"Android Studio utiliza convenciones de nombres específicas y, actualmente, prioriza Kotlin (.kt) sobre Java en proyectos nuevos.","text":"ProjectInit.java"},{"isCorrect":true,"rationale":"Es el archivo que contiene la lógica de programación inicial (en Kotlin) asociada a la ventana principal de la aplicación.","text":"MainActivity.kt"}],"hint":"Busca el nombre que combina 'actividad' y 'principal'.","question":"Al crear un nuevo proyecto en Android Studio, ¿cómo se denomina el archivo de código fuente principal que se abre por defecto?"},{"answerOptions":[{"isCorrect":false,"rationale":"Los widgets incluyen elementos más complejos como calendarios o barras de progreso, no los selectores básicos de estado.","text":"Widgets"},{"isCorrect":true,"rationale":"Aunque tienen funciones específicas de estado, su comportamiento base es una interacción de pulsación tipo botón.","text":"Buttons"},{"isCorrect":false,"rationale":"Aunque son comunes, el sistema los organiza específicamente bajo la categoría de botones por su naturaleza interactiva.","text":"Common"},{"isCorrect":false,"rationale":"Los contenedores sirven para agrupar otros elementos; los selectores son componentes individuales (Views).","text":"Containers"}],"hint":"Se agrupan por su mecanismo físico de interacción.","question":"Dentro de la paleta de componentes de Android, ¿en qué categoría se encuentran elementos como el 'CheckBox' y el 'ToggleButton'?"},{"answerOptions":[{"isCorrect":true,"rationale":"Los cuadros de diálogo permiten captar la atención del usuario para decisiones críticas o confirmaciones de seguridad.","text":"Mantener una comunicación activa y mejorar la interacción con el usuario."},{"isCorrect":false,"rationale":"Los diálogos son complementos temporales; la estructura base de la aplicación siempre requiere layouts para organizar el contenido fijo.","text":"Sustituir por completo el uso de Layouts en la pantalla principal."},{"isCorrect":false,"rationale":"La compilación depende del hardware y el código total, no de si se incluyen o no ventanas de diálogo.","text":"Acelerar el tiempo de compilación de las librerías de Google Maps."},{"isCorrect":false,"rationale":"El uso de diálogos no afecta significativamente al tamaño del archivo, sino a la experiencia de usuario (UX).","text":"Reducir el tamaño total del paquete de instalación (.apk)."}],"hint":"Piensa en el flujo de retroalimentación hacia el cliente.","question":"En el diseño de interfaces móviles, ¿cuál es una de las principales utilidades de las ventanas emergentes (diálogos)?"}];
        let currentIndex = 0;
        let mode = 'quiz';
        let state = quizData.map(() => ({ selectedIndex: null, hintVisible: false }));

        function getStats() {
            const answered = state.filter((s) => s.selectedIndex !== null).length;
            const correct = state.filter((s, i) => s.selectedIndex !== null && quizData[i].answerOptions[s.selectedIndex].isCorrect).length;
            const wrong = state.filter((s, i) => s.selectedIndex !== null && !quizData[i].answerOptions[s.selectedIndex].isCorrect).length;
            const skipped = quizData.length - answered;
            const accuracy = answered > 0 ? Math.round((correct / answered) * 100) : 0;
            return { answered, correct, wrong, skipped, accuracy };
        }

        function shuffleAnswers() {
            quizData.forEach((q) => {
                for (let i = q.answerOptions.length - 1; i > 0; i -= 1) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [q.answerOptions[i], q.answerOptions[j]] = [q.answerOptions[j], q.answerOptions[i]];
                }
            });
        }

        function shuffleQuestions() {
            for (let i = quizData.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
            }
        }

        function resetState() {
            state = quizData.map(() => ({ selectedIndex: null, hintVisible: false }));
        }

        function renderQuestion() {
            const q = quizData[currentIndex];
            const s = state[currentIndex];
            const content = document.getElementById('quiz-content');
            const results = document.getElementById('results-content');
            const hintBox = document.getElementById('hint-box');
            const nav = document.querySelector('.navigation');
            const nextBtn = document.getElementById('next-btn');
            const prevBtn = document.getElementById('prev-btn');

            let optionsHtml = '';
            const correctIndex = q.answerOptions.findIndex((o) => o.isCorrect);
            const selectedCorrect = s.selectedIndex !== null && q.answerOptions[s.selectedIndex].isCorrect;
            q.answerOptions.forEach((opt, idx) => {
                const isSelected = s.selectedIndex === idx;
                const statusClass = isSelected ? (opt.isCorrect ? 'correct' : 'incorrect') : '';
                const selectedClass = isSelected ? 'selected' : '';
                const revealCorrect = (s.selectedIndex !== null && !selectedCorrect && opt.isCorrect) || (mode === 'review' && opt.isCorrect);
                const revealClass = revealCorrect ? 'revealed-correct' : '';

                optionsHtml += `
                    <li class="option-item ${selectedClass} ${statusClass} ${revealClass}" onclick="selectOption(${idx})">
                        <div class="option-label">
                            <span>${String.fromCharCode(65 + idx)}. ${opt.text}</span>
                        </div>
                        <div class="feedback-state">
                            ${opt.isCorrect ? '✓ Correcto' : '✕ Incorrecto'}
                        </div>
                        ${opt.rationale ? '<div class="rationale">' + opt.rationale + '</div>' : ''}
                    </li>
                `;
            });

            const stats = getStats();

            content.innerHTML = `
                <div class="progress-container">
                    <div class="progress-text">${currentIndex + 1} / ${quizData.length}</div>
                    <div class="status-bar">
                        <div class="status-item status-correct">
                            <span>✓</span>
                            <span>${stats.correct}</span>
                        </div>
                        <div class="status-item status-wrong">
                            <span>✕</span>
                            <span>${stats.wrong}</span>
                        </div>
                    </div>
                </div>
                <div class="question-text">${q.question}</div>
                <ul class="options-list">
                    ${optionsHtml}
                </ul>
            `;

            // Update Pista Box
            const hintText = document.getElementById('hint-text');
            hintText.innerText = q.hint || 'No hay pista disponible para esta pregunta.';
            if (s.hintVisible) {
                hintBox.classList.add('active');
            } else {
                hintBox.classList.remove('active');
            }

            results.classList.add('hidden');
            content.classList.remove('hidden');
            hintBox.classList.remove('hidden');
            nav.classList.remove('hidden');

            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = false;
            if (mode === 'review') {
                nextBtn.innerText = currentIndex === quizData.length - 1 ? 'Volver a resultados' : 'Siguiente';
            } else {
                nextBtn.innerText = currentIndex === quizData.length - 1 ? 'Finalizar' : 'Siguiente';
            }
            document.getElementById('hint-icon-arrow').innerText = s.hintVisible ? '▲' : '▼';
        }

        function selectOption(idx) {
            if (mode !== 'quiz') return;
            if (state[currentIndex].selectedIndex !== null) return; // Prevent re-selection
            state[currentIndex].selectedIndex = idx;
            renderQuestion();
        }

        function toggleHint() {
            if (mode === 'results') return;
            state[currentIndex].hintVisible = !state[currentIndex].hintVisible;
            renderQuestion();
        }

        function renderResults() {
            const stats = getStats();
            const content = document.getElementById('quiz-content');
            const results = document.getElementById('results-content');
            const hintBox = document.getElementById('hint-box');
            const nav = document.querySelector('.navigation');

            const score = `${stats.correct} / ${quizData.length}`;

            results.innerHTML = `
                <div class="results-screen">
                    <div>
                        <h1 class="results-title">¡Lo lograste! Quiz completado.</h1>
                        <p class="results-subtitle">Revisa tu puntuación o inténtalo de nuevo.</p>
                    </div>
                    <div class="results-grid">
                        <div class="result-card">
                            <div class="result-label">Puntuación</div>
                            <div class="result-value">${score}</div>
                        </div>
                        <div class="result-card">
                            <div class="result-label">Precisión</div>
                            <div class="result-value">${stats.accuracy}%</div>
                        </div>
                        <div class="result-card">
                            <div class="result-metrics">
                                <div>Correctas <strong>${stats.correct}</strong></div>
                                <div>Incorrectas <strong>${stats.wrong}</strong></div>
                                <div>Omitidas <strong>${stats.skipped}</strong></div>
                            </div>
                        </div>
                    </div>
                    <div class="results-actions">
                        <button id="review-btn" class="btn btn-ghost">Revisar Quiz</button>
                        <button id="retake-btn" class="btn btn-next">Repetir Quiz</button>
                    </div>
                </div>
            `;

            content.classList.add('hidden');
            results.classList.remove('hidden');
            hintBox.classList.add('hidden');
            nav.classList.add('hidden');

            document.getElementById('review-btn').onclick = () => {
                mode = 'review';
                currentIndex = 0;
                renderQuestion();
            };

            document.getElementById('retake-btn').onclick = () => {
                mode = 'quiz';
                currentIndex = 0;
                shuffleQuestions();
                shuffleAnswers();
                resetState();
                renderQuestion();
            };
        }

        document.getElementById('prev-btn').onclick = () => {
            if (mode === 'results') return;
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        };

        document.getElementById('next-btn').onclick = () => {
            if (mode === 'results') return;
            if (mode === 'review') {
                if (currentIndex < quizData.length - 1) {
                    currentIndex++;
                    renderQuestion();
                } else {
                    mode = 'results';
                    renderResults();
                }
                return;
            }
            if (currentIndex < quizData.length - 1) {
                currentIndex++;
                renderQuestion();
            } else {
                mode = 'results';
                renderResults();
            }
        };

        document.getElementById('hint-toggle').onclick = toggleHint;

        renderQuestion();
    </script>
