<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotebookLM - Quiz Export</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

        :root {
            --bg: #f6f1e7;
            --bg-deep: #efe4d6;
            --ink: #171717;
            --muted: #5b5b5b;
            --accent: #d3542c;
            --accent-light: #ff8f5a;
            --accent-dark: #b14320;
            --teal: #1f6f78;
            --card: #fff7ef;
            --stroke: #e3d6c5;
            --shadow: 0 18px 40px rgba(23, 23, 23, 0.12);
            --radius-sm: 10px;
            --radius-md: 12px;
            --radius-lg: 14px;
            --radius-xl: 18px;
            --radius-2xl: 22px;
            --space-1: 6px;
            --space-2: 8px;
            --space-3: 10px;
            --space-4: 12px;
            --space-5: 14px;
            --space-6: 16px;
            --space-7: 18px;
            --space-8: 20px;
            --space-9: 24px;
            --space-10: 32px;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'IBM Plex Sans', sans-serif;
            --error: #b54832;
        }

        body {
            font-family: var(--font-body);
            background:
                radial-gradient(240px 140px at 10% -10%, #ffd2b9 0%, transparent 70%),
                radial-gradient(220px 160px at 90% 0%, #cfe7e6 0%, transparent 65%),
                linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
            color: var(--ink);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            width: 100%;
            max-width: 800px;
            padding: var(--space-10) var(--space-8);
            box-sizing: border-box;
            background: var(--card);
            border-radius: var(--radius-2xl);
            border: 1px solid var(--stroke);
            box-shadow: var(--shadow);
        }

        .progress-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .progress-text {
            color: var(--muted);
            font-size: 0.9em;
        }

        .status-bar {
            display: flex;
            gap: 16px;
            font-size: 0.9em;
            font-weight: 500;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-correct { color: var(--teal); }
        .status-wrong { color: var(--error); }

        .question-text {
            font-family: var(--font-display);
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .options-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-item {
            background-color: #fff;
            border: 1px solid var(--stroke);
            padding: var(--space-4) var(--space-6);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option-item:hover:not(.selected) {
            background-color: var(--card);
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .option-item.selected.correct {
            background-color: rgba(31, 111, 120, 0.12);
            border-color: var(--teal);
        }

        .option-item.selected.incorrect {
            background-color: rgba(181, 72, 50, 0.12);
            border-color: var(--error);
        }

        .option-item.revealed-correct {
            border-color: rgba(31, 111, 120, 0.5);
            box-shadow: inset 0 0 0 1px rgba(31, 111, 120, 0.16);
        }

        .option-label {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .feedback-state {
            font-weight: bold;
            font-size: 0.9em;
            display: none;
        }

        .selected .feedback-state {
            display: block;
        }

        .revealed-correct .feedback-state {
            display: block;
        }

        .correct .feedback-state { color: var(--teal); }
        .incorrect .feedback-state { color: var(--error); }
        .revealed-correct .feedback-state { color: var(--teal); }

        .rationale {
            font-size: 0.95em;
            color: var(--muted);
            margin-top: 4px;
            line-height: 1.5;
            display: none;
        }

        .selected .rationale {
            display: block;
        }

        .revealed-correct .rationale {
            display: block;
        }
        .hint-toggle {
            border: 1px solid var(--stroke);
            color: var(--muted);
            cursor: pointer;
            padding: var(--space-2) var(--space-6);
            border-radius: var(--radius-md);
            background-color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .hint-toggle:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .hint-content {
            margin-top: 32px;
            padding: var(--space-6);
            background-color: #fff;
            border: 1px solid var(--stroke);
            border-radius: var(--radius-lg);
            font-size: 0.95em;
            color: var(--muted);
            display: none;
            align-items: flex-start;
            gap: 16px;
        }

        .hint-content.active {
            display: flex;
        }

        .hint-icon-box {
            color: var(--accent-dark);
            font-size: 1.2em;
            margin-top: -2px;
        }

        .navigation {
            margin-top: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            border-radius: var(--radius-md);
            padding: var(--space-2) var(--space-7);
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-prev {
            background-color: #fff;
            color: var(--ink);
            border-color: var(--stroke);
        }

        .btn-prev:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn-next {
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            color: #fff;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .results-screen {
            display: flex;
            flex-direction: column;
            gap: var(--space-8);
        }

        .results-title {
            font-family: var(--font-display);
            font-size: 2.1em;
            margin: 0;
        }

        .results-subtitle {
            color: var(--muted);
            margin: 0;
            font-size: 1em;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-6);
        }

        .result-card {
            padding: var(--space-6);
            border-radius: var(--radius-xl);
            background: #fff;
            border: 1px solid var(--stroke);
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        .result-label {
            color: var(--muted);
            font-size: 0.95em;
        }

        .result-value {
            font-size: 2em;
            font-family: var(--font-display);
        }

        .result-metrics {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
            color: var(--muted);
            font-size: 0.95em;
        }

        .results-actions {
            display: flex;
            gap: var(--space-4);
            flex-wrap: wrap;
        }

        .btn-ghost {
            background-color: transparent;
            border: 1px solid var(--stroke);
            color: var(--ink);
        }

        .hidden { display: none; }

        @media (max-width: 900px) {
            .quiz-container {
                margin: var(--space-8);
                max-width: 100%;
            }
        }

        @media (max-width: 720px) {
            .quiz-container {
                padding: var(--space-8) var(--space-6);
            }

            .question-text {
                font-size: 1.3em;
            }

            .option-item {
                padding: var(--space-4);
            }
        }

        @media (max-width: 520px) {
            body {
                align-items: flex-start;
            }

            .quiz-container {
                margin: var(--space-6);
                padding: var(--space-7) var(--space-5);
            }

            .progress-container {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-3);
            }

            .navigation {
                flex-direction: column;
                align-items: stretch;
                gap: var(--space-4);
            }

            .nav-buttons {
                width: 100%;
            }

            .btn {
                width: 100%;
            }

            .hint-toggle {
                justify-content: space-between;
            }

            .results-actions {
                flex-direction: column;
            }
        }
    
    [data-theme="dark"] {
      --bg: #1a1612;
      --bg-deep: #141210;
      --ink: #f0ebe0;
      --muted: #9a9080;
      --accent: #e8673a;
      --accent-light: #ff9a6a;
      --accent-dark: #c45528;
      --teal: #2a9aa8;
      --card: #221e18;
      --stroke: #3a3028;
      --shadow: 0 18px 40px rgba(0,0,0,0.4);
      --error: #e06050;
    }
    [data-theme="dark"] body {
      background:
        radial-gradient(240px 140px at 10% -10%, #3a1a08 0%, transparent 70%),
        radial-gradient(220px 160px at 90% 0%, #0a2a2e 0%, transparent 65%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
    }
    [data-theme="dark"] .option-item { background-color: var(--card); }
    [data-theme="dark"] .hint-toggle,
    [data-theme="dark"] .hint-content,
    [data-theme="dark"] .btn-prev { background-color: var(--card); color: var(--ink); }
    [data-theme="dark"] .result-card { background: var(--card); }
    [data-theme="dark"] .btn-next {
      background: linear-gradient(90deg, #e8673a, #f28c5e);
      box-shadow: 0 4px 20px rgba(232, 103, 58, 0.35);
      color: #fff;
    }
    [data-theme="dark"] .btn-next:hover:not(:disabled) {
      box-shadow: 0 6px 24px rgba(232, 103, 58, 0.5);
    }
    
    /* quiz-mobile-v3 */
    @media (max-width: 640px) {
      body {
        height: 100dvh;
        overflow: hidden;
        align-items: flex-start;
        padding: 0;
      }
      .quiz-container {
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        margin: 0;
        border-radius: 0;
        border-left: none;
        border-right: none;
        border-top: none;
        padding-bottom: 0;
      }
      #quiz-content,
      #results-content {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        min-height: 0;
        padding-bottom: 8px;
      }
      #hint-box { flex-shrink: 0; }
      .navigation {
        flex-shrink: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        margin-top: 0;
        background: var(--card);
        border-top: 1px solid var(--stroke);
      }
    }
    </style>
</head>
<body>
    <div class="quiz-container">

    <div class="quiz-heading" style="margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--stroke)">
      <a href="../index.html" style="font-size:0.82em;color:var(--muted);text-decoration:none;font-family:var(--font-body)">← Índice</a>
      <h1 style="font-family:var(--font-display);font-size:1.1em;font-weight:700;color:var(--ink);margin-top:8px;padding-right:44px">Itinerario Personal para la Empleabilidad · Quiz 3</h1>
    </div>
        <div id="quiz-content">
            <!-- Dynamic Content -->
        </div>
        <div id="results-content" class="hidden"></div>

        <div id="hint-box" class="hint-content">
            <div class="hint-icon-box">💡</div>
            <div id="hint-text"></div>

        <div class="navigation">
            <button id="hint-toggle" class="hint-toggle">
                <span>Pista</span>
                <span id="hint-icon-arrow">▼</span>

                <button id="prev-btn" class="btn btn-prev">Anterior</button>
                <button id="next-btn" class="btn btn-next">Siguiente</button>
            </div>
        </div>
    </div>

    <script>
        let quizData = [{"answerOptions":[{"isCorrect":false,"rationale":"El intraemprendimiento busca el crecimiento y la competitividad de la empresa actual, no su liquidación o transformación total.","text":"El cese de las actividades actuales para pivotar hacia un sector tecnológico diferente."},{"isCorrect":false,"rationale":"La recapitalización externa es un proceso financiero estratégico, no una actividad de innovación de los empleados.","text":"La venta de la mayoría de las acciones a un fondo de inversión para recapitalización."},{"isCorrect":false,"rationale":"El intraemprendimiento ocurre dentro del marco de la organización actual, no necesariamente mediante la creación de filiales externas.","text":"La creación de una entidad legalmente independiente para mitigar riesgos financieros."},{"isCorrect":true,"rationale":"Este concepto se basa en que los trabajadores por cuenta ajena utilicen su conocimiento interno para proponer y desarrollar mejoras o nuevos productos.","text":"La adopción de mentalidades emprendedoras por parte de empleados para innovar internamente."}],"hint":"Considera quiénes son los agentes que impulsan la innovación en este modelo.","question":"¿Qué característica define primordialmente al intraemprendimiento dentro de una organización ya consolidada?"},{"answerOptions":[{"isCorrect":false,"rationale":"Este tipo de liderazgo busca claridad en las tareas y expectativas, no ambigüedad.","text":"Promoción de la ambigüedad estratégica para favorecer la adaptabilidad."},{"isCorrect":false,"rationale":"La innovación radical suele asociarse más con liderazgos transformacionales que con procesos de intercambio.","text":"Fomento de la innovación radical mediante el pensamiento lateral."},{"isCorrect":true,"rationale":"El liderazgo transaccional opera bajo la premisa de intercambios específicos entre el líder y los seguidores para cumplir objetivos.","text":"Uso de sistemas de recompensas y castigos basados en resultados."},{"isCorrect":false,"rationale":"El enfoque transaccional es generalmente estructurado y se basa en normas y procedimientos establecidos.","text":"Gestión basada exclusivamente en la improvisación y la flexibilidad operativa."}],"hint":"Relaciona el término 'transacción' con la dinámica entre superiores y empleados.","question":"En el contexto del liderazgo transaccional, ¿en qué se centra el foco principal para gestionar el rendimiento?"},{"answerOptions":[{"isCorrect":false,"rationale":"La distribución o 'place' se encarga de la logística y la ubicación de los puntos de venta.","text":"Distribución"},{"isCorrect":false,"rationale":"El producto se centra en el diseño, la calidad y las características físicas o funcionales de lo que se ofrece.","text":"Producto"},{"isCorrect":false,"rationale":"La promoción se dedica a dar a conocer el producto mediante publicidad y relaciones públicas.","text":"Promoción"},{"isCorrect":true,"rationale":"Esta variable equilibra factores internos como los costes y factores externos como la competencia y la disposición al pago del cliente.","text":"Precio"}],"hint":"Es el único elemento de la mezcla que genera ingresos directos.","question":"Dentro del Marketing Mix ($4P$), ¿qué variable se encarga de analizar los costes de fabricación y la demanda del mercado para fijar un valor monetario?"},{"answerOptions":[{"isCorrect":false,"rationale":"Esta cifra suele asociarse con los estatutos de algunas cooperativas, no con sociedades capitalistas de gran tamaño.","text":"$2.000\\ €$"},{"isCorrect":false,"rationale":"Aunque era el mínimo tradicional para las S.L., las Sociedades Anónimas siempre han requerido una cifra significativamente mayor.","text":"$3.000\\ €$"},{"isCorrect":true,"rationale":"La ley establece este capital mínimo para las S.A., el cual debe estar dividido en acciones que pueden ser negociadas en bolsa.","text":"$60.000\\ €$"},{"isCorrect":false,"rationale":"Este es el mínimo actual para una Sociedad de Responsabilidad Limitada, pero es insuficiente para una S.A.","text":"$1\\ €$"}],"hint":"Es una cifra elevada pensada para empresas de gran volumen.","question":"¿Cuál es el capital social mínimo requerido para constituir una Sociedad Anónima ($S.A.$) en España?"},{"answerOptions":[{"isCorrect":false,"rationale":"Esa acción corresponde más bien a la 'S' de sustituir dentro de la misma metodología.","text":"Reemplazar materias primas por alternativas sostenibles."},{"isCorrect":false,"rationale":"La reevaluación del mercado es parte del testeo o del plan de empresa, no es una fase directa de SCAMPER.","text":"Reevaluar el mercado objetivo tras el fracaso del prototipo."},{"isCorrect":true,"rationale":"Reorganizar permite ver si un cambio en la secuencia o estructura actual genera un valor inesperado o mejora el funcionamiento.","text":"Reorganizar o reestructurar el orden de los componentes o etapas."},{"isCorrect":false,"rationale":"SCAMPER se centra en la modificación creativa del producto o proceso, no solo en la eficiencia de costes.","text":"Reducción de costes operativos mediante la automatización."}],"hint":"Piensa en cambiar el orden lógico de las cosas.","question":"En el método SCAMPER, ¿a qué hace referencia la letra 'R'?"},{"answerOptions":[{"isCorrect":false,"rationale":"La S.L.U. otorga personalidad jurídica independiente, lo que permite limitar la responsabilidad al capital aportado.","text":"Ambos tienen responsabilidad ilimitada al ser negocios de una sola persona."},{"isCorrect":true,"rationale":"La S.L.U. ofrece un 'paraguas' legal que limita el riesgo al capital social, mientras que el autónomo actúa en nombre propio con todos sus bienes.","text":"El autónomo responde con su patrimonio personal y el socio de la S.L.U. solo con el capital de la empresa."},{"isCorrect":false,"rationale":"Al ser unipersonal, no hay otros socios con quienes compartir la responsabilidad de forma solidaria.","text":"La responsabilidad de la S.L.U. es solidaria entre todos los socios participantes."},{"isCorrect":false,"rationale":"Es exactamente al revés; la figura de la sociedad busca precisamente proteger el patrimonio personal.","text":"El autónomo tiene responsabilidad limitada y el socio de la S.L.U. ilimitada."}],"hint":"Considera qué figura ofrece mayor protección para la vivienda o ahorros personales del emprendedor.","question":"¿Qué diferencia fundamental existe entre un autónomo y una Sociedad Limitada Unipersonal ($S.L.U.$) en cuanto a la responsabilidad?"},{"answerOptions":[{"isCorrect":true,"rationale":"Esta fase utiliza la observación y entrevistas para ver el mundo desde la perspectiva del cliente potencial.","text":"Comprender profundamente las necesidades y comportamientos del usuario."},{"isCorrect":false,"rationale":"La rentabilidad se analiza en fases posteriores de viabilidad económica, no en el diseño centrado en el usuario.","text":"Definir las métricas de rentabilidad del proyecto."},{"isCorrect":false,"rationale":"La selección de ideas ocurre tras la fase de 'Idear', mientras que empatizar es el primer paso del proceso.","text":"Seleccionar la mejor idea generada en la lluvia de ideas."},{"isCorrect":false,"rationale":"La creación de versiones físicas o digitales corresponde a la fase de 'Prototipar'.","text":"Crear un producto mínimamente viable para el mercado."}],"hint":"Se trata de ponerse en los zapatos de la otra persona.","question":"En la técnica de Design Thinking, ¿cuál es el objetivo primordial de la fase de 'Empatizar'?"},{"answerOptions":[{"isCorrect":false,"rationale":"Se enfoca en resolver problemas comunitarios o ambientales, independientemente de la situación laboral del fundador.","text":"Emprendimiento social"},{"isCorrect":false,"rationale":"Este tipo surge al identificar una brecha o necesidad rentable en el mercado, no por desesperación laboral.","text":"Emprendimiento por oportunidad"},{"isCorrect":true,"rationale":"Ocurre cuando el individuo inicia un negocio como una alternativa de autoempleo ante la falta de vacantes en el mercado de trabajo.","text":"Emprendimiento por necesidad"},{"isCorrect":false,"rationale":"El escalable busca un crecimiento masivo y tecnológico, no necesariamente es una respuesta a la falta de empleo.","text":"Emprendimiento escalable"}],"hint":"Considera la motivación de supervivencia económica detrás de la iniciativa.","question":"¿Qué tipo de emprendimiento surge específicamente por la falta de opciones de empleo tradicionales?"},{"answerOptions":[{"isCorrect":false,"rationale":"Los recursos son los activos (físicos, intelectuales) que la empresa posee para operar.","text":"Recursos clave"},{"isCorrect":true,"rationale":"Este bloque identifica la red de proveedores y socios que optimizan el modelo de negocio y reducen riesgos.","text":"Alianzas clave"},{"isCorrect":false,"rationale":"Las actividades clave son las acciones internas que la empresa debe ejecutar, no las entidades externas.","text":"Actividades clave"},{"isCorrect":false,"rationale":"Los segmentos de clientes son quienes pagan por el valor, no quienes colaboran en la producción.","text":"Segmentos de clientes"}],"hint":"Se refiere a la red de contactos externos indispensables.","question":"Dentro del Modelo Canvas, ¿qué bloque describe a los socios y proveedores que ayudan a que el negocio funcione?"},{"answerOptions":[{"isCorrect":false,"rationale":"Una cooperativa requiere por definición la colaboración de múltiples personas; un solo socio formaría una S.L.U.","text":"1 socio"},{"isCorrect":true,"rationale":"La ley generalmente exige un mínimo de tres socios para garantizar la estructura participativa y democrática de la cooperativa.","text":"3 socios"},{"isCorrect":false,"rationale":"Este es el mínimo para comunidades de bienes o sociedades civiles, pero las cooperativas suelen requerir más para asegurar su carácter democrático.","text":"2 socios"},{"isCorrect":false,"rationale":"Aunque es posible tener muchos más, el mínimo legal para empezar suele ser menor que cinco.","text":"5 socios"         let mode = 'quiz';

        function getStats() {
            const answered = state.filter((s) => s.selectedIndex !== null).length;
            const correct = state.filter((s, i) => s.selectedIndex !== null && quizData[i].answerOptions[s.selectedIndex].isCorrect).length;
            const wrong = state.filter((s, i) => s.selectedIndex !== null && !quizData[i].answerOptions[s.selectedIndex].isCorrect).length;
            const skipped = quizData.length - answered;
            const accuracy = answered > 0 ? Math.round((correct / answered) * 100) : 0;
            return { answered, correct, wrong, skipped, accuracy };
        }

        function shuffleAnswers() {
            quizData.forEach((q) => {
                for (let i = q.answerOptions.length - 1; i > 0; i -= 1) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [q.answerOptions[i], q.answerOptions[j]] = [q.answerOptions[j], q.answerOptions[i]];
                }
            });
        }

        function shuffleQuestions() {
            for (let i = quizData.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
            }
        }

        function resetState() {
            state = quizData.map(() => ({ selectedIndex: null, hintVisible: false }));

        function fmt(str) {
          if (!str) return str;
          return str
            .replace(/\$\$(.*?)\$\$/gs, function(_,m){return m;})
            .replace(/\$([^$<>]+?)\$/g, function(_,m){return m;})
            .replace(/\*\*(.*?)\*\*/g, function(_,m){return "<strong>"+m+"</strong>";})
            .replace(/\*(.*?)\*/g, function(_,m){return "<em>"+m+"</em>";})
            .replace(/`(.*?)`/g, function(_,m){return "<code>"+m+"</code>";})
        }
        function renderQuestion() {

                const isSelected = s.selectedIndex === idx;

        function selectOption(idx) {
            if (mode !== 'quiz') return;

        function toggleHint() {

        function saveWrongAnswers() {
          var wrongQuestions = state
            .map(function(s,i){return {s:s,i:i};})

            var wrongQuestions = saveWrongAnswers();

              retakeWrongBtn.style.display = '';
            }
            (function() {
              var fname = window.location.pathname.split('/').pop();
              var backLink = document.querySelector('.quiz-heading a[href*="index.html"]');
              if (backLink) {
                var h = '#wrong=' + fname + ':' + wrongQuestions.length;
                backLink.href = backLink.href.split('#')[0] + h;

            })();

              if (wrongQuestions.length === 0) return;

              currentIndex = 0;

              resetState();
              renderQuestion();

              shuffleAnswers();
              resetState();
              renderQuestion();
            };
            document.getElementById('review-btn').onclick = () => {
                mode = 'review';
                currentIndex = 0;
                renderQuestion();
            };

            document.getElementById('retake-btn').onclick = () => {
                mode = 'quiz';
                currentIndex = 0;
                shuffleQuestions();
                shuffleAnswers();
                resetState();
                renderQuestion();
            };
        }

        document.getElementById('prev-btn').onclick = () => {
            if (mode === 'results') return;
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        };

        document.getElementById('next-btn').onclick = () => {
            if (mode === 'results') return;
            if (mode === 'review') {
                if (currentIndex < quizData.length - 1) {
                    currentIndex++;
                    renderQuestion();
                } else {
                    mode = 'results';
                    renderResults();
                }
                return;
            }
            if (currentIndex < quizData.length - 1) {
                currentIndex++;
                renderQuestion();
            } else {
                mode = 'results';
                renderResults();
            }
        };

        document.getElementById('hint-toggle').onclick = toggleHint;

        renderQuestion();

  <button id="theme-toggle" title="Cambiar tema" style="position:fixed;top:8px;right:8px;background:var(--card);border:1px solid var(--stroke);border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,0.1);transition:transform 0.2s ease;z-index:100;">🌙</button>
  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.getElementById('theme-toggle').textContent = '☀️';
      }
      document.getElementById('theme-toggle').addEventListener('click', function() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
        this.textContent = isDark ? '🌙' : '☀️';
      });
    })();
  </script>
