<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotebookLM - Quiz Export</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

        :root {
            --bg: #f6f1e7;
            --bg-deep: #efe4d6;
            --ink: #171717;
            --muted: #5b5b5b;
            --accent: #d3542c;
            --accent-light: #ff8f5a;
            --accent-dark: #b14320;
            --teal: #1f6f78;
            --card: #fff7ef;
            --stroke: #e3d6c5;
            --shadow: 0 18px 40px rgba(23, 23, 23, 0.12);
            --radius-sm: 10px;
            --radius-md: 12px;
            --radius-lg: 14px;
            --radius-xl: 18px;
            --radius-2xl: 22px;
            --space-1: 6px;
            --space-2: 8px;
            --space-3: 10px;
            --space-4: 12px;
            --space-5: 14px;
            --space-6: 16px;
            --space-7: 18px;
            --space-8: 20px;
            --space-9: 24px;
            --space-10: 32px;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'IBM Plex Sans', sans-serif;
            --error: #b54832;
        }

        body {
            font-family: var(--font-body);
            background:
                radial-gradient(240px 140px at 10% -10%, #ffd2b9 0%, transparent 70%),
                radial-gradient(220px 160px at 90% 0%, #cfe7e6 0%, transparent 65%),
                linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
            color: var(--ink);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            width: 100%;
            max-width: 800px;
            padding: var(--space-10) var(--space-8);
            box-sizing: border-box;
            background: var(--card);
            border-radius: var(--radius-2xl);
            border: 1px solid var(--stroke);
            box-shadow: var(--shadow);
        }

        .progress-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .progress-text {
            color: var(--muted);
            font-size: 0.9em;
        }

        .status-bar {
            display: flex;
            gap: 16px;
            font-size: 0.9em;
            font-weight: 500;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-correct { color: var(--teal); }
        .status-wrong { color: var(--error); }

        .question-text {
            font-family: var(--font-display);
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .options-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-item {
            background-color: #fff;
            border: 1px solid var(--stroke);
            padding: var(--space-4) var(--space-6);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option-item:hover:not(.selected) {
            background-color: var(--card);
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .option-item.selected.correct {
            background-color: rgba(31, 111, 120, 0.12);
            border-color: var(--teal);
        }

        .option-item.selected.incorrect {
            background-color: rgba(181, 72, 50, 0.12);
            border-color: var(--error);
        }

        .option-item.revealed-correct {
            border-color: rgba(31, 111, 120, 0.5);
            box-shadow: inset 0 0 0 1px rgba(31, 111, 120, 0.16);
        }

        .option-label {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .feedback-state {
            font-weight: bold;
            font-size: 0.9em;
            display: none;
        }

        .selected .feedback-state {
            display: block;
        }

        .revealed-correct .feedback-state {
            display: block;
        }

        .correct .feedback-state { color: var(--teal); }
        .incorrect .feedback-state { color: var(--error); }
        .revealed-correct .feedback-state { color: var(--teal); }

        .rationale {
            font-size: 0.95em;
            color: var(--muted);
            margin-top: 4px;
            line-height: 1.5;
            display: none;
        }

        .selected .rationale {
            display: block;
        }

        .revealed-correct .rationale {
            display: block;
        }
        .hint-toggle {
            border: 1px solid var(--stroke);
            color: var(--muted);
            cursor: pointer;
            padding: var(--space-2) var(--space-6);
            border-radius: var(--radius-md);
            background-color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .hint-toggle:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .hint-content {
            margin-top: 32px;
            padding: var(--space-6);
            background-color: #fff;
            border: 1px solid var(--stroke);
            border-radius: var(--radius-lg);
            font-size: 0.95em;
            color: var(--muted);
            display: none;
            align-items: flex-start;
            gap: 16px;
        }

        .hint-content.active {
            display: flex;
        }

        .hint-icon-box {
            color: var(--accent-dark);
            font-size: 1.2em;
            margin-top: -2px;
        }

        .navigation {
            margin-top: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            border-radius: var(--radius-md);
            padding: var(--space-2) var(--space-7);
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-prev {
            background-color: #fff;
            color: var(--ink);
            border-color: var(--stroke);
        }

        .btn-prev:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn-next {
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            color: #fff;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .results-screen {
            display: flex;
            flex-direction: column;
            gap: var(--space-8);
        }

        .results-title {
            font-family: var(--font-display);
            font-size: 2.1em;
            margin: 0;
        }

        .results-subtitle {
            color: var(--muted);
            margin: 0;
            font-size: 1em;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-6);
        }

        .result-card {
            padding: var(--space-6);
            border-radius: var(--radius-xl);
            background: #fff;
            border: 1px solid var(--stroke);
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        .result-label {
            color: var(--muted);
            font-size: 0.95em;
        }

        .result-value {
            font-size: 2em;
            font-family: var(--font-display);
        }

        .result-metrics {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
            color: var(--muted);
            font-size: 0.95em;
        }

        .results-actions {
            display: flex;
            gap: var(--space-4);
            flex-wrap: wrap;
        }

        .btn-ghost {
            background-color: transparent;
            border: 1px solid var(--stroke);
            color: var(--ink);
        }

        .hidden { display: none; }

        @media (max-width: 900px) {
            .quiz-container {
                margin: var(--space-8);
                max-width: 100%;
            }
        }

        @media (max-width: 720px) {
            .quiz-container {
                padding: var(--space-8) var(--space-6);
            }

            .question-text {
                font-size: 1.3em;
            }

            .option-item {
                padding: var(--space-4);
            }
        }

        @media (max-width: 520px) {
            body {
                align-items: flex-start;
            }

            .quiz-container {
                margin: var(--space-6);
                padding: var(--space-7) var(--space-5);
            }

            .progress-container {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-3);
            }

            .navigation {
                flex-direction: column;
                align-items: stretch;
                gap: var(--space-4);
            }

            .nav-buttons {
                width: 100%;
            }

            .btn {
                width: 100%;
            }

            .hint-toggle {
                justify-content: space-between;
            }

            .results-actions {
                flex-direction: column;
            }
        }
    
    [data-theme="dark"] {
      --bg: #1a1612;
      --bg-deep: #141210;
      --ink: #f0ebe0;
      --muted: #9a9080;
      --accent: #e8673a;
      --accent-light: #ff9a6a;
      --accent-dark: #c45528;
      --teal: #2a9aa8;
      --card: #221e18;
      --stroke: #3a3028;
      --shadow: 0 18px 40px rgba(0,0,0,0.4);
      --error: #e06050;
    }
    [data-theme="dark"] body {
      background:
        radial-gradient(240px 140px at 10% -10%, #3a1a08 0%, transparent 70%),
        radial-gradient(220px 160px at 90% 0%, #0a2a2e 0%, transparent 65%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
    }
    [data-theme="dark"] .option-item { background-color: var(--card); }
    [data-theme="dark"] .hint-toggle,
    [data-theme="dark"] .hint-content,
    [data-theme="dark"] .btn-prev { background-color: var(--card); color: var(--ink); }
    [data-theme="dark"] .result-card { background: var(--card); }
    [data-theme="dark"] .btn-next {
      background: linear-gradient(90deg, #e8673a, #f28c5e);
      box-shadow: 0 4px 20px rgba(232, 103, 58, 0.35);
      color: #fff;
    }
    [data-theme="dark"] .btn-next:hover:not(:disabled) {
      box-shadow: 0 6px 24px rgba(232, 103, 58, 0.5);
    }
    
    /* quiz-mobile-v3 */
    @media (max-width: 640px) {
      body {
        height: 100dvh;
        overflow: hidden;
        align-items: flex-start;
        padding: 0;
      }
      .quiz-container {
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        margin: 0;
        border-radius: 0;
        border-left: none;
        border-right: none;
        border-top: none;
        padding-bottom: 0;
      }
      #quiz-content,
      #results-content {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        min-height: 0;
        padding-bottom: 8px;
      }
      #hint-box { flex-shrink: 0; }
      .navigation {
        flex-shrink: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        margin-top: 0;
        background: var(--card);
        border-top: 1px solid var(--stroke);
      }
    }
    </style>
</head>
<body>
    <div class="quiz-container">

    <div class="quiz-heading" style="margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--stroke)">
      <a href="../index.html" style="font-size:0.82em;color:var(--muted);text-decoration:none;font-family:var(--font-body)">← Índice</a>
      <h1 style="font-family:var(--font-display);font-size:1.1em;font-weight:700;color:var(--ink);margin-top:8px;padding-right:44px">AD · Quiz 1</h1>
    </div>
        <div id="quiz-content">
            <!-- Dynamic Content -->
        </div>
        <div id="results-content" class="hidden"></div>

        <div id="hint-box" class="hint-content">
            <div class="hint-icon-box">💡</div>
            <div id="hint-text"></div>
        </div>

        <div class="navigation">
            <button id="hint-toggle" class="hint-toggle">
                <span>Pista</span>
                <span id="hint-icon-arrow">▼</span>
            </button>
            <div class="nav-buttons">
                <button id="prev-btn" class="btn btn-prev">Anterior</button>
                <button id="next-btn" class="btn btn-next">Siguiente</button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [{"answerOptions":[{"isCorrect":false,"rationale":"Este modelo no elimina las estructuras tabulares, sino que las combina con conceptos de objetos.","text":"Un sistema que elimina las tablas para trabajar exclusivamente con punteros de memoria."},{"isCorrect":true,"rationale":"El modelo objeto-relacional se describe como un sistema híbrido que extiende el modelo relacional tradicional con capacidades de orientación a objetos.","text":"Una base de datos relacional que evoluciona incorporando características del modelo de objetos."},{"isCorrect":false,"rationale":"Aunque busca acortar distancias con lenguajes como C++, no se limita a su uso para el almacenamiento.","text":"Un gestor que utiliza exclusivamente lenguajes de bajo nivel como C++ para el almacenamiento físico."},{"isCorrect":false,"rationale":"Aunque soporta objetos, sigue manteniendo la estructura y los tipos de datos del modelo relacional como núcleo.","text":"Una base de datos orientada a objetos que utiliza SQL únicamente para la exportación de datos."}],"hint":"Considere la naturaleza híbrida mencionada en la definición del tema 10.","question":"¿Cómo se define fundamentalmente una base de datos objeto-relacional según el material proporcionado?"},{"answerOptions":[{"isCorrect":true,"rationale":"El diseño busca facilitar la integración de datos con lenguajes como Java o C# eliminando la fricción entre modelos distintos.","text":"Reducir la brecha entre las bases de datos relacionales y las prácticas de programación orientada a objetos."},{"isCorrect":false,"rationale":"Este modelo es una evolución del relacional, no una implementación del movimiento No-SQL.","text":"Garantizar que todas las bases de datos sigan estrictamente el estándar No-SQL."},{"isCorrect":false,"rationale":"El modelo objeto-relacional soporta la herencia, no busca sustituirla en el lenguaje de aplicación.","text":"Sustituir el uso de herencia en los lenguajes de programación por procedimientos almacenados."},{"isCorrect":false,"rationale":"La ausencia de esquema es una característica típica de No-SQL, no del modelo objeto-relacional.","text":"Eliminar la necesidad de esquemas en el almacenamiento de datos empresariales."}],"hint":"Piense en la relación entre el almacenamiento de datos y los lenguajes de programación modernos.","question":"¿Cuál es el objetivo principal de los modelos de base de datos objeto-relacionales en el desarrollo de software?"},{"answerOptions":[{"isCorrect":false,"rationale":"Oracle sigue siendo un sistema basado en SQL que permite extensiones de objetos.","text":"Como una base de datos independiente que no admite SQL."},{"isCorrect":false,"rationale":"Aunque Oracle soporta clusters, la implementación del modelo de objetos se define como una extensión lógica del modelo de datos.","text":"A través de un sistema de archivos distribuido llamado Cluster-Oracle."},{"isCorrect":true,"rationale":"Oracle no reemplaza su motor relacional, sino que añade capacidades de objetos sobre su base relacional probada.","text":"Como una extensión del modelo relacional existente."},{"isCorrect":false,"rationale":"El almacenamiento JSON es más común en bases de datos de documentos No-SQL que en el enfoque objeto-relacional de Oracle.","text":"Mediante el uso exclusivo de archivos JSON sin tablas."}],"hint":"Recuerde que Oracle es uno de los gestores relacionales más conocidos.","question":"En el contexto de Oracle, ¿cómo se implementa el modelo de objetos?"},{"answerOptions":[{"isCorrect":false,"rationale":"No-SQL no es un lenguaje único, sino una categoría de sistemas gestores de bases de datos.","text":"A un lenguaje de consulta específico que reemplaza a SELECT y INSERT."},{"isCorrect":true,"rationale":"Representa un grupo diverso de tecnologías y conceptos que divergen de los principios relacionales clásicos.","text":"A un conjunto de conceptos y productos que no se basan en el sistema relacional tradicional."},{"isCorrect":false,"rationale":"Aunque muchas no usan tablas, el término es más una etiqueta para sistemas no relacionales que una prohibición técnica total.","text":"A bases de datos que prohíben estrictamente el uso de cualquier tabla."},{"isCorrect":false,"rationale":"El término no tiene relación con protocolos de seguridad, sino con el modelo de datos y arquitectura.","text":"A un protocolo de seguridad para evitar inyecciones de código en bases de datos relacionales."}],"hint":"Considere la evolución histórica y el uso de etiquetas o hashtags mencionados.","question":"¿A qué se refiere el término 'No-SQL' en el ámbito moderno del almacenamiento de datos?"},{"answerOptions":[{"isCorrect":false,"rationale":"Esta es precisamente la característica del esquema fijo de las bases de datos relacionales.","text":"La obligatoriedad de definir todas las columnas antes de la entrada de cualquier dato."},{"isCorrect":false,"rationale":"Eso describe un esquema rígido; las bases 'schemaless' permiten datos escasos o heterogéneos.","text":"El requisito de que cada fila contenga información para todas las columnas de la base de datos."},{"isCorrect":true,"rationale":"La ausencia de esquema permite guardar datos sin una estructura predefinida rígida, facilitando cambios rápidos.","text":"La capacidad de almacenar información no uniforme permitiendo una evolución flexible."},{"isCorrect":false,"rationale":"Ser 'schemaless' no implica la falta de índices, sino la flexibilidad en la estructura del dato almacenado.","text":"La imposibilidad de realizar consultas complejas debido a la falta de índices."}],"hint":"Piense en la flexibilidad y la uniformidad de los datos.","question":"¿Qué característica define a las bases de datos No-SQL como 'schemaless'?"},{"answerOptions":[{"isCorrect":false,"rationale":"Al contrario, el texto destaca que el rendimiento en No-SQL puede aumentar linealmente al añadir nodos.","text":"Las bases No-SQL no permiten el aumento de rendimiento mediante la adición de nuevos nodos."},{"isCorrect":true,"rationale":"No-SQL está diseñado para distribuirse en múltiples servidores (nodos), mientras que las relacionales suelen crecer mejorando el hardware de un único servidor.","text":"Las relacionales favorecen el escalado vertical mientras que las No-SQL facilitan el escalado horizontal."},{"isCorrect":false,"rationale":"El texto menciona que ninguna base relacional ofrece un modelo simple de distribución sin causar problemas de rendimiento.","text":"El escalado horizontal de las relacionales es nativo y no presenta problemas de rendimiento."},{"isCorrect":false,"rationale":"Una ventaja de No-SQL es el uso de servidores múltiples más económicos comparado con el escalado vertical costoso.","text":"Las bases No-SQL solo pueden escalar si se utiliza hardware de alta gama y coste elevado."}],"hint":"Recuerde los términos de escalado en clúster y la relación con el precio del hardware.","question":"Según el material, ¿cuál es una diferencia crítica entre el escalado de las bases de datos relacionales y las No-SQL?"},{"answerOptions":[{"isCorrect":false,"rationale":"La replicación debe permitir que los nodos sigan atendiendo solicitudes incluso si otros fallan.","text":"Requiere que todos los nodos del clúster se detengan para replicar los datos correctamente."},{"isCorrect":false,"rationale":"El material indica que deben estar listas para la nube y admitir configuraciones híbridas.","text":"Solo puede considerarse empresarial si se aloja exclusivamente en instalaciones físicas locales."},{"isCorrect":true,"rationale":"La resiliencia ante fallos de máquinas individuales debe ser una característica nativa del sistema No-SQL empresarial.","text":"Debe ofrecer disponibilidad continua sin un solo punto de fallo, integrada en el propio software."},{"isCorrect":false,"rationale":"La disponibilidad continua mencionada es una función integrada, no externa o programada por intervalos largos.","text":"Debe depender de software externo para gestionar las copias de seguridad cada 24 horas."}],"hint":"Considere lo que sucede cuando una máquina del clúster deja de funcionar.","question":"¿Qué significa que una base de datos No-SQL sea de 'clase empresarial' respecto a su disponibilidad?"},{"answerOptions":[{"isCorrect":true,"rationale":"El escalado lineal garantiza que añadir más recursos al clúster se traduzca directamente en una mejora del rendimiento operacional.","text":"Las ganancias de rendimiento en lectura y escritura son proporcionales a la adición de nodos."},{"isCorrect":false,"rationale":"El texto aclara que, a diferencia de otros sistemas, No-SQL aumenta el rendimiento con nodos adicionales.","text":"El rendimiento disminuye a medida que se agregan nodos para mantener la consistencia ACID."},{"isCorrect":false,"rationale":"El escalado es una propiedad de rendimiento y capacidad, no tiene relación con la rigidez del esquema.","text":"Garantiza que el esquema de la base de datos se vuelva más rígido para evitar errores."},{"isCorrect":false,"rationale":"Todos los nodos requieren recursos; el escalado lineal se refiere a la eficiencia de la arquitectura, no a la eliminación de requisitos físicos.","text":"Permite que la base de datos funcione sin necesidad de memoria RAM en los nodos secundarios."}],"hint":"Piense en la relación matemática entre el número de servidores y la velocidad de operación.","question":"¿Cuál es un beneficio técnico del escalado lineal en las soluciones No-SQL?"},{"answerOptions":[{"isCorrect":false,"rationale":"La caché integrada busca precisamente reducir la latencia de entrada/salida.","text":"Aumenta la latencia al introducir una capa intermedia de validación de datos."},{"isCorrect":false,"rationale":"Los datos siguen siendo persistentes; la caché es una capa optimizada para el rendimiento.","text":"Obliga a que todos los datos se almacenen exclusivamente en la memoria volátil."},{"isCorrect":true,"rationale":"Al usar la memoria de todos los nodos para el acceso rápido, se simplifica la administración y se evitan e 'adaptar la web' mencionada en el resumen.","question":"¿Cuál es la función principal de CouchDB según la investigación del tema 11?"},{"answerOptions":[{"isCorrect":false,"rationale":"El término 'documento' se refiere a la estructura lógica del dato (como un JSON), no al formato de archivo ofimático.","text":"Solo permite almacenar archivos de tipo PDF o Word."},{"isCorrect":true,"rationale":"Cada registro es un documento independiente que puede contener estructuras complejas mediante etiquetas (como JSON o BSON).","text":"Almacena datos compuestos por elementos etiquetados."},{"isCorrect":false,"rationale":"Al ser No-SQL, permiten una estructura flexible y longitudes variables por documento.","text":"Obliga a que todos los registros tengan exactamente la misma longitud."},{"isCorrect":false,"rationale":"Los sistemas de documentos como MongoDB permiten búsquedas potentes por campos internos.","text":"No permite realizar búsquedas por ningún campo que no sea el ID."}],"hint":"Considere la descripción dada para MongoDB y CouchDB.","question":"¿Qué caracteriza a una base de datos orientada a documentos?"},{"answerOptions":[{"isCorrect":false,"rationale":"El método estándar en la API de Redis para este propósito es 'get'.","text":"client.find(\"clave\");"},{"isCorrect":false,"rationale":"Redis no utiliza sintaxis SQL para operaciones básicas de recuperación de claves.","text":"client.select(\"SELECT valor FROM clave\");"},{"isCorrect":true,"rationale":"Según el código de ejemplo, el método 'get' del cliente Jedis recupera el valor almacenado para la clave proporcionada.","text":"client.get(\"clave\");"},{"isCorrect":false,"rationale":"Aunque es un término lógico, la librería Jedis utiliza 'get' siguiendo la nomenclatura estándar de clave-valor.","text":"client.retrieve(\"clave\");"}],"hint":"Observe los métodos utilizados en el 'Código 2. Integración Redis'.","question":"En el desarrollo de aplicaciones con Redis, ¿qué método se utiliza para recuperar un valor asociado a una clave en Java?"},{"answerOptions":[{"isCorrect":false,"rationale":"La distribución en clústeres hace que la atomicidad global sea más difícil de garantizar, no más fácil.","text":"No-SQL es más atómico que el modelo relacional gracias a los clústeres."},{"isCorrect":false,"rationale":"La atomicidad es una propiedad de las transacciones que el modelo relacional implementa de forma nativa en todo su sistema.","text":"La atomicidad solo existe en las bases de datos basadas en gráficos."},{"isCorrect":true,"rationale":"No-SQL suele priorizar la disponibilidad y el rendimiento sobre la consistencia estricta e inmediata de ACID.","text":"El modelo relacional sigue los principios ACID, mientras que No-SQL generalmente no los favorece."},{"isCorrect":false,"rationale":"La tabla comparativa del tema 11 muestra explícitamente que No-SQL no está a favor de los principios ACID.","text":"Ambos modelos garantizan la atomicidad de la misma manera exacta."}],"hint":"Recuerde el acrónimo ACID mencionado en la comparación de modelos.","question":"¿Cuál es la principal diferencia entre el modelo relacional y No-SQL respecto a la atomicidad?"},{"answerOptions":[{"isCorrect":true,"rationale":"El material explica que las memorias caché de todos los nodos en el clúster pueden almacenar datos directamente, eliminando la necesidad de una caché externa.","text":"Verdadero"},{"isCorrect":false,"rationale":"No-SQL permite integrar el almacenamiento en memoria en los propios nodos del clúster, facilitando la escalabilidad.","text":"Falso"}],"hint":"Considere la información sobre 'Sin capa de almacenamiento en caché separada'.","question":"Verdadero o Falso: Una base de datos No-SQL es capaz de utilizar múltiples nodos y distribuir datos sin requerir una capa de caché separada."},{"answerOptions":[{"isCorrect":false,"rationale":"El escalado se refiere a la capacidad de procesamiento y almacenamiento, no a la eliminación de capas de software base.","text":"Permite que la base de datos funcione sin sistema operativo."},{"isCorrect":false,"rationale":"Añadir múltiples servidores suele requerir más espacio físico que mejorar uno solo.","text":"Requiere menos espacio físico en el centro de datos."},{"isCorrect":false,"rationale":"Todo hardware puede fallar; la ventaja es la redundancia y el coste, no la inmunidad física.","text":"El hardware de escalado horizontal es inmune a los fallos eléctricos."},{"isCorrect":true,"rationale":"Es más económico añadir varios servidores estándar que mejorar un solo servidor a niveles extremos de potencia (escalado vertical).","text":"Existe una ventaja de precio en relación al hardware que se añade."}],"hint":"Piense en la comparativa económica mencionada en la Tabla 1 del tema 11.","question":"¿Qué ventaja tiene el uso de múltiples servidores en el escalado horizontal frente al vertical en términos de hardware?"}];
        let currentIndex = 0;
        let mode = 'quiz';
        let state = quizData.map(() => ({ selectedIndex: null, hintVisible: false }));

        function getStats() {
            const answered = state.filter((s) => s.selectedIndex !== null).length;
            const correct = state.filter((s, i) => s.selectedIndex !== null && quizData[i].answerOptions[s.selectedIndex].isCorrect).length;
            const wrong = state.filter((s, i) => s.selectedIndex !== null && !quizData[i].answerOptions[s.selectedIndex].isCorrect).length;
            const skipped = quizData.length - answered;
            const accuracy = answered > 0 ? Math.round((correct / answered) * 100) : 0;
            return { answered, correct, wrong, skipped, accuracy };
        }

        function shuffleAnswers() {
            quizData.forEach((q) => {
                for (let i = q.answerOptions.length - 1; i > 0; i -= 1) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [q.answerOptions[i], q.answerOptions[j]] = [q.answerOptions[j], q.answerOptions[i]];
                }
            });
        }

        function shuffleQuestions() {
            for (let i = quizData.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
            }
        }

        function resetState() {
            state = quizData.map(() => ({ selectedIndex: null, hintVisible: false }));
        }

        function renderQuestion() {
            const q = quizData[currentIndex];
            const s = state[currentIndex];
            const content = document.getElementById('quiz-content');
            const results = document.getElementById('results-content');
            const hintBox = document.getElementById('hint-box');
            const nav = document.querySelector('.navigation');
            const nextBtn = document.getElementById('next-btn');
            const prevBtn = document.getElementById('prev-btn');

            let optionsHtml = '';
            const correctIndex = q.answerOptions.findIndex((o) => o.isCorrect);
            const selectedCorrect = s.selectedIndex !== null && q.answerOptions[s.selectedIndex].isCorrect;
            q.answerOptions.forEach((opt, idx) => {
                const isSelected = s.selectedIndex === idx;
                const statusClass = isSelected ? (opt.isCorrect ? 'correct' : 'incorrect') : '';
                const selectedClass = isSelected ? 'selected' : '';
                const revealCorrect = (s.selectedIndex !== null && !selectedCorrect && opt.isCorrect) || (mode === 'review' && opt.isCorrect);
                const revealClass = revealCorrect ? 'revealed-correct' : '';

                optionsHtml += `
                    <li class="option-item ${selectedClass} ${statusClass} ${revealClass}" onclick="selectOption(${idx})">
                        <div class="option-label">
                            <span>${String.fromCharCode(65 + idx)}. ${opt.text}</span>
                        </div>
                        <div class="feedback-state">
                            ${opt.isCorrect ? '✓ Correcto' : '✕ Incorrecto'}
                        </div>
                        ${opt.rationale ? '<div class="rationale">' + opt.rationale + '</div>' : ''}
                    </li>
                `;
            });

            const stats = getStats();

            content.innerHTML = `
                <div class="progress-container">
                    <div class="progress-text">${currentIndex + 1} / ${quizData.length}</div>
                    <div class="status-bar">
                        <div class="status-item status-correct">
                            <span>✓</span>
                            <span>${stats.correct}</span>
                        </div>
                        <div class="status-item status-wrong">
                            <span>✕</span>
                            <span>${stats.wrong}</span>
                        </div>
                    </div>
                </div>
                <div class="question-text">${q.question}</div>
                <ul class="options-list">
                    ${optionsHtml}
                </ul>
            `;

            // Update Pista Box
            const hintText = document.getElementById('hint-text');
            hintText.innerText = q.hint || 'No hay pista disponible para esta pregunta.';
            if (s.hintVisible) {
                hintBox.classList.add('active');
            } else {
                hintBox.classList.remove('active');
            }

            results.classList.add('hidden');
            content.classList.remove('hidden');
            hintBox.classList.remove('hidden');
            nav.classList.remove('hidden');

            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = false;
            if (mode === 'review') {
                nextBtn.innerText = currentIndex === quizData.length - 1 ? 'Volver a resultados' : 'Siguiente';
            } else {
                nextBtn.innerText = currentIndex === quizData.length - 1 ? 'Finalizar' : 'Siguiente';
            }
            document.getElementById('hint-icon-arrow').innerText = s.hintVisible ? '▲' : '▼';
        }

        function selectOption(idx) {
            if (mode !== 'quiz') return;
            if (state[currentIndex].selectedIndex !== null) return; // Prevent re-selection
            state[currentIndex].selectedIndex = idx;
            renderQuestion();
        }

        function toggleHint() {
            if (mode === 'results') return;
            state[currentIndex].hintVisible = !state[currentIndex].hintVisible;
            renderQuestion();
        }

        function renderResults() {
            const stats = getStats();
            const content = document.getElementById('quiz-content');
            const results = document.getElementById('results-content');
            const hintBox = document.getElementById('hint-box');
            const nav = document.querySelector('.navigation');

            const score = `${stats.correct} / ${quizData.length}`;

            results.innerHTML = `
                <div class="results-screen">
                    <div>
                        <h1 class="results-title">¡Lo lograste! Quiz completado.</h1>

                    <div class="results-grid">
                        <div class="result-card">

                            <div class="result-value">${score}</div>
                        </div>
                        <div class="result-card">
                            <div class="result-label">Precisión</div>
                            <div class="result-value">${stats.accuracy}%</div>
                        </div>
                        <div class="result-card">
                            <div class="result-metrics">
                                <div>Correctas <strong>${stats.correct}</strong></div>
                                <div>Incorrectas <strong>${stats.wrong}</strong></div>
                                <div>Omitidas <strong>${stats.skipped}</strong></div>
                            </div>
                        </div>
                    </div>
                    <div class="results-actions">
                        <button id="review-btn" class="btn btn-ghost">Revisar Quiz</button>
                        <button id="retake-btn" class="btn btn-next">Repetir Quiz</button>
                    </div>
                </div>
            `;

            content.classList.add('hidden');
            results.classList.remove('hidden');
            hintBox.classList.add('hidden');
            nav.classList.add('hidden');

            document.getElementById('review-btn').onclick = () => {
                mode = 'review';
                currentIndex = 0;
                renderQuestion();
            };

            document.getElementById('retake-btn').onclick = () => {
                mode = 'quiz';
                currentIndex = 0;
                shuffleQuestions();
                shuffleAnswers();
                resetState();
                renderQuestion();
            };
        }

        document.getElementById('prev-btn').onclick = () => {
            if (mode === 'results') return;
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        };

        document.getElementById('next-btn').onclick = () => {
            if (mode === 'results') return;
            if (mode === 'review') {
                if (currentIndex < quizData.length - 1) {
                    currentIndex++;
                    renderQuestion();
                } else {
                    mode = 'results';
                    renderResults();
                }
                return;
            }
            if (currentIndex < quizData.length - 1) {
                currentIndex++;
                renderQuestion();
            } else {
                mode = 'results';
                renderResults();
            }
        };

        document.getElementById('hint-toggle').onclick = toggleHint;

        renderQuestion();
    </script>

  <button id="theme-toggle" title="Cambiar tema" style="position:fixed;top:8px;right:8px;background:var(--card);border:1px solid var(--stroke);border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,0.1);transition:transform 0.2s ease;z-index:100;">🌙</button>
  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.getElementById('theme-toggle').textContent = '☀️';
      }
      document.getElementById('theme-toggle').addEventListener('click', function() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
        this.textContent = isDark ? '🌙' : '☀️';
      });
    })();
  </script>
</body>
</html>
