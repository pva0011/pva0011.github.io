<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desarrollo de Interface - 8 a 15 - NotebookLM - Quiz Export</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

        :root {
            --bg: #f6f1e7;
            --bg-deep: #efe4d6;
            --ink: #171717;
            --muted: #5b5b5b;
            --accent: #d3542c;
            --accent-light: #ff8f5a;
            --accent-dark: #b14320;
            --teal: #1f6f78;
            --card: #fff7ef;
            --stroke: #e3d6c5;
            --shadow: 0 18px 40px rgba(23, 23, 23, 0.12);
            --radius-sm: 10px;
            --radius-md: 12px;
            --radius-lg: 14px;
            --radius-xl: 18px;
            --radius-2xl: 22px;
            --space-1: 6px;
            --space-2: 8px;
            --space-3: 10px;
            --space-4: 12px;
            --space-5: 14px;
            --space-6: 16px;
            --space-7: 18px;
            --space-8: 20px;
            --space-9: 24px;
            --space-10: 32px;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'IBM Plex Sans', sans-serif;
            --error: #b54832;
        }

        body {
            font-family: var(--font-body);
            background:
                radial-gradient(240px 140px at 10% -10%, #ffd2b9 0%, transparent 70%),
                radial-gradient(220px 160px at 90% 0%, #cfe7e6 0%, transparent 65%),
                linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
            color: var(--ink);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            width: 100%;
            max-width: 800px;
            padding: var(--space-10) var(--space-8);
            box-sizing: border-box;
            background: var(--card);
            border-radius: var(--radius-2xl);
            border: 1px solid var(--stroke);
            box-shadow: var(--shadow);
        }

        .progress-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .progress-text {
            color: var(--muted);
            font-size: 0.9em;
        }

        .status-bar {
            display: flex;
            gap: 16px;
            font-size: 0.9em;
            font-weight: 500;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-correct { color: var(--teal); }
        .status-wrong { color: var(--error); }

        .question-text {
            font-family: var(--font-display);
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .options-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-item {
            background-color: #fff;
            border: 1px solid var(--stroke);
            padding: var(--space-4) var(--space-6);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option-item:hover:not(.selected) {
            background-color: var(--card);
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .option-item.selected.correct {
            background-color: rgba(31, 111, 120, 0.12);
            border-color: var(--teal);
        }

        .option-item.selected.incorrect {
            background-color: rgba(181, 72, 50, 0.12);
            border-color: var(--error);
        }

        .option-item.revealed-correct {
            border-color: rgba(31, 111, 120, 0.5);
            box-shadow: inset 0 0 0 1px rgba(31, 111, 120, 0.16);
        }

        .option-label {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .feedback-state {
            font-weight: bold;
            font-size: 0.9em;
            display: none;
        }

        .selected .feedback-state {
            display: block;
        }

        .revealed-correct .feedback-state {
            display: block;
        }

        .correct .feedback-state { color: var(--teal); }
        .incorrect .feedback-state { color: var(--error); }
        .revealed-correct .feedback-state { color: var(--teal); }

        .rationale {
            font-size: 0.95em;
            color: var(--muted);
            margin-top: 4px;
            line-height: 1.5;
            display: none;
        }

        .selected .rationale {
            display: block;
        }

        .revealed-correct .rationale {
            display: block;
        }
        .hint-toggle {
            border: 1px solid var(--stroke);
            color: var(--muted);
            cursor: pointer;
            padding: var(--space-2) var(--space-6);
            border-radius: var(--radius-md);
            background-color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .hint-toggle:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .hint-content {
            margin-top: 32px;
            padding: var(--space-6);
            background-color: #fff;
            border: 1px solid var(--stroke);
            border-radius: var(--radius-lg);
            font-size: 0.95em;
            color: var(--muted);
            display: none;
            align-items: flex-start;
            gap: 16px;
        }

        .hint-content.active {
            display: flex;
        }

        .hint-icon-box {
            color: var(--accent-dark);
            font-size: 1.2em;
            margin-top: -2px;
        }

        .navigation {
            margin-top: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            border-radius: var(--radius-md);
            padding: var(--space-2) var(--space-7);
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-prev {
            background-color: #fff;
            color: var(--ink);
            border-color: var(--stroke);
        }

        .btn-prev:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn-next {
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            color: #fff;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .results-screen {
            display: flex;
            flex-direction: column;
            gap: var(--space-8);
        }

        .results-title {
            font-family: var(--font-display);
            font-size: 2.1em;
            margin: 0;
        }

        .results-subtitle {
            color: var(--muted);
            margin: 0;
            font-size: 1em;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-6);
        }

        .result-card {
            padding: var(--space-6);
            border-radius: var(--radius-xl);
            background: #fff;
            border: 1px solid var(--stroke);
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        .result-label {
            color: var(--muted);
            font-size: 0.95em;
        }

        .result-value {
            font-size: 2em;
            font-family: var(--font-display);
        }

        .result-metrics {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
            color: var(--muted);
            font-size: 0.95em;
        }

        .results-actions {
            display: flex;
            gap: var(--space-4);
            flex-wrap: wrap;
        }

        .btn-ghost {
            background-color: transparent;
            border: 1px solid var(--stroke);
            color: var(--ink);
        }

        .hidden { display: none; }

        @media (max-width: 900px) {
            .quiz-container {
                margin: var(--space-8);
                max-width: 100%;
            }
        }

        @media (max-width: 720px) {
            .quiz-container {
                padding: var(--space-8) var(--space-6);
            }

            .question-text {
                font-size: 1.3em;
            }

            .option-item {
                padding: var(--space-4);
            }
        }

        @media (max-width: 520px) {
            body {
                align-items: flex-start;
            }

            .quiz-container {
                margin: var(--space-6);
                padding: var(--space-7) var(--space-5);
            }

            .progress-container {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-3);
            }

            .navigation {
                flex-direction: column;
                align-items: stretch;
                gap: var(--space-4);
            }

            .nav-buttons {
                width: 100%;
            }

            .btn {
                width: 100%;
            }

            .hint-toggle {
                justify-content: space-between;
            }

            .results-actions {
                flex-direction: column;
            }
        }
    
    [data-theme="dark"] {
      --bg: #1a1612;
      --bg-deep: #141210;
      --ink: #f0ebe0;
      --muted: #9a9080;
      --accent: #e8673a;
      --accent-light: #ff9a6a;
      --accent-dark: #c45528;
      --teal: #2a9aa8;
      --card: #221e18;
      --stroke: #3a3028;
      --shadow: 0 18px 40px rgba(0,0,0,0.4);
      --error: #e06050;
    }
    [data-theme="dark"] body {
      background:
        radial-gradient(240px 140px at 10% -10%, #3a1a08 0%, transparent 70%),
        radial-gradient(220px 160px at 90% 0%, #0a2a2e 0%, transparent 65%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
    }
    [data-theme="dark"] .option-item { background-color: var(--card); }
    [data-theme="dark"] .hint-toggle,
    [data-theme="dark"] .hint-content,
    [data-theme="dark"] .btn-prev { background-color: var(--card); color: var(--ink); }
    [data-theme="dark"] .result-card { background: var(--card); }
    [data-theme="dark"] .btn-next {
      background: linear-gradient(90deg, #e8673a, #f28c5e);
      box-shadow: 0 4px 20px rgba(232, 103, 58, 0.35);
      color: #fff;
    }
    [data-theme="dark"] .btn-next:hover:not(:disabled) {
      box-shadow: 0 6px 24px rgba(232, 103, 58, 0.5);
    }
    
    /* quiz-mobile-v3 */
    @media (max-width: 640px) {
      body {
        height: 100dvh;
        overflow: hidden;
        align-items: flex-start;
        padding: 0;
      }
      .quiz-container {
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        margin: 0;
        border-radius: 0;
        border-left: none;
        border-right: none;
        border-top: none;
        padding-bottom: 0;
      }
      #quiz-content,
      #results-content {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        min-height: 0;
        padding-bottom: 8px;
      }
      #hint-box { flex-shrink: 0; }
      .navigation {
        flex-shrink: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        margin-top: 0;
        background: var(--card);
        border-top: 1px solid var(--stroke);
      }
    }
    </style>
</head>
<body>
    <div class="quiz-container">

    <div class="quiz-heading" style="margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--stroke)">
      <a href="../index.html" style="font-size:0.82em;color:var(--muted);text-decoration:none;font-family:var(--font-body)">← Índice</a>
      <h1 style="font-family:var(--font-display);font-size:1.1em;font-weight:700;color:var(--ink);margin-top:8px;padding-right:44px">Desarrollo de Interfaces · Quiz 6</h1>
    </div>
        <div id="quiz-content">

        </div>

        <div id="hint-box" class="hint-content">

                <button id="prev-btn" class="btn btn-prev">Anterior</button>
                <button id="next-btn" class="btn btn-next">Siguiente</button>
            </div>
        </div>

    <script>
        let quizData = [{"answerOptions":[{"isCorrect":true,"rationale":"El estrés busca el punto de ruptura y recuperación, mientras que el volumen se enfoca en la magnitud de los datos procesados.","text":"El estrés evalúa la capacidad de recuperación ante sobrecargas, mientras que el volumen analiza el manejo de grandes cantidades de datos."},{"isCorrect":false,"rationale":"La velocidad es objetivo de las pruebas de rendimiento, no de estrés.","text":"El estrés evalúa la velocidad de procesamiento y el volumen la seguridad."},{"isCorrect":false,"rationale":"Aunque relacionadas con la capacidad, cada una mide un aspecto distinto del comportamiento bajo presión.","text":"No existe diferencia; son sinónimos dentro de las pruebas de capacidad."},{"isCorrect":false,"rationale":"Ambas son generalmente consideradas pruebas no funcionales de caja negra.","text":"El volumen es una prueba de caja blanca y el estrés es de caja negra."}],"hint":"Diferencie entre la 'cantidad' de información y la 'reacción' del sistema ante un colapso inminente.","question":"¿Cuál es la característica principal de las pruebas de estrés en comparación con las pruebas de volumen?"},{"answerOptions":[{"isCorrect":true,"rationale":"Este método bloquea la posibilidad de ignorar el diálogo, forzando al usuario a elegir una de las opciones (Yes/No).","text":".setCancelable(false)"},{"isCorrect":false,"rationale":"Este método cierra la actividad actual de la aplicación, no el diálogo emergente.","text":".finish()"},{"isCorrect":false,"rationale":"Este método define la acción del botón de afirmación, no el comportamiento de cierre del cuadro.","text":".setPositiveButton()"},{"isCorrect":false,"rationale":"Es el método que instancia el objeto final tras configurar todas las propiedades, pero no controla la persistencia.","text":".create()"}],"hint":"Busque el término que indica si una acción es 'anulable' o no.","question":"Al crear un cuadro de diálogo en Android mediante AlertDialog.Builder, ¿qué método se utiliza para que el usuario no pueda cerrar la ventana pulsando fuera de ella?"},{"answerOptions":[{"isCorrect":false,"rationale":"Los títulos deben ser lo suficientemente claros para no necesitar documentos adicionales de apoyo.","text":"Utilizar títulos crípticos que obliguen a consultar el manual de referencia."},{"isCorrect":true,"rationale":"La claridad y la falta de redundancia son pilares para un índice útil y profesional.","text":"Asegurar que los títulos sean claros y que no se duplique la información."},{"isCorrect":false,"rationale":"El material indica explícitamente que no debe duplicarse la información.","text":"Duplicar la información clave en varios niveles para asegurar su lectura."},{"isCorrect":false,"rationale":"Las tablas de contenido deben situarse al inicio, como el índice de un libro.","text":"Situar la tabla siempre al final del documento como un apéndice."}],"hint":"Piense en los principios de economía de información y claridad expositiva.","question":"En el diseño de tablas de contenido, ¿cuál es una de las pautas críticas para evitar la confusión del usuario?"},{"answerOptions":[{"isCorrect":false,"rationale":"JMeter es una herramienta de testing técnico, no de documentación documental.","text":"Documentar los manuales de usuario en formato PDF."},{"isCorrect":true,"rationale":"JMeter se especializa en simular cargas de trabajo para ver cómo responde la aplicación ante el uso masivo.","text":"Realizar pruebas de carga para evaluar el rendimiento."},{"isCorrect":false,"rationale":"Esa es la función principal de JUnit.","text":"Realizar pruebas unitarias de código en Java."},{"isCorrect":false,"rationale":"Esa es la función de Bugzilla.","text":"Hacer el seguimiento de defectos y versiones."}],"hint":"Relacione la herramienta con la simulación de múltiples peticiones al sistema.","question":"¿Cuál es la función principal de la herramienta Apache JMeter dentro de una estrategia de pruebas?"},{"answerOptions":[{"isCorrect":false,"rationale":"Los errores de ejecución ocurren durante la actividad del programa, no durante su fase de traducción o compilación.","text":"El error de ejecución es siempre producido por el compilador al detectar variables no inicializadas."},{"isCorrect":false,"rationale":"Solo los errores de sintaxis o de compilación detienen el proceso de creación del ejecutable.","text":"El error de lógica impide que el programa se compile por completo."},{"isCorrect":false,"rationale":"Los fallos sintácticos son errores de compilación; los de ejecución ocurren con sintaxis correcta pero operaciones inválidas.","text":"El error de ejecución se debe a fallos sintácticos, mientras que el de lógica es por operaciones matemáticas."},{"isCorrect":true,"rationale":"Los errores de lógica producen resultados inesperados sin interrumpir el programa con avisos del sistema, lo que dificulta su detección.","text":"El error de lógica no devuelve mensajes de error, mientras que el de ejecución sí."}],"hint":"Considere cuál de los dos tipos es más 'silencioso' y difícil de rastrear por el programador.","question":"¿Qué diferencia fundamental existe entre un error de ejecución y un error de lógica durante la depuración de código?"},{"answerOptions":[{"isCorrect":false,"rationale":"Incluso con match_parent, los márgenes se respetan, reduciendo el área efectiva del componente dentro del padre.","text":"El elemento ignora los márgenes establecidos por el atributo layout_margin."},{"isCorrect":true,"rationale":"match_parent expande el componente para que coincida con las dimensiones de su elemento padre.","text":"El elemento toma el ancho completo del contenedor en el que se encuentra alojado."},{"isCorrect":false,"rationale":"Ajustar la dimensión al contenido es la función del valor wrap_content.","text":"El ancho del elemento se reduce hasta ajustarse estrictamente al contenido que tiene dentro."},{"isCorrect":false,"rationale":"El posicionamiento relativo depende del tipo de Layout (como RelativeLayout), no del valor de dimensión match_parent.","text":"Permite al elemento posicionarse de forma relativa respecto a otros componentes vecinos."}],"hint":"Piense en la relación de tamaño entre un objeto 'hijo' y su 'padre' jerárquico.","question":"Al configurar un Layout en Android, ¿qué efecto tiene asignar el valor 'match_parent' al atributo 'layout_width'?"},{"answerOptions":[{"isCorrect":false,"rationale":"La alineación automática vertical es una propiedad específica de un LinearLayout, no el comportamiento por defecto del sistema.","text":"Los componentes se alinearían automáticamente en una lista vertical infinita."},{"isCorrect":false,"rationale":"Las dimensiones deben ser declaradas por el desarrollador; el sistema no asume valores de expansión total por defecto.","text":"El sistema operativo Android asignaría automáticamente un 'match_parent' a cada botón."},{"isCorrect":true,"rationale":"Los layouts son los encargados de asignar coordenadas y dimensiones relativas; sin ellos, el sistema no sabe cómo distribuir el espacio.","text":"Los elementos ocuparían todo el contenedor, superponiéndose o perdiendo su distribución lógica."},{"isCorrect":false,"rationale":"La ausencia de layouts puede ser un error de diseño, pero no necesariamente impide la compilación técnica del código.","text":"La aplicación no podrá compilarse debido a un error de sintaxis en el fichero Java."}],"hint":"Considere la función de los layouts como 'organizadores' del espacio visual.","question":"¿Qué sucede en una aplicación Android si no se utilizan Layouts para organizar los componentes?"},{"answerOptions":[{"isCorrect":false,"rationale":"Ni View ni ViewGroup gestionan eventos de red; su función es estrictamente de representación y organización gráfica.","text":"El View es el encargado de gestionar los eventos de red de la aplicación."},{"isCorrect":true,"rationale":"Los componentes de tipo View son elementos terminales de la interfaz, como un botón o una imagen.","text":"Un View no puede c rencia la documentación interna de la externa?"},{"answerOptions":[{"isCorrect":false,"rationale":"Hoy en día, casi toda la documentación se distribuye en formatos digitales como PDF o sistemas de ayuda integrados.","text":"El manual debe estar impreso obligatoriamente y la guía de referencia puede ser digital."},{"isCorrect":false,"rationale":"La guía de referencia es parte estándar de la documentación para aplicaciones complejas que requieren precisión técnica constante.","text":"La guía de referencia solo se entrega si el software presenta errores críticos conocidos."},{"isCorrect":true,"rationale":"Los manuales de usuario son procedimentales (orientados a tareas), mientras que las guías de referencia son enciclopédicas (orientadas a la consulta rápida de datos técnicos).","text":"El manual explica cómo realizar tareas paso a paso, mientras que la guía detalla funciones, comandos o parámetros de forma técnica."},{"isCorrect":false,"rationale":"Ambos pueden ser para usuarios, pero su estructura y objetivo de lectura (aprendizaje vs. consulta puntual) son distintos.","text":"El manual es para programadores y la guía de referencia es para usuarios finales sin experiencia."}],"hint":"Considera el propósito: ¿quieres aprender a usar el programa desde cero o quieres saber qué hace exactamente un botón específico?","question":"¿Qué diferencia fundamental existe entre un manual de usuario y una guía de referencia?"},{"answerOptions":[{"isCorrect":false,"rationale":"Esa configuración se realiza en la pestaña JRE, no en la de elementos visuales de inicio.","text":"Configura la versión mínima del JRE necesaria para ejecutar el programa."},{"isCorrect":true,"rationale":"La pantalla de bienvenida (splash screen) mejora la experiencia de usuario al confirmar que la aplicación está cargando.","text":"Permite habilitar y seleccionar una imagen que se muestra al usuario durante el inicio de la aplicación."},{"isCorrect":false,"rationale":"La compresión se gestiona en las opciones             const wrong = state.filter((s, i) => s.selectedIndex !== null && !quizData[i].answerOptions[s.selectedIndex].isCorrect).length;
            const skipped = quizData.length - answered;

        function shuffleAnswers() {
            quizData.forEach((q) => {
                for (let i = q.answerOptions.length - 1; i > 0; i -= 1) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [q.answerOptions[i], q.answerOptions[j]] = [q.answerOptions[j], q.answerOptions[i]];
                }
            });
        }

        function shuffleQuestions() {

            .replace(/\*\*(.*?)\*\*/g, function(_,m){return "<strong>"+m+"</strong>";})

  <button id="theme-toggle" title="Cambiar tema" style="position:fixed;top:8px;right:8px;background:var(--card);border:1px solid var(--stroke);border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,0.1);transition:transform 0.2s ease;z-index:100;">🌙</button>
  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.getElementById('theme-toggle').textContent = '☀️';
      }
      document.getElementById('theme-toggle').addEventListener('click', function() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
        this.textContent = isDark ? '🌙' : '☀️';
      });
    })();
  </script>
