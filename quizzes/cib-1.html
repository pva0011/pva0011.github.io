    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

        :root {
            --bg: #f6f1e7;
            --bg-deep: #efe4d6;
            --ink: #171717;
            --muted: #5b5b5b;
            --accent: #d3542c;
            --accent-light: #ff8f5a;
            --accent-dark: #b14320;
            --teal: #1f6f78;
            --card: #fff7ef;
            --stroke: #e3d6c5;
            --shadow: 0 18px 40px rgba(23, 23, 23, 0.12);
            --radius-sm: 10px;
            --radius-md: 12px;
            --radius-lg: 14px;
            --radius-xl: 18px;
            --radius-2xl: 22px;
            --space-1: 6px;
            --space-2: 8px;
            --space-3: 10px;
            --space-4: 12px;
            --space-5: 14px;
            --space-6: 16px;
            --space-7: 18px;
            --space-8: 20px;
            --space-9: 24px;
            --space-10: 32px;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'IBM Plex Sans', sans-serif;
            --error: #b54832;
        }

        body {
            font-family: var(--font-body);
            background:
                radial-gradient(240px 140px at 10% -10%, #ffd2b9 0%, transparent 70%),
                radial-gradient(220px 160px at 90% 0%, #cfe7e6 0%, transparent 65%),
                linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
            color: var(--ink);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            width: 100%;
            max-width: 800px;
            padding: var(--space-10) var(--space-8);
            box-sizing: border-box;
            background: var(--card);
            border-radius: var(--radius-2xl);
            border: 1px solid var(--stroke);
            box-shadow: var(--shadow);
        }

        .progress-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .progress-text {
            color: var(--muted);
            font-size: 0.9em;
        }

        .status-bar {
            display: flex;
            gap: 16px;
            font-size: 0.9em;
            font-weight: 500;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-correct { color: var(--teal); }
        .status-wrong { color: var(--error); }

        .question-text {
            font-family: var(--font-display);
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .options-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-item {
            background-color: #fff;
            border: 1px solid var(--stroke);
            padding: var(--space-4) var(--space-6);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option-item:hover:not(.selected) {
            background-color: var(--card);
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .option-item.selected.correct {
            background-color: rgba(31, 111, 120, 0.12);
            border-color: var(--teal);
        }

        .option-item.selected.incorrect {
            background-color: rgba(181, 72, 50, 0.12);
            border-color: var(--error);
        }

        .option-item.revealed-correct {
            border-color: rgba(31, 111, 120, 0.5);
            box-shadow: inset 0 0 0 1px rgba(31, 111, 120, 0.16);
        }

        .option-label {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .feedback-state {
            font-weight: bold;
            font-size: 0.9em;
            display: none;
        }

        .selected .feedback-state {
            display: block;
        }

        .revealed-correct .feedback-state {
            display: block;
        }

        .correct .feedback-state { color: var(--teal); }
        .incorrect .feedback-state { color: var(--error); }
        .revealed-correct .feedback-state { color: var(--teal); }

        .rationale {
            font-size: 0.95em;
            color: var(--muted);
            margin-top: 4px;
            line-height: 1.5;
            display: none;
        }

        .selected .rationale {
            display: block;
        }

        .revealed-correct .rationale {
            display: block;
        }
        .hint-toggle {
            border: 1px solid var(--stroke);
            color: var(--muted);
            cursor: pointer;
            padding: var(--space-2) var(--space-6);
            border-radius: var(--radius-md);
            background-color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .hint-toggle:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .hint-content {
            margin-top: 32px;
            padding: var(--space-6);
            background-color: #fff;
            border: 1px solid var(--stroke);
            border-radius: var(--radius-lg);
            font-size: 0.95em;
            color: var(--muted);
            display: none;
            align-items: flex-start;
            gap: 16px;
        }

        .hint-content.active {
            display: flex;
        }

        .hint-icon-box {
            color: var(--accent-dark);
            font-size: 1.2em;
            margin-top: -2px;
        }

        .navigation {
            margin-top: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            border-radius: var(--radius-md);
            padding: var(--space-2) var(--space-7);
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-prev {
            background-color: #fff;
            color: var(--ink);
            border-color: var(--stroke);
        }

        .btn-prev:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn-next {
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            color: #fff;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .results-screen {
            display: flex;
            flex-direction: column;
            gap: var(--space-8);
        }

        .results-title {
            font-family: var(--font-display);
            font-size: 2.1em;
            margin: 0;
        }

        .results-subtitle {
            color: var(--muted);
            margin: 0;
            font-size: 1em;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-6);
        }

        .result-card {
            padding: var(--space-6);
            border-radius: var(--radius-xl);
            background: #fff;
            border: 1px solid var(--stroke);
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        .result-label {
            color: var(--muted);
            font-size: 0.95em;
        }

        .result-value {
            font-size: 2em;
            font-family: var(--font-display);
        }

        .result-metrics {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
            color: var(--muted);
            font-size: 0.95em;
        }

        .results-actions {
            display: flex;
            gap: var(--space-4);
            flex-wrap: wrap;
        }

        .btn-ghost {
            background-color: transparent;
            border: 1px solid var(--stroke);
            color: var(--ink);
        }

        .hidden { display: none; }

        @media (max-width: 900px) {
            .quiz-container {
                margin: var(--space-8);
                max-width: 100%;
            }
        }

        @media (max-width: 720px) {
            .quiz-container {
                padding: var(--space-8) var(--space-6);
            }

            .question-text {
                font-size: 1.3em;
            }

            .option-item {
                padding: var(--space-4);
            }
        }

        @media (max-width: 520px) {
            body {
                align-items: flex-start;
            }

            .quiz-container {
                margin: var(--space-6);
                padding: var(--space-7) var(--space-5);
            }

            .progress-container {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-3);
            }

            .navigation {
                flex-direction: column;
                align-items: stretch;
                gap: var(--space-4);
            }

            .nav-buttons {
                width: 100%;
            }

            .btn {
                width: 100%;
            }

            .hint-toggle {
                justify-content: space-between;
            }

            .results-actions {
                flex-direction: column;
            }
        }

    }
    [data-theme="dark"] .btn-next:hover:not(:disabled) {

    /* quiz-mobile-v3 */
    @media (max-width: 640px) {
      body {
        height: 100dvh;
        overflow: hidden;

        flex-shrink: 0;

        gap: 10px;
        padding: 12px 16px;
        margin-top: 0;
        background: var(--card);
        border-top: 1px solid var(--stroke);
      }
    }

  <script>/* theme-init-v2 */
    (function() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();

    <script>
        let quizData = [{"answerOptions":[{"isCorrect":true,"rationale":"Mientras que ambos pueden ocultar el origen del tráfico, solo la VPN aplica técnicas de encapsulación y encriptación de datos para asegurar la confidencialidad.","text":"El proxy gestiona el tráfico y oculta la IP, pero no cifra la información, a diferencia de la VPN."},{"isCorrect":false,"rationale":"Ambas soluciones pueden ser implementadas mediante software o hardware especializado según la arquitectura de la empresa.","text":"La VPN requiere hardware dedicado obligatoriamente, mientras que el proxy es siempre un software integrado en el rúter."},{"isCorrect":false,"rationale":"Ambas tecnologías pueden aplicarse tanto en contextos internos como externos dependiendo de la configuración de red.","text":"La VPN solo funciona para redes externas, mientras que el proxy es exclusivo para redes internas."},{"isCorrect":false,"rationale":"El texto especifica que los servidores proxy no encriptan el tráfico y el protocolo BGP es propio del enrutamiento, no del cifrado VPN.","text":"El proxy cifra el tráfico mediante protocolos AAA, mientras que la VPN utiliza protocolos BGP."}],"hint":"Considere qué tecnología garantiza que el contenido del mensaje sea ilegible para terceros durante el tránsito.","question":"¿Cuál es la principal diferencia funcional entre un servidor proxy y una red privada virtual (VPN) en términos de protección de datos?"},{"answerOptions":[{"isCorrect":false,"rationale":"Esta función de filtrado inicial desde la red externa corresponde al cortafuegos frontal o 'front-end'.","text":"Filtrar el tráfico malicioso proveniente de Internet antes de que llegue a los servidores de correo."},{"isCorrect":false,"rationale":"Un cortafuegos y un sistema bastión tienen roles distintos; el cortafuegos filtra tráfico mientras que el bastión es un host fortalecido que ofrece servicios.","text":"Sustituir al sistema bastión en caso de que este sufra una sobrecarga de peticiones externas."},{"isCorrect":true,"rationale":"El cortafuegos back-end actúa como una barrera interna que regula la comunicación entre la LAN de la organización y la zona de servicios públicos.","text":"Permitir exclusivamente el tráfico desde la red interna hacia la zona desmilitarizada (DMZ)."},{"isCorrect":false,"rationale":"La gestión de VPN suele realizarse en un servidor específico o en el perímetro, no es la función definitoria de un cortafuegos back-end en una DMZ.","text":"Gestionar las conexiones VPN de los usuarios que realizan teletrabajo mediante certificados."}],"hint":"Piense en la ubicación del 'back-end' en relación con la red interna de la empresa.","question":"En una arquitectura de seguridad perimetral de tipo 'doble cortafuegos' (dual firewall), ¿cuál es la función específica del cortafuegos denominado 'back-end'?"},{"answerOptions":[{"isCorrect":false,"rationale":"Ambos protocolos forman parte del marco AAA, lo que implica que cubren Autenticación, Autorización y Accounting.","text":"Diameter no permite la autorización de servicios, centrándose solo en el registro de tiempo."},{"isCorrect":false,"rationale":"Es RADIUS el que utiliza el puerto UDP 1812; Diameter se apoya en IPsec o TLS para su seguridad.","text":"Diameter utiliza el puerto UDP 1812, mientras que RADIUS utiliza conexiones cifradas por defecto."},{"isCorrect":false,"rationale":"RADIUS es ampliamente compatible con diversos sistemas (Linux, NAS, Cisco); LDAP es el mencionado en relación con Windows Server 2008.","text":"RADIUS es exclusivo para sistemas Windows Server 2008, mientras que Diameter es para Unix."},{"isCorrect":true,"rationale":"A diferencia de la estructura cliente-servidor tradicional de RADIUS, Diameter permite una comunicación entre pares más flexible.","text":"Diameter es un protocolo peer-to-peer donde cada nodo puede actuar como cliente o servidor."}],"hint":"Revise el modelo de comunicación de nodos que utiliza este protocolo para aplicaciones de IP móvil.","question":"Al analizar protocolos AAA, ¿qué característica distingue fundamentalmente a Diameter de su predecesor RADIUS?"},{"answerOptions":[{"isCorrect":true,"rationale":"El uso de fabricantes distintos aplica el principio de defensa en profundidad, dificultando que un atacante use el mismo exploit para atravesar todo el perímetro.","text":"Para evitar que una vulnerabilidad específica de un fabricante comprometa ambas capas de defensa simultáneamente."},{"isCorrect":false,"rationale":"No existe tal restricción técnica en el protocolo BGP; la elección de fabricantes distintos es una decisión estratégica de seguridad.","text":"Porque el protocolo BGP no permite la conexión de dos dispositivos del mismo fabricante en la DMZ."},{"isCorrect":false,"rationale":"Aunque es posible, no es la razón principal de seguridad para emplear una arquitectura multimarca en el perímetro.","text":"Para que uno gestione el tráfico IPv4 y el otro se encargue exclusivamente del tráfico IPv6."},{"isCorrect":false,"rationale":"Generalmente, esto suele aumentar la complejidad y el coste; el objetivo primordial es la robustez de la seguridad.","text":"Para reducir los costes de licencias mediante el uso de una marca cara y una marca de bajo coste."}],"hint":"Considere qué sucedería si se descubre un fallo de seguridad 'Zero-Day' en el software de una de las marcas.","question":"En el contexto de la arquitectura fuerte de subred protegida, ¿por qué se recomienda a veces utilizar cortafuegos de fabricantes diferentes?"},{"answerOptions":[{"isCorrect":false,"rationale":"La autorización determina qué servicios o recursos específicos tiene permitido utilizar el usuario una vez que su identidad ha sido validada.","text":"Autorización."},{"isCorrect":true,"rationale":"Esta función permite registrar la actividad del usuario, incluyendo tiempos de acceso y consumo de recursos para auditoría o facturación.","text":"Accounting (Responsabilidad)."},{"isCorrect":false,"rationale":"La encapsulación es un proceso técnico de las VPN para el transporte de datos, no forma parte de las siglas del marco AAA.","text":"Encapsulación."},{"isCorrect":false,"rationale":"La autenticación se limita a verificar la identidad del usuario mediante credenciales como contraseñas o certificados.","text":"Autenticación."}],"hint":"Piense en el término en inglés que se refiere a la contabilidad o registro de acciones.","question":"Según el material proporcionado, ¿qué componente del marco AAA se encarga de conocer el tiempo de conexión y generar datos estadísticos de uso?"},{"answerOptions":[{"isCorrect":true,"rationale":"Al depender de un solo dispositivo (cortafuegos de tres patas), no hay una segunda barrera física que detenga al atacante si el firewall es comprometido.","text":"Un único fallo en el cortafuegos de perímetro deja totalmente desprotegida a la red interna."},{"isCorrect":false,"rationale":"La arquitectura débil sí utiliza equipos bastión; de hecho, estos se convierten en el objetivo principal del atacante en este esquema.","text":"No permite el uso de sistemas bastión para proteger servidores web."},{"isCorrect":false,"rationale":"La arquitectura débil no dicta la política de direccionamiento IP interno, sino la disposición de los elementos de filtrado.","text":"Obliga a que todos los dispositivos internos tengan una IP pública compartida."},{"isCorrect":false,"rationale":"Cualquier arquitectura perimetral puede configurarse para permitir VPN, independientemente de si es débil o fuerte.","text":"Es incompatible con las conexiones VPN para teletrabajo."}],"hint":"Analice el número de puntos de fallo únicos que separan la red externa de la red privada.","question":"¿Cuál es la vulnerabilidad crítica de una arquitectura 'débil' de subred protegida comparada con una 'fuerte'?"},{"answerOptions":[{"isCorrect":false,"rationale":"Aunque Cisco lo utiliza ampliamente, el protocolo basado específicamente en Unix mencionado en el texto para la identidad es Kerberos.","text":"Se utiliza principalmente para garantizar la identidad en sistemas basados exclusivamente en Unix."},{"isCorrect":false,"rationale":"El material indica explícitamente que TACACS+ es un protocolo nuevo e incompatible con su versión anterior.","text":"Es totalmente compatible con la versión anterior de TACACS para asegurar la retrocompatibilidad."},{"isCorrect":true,"rationale":"A diferencia de versiones anteriores u otros protocolos, TACACS+ permite una granularidad mayor al separar estas tres funciones de seguridad.","text":"Gestiona por separado los servicios de autenticación, autorización y registro."},{"isCorrect":false,"rationale":"El puerto UDP 1812 y la comunicación con NAS son características asociadas en el texto al protocolo RADIUS.","text":"Utiliza el puerto UDP 1812 para comunicarse con servidores NAS."}],"hint":"Observe cómo maneja este protocolo las distintas fases del marco AAA de forma modular.","question":"Sobre el protocolo TACACS+, ¿cuál de las siguientes afirmaciones es correcta según su descripción técnica?"},{"answerOptions":[{"isCorrect":false,"rationale":"La arquitectura de nube se basa en el acceso desde cualquier punto de Internet, no necesariamente a través de líneas dedicadas.","text":"Utiliza exclusivamente líneas dedicadas físicas para conectar los puntos remotos."},{"isCorrect":false,"rationale":"Al contrario, el texto señala que la confidencialidad no está garantizada en la nube ya que los datos residen en servidores de un proveedor.","text":"Garantiza una confidencialidad absoluta de los datos al no depender de terceros."},{"isCorrect":true,"rationale":"La infraestructura es proporcionada por el proveedor, lo que elimina costes de mantenimiento físico y espacio en las instalaciones de la empresa.","text":"No requiere la instalación física de una sala de equipos o centro de datos propio para implementar servicios."},{"isCorrect":false,"rationale":"El texto menciona como desventaja que si el proveedor es atacado, todos sus clientes se ven comprometidos.","text":"Es inmune a ataques dirigidos al proveedor de servicios."}],"hint":"Considere la infraestructura física necesaria en la sede central de la empresa.","question":"¿Qué ventaja competitiva ofrece una arquitectura de seguridad perimetral en la nube frente a una arquitectura distribuida tradicional?"},{"answerOptions":[{"isCorrect":false,"rationale":"WPA2-PSK se basa en una 'Pre-Shared Key' (clave compartida); son los sistemas corporativos los que suelen optar por certificados.","text":"WPA2-PSK utiliza certificados digitales obligatorios para cada dispositivo móvil."},{"isCorrect":false,"rationale":"La autenticación es el pilar de WPA2-Enterprise; el lugar de conexión no exime de la validación de identidad.","text":"WPA2-Enterprise no requiere autenticación si el usuario se conecta desde una DMZ."},{"isCorrect":false,"rationale":"Ambos protocolos pueden coexistir con una VPN, pero WPA2-Enterprise es intrínsecamente más robusto para entornos corporativos.","text":"WPA2-PSK es el único que permite el uso de redes privadas virtuales (VPN)."},{"isCorrect":true,"rationale":"Mediante el uso de un servidor RADIUS, cada usuario se identifica de forma única, evitando el riesgo de una clave compartida por todos.","text":"WPA2-Enterprise implementa un control individualizado mediante credenciales únicas por usuario."}],"hint":"Piense en cómo se gestionan las contraseñas en un restaurante comparado con una gran corporación.","question":"En el contexto de la seguridad en redes wifi, ¿qué diferencia al protocolo WPA2-Enterprise del estándar WPA2-PSK habitual en hogares?"},{"answerOptions":[{"isCorrect":false,"rationale":"Kerberos es un protocolo de red para autenticación lógica, aunque el marco AAA puede integrarse con sistemas físicos de alta seguridad.","text":"Gestionar el acceso físico a las instalaciones mediante tarjetas inteligentes."},{"isCorrect":false,"rationale":"La naturaleza peer-to-peer se atribuye al protocolo Diameter en la comparativa de sistemas AAA.","text":"Funcionar como un peer-to-peer para aplicaciones de IP móvil."},{"isCorrect":false,"rationale":"Esta descripción corresponde al protocolo LDAP, no a Kerberos.","text":"Establecer un servicio de directorio cliente-servidor para Windows Server 2008."},{"isCorrect":true,"rationale":"Basado en sistemas Unix, Kerberos protege la identidad evitando el envío de credenciales en texto plano a través del medio de transmisión.","text":"Asegurar que las contraseñas sean encriptadas antes de ser enviadas por la red."}],"hint":"Su función se centra en la protección de las credenciales durante el proceso de validación de identidad.","question":"¿Cuál es el objetivo principal del protocolo Kerberos dentro de una red?"},{"answerOptions":[{"isCorrect":false,"rationale":"No todas las aplicaciones cifran su tráfico y, aunque lo hicieran, el riesgo persiste en la ejecución del software en el dispositivo del usuario.","text":"Porque las aplicaciones locales siempre cifran su tráfico, impidiendo que el perímetro lo analice."},{"isCorrect":false,"rationale":"BGP es un protocolo de enrutamiento y no impone restricciones sobre el filtrado de aplicaciones en las políticas de seguridad.","text":"Porque la normativa BGP prohíbe el filtrado de aplicaciones en el rúter frontera."},{"isCorrect":true,"rationale":"La seguridad debe ser multicapa; eliminar aplicaciones no permitidas en el host reduce riesgos que el firewall perimetral podría no detectar.","text":"Porque cada aplicación instalada en un dispositivo de usuario aumenta la superficie de riesgo y posibles vectores de ataque."},{"isCorrect":false,"rationale":"Los cortafuegos modernos pueden filtrar múltiples protocolos, pero no pueden mitigar vulnerabilidades de software local una vez que el tráfico legítimo pasa.","text":"Porque los cortafuegos de tres patas solo pueden filtrar tráfico web (puerto 80) y no aplicaciones."}],"hint":"Considere el concepto de 'defensa en capas' aplicado a los dispositivos individuales.","question":"Al diseñar una red perimetral, ¿por qué el control de aplicaciones desde el perímetro no sustituye la necesidad de gestionar el software en los equipos finales?"},{"answerOptions":[{"isCorrect":false,"rationale":"La arquitectura distribuida utiliza Internet para que los diferentes servicios se conecten remotamente al punto central.","text":"No permite el uso de Internet para la conexión, obligando al uso de satélites."},{"isCorrect":true,"rationale":"La dependencia de una ubicación geográfica central para los recursos compartidos crea un punto único de fallo para toda la organización.","text":"Si se pierde el servicio en el punto central, todos los puntos remotos se ven afectados."},{"isCorrect":false,"rationale":"El texto menciona explícitamente los servicios de VoIP como un ejemplo de lo que se puede integrar en arquitecturas distribuidas.","text":"Es imposible conectar servicios de telefonía VoIP bajo este esquema."},{"isCorrect":false,"rationale":"Al contrario, esta arquitectura permite disminuir los costes en los remotos al centralizar los recursos.","text":"Requiere una inversión masiva de hardware de alta gama en cada uno de los puntos remotos."}],"hint":"Piense en qué ocurre con las sucursales si la sede principal sufre una caída de red.","question":"En una arquitectura de empresa distribuida, ¿cuál es la principal desventaja en comparación con otros esquemas?"},{"answerOptions":[{"isCorrect":false,"rationale":"Aunque puede albergar servicios, su función perimetral no es el almacenamiento de datos sensibles internos, sino la seguridad de acceso.","text":"Actuar como un servidor de base de datos cifrada para el departamento de contabilidad."},{"isCorrect":false,"rationale":"LDAP es un servicio de directorio; el sistema bastión tiene una finalidad de endurecimiento de red más amplia y estructural.","text":"Gestionar exclusivamente las actualizaciones de Windows Server 2008 mediante LDAP."},{"isCorrect":true,"rationale":"Su propósito es resistir ataques directos al estar expuesto, sirviendo como barrera de seguridad para la red interna.","text":"Es un host fortalecido ubicado entre dos rúteres para crear una zona de protección adicional."},{"isCorrect":false,"rationale":"Un sistema bastión y un antivirus son elementos complementarios, no sustitutivos; el bastión es una arquitectura de host, el antivirus es software de detección.","text":"Sustituir al antivirus perimetral mediante el uso de protocolos AAA."}],"hint":"Considere su ubicación física en el esquema de red según la Figura 3 del material.","question":"¿Cuál es la función de un sistema bastión en una red perimetral?"},{"answerOptions":[{"isCorrect":false,"rationale":"El escaneo del antivirus y la conexión wifi son procesos distintos; la recomendación busca mitigar riesgos de interceptación de datos.","text":"Para ahorrar batería al evitar que el antivirus escanee constantemente el perímetro."},{"isCorrect":false,"rationale":"La seguridad del usuario es la prioridad; el agotamiento de IPs en la red pública es un problema del administrador de dicha red.","text":"Para impedir que el rúter frontera de la cafetería agote sus direcciones IP."},{"isCorrect":false,"rationale":"WPA2-Enterprise puede recordar credenciales, pero la desactivación automática es una medida preventiva contra la suplantación de puntos de acceso.","text":"Porque el protocolo WPA2-Enterprise requiere configuración manual obligatoria en cada sesión."},{"isCorrect":true,"rationale":"Un atacante puede crear una red con el mismo nombre que una red legítima para capturar el tráfico de dispositivos que se conectan automáticamente.","text":"Para evitar ataques basados en redes falsas que suplantan identidades conocidas."}],"hint":"Piense en cómo un atacante podría engañar a su teléfono para que se conecte a su antena sin que usted se dé cuenta.","question":"Dentro de las buenas prácticas para el uso de redes wifi públicas, ¿por qué se recomienda desactivar la conexión automática a redes conocidas?"},{"answerOptions":[{"isCorrect":false,"rationale":"Aunque es un protocolo de seguridad, se utiliza más comúnmente a nivel de red para VPNs, no es el estándar primario de comunicaciones web directas.","text":"IPsec."},{"isCorrect":true,"rationale":"Es el estándar para asegurar el tráfico HTTP (HTTPS), proporcionando autenticación y cifrado en la comunicación entre cliente y servidor.","text":"SSL/TLS."},{"isCorrect":false,"rationale":"PGP (Pretty Good Privacy) se utiliza fundamentalmente para el cifrado de archivos y correos electrónicos, no para sesiones web en tiempo real.","text":"PGP."},{"isCorrect":false,"rationale":"S/MIME es un estándar para la firma y cifrado de mensajes de correo electrónico, similar a PGP en su ámbito de aplicación.","text":"S/MIME."}],"hint":"Es el protocolo que activa el candado de seguridad en la barra de direcciones de su navegador.","question":"¿Qué protocolo es comúnmente utilizado para establecer comunicaciones web seguras mediante cifrado?"},{"answerOptions":[{"isCorrect":false,"rationale":"El rúter frontera sigue siendo necesario para gestionar la entrada del tráfico de Internet hacia el servidor VPN.","text":"Elimina la necesidad de tener un rúter frontera en la organización."},{"isCorrect":true,"rationale":"OpenVPN es una solución de código abierto robusta y ampliamente utilizada para establecer túneles seguros hacia infraestructuras privadas.","text":"Permite realizar conexiones VPN con una nube privada de forma flexible."},{"isCorrect":false,"rationale":"VPN y cortafuegos cumplen funciones diferentes; la VPN cifra el túnel, mientras que el cortafuegos filtra qué tráfico puede pasar por él.","text":"Sustituye automáticamente al cortafuegos dual-firewall de la DMZ."},{"isCorrect":false,"rationale":"La seguridad VPN requiere autenticación; el texto menciona que estos sistemas manejan sesiones mediante usuario, contraseña y opcionalmente certificados.","text":"Es el único protocolo que no requiere usuario ni contraseña para el acceso."}],"hint":"Se trata de una herramienta de software para implementar conectividad remota segura.","question":"En el caso práctico de teletrabajo, ¿qué ventaja ofrece el uso de OpenVPN en servidores Linux?"},{"answerOptions":[{"isCorrect":false,"rationale":"No existe tal prohibición; al contrario, se fomenta el uso de métodos seguros de autenticación.","text":"La prohibición del uso de protocolos AAA en redes públicas."},{"isCorrect":false,"rationale":"RADIUS es un protocolo de autenticación antiguo; las VPN se popularizaron por la necesidad de movilidad y privacidad generalizada.","text":"La invención del protocolo RADIUS para redes wifi en restaurantes."},{"isCorrect":true,"rationale":"El confinamiento obligó a las empresas a implementar soluciones de acceso remoto rápido para mantener la operatividad desde los hogares.","text":"La pandemia mundial del covid-19 y la necesidad de teletrabajo seguro."},{"isCorrect":false,"rationale":"Aunque ese ataque resaltó la importancia de la ciberseguridad, no fue el catalizador de la adopción masiva de VPN como lo fue la pandemia.","text":"El descubrimiento del ataque a British Airways en el año 2018."}],"hint":"Considere un evento global reciente que cambió la forma en que trabajamos.","question":"Según el material, ¿cuál fue la causa principal de la popularización masiva de las redes VPN en los últimos años?"},{"answerOptions":[{"isCorrect":true,"rationale":"BGP (Border Gateway Protocol) es fundamental para la comunicación entre diferentes sistemas autónomos en Internet y debe estar bien configurado para ser seguro.","text":"Gestionar el enrutamiento de la información hacia el exterior y evitar vulnerabilidades de frontera."},{"isCorrect":false,"rationale":"BGP no es un protocolo de cifrado de datos, sino de intercambio de información de rutas entre redes.","text":"Cifrar las bases de datos de los clientes en tránsito hacia la nube."},{"isCorrect":false,"rationale":"El antivirus es un elemento básico independiente o una función de software, distinta del protocolo de enrutamiento BGP.","text":"Actuar como un antivirus en tiempo real dentro del rúter doméstico."},{"isCorrect":false,"rationale":"La gestión de credenciales únicas para wifi es tarea de protocolos como WPA2-Enterprise junto con un servidor RADIUS.","text":"Proporcionar credenciales únicas a los usuarios de una red wifi empresarial."}],"hint":"Piense en su nombre en español: Protocolo de Pasarela de Frontera.","question":"En el esquema de seguridad perimetral, ¿qué función cumple el protocolo BGP mencionado en relación con los rúteres?"},{"answerOptions":[{"isCorrect":false,"rationale":"La DMZ es un concepto lógico de topología de red, no un espacio físico en el centro de datos del proveedor de nube.","text":"El espacio físico donde se ubican los servidores en una arquitectura de nube."},{"isCorrect":false,"rationale":"La DMZ suele requerir controles estrictos de acceso; desactivar protocolos AAA iría en contra de los principios de seguridad perimetral.","text":"Una red donde el protocolo AAA está desactivado para facilitar el acceso remoto."},{"isCorrect":true,"rationale":"Su objetivo es exponer servicios al exterior sin comprometer directamente el acceso a los datos privados de la red interna.","text":"Una red perimetral (DMZ) situada entre la red interna segura y la red externa no segura."},{"isCorrect":false,"rationale":"La seguridad perimetral debe aplicarse en todas las zonas de acceso; una zona sin cortafuegos sería una vulnerabilidad crítica.","text":"Un área de la oficina donde los empleados pueden usar wifi sin cortafuegos."}],"hint":"Es otro nombre común para la Zona Desmilitarizada.","question":"¿Qué se entiende por 'zona neutral' en el diseño de arquitecturas de red?"},{"answerOptions":[{"isCorrect":true,"rationale":"Este enfoque de 'denegación por defecto' asegura que solo el tráfico explícitamente autorizado pueda circular por la red.","text":"Permitir solo los servicios definidos para su uso y denegar todo lo demás."},{"isCorrect":false,"rationale":"Permitir todo el tráfico entrante expondría la red a ataques constantes; el filtrado debe ser bidireccional.","text":"Permitir todo el tráfico entrante y filtrar solo el tráfico saliente para evitar robo de datos."},{"isCorrect":false,"rationale":"La seguridad debe ser integral; el perímetro debe actuar como la primera barrera antes de que el tráfico llegue al host.","text":"Delegar la seguridad de los servicios exclusivamente en el antivirus del host final."},{"isCorrect":false,"rationale":"Las políticas de seguridad suelen priorizar el tráfico crítico del negocio y limitar o denegar el tráfico no productivo.","text":"Dar prioridad a los servicios de entretenimiento para que no saturen la VPN corporativa."}],"hint":"Considere la postura más conservadora y segura para un administrador de red.","question":"Al aplicar políticas de defensa perimetral, ¿cuál es el principio básico de actuación respecto a los servicios de red?"},{"answerOptions":[{"isCorrect":false,"rationale":"El filtrado de sitios maliciosos es una de las funciones principales de los servidores proxy descritas en el material.","text":"Son incapaces de filtrar sitios web maliciosos."},{"isCorrect":false,"rationale":"Los proxies son independientes del medio físico y funcionan sobre cualquier conexión a Internet.","text":"Solo funcionan con conexiones de fibra óptica dedicadas."},{"isCorrect":false,"rationale":"El texto afirma explícitamente que los servidores proxy sí ocultan las direcciones IP.","text":"No permiten ocultar la dirección IP del usuario."},{"isCorrect":true,"rationale":"A diferencia de las VPN, los proxies se centran en la gestión y el anonimato de la IP, pero la información viaja sin cifrado adicional del proxy.","text":"No encriptan el tráfico de datos."}],"hint":"Piense en la diferencia fundamental de privacidad entre un túnel VPN y un intermediario proxy.","question":"Sobre los elementos adicionales para mayor seguridad, ¿qué limitación técnica tienen los servidores proxy mencionados en el texto?"},{"answerOptions":[{"isCorrect":false,"rationale":"El almacenamiento de credenciales es tarea de servidores de autenticación o directorios, no de un cortafuegos físico de perímetro.","text":"Almacenar las contraseñas encriptadas mediante el protocolo Kerberos."},{"isCorrect":false,"rationale":"La seguridad wifi se gestiona en los puntos de acceso y servidores RADIUS, no en el cortafuegos frontal de la red cableada.","text":"Cifrar la conexión wifi mediante el estándar WPA2-Enterprise."},{"isCorrect":true,"rationale":"El primer cortafuegos protege a la DMZ de Internet, pero no debe permitir que el tráfico externo salte directamente a la red interna.","text":"Permitir el tráfico desde el exterior únicamente hacia la zona desmilitarizada."},{"isCorrect":false,"rationale":"Aunque el tráfico pase por él, la terminación de la VPN suele ocurrir en un servidor dedicado o un dispositivo específico tras el front-end.","text":"Actuar como el único punto de conexión para los usuarios de teletrabajo."}],"hint":"Considere su posición como 'primera línea' de defensa frente a la red pública.","question":"¿Cuál es la función del 'front-end' en una configuración avanzada de DMZ con dos cortafuegos?"},{"answerOptions":[{"isCorrect":false,"rationale":"Kerberos es el protocolo mencionado en relación con identidades en Unix y alta seguridad como tarjetas inteligentes.","text":"Gestionar exclusivamente las conexiones de tarjetas inteligentes en sistemas Unix."},{"isCorrect":false,"rationale":"LDAP y BGP operan en capas y con objetivos totalmente distintos; uno es para identidad y el otro para rutas de red.","text":"Reemplazar al protocolo BGP en los rúteres de frontera de Cisco."},{"isCorrect":true,"rationale":"LDAP permite organizar y acceder a información sobre usuarios y recursos en una red de forma jerárquica.","text":"Fue utilizado ampliamente por Windows Server 2008 como servicio de directorio."},{"isCorrect":false,"rationale":"El desarrollo de las VPN se centró en el acceso remoto seguro, mientras que LDAP se orienta a servicios de directorio.","text":"Servir como la base para el desarrollo de la primera VPN en los años 90."}],"hint":"Relacione este protocolo con un sistema operativo de servidor de la década de 2000.","question":"En el contexto de protocolos AAA, ¿cuál fue el uso histórico destacado del protocolo LDAP?"},{"answerOptions":[{"isCorrect":false,"rationale":"Bloquear este puerto impediría la autenticación legítima, pero no es el error de diseño 'común' mencionado sobre la ubicación del antivirus.","text":"Configurar el antivirus para que bloquee el puerto UDP 1812 del servidor RADIUS."},{"isCorrect":false,"rationale":"Usar varios fabricantes suele ser una buena práctica de seguridad (defensa en profundidad), no un error de diseño.","text":"Usar antivirus de fabricantes diferentes para el tráfico entrante y saliente."},{"isCorrect":true,"rationale":"La protección debe ser redundante; las amenazas pueden introducirse por medios no perimetrales (como USB) o saltar el primer filtro.","text":"Creer que tener antivirus en el perímetro elimina la necesidad de proteger cada equipo individual."},{"isCorrect":false,"rationale":"Aunque es necesario en el correo, el error citado es la falta de protección en los equipos finales de la red privada.","text":"Instalar el antivirus únicamente en el servidor de correo de la nube."}],"hint":"Piense en el principio de defensa en capas y dónde deben residir las licencias de software.","question":"Según el texto, ¿qué error común se debe evitar al diseñar una red perimetral respecto al antivirus?"},{"answerOptions":[{"isCorrect":true,"rationale":"Tener múltiples puntos de inspección permite detectar ataques que hayan logrado evadir la primera línea de defensa perimetral.","text":"Contar con uno en el perímetro y otro adicional dentro de la red privada para mayor protección."},{"isCorrect":false,"rationale":"El IPS busca detectar ataques, no cifrar tráfico; de hecho, el cifrado dificulta la labor de inspección del IPS.","text":"Encriptar el tráfico de las aplicaciones P2P para que no saturen el ancho de banda."},{"isCorrect":false,"rationale":"El IPS complementa al cortafuegos; no lo sustituye, ya que operan bajo lógicas de filtrado diferentes (firmas/comportamiento vs reglas de acceso).","text":"Sustituir al cortafuegos dual en arquitecturas débiles de subred."},{"isCorrect":false,"rationale":"El IPS es un componente técnico de seguridad, no una herramienta de gestión administrativa o financiera.","text":"Gestionar el pago mensual o anual de los servicios de arquitectura híbrida."}],"hint":"Considere la ubicación ideal para este sistema para maximizar la visibilidad de amenazas.","question":"¿Cuál es la función principal de un Sistema de Detección y Prevención de Intrusiones (IPS) según las recomendaciones de diseño?"},{"answerOptions":[{"isCorrect":false,"rationale":"El filtrado es una función de control de acceso, mientras que la encapsulación es un método de transmisión de datos.","text":"El filtrado de direcciones IP maliciosas realizado por un servidor proxy."},{"isCorrect":false,"rationale":"La encapsulación es un concepto de red lógico/protocolo, no una medida de protección física de hardware.","text":"La instalación de cortafuegos físicos alrededor de cada servidor bastión."},{"isCorrect":true,"rationale":"Este proceso es fundamental para crear el 'túnel' que permite que los datos privados viajen a través de Internet sin ser interceptados fácilmente.","text":"El proceso de envolver un paquete de datos dentro de otro para su transporte seguro por una red pública."},{"isCorrect":false,"rationale":"El control del ancho de banda es una gestión de calidad de servicio (QoS), no está relacionado con la encapsulación VPN.","text":"La limitación del ancho de banda para usuarios que no utilicen HTTPS."}],"hint":"Piense en la analogía de meter una carta dentro de un sobre para que nadie lea el contenido durante el envío.","question":"¿Qué representa la técnica de 'encapsulación' en una red VPN?"},{"answerOptions":[{"isCorrect":false,"rationale":"Desactivar un cortafuegos comprometería gravemente la seguridad; los permisos VPN se configuran permitiendo el tráfico específico, no eliminando defensas.","text":"Desactivar el cortafuegos back-end de la organización."},{"isCorrect":false,"rationale":"BGP y las líneas dedicadas son infraestructuras de conexión que no dependen directamente de los permisos de usuario en el servidor.","text":"Cambiar el protocolo BGP por una línea dedicada."},{"isCorrect":false,"rationale":"OpenVPN es la alternativa mencionada para servidores Linux; para Windows Server Essentials se utilizan sus herramientas nativas de administración.","text":"Instalar el paquete OpenVPN en el escritorio del cliente."},{"isCorrect":true,"rationale":"La gestión de accesos remotos comienza por la administración de las cuentas de usuario a las que se desea conceder el privilegio.","text":"Abrir el panel de usuarios."}],"hint":"Se trata de una acción administrativa básica sobre las cuentas de los empleados.","question":"En el caso práctico 2, ¿cuál es el primer paso recomendado para establecer permisos de VPN en un servidor Windows Server Essentials?"},{"answerOptions":[{"isCorrect":true,"rationale":"La arquitectura híbrida aprovecha la flexibilidad de la nube y la seguridad controlada de la red local según las necesidades de la empresa.","text":"Permite intercambiar información mediante VPN combinando niveles de confidencialidad configurables."},{"isCorrect":false,"rationale":"La arquitectura híbrida no altera las limitaciones físicas de la conexión a Internet; su foco es la distribución lógica de servicios y seguridad.","text":"Garantiza que el ancho de banda sea ilimitado para aplicaciones P2P."},{"isCorrect":false,"rationale":"Al mantener una parte de la infraestructura local (on-premise), los elementos básicos como rúteres y cortafuegos siguen siendo críticos.","text":"No requiere el uso de
