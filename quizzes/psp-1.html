<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSP - 8 a 15 - NotebookLM - Quiz Export</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

        :root {
            --bg: #f6f1e7;
            --bg-deep: #efe4d6;
            --ink: #171717;
            --muted: #5b5b5b;
            --accent: #d3542c;
            --accent-light: #ff8f5a;
            --accent-dark: #b14320;
            --teal: #1f6f78;
            --card: #fff7ef;
            --stroke: #e3d6c5;
            --shadow: 0 18px 40px rgba(23, 23, 23, 0.12);
            --radius-sm: 10px;
            --radius-md: 12px;
            --radius-lg: 14px;
            --radius-xl: 18px;
            --radius-2xl: 22px;
            --space-1: 6px;
            --space-2: 8px;
            --space-3: 10px;
            --space-4: 12px;
            --space-5: 14px;
            --space-6: 16px;
            --space-7: 18px;
            --space-8: 20px;
            --space-9: 24px;
            --space-10: 32px;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'IBM Plex Sans', sans-serif;
            --error: #b54832;
        }

        body {
            font-family: var(--font-body);
            background:
                radial-gradient(240px 140px at 10% -10%, #ffd2b9 0%, transparent 70%),
                radial-gradient(220px 160px at 90% 0%, #cfe7e6 0%, transparent 65%),
                linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
            color: var(--ink);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            width: 100%;
            max-width: 800px;
            padding: var(--space-10) var(--space-8);
            box-sizing: border-box;
            background: var(--card);
            border-radius: var(--radius-2xl);
            border: 1px solid var(--stroke);
            box-shadow: var(--shadow);
        }

        .progress-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .progress-text {
            color: var(--muted);
            font-size: 0.9em;
        }

        .status-bar {
            display: flex;
            gap: 16px;
            font-size: 0.9em;
            font-weight: 500;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-correct { color: var(--teal); }
        .status-wrong { color: var(--error); }

        .question-text {
            font-family: var(--font-display);
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .options-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-item {
            background-color: #fff;
            border: 1px solid var(--stroke);
            padding: var(--space-4) var(--space-6);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option-item:hover:not(.selected) {
            background-color: var(--card);
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .option-item.selected.correct {
            background-color: rgba(31, 111, 120, 0.12);
            border-color: var(--teal);
        }

        .option-item.selected.incorrect {
            background-color: rgba(181, 72, 50, 0.12);
            border-color: var(--error);
        }

        .option-item.revealed-correct {
            border-color: rgba(31, 111, 120, 0.5);
            box-shadow: inset 0 0 0 1px rgba(31, 111, 120, 0.16);
        }

        .option-label {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .feedback-state {
            font-weight: bold;
            font-size: 0.9em;
            display: none;
        }

        .selected .feedback-state {
            display: block;
        }

        .revealed-correct .feedback-state {
            display: block;
        }

        .correct .feedback-state { color: var(--teal); }
        .incorrect .feedback-state { color: var(--error); }
        .revealed-correct .feedback-state { color: var(--teal); }

        .rationale {
            font-size: 0.95em;
            color: var(--muted);
            margin-top: 4px;
            line-height: 1.5;
            display: none;
        }

        .selected .rationale {
            display: block;
        }

        .revealed-correct .rationale {
            display: block;
        }
        .hint-toggle {
            border: 1px solid var(--stroke);
            color: var(--muted);
            cursor: pointer;
            padding: var(--space-2) var(--space-6);
            border-radius: var(--radius-md);
            background-color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .hint-toggle:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .hint-content {
            margin-top: 32px;
            padding: var(--space-6);
            background-color: #fff;
            border: 1px solid var(--stroke);
            border-radius: var(--radius-lg);
            font-size: 0.95em;
            color: var(--muted);
            display: none;
            align-items: flex-start;
            gap: 16px;
        }

        .hint-content.active {
            display: flex;
        }

        .hint-icon-box {
            color: var(--accent-dark);
            font-size: 1.2em;
            margin-top: -2px;
        }

        .navigation {
            margin-top: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            border-radius: var(--radius-md);
            padding: var(--space-2) var(--space-7);
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-prev {
            background-color: #fff;
            color: var(--ink);
            border-color: var(--stroke);
        }

        .btn-prev:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn-next {
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            color: #fff;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .results-screen {
            display: flex;
            flex-direction: column;
            gap: var(--space-8);
        }

        .results-title {
            font-family: var(--font-display);
            font-size: 2.1em;
            margin: 0;
        }

        .results-subtitle {
            color: var(--muted);
            margin: 0;
            font-size: 1em;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-6);
        }

        .result-card {
            padding: var(--space-6);
            border-radius: var(--radius-xl);
            background: #fff;
            border: 1px solid var(--stroke);
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        .result-label {
            color: var(--muted);
            font-size: 0.95em;
        }

        .result-value {
            font-size: 2em;
            font-family: var(--font-display);
        }

        .result-metrics {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
            color: var(--muted);
            font-size: 0.95em;
        }

        .results-actions {
            display: flex;
            gap: var(--space-4);
            flex-wrap: wrap;
        }

        .btn-ghost {
            background-color: transparent;
            border: 1px solid var(--stroke);
            color: var(--ink);
        }

        .hidden { display: none; }

        @media (max-width: 900px) {
            .quiz-container {
                margin: var(--space-8);
                max-width: 100%;
            }
        }

        @media (max-width: 720px) {
            .quiz-container {
                padding: var(--space-8) var(--space-6);
            }

            .question-text {
                font-size: 1.3em;
            }

            .option-item {
                padding: var(--space-4);
            }
        }

        @media (max-width: 520px) {
            body {
                align-items: flex-start;
            }

            .quiz-container {
                margin: var(--space-6);
                padding: var(--space-7) var(--space-5);
            }

            .progress-container {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-3);
            }

            .navigation {
                flex-direction: column;
                align-items: stretch;
                gap: var(--space-4);
            }

            .nav-buttons {
                width: 100%;
            }

            .btn {
                width: 100%;
            }

            .hint-toggle {
                justify-content: space-between;
            }

            .results-actions {
                flex-direction: column;
            }
        }
    </style>
</head>

ption"},{"isCorrect":true,"rationale":"Es la excepción base para todos los errores de entrada/salida, incluyendo fallos de conexión de red.","text":"IOException"},{"isCorrect":false,"rationale":"Se produce por errores matemáticos (como división por cero) y no tiene relación con las interfaces de red.","text":"ArithmeticException"},{"isCorrect":false,"rationale":"Suele ocurrir por restricciones del gestor de seguridad de Java, no necesariamente por la disponibilidad física del host remoto.","text":"SecurityException"}],"hint":"Es la excepción más común cuando algo falla al leer o escribir datos fuera del programa.","question":"En una implementación de red en Java, ¿qué excepción suele lanzarse si intentamos conectar un Socket a una IP inexistente o puerto cerrado?"},{"answerOptions":[{"isCorrect":false,"rationale":"El User Agent reside en la parte del cliente, no en la infraestructura central del servidor.","text":"Es el servidor que almacena las bases de datos de los usuarios."},{"isCorrect":true,"rationale":"Identifica al software (como Chrome, Firefox o un programa Java) que está realizando la solicitud al servidor web.","text":"Es la aplicación o navegador que inicia la petición en nombre del usuario."},{"isCorrect":false,"rationale":"El término se refiere a una entidad de software dentro del protocolo, no a una persona física.","text":"Es el administrador de red encargado de configurar el puerto 80."},{"isCorrect":false,"rationale":"No es un protocolo en sí, sino un identificador dentro de las cabeceras del protocolo HTTP.","text":"Es un protocolo de seguridad que reemplaza al SSL."}],"hint":"Piense en quién actúa como 'representante' del humano ante el servidor web.","question":"¿Qué característica define al 'User Agent' en el protocolo HTTP?"},{"answerOptions":[{"isCorrect":false,"rationale":"Los flujos (Streams) son propios de TCP; UDP utiliza paquetes discretos con su propia cabecera de dirección.","text":"El flujo de salida OutputStream obtenido del cliente."},{"isCorrect":true,"rationale":"UDP requiere que cada paquete individual contenga toda la información necesaria para el enrutamiento.","text":"Los datos, la longitud, la dirección IP destino y el puerto destino."},{"isCorrect":false,"rationale":"Al no haber conexión previa, el paquete 'suelto' no sabría a dónde dirigirse sin una dirección destino.","text":"Solo el array de bytes con el mensaje."},{"isCorrect":false,"rationale":"El socket necesita una InetAddress y un puerto numérico, no solo una cadena de texto de dominio.","text":"Únicamente el nombre de dominio resuelto por el servidor DNS."}],"hint":"Imagine que está enviando una carta física: ¿qué necesita poner en el sobre para que llegue?","question":"Para enviar datos a través de un DatagramSocket, ¿qué información debe incluirse obligatoriamente en el constructor del DatagramPacket de salida?"},{"answerOptions":[{"isCorrect":false,"rationale":"La confidencialidad asegura que solo las personas autorizadas lean el mensaje, sin importar si el emisor admite el envío.","text":"Confidencialidad"},{"isCorrect":true,"rationale":"Este principio garantiza que el emisor no pueda desvincularse legal o técnicamente de una acción o comunicación realizada.","text":"No repudio"},{"isCorrect":false,"rationale":"Se refiere a que el sistema esté accesible cuando se necesite, no a la autoría de los mensajes.","text":"Disponibilidad"},{"isCorrect":false,"rationale":"La integridad asegura que el mensaje no ha sido modificado, pero no garantiza quién lo envió originalmente.","text":"Integridad"}],"hint":"Es un término legal aplicado a la tecnología para evitar excusas sobre la autoría.","question":"En el contexto de la seguridad informática, ¿cuál de estos conceptos se refiere a que un usuario no pueda negar haber enviado un mensaje?"},{"answerOptions":[{"isCorrect":false,"rationale":"Este método inicia el enlace físico, pero no proporciona por sí mismo la vía para leer los datos.","text":"connect()"},{"isCorrect":false,"rationale":"Es un método de ServerSocket, no de la clase Socket que utiliza el cliente para comunicarse.","text":"accept()"},{"isCorrect":true,"rationale":"Permite al cliente leer los bytes que el servidor está enviando como respuesta o información.","text":"getInputStream()"},{"isCorrect":false,"rationale":"Este método devuelve el flujo para enviar datos desde el cliente hacia el servidor.","text":"getOutputStream()"}],"hint":"Busque el flujo que representa la 'entrada' de información al programa local.","question":"¿Qué método de la clase Socket en Java se utiliza para obtener el canal de recepción de datos del servidor?"},{"answerOptions":[{"isCorrect":false,"rationale":"Este comando se envía después de establecer la sesión para indicar el remitente del mensaje específico.","text":"MAIL FROM"},{"isCorrect":false,"rationale":"Aunque se requiere autenticación después, el saludo de protocolo obligatorio es previo a las credenciales de usuario.","text":"LOGIN"},{"isCorrect":false,"rationale":"No es un comando estándar de inicio de protocolo SMTP, aunque existen extensiones como STARTTLS para seguridad.","text":"START"},{"isCorrect":true,"rationale":"Es el comando de saludo inicial definido en el protocolo para identificarse ante el servidor de correo.","text":"HELO"}],"hint":"Es una variación corta de la palabra 'Hola' en inglés.","question":"Al programar un cliente SMTP, ¿cuál es el comando estándar utilizado para iniciar la sesión con el servidor de correo?"},{"answerOptions":[{"isCorrect":true,"rationale":"Incluye tanto el tiempo de transmisión por la red como el tiempo que tarda la CPU del servidor en procesar la lógica.","text":"El tiempo transcurrido entre la petición del cliente y la recepción del resultado final."},{"isCorrect":false,"rationale":"Eso se conoce como tiempo de carga o inicialización, no respuesta al servicio.","text":"El tiempo que tarda el servidor en arrancar desde cero."},{"isCorrect":false,"rationale":"La capacidad del hardware del cliente es solo uno de los muchos factores y no define la métrica de respuesta del servicio.","text":"La velocidad máxima de la tarjeta de red del cliente."},{"isCorrect":false,"rationale":"Esto define el rendimiento o caudal (throughput), no la latencia de una petición individual.","text":"El número de clientes que pueden conectarse por segundo."}],"hint":"Piense en cuánto tiempo espera un usuario desde que hace clic hasta que ve el dato.","question":"¿Qué indica el 'Tiempo de respuesta' en la monitorización de una aplicación servidor?"},{"answerOptions":[{"isCorrect":false,"rationale":"La forma de crear hilos es independiente del protocolo de red utilizado.","text":"Thread es obligatorio para servidores TCP y Runnable para UDP."},{"isCorrect":false,"rationale":"El consumo de recursos depende de la lógica interna del hilo, no de la sintaxis elegida para declararlo.","text":"Runnable consume mucha más memoria RAM al ejecutarse."},{"isCorrect":false,"rationale":"En ambas opciones se pueden pasar parámetros a través del constructor de la clase.","text":"Heredar de Thread es la única forma de pasar parámetros al hilo."},{"isCorrect":true,"rationale":"Java no admite herencia múltiple; usar la interfaz Runnable es más flexible para la arquitectura de clases.","text":"Runnable permite que la clase herede de otra si es necesario, mientras que Thread no."}],"hint":"Recuerde las limitaciones de la herencia simple en el lenguaje Java.","question":"En Java, ¿qué diferencia existe entre usar la interfaz Runnable o heredar de Thread para crear el hilo de un servidor?"},{"answerOptions":[{"isCorrect":false,"rationale":"La IP solo sirve para el enrutamiento hacia el equipo correcto, no indica el tamaño del mensaje.","text":"IP destino"},{"isCorrect":false,"rationale":"Identifica la aplicación emisora para posibles respuestas, pero es independiente del tamaño de la carga útil.","text":"Puerto origen"},{"isCorrect":false,"rationale":"Es el contenedor de los datos en sí, pero no el campo de control que indica su medida exacta.","text":"Array de bytes"},{"isCorrect":true,"rationale":"Este campo especifica el tamaño total del datagrama (cabecera más datos) para su correcto procesamiento.","text":"Longitud"}],"hint":"Es un valor numérico que acompaña a los datos para delimitar su final.","question":"Dentro de un datagrama UDP, ¿qué campo permite al receptor saber cuántos bytes de datos útiles contiene el paquete?"},{"answerOptions":[{"isCorrect":false,"rationale":"Los protocolos son fijos según la implementación y no cambian por la carga de usuarios.","text":"Para evitar que el protocolo TCP cambie automáticamente a UDP."},{"isCorrect":false,"rationale":"Java puede manejar miles de hilos, el límite lo marca el hardware y la eficiencia del código.","text":"Porque Java solo permite un máximo de 10 hilos simultáneos por defecto."},{"isCorrect":true,"rationale":"Cada hilo consume recursos; un número excesivo de ellos podría degradar el rendimiento o provocar la caída del sistema.","text":"Para prevenir la saturación de los recursos de CPU y memoria RAM del servidor."},{"isCorrect":false,"rationale":"El límite de usuarios es una gestión de rendimiento, no una imposición de protocolos de seguridad.","text":"Para obligar a los clientes a utilizar conexiones cifradas HTTPS."}],"hint":"Piense en qué sucedería si mil personas intentaran entrar por una puerta diseñada para diez.","question":"¿Cuál es la principal razón por la que se recomienda establecer un 'máximo de clientes' en un servidor concurrente?"}];
        let currentIndex = 0;
        let mode = 'quiz';
        let state = quizData.map(() => ({ selectedIndex: null, hintVisible: false }));

        function getStats() {
            const answered = state.filter((s) => s.selectedIndex !== null).length;
            const correct = state.filter((s, i) => s.selectedIndex !== null && quizData[i].answerOptions[s.selectedIndex].isCorrect).length;
            const wrong = state.filter((s, i) => s.selectedIndex !== null && !quizData[i].answerOptions[s.selectedIndex].isCorrect).length;
            const skipped = quizData.length - answered;
            const accuracy = answered > 0 ? Math.round((correct / answered) * 100) : 0;
            return { answered, correct, wrong, skipped, accuracy };
        }

        function shuffleAnswers() {
            quizData.forEach((q) => {
                for (let i = q.answerOptions.length - 1; i > 0; i -= 1) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [q.answerOptions[i], q.answerOptions[j]] = [q.answerOptions[j], q.answerOptions[i]];
                }
            });
        }

        function shuffleQuestions() {
            for (let i = quizData.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
            }
        }

        function resetState() {
            state = quizData.map(() => ({ selectedIndex: null, hintVisible: false }));
        }

        function renderQuestion() {
            const q = quizData[currentIndex];
            const s = state[currentIndex];
            const content = document.getElementById('quiz-content');
            const results = document.getElementById('results-content');
            const hintBox = document.getElementById('hint-box');
            const nav = document.querySelector('.navigation');
            const nextBtn = document.getElementById('next-btn');
            const prevBtn = document.getElementById('prev-btn');

            let optionsHtml = '';
            const correctIndex = q.answerOptions.findIndex((o) => o.isCorrect);
            const selectedCorrect = s.selectedIndex !== null && q.answerOptions[s.selectedIndex].isCorrect;
            q.answerOptions.forEach((opt, idx) => {
                const isSelected = s.selectedIndex === idx;
                const statusClass = isSelected ? (opt.isCorrect ? 'correct' : 'incorrect') : '';
                const selectedClass = isSelected ? 'selected' : '';
                const revealCorrect = (s.selectedIndex !== null && !selectedCorrect && opt.isCorrect) || (mode === 'review' && opt.isCorrect);
                const revealClass = revealCorrect ? 'revealed-correct' : '';

                optionsHtml += `
                    <li class="option-item ${selectedClass} ${statusClass} ${revealClass}" onclick="selectOption(${idx})">
                        <div class="option-label">
                            <span>${String.fromCharCode(65 + idx)}. ${opt.text}</span>
                        </div>
                        <div class="feedback-state">
                            ${opt.isCorrect ? '✓ Correcto' : '✕ Incorrecto'}
                        </div>
                        ${opt.rationale ? '<div class="rationale">' + opt.rationale + '</div>' : ''}
                    </li>
                `;
            });

            const stats = getStats();

            content.innerHTML = `
                <div class="progress-container">
                    <div class="progress-text">${currentIndex + 1} / ${quizData.length}</div>
                    <div class="status-bar">
                        <div class="status-item status-correct">
                            <span>✓</span>
                            <span>${stats.correct}</span>
                        </div>
                        <div class="status-item status-wrong">
                            <span>✕</span>
                            <span>${stats.wrong}</span>
                        </div>
                    </div>
                </div>
                <div class="question-text">${q.question}</div>
                <ul class="options-list">
                    ${optionsHtml}
                </ul>
            `;

            // Update Pista Box
            const hintText = document.getElementById('hint-text');
            hintText.innerText = q.hint || 'No hay pista disponible para esta pregunta.';
            if (s.hintVisible) {
                hintBox.classList.add('active');
            } else {
                hintBox.classList.remove('active');
            }

            results.classList.add('hidden');
            content.classList.remove('hidden');
            hintBox.classList.remove('hidden');
            nav.classList.remove('hidden');

            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = false;
            if (mode === 'review') {
                nextBtn.innerText = currentIndex === quizData.length - 1 ? 'Volver a resultados' : 'Siguiente';
            } else {
                nextBtn.innerText = currentIndex === quizData.length - 1 ? 'Finalizar' : 'Siguiente';
            }
            document.getElementById('hint-icon-arrow').innerText = s.hintVisible ? '▲' : '▼';
        }

        function selectOption(idx) {
            if (mode !== 'quiz') return;
            if (state[currentIndex].selectedIndex !== null) return; // Prevent re-selection
            state[currentIndex].selectedIndex = idx;
            renderQuestion();
        }

        function toggleHint() {
            if (mode === 'results') return;
            state[currentIndex].hintVisible = !state[currentIndex].hintVisible;
            renderQuestion();
        }

        function renderResults() {
            const stats = getStats();
            const content = document.getElementById('quiz-content');
            const results = document.getElementById('results-content');
            const hintBox = document.getElementById('hint-box');
            const nav = document.querySelector('.navigation');

            const score = `${stats.correct} / ${quizData.length}`;

            results.innerHTML = `
                <div class="results-screen">
                    <div>
                        <h1 class="results-title">¡Lo lograste! Quiz completado.</h1>
                        <p class="results-subtitle">Revisa tu puntuación o inténtalo de nuevo.</p>
                    </div>
                    <div class="results-grid">
                        <div class="result-card">
                            <div class="result-label">Puntuación</div>
                            <div class="result-value">${score}</div>
                        </div>
                        <div class="result-card">
                            <div class="result-label">Precisión</div>
                            <div class="result-value">${stats.accuracy}%</div>
                        </div>
                        <div class="result-card">
                            <div class="result-metrics">
                                <div>Correctas <strong>${stats.correct}</strong></div>
                                <div>Incorrectas <strong>${stats.wrong}</strong></div>
                                <div>Omitidas <strong>${stats.skipped}</strong></div>
                            </div>
                        </div>
                    </div>
                    <div class="results-actions">
                        <button id="review-btn" class="btn btn-ghost">Revisar Quiz</button>
                        <button id="retake-btn" class="btn btn-next">Repetir Quiz</button>
                    </div>
                </div>
            `;

            content.classList.add('hidden');
            results.classList.remove('hidden');
            hintBox.classList.add('hidden');
            nav.classList.add('hidden');

            document.getElementById('review-btn').onclick = () => {
                mode = 'review';
                currentIndex = 0;
                renderQuestion();
            };

            document.getElementById('retake-btn').onclick = () => {
                mode = 'quiz';
                currentIndex = 0;
                shuffleQuestions();
                shuffleAnswers();
                resetState();
                renderQuestion();
            };
        }

        document.getElementById('prev-btn').onclick = () => {
            if (mode === 'results') return;
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        };

        document.getElementById('next-btn').onclick = () => {
            if (mode === 'results') return;
            if (mode === 'review') {
                if (currentIndex < quizData.length - 1) {
                    currentIndex++;
                    renderQuestion();
                } else {
                    mode = 'results';
                    renderResults();
                }
                return;
            }
            if (currentIndex < quizData.length - 1) {
                currentIndex++;
                renderQuestion();
            } else {
                mode = 'results';
                renderResults();
            }
        };

        document.getElementById('hint-toggle').onclick = toggleHint;

        renderQuestion();
    </script>
</body>
