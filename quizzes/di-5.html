<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotebookLM - Quiz Export</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

        :root {
            --bg: #f6f1e7;
            --bg-deep: #efe4d6;
            --ink: #171717;
            --muted: #5b5b5b;
            --accent: #d3542c;
            --accent-light: #ff8f5a;
            --accent-dark: #b14320;
            --teal: #1f6f78;
            --card: #fff7ef;
            --stroke: #e3d6c5;
            --shadow: 0 18px 40px rgba(23, 23, 23, 0.12);
            --radius-sm: 10px;
            --radius-md: 12px;
            --radius-lg: 14px;
            --radius-xl: 18px;
            --radius-2xl: 22px;
            --space-1: 6px;
            --space-2: 8px;
            --space-3: 10px;
            --space-4: 12px;
            --space-5: 14px;
            --space-6: 16px;
            --space-7: 18px;
            --space-8: 20px;
            --space-9: 24px;
            --space-10: 32px;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'IBM Plex Sans', sans-serif;
            --error: #b54832;
        }

        body {
            font-family: var(--font-body);
            background:
                radial-gradient(240px 140px at 10% -10%, #ffd2b9 0%, transparent 70%),
                radial-gradient(220px 160px at 90% 0%, #cfe7e6 0%, transparent 65%),
                linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
            color: var(--ink);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            width: 100%;
            max-width: 800px;
            padding: var(--space-10) var(--space-8);
            box-sizing: border-box;
            background: var(--card);
            border-radius: var(--radius-2xl);
            border: 1px solid var(--stroke);
            box-shadow: var(--shadow);
        }

        .progress-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .progress-text {
            color: var(--muted);
            font-size: 0.9em;
        }

        .status-bar {
            display: flex;
            gap: 16px;
            font-size: 0.9em;
            font-weight: 500;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-correct { color: var(--teal); }
        .status-wrong { color: var(--error); }

        .question-text {
            font-family: var(--font-display);
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .options-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-item {
            background-color: #fff;
            border: 1px solid var(--stroke);
            padding: var(--space-4) var(--space-6);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option-item:hover:not(.selected) {
            background-color: var(--card);
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .option-item.selected.correct {
            background-color: rgba(31, 111, 120, 0.12);
            border-color: var(--teal);
        }

        .option-item.selected.incorrect {
            background-color: rgba(181, 72, 50, 0.12);
            border-color: var(--error);
        }

        .option-item.revealed-correct {
            border-color: rgba(31, 111, 120, 0.5);
            box-shadow: inset 0 0 0 1px rgba(31, 111, 120, 0.16);
        }

        .option-label {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .feedback-state {
            font-weight: bold;
            font-size: 0.9em;
            display: none;
        }

        .selected .feedback-state {
            display: block;
        }

        .revealed-correct .feedback-state {
            display: block;
        }

        .correct .feedback-state { color: var(--teal); }
        .incorrect .feedback-state { color: var(--error); }
        .revealed-correct .feedback-state { color: var(--teal); }

        .rationale {
            font-size: 0.95em;
            color: var(--muted);
            margin-top: 4px;
            line-height: 1.5;
            display: none;
        }

        .selected .rationale {
            display: block;
        }

        .revealed-correct .rationale {
            display: block;
        }
        .hint-toggle {
            border: 1px solid var(--stroke);
            color: var(--muted);
            cursor: pointer;
            padding: var(--space-2) var(--space-6);
            border-radius: var(--radius-md);
            background-color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .hint-toggle:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .hint-content {
            margin-top: 32px;
            padding: var(--space-6);
            background-color: #fff;
            border: 1px solid var(--stroke);
            border-radius: var(--radius-lg);
            font-size: 0.95em;
            color: var(--muted);
            display: none;
            align-items: flex-start;
            gap: 16px;
        }

        .hint-content.active {
            display: flex;
        }

        .hint-icon-box {
            color: var(--accent-dark);
            font-size: 1.2em;
            margin-top: -2px;
        }

        .navigation {
            margin-top: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            border-radius: var(--radius-md);
            padding: var(--space-2) var(--space-7);
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-prev {
            background-color: #fff;
            color: var(--ink);
            border-color: var(--stroke);
        }

        .btn-prev:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn-next {
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            color: #fff;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .results-screen {
            display: flex;
            flex-direction: column;
            gap: var(--space-8);
        }

        .results-title {
            font-family: var(--font-display);
            font-size: 2.1em;
            margin: 0;
        }

        .results-subtitle {
            color: var(--muted);
            margin: 0;
            font-size: 1em;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-6);
        }

        .result-card {
            padding: var(--space-6);
            border-radius: var(--radius-xl);
            background: #fff;
            border: 1px solid var(--stroke);
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        .result-label {
            color: var(--muted);
            font-size: 0.95em;
        }

        .result-value {
            font-size: 2em;
            font-family: var(--font-display);
        }

        .result-metrics {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
            color: var(--muted);
            font-size: 0.95em;
        }

        .results-actions {
            display: flex;
            gap: var(--space-4);
            flex-wrap: wrap;
        }

        .btn-ghost {
            background-color: transparent;
            border: 1px solid var(--stroke);
            color: var(--ink);
        }

        .hidden { display: none; }

        @media (max-width: 900px) {
            .quiz-container {
                margin: var(--space-8);
                max-width: 100%;
            }
        }

        @media (max-width: 720px) {
            .quiz-container {
                padding: var(--space-8) var(--space-6);
            }

            .question-text {
                font-size: 1.3em;
            }

            .option-item {
                padding: var(--space-4);
            }
        }

        @media (max-width: 520px) {
            body {
                align-items: flex-start;
            }

            .quiz-container {
                margin: var(--space-6);
                padding: var(--space-7) var(--space-5);
            }

            .progress-container {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-3);
            }

            .navigation {
                flex-direction: column;
                align-items: stretch;
                gap: var(--space-4);
            }

            .nav-buttons {
                width: 100%;
            }

            .btn {
                width: 100%;
            }

            .hint-toggle {
                justify-content: space-between;
            }

            .results-actions {
                flex-direction: column;
            }
        }
    
    [data-theme="dark"] {
      --bg: #1a1612;
      --bg-deep: #141210;
      --ink: #f0ebe0;
      --muted: #9a9080;
      --accent: #e8673a;
      --accent-light: #ff9a6a;
      --accent-dark: #c45528;
      --teal: #2a9aa8;
      --card: #221e18;
      --stroke: #3a3028;
      --shadow: 0 18px 40px rgba(0,0,0,0.4);
      --error: #e06050;
    }
    [data-theme="dark"] body {
      background:
        radial-gradient(240px 140px at 10% -10%, #3a1a08 0%, transparent 70%),
        radial-gradient(220px 160px at 90% 0%, #0a2a2e 0%, transparent 65%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
    }
    [data-theme="dark"] .option-item { background-color: var(--card); }
    [data-theme="dark"] .hint-toggle,
    [data-theme="dark"] .hint-content,
    [data-theme="dark"] .btn-prev { background-color: var(--card); color: var(--ink); }
    [data-theme="dark"] .result-card { background: var(--card); }
    [data-theme="dark"] .btn-next {
      background: linear-gradient(90deg, #e8673a, #f28c5e);
      box-shadow: 0 4px 20px rgba(232, 103, 58, 0.35);
      color: #fff;
    }
    [data-theme="dark"] .btn-next:hover:not(:disabled) {
      box-shadow: 0 6px 24px rgba(232, 103, 58, 0.5);
    }
    
    /* quiz-mobile-v3 */
    @media (max-width: 640px) {
      body {
        height: 100dvh;
        overflow: hidden;
        align-items: flex-start;
        padding: 0;
      }
      .quiz-container {
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        margin: 0;
        border-radius: 0;
        border-left: none;
        border-right: none;
        border-top: none;
        padding-bottom: 0;
      }
      #quiz-content,
      #results-content {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        min-height: 0;
        padding-bottom: 8px;
      }
      #hint-box { flex-shrink: 0; }
      .navigation {
        flex-shrink: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        margin-top: 0;
        background: var(--card);
        border-top: 1px solid var(--stroke);
      }
    }
    </style>
</head>
<body>
    <div class="quiz-container">

    <div class="quiz-heading" style="margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--stroke)">
      <a href="../index.html" style="font-size:0.82em;color:var(--muted);text-decoration:none;font-family:var(--font-body)">← Índice</a>
      <h1 style="font-family:var(--font-display);font-size:1.1em;font-weight:700;color:var(--ink);margin-top:8px;padding-right:44px">Desarrollo de Interfaces · Quiz 5</h1>
    </div>
        <div id="quiz-content">
            <!-- Dynamic Content -->
        </div>
        <div id="results-content" class="hidden"></div>

        <div id="hint-box" class="hint-content">
            <div class="hint-icon-box">💡</div>
            <div id="hint-text"></div>
        </div>

        <div class="navigation">
            <button id="hint-toggle" class="hint-toggle">
                <span>Pista</span>
                <span id="hint-icon-arrow">▼</span>
            </button>
            <div class="nav-buttons">
                <button id="prev-btn" class="btn btn-prev">Anterior</button>
                <button id="next-btn" class="btn btn-next">Siguiente</button>
            </div>
        </div>
    </div>

    <script>
        let quizData = [{"answerOptions":[{"isCorrect":false,"rationale":"La regresión local se refiere a errores introducidos directamente por los cambios recientes en la misma zona.","text":"Regresión local."},{"isCorrect":true,"rationale":"Se define así cuando los cambios nuevos exponen fallos preexistentes que no tenían relación directa con la modificación.","text":"Regresión desenmascarada."},{"isCorrect":false,"rationale":"La regresión remota surge de problemas de integración entre diferentes partes que funcionan bien por separado.","text":"Regresión remota."},{"isCorrect":false,"rationale":"Este no es un término técnico tipificado en el material; se refiere generalmente a pruebas de regresión globales.","text":"Regresión de sistema."}],"hint":"Piense en errores que ya estaban allí pero cuya presencia solo se hace evidente tras alterar el entorno.","question":"Si tras introducir un cambio para solucionar un defecto, aparecen errores en partes del código que no han sido modificadas pero que antes estaban ocultos, ¿ante qué tipo de prueba de regresión nos encontramos?"},{"answerOptions":[{"isCorrect":false,"rationale":"La progresión no es lineal, sino mucho más agresiva.","text":"El coste aumenta de forma lineal a medida que avanza el tiempo."},{"isCorrect":false,"rationale":"Los costes de corrección varían drásticamente dependiendo de la fase en la que se encuentre el proyecto.","text":"El coste se mantiene constante gracias a los contratos de mantenimiento."},{"isCorrect":true,"rationale":"Tal como indica el material, cuanto más tarde se detecta un error, más fases hay que desandar, disparando los costes económicos.","text":"El coste crece de forma exponencial, siendo mucho más caro solucionarlo en producción."},{"isCorrect":false,"rationale":"Las pruebas de aceptación ocurren antes de producción; un error en producción ya implica fallos en el servicio real y costes de redepliegue.","text":"No hay impacto económico si se dispone de una buena estrategia de pruebas de aceptación."}],"hint":"Considere la forma de la gráfica de costes mencionada en la resolución del caso práctico.","question":"En el ciclo de vida de un proyecto, ¿cuál es la consecuencia económica de detectar un error en la fase de producción frente a la fase de diseño?"},{"answerOptions":[{"isCorrect":true,"rationale":"La Fábrica Nacional de Moneda y Timbre es una autoridad certificadora mencionada para validar la identidad del software.","text":"Emitir certificados de firma digital para garantizar la autenticidad."},{"isCorrect":false,"rationale":"El alojamiento depende de servidores del desarrollador o de terceros, no de la FNMT.","text":"Alojar paquetes en servidores web para su descarga."},{"isCorrect":false,"rationale":"Esa tarea corresponde a herramientas como Launch4j.","text":"Compilar ficheros Java en ejecutables."},{"isCorrect":false,"rationale":"Windows Update es gestionado por Microsoft; la FNMT se limita a la certificación de identidad.","text":"Gestionar las actualizaciones automáticas de Windows."}],"hint":"Relacione el organismo con la seguridad y la identidad legal digital.","question":"¿Cuál es la función del organismo FNMT en el proceso de distribución de aplicaciones?"},{"answerOptions":[{"isCorrect":true,"rationale":"El Java ARchive (.jar) es el formato nativo para agrupar clases y recursos de Java.","text":".jar"},{"isCorrect":false,"rationale":"Es el ejecutable de Windows, pero Java usa un formato propio portable.","text":".exe"},{"isCorrect":false,"rationale":"Es un formato de paquetes para sistemas Linux Debian.","text":".deb"},{"isCorrect":false,"rationale":"Es el instalador de Microsoft Windows, no nativo de Java.","text":".msi"}],"hint":"Piense en el acrónimo que representa un archivo comprimido de Java.","question":"¿Qué formato de empaquetado es el estándar para aplicaciones desarrolladas en lenguaje Java?"},{"answerOptions":[{"isCorrect":false,"rationale":"Una regla fundamental del diseño de TOC es que no debe duplicarse la información para evitar redundancias innecesarias.","text":"Se debe duplicar la información clave en varios niveles para reforzar el aprendizaje."},{"isCorrect":false,"rationale":"Las tablas de contenido se ubican habitualmente al inicio, funcionando como el índice de un libro.","text":"Debe situarse exclusivamente al final del documento para no distraer al lector."},{"isCorrect":true,"rationale":"La autonomía de los títulos permite al usuario navegar eficientemente sin ambigüedades sobre el contenido de cada sección.","text":"Los títulos deben ser lo suficientemente claros para no requerir documentación adicional."},{"isCorrect":false,"rationale":"En formatos digitales, el número de página es opcional y depende estrictamente del diseño del desarrollador.","text":"Es obligatorio que cada entrada de la tabla incluya el número de página físico."}],"hint":"Piense en la capacidad de los encabezados para comunicar el propósito de la sección de forma independiente.","question":"Según las pautas de diseño de una tabla de contenidos (TOC), ¿qué requisito es fundamental para asegurar la claridad del usuario?"},{"answerOptions":[{"isCorrect":false,"rationale":"Las librerías de pruebas unitarias en Java se asocian habitualmente con JUnit, no con la estructura de la interfaz.","text":"Una librería de Java utilizada exclusivamente para realizar pruebas unitarias sobre interfaces."},{"isCorrect":false,"rationale":"Los componentes que no pueden contener otros elementos se denominan simplemente Views.","text":"Un componente simple como un botón o una caja de texto que implementa una función concreta."},{"isCorrect":false,"rationale":"Aunque la interfaz se define en XML, un ViewGroup es un objeto de la jerarquía visual, no un archivo de manifiesto de permisos.","text":"Un fichero de configuración XML que determina los permisos de seguridad de la aplicación."},{"isCorrect":true,"rationale":"Los ViewGroup (como los Layouts) tienen la capacidad de albergar tanto otros ViewGroup como componentes simples (Views).","text":"Un contenedor que controla la posición y distribución de otros elementos de la interfaz."}],"hint":"Piense en la jerarquía de elementos donde unos actúan como 'padres' de otros.","question":"En Android Studio, ¿qué componente se define como un objeto 'ViewGroup'?"},{"answerOptions":[{"isCorrect":true,"rationale":"El manual de usuario está diseñado específicamente para facilitar la comprensión y el uso autónomo de la aplicación por parte del cliente.","text":"Manual o guía de usuario"},{"isCorrect":false,"rationale":"El mapa de navegación es una estructura técnica interna de los archivos de ayuda, no un manual independiente.","text":"Mapa de navegación de ayuda"},{"isCorrect":false,"rationale":"El manual de explotación suele dirigirse a personal técnico para el mantenimiento de sistemas y servidores, no al usuario final.","text":"Manual de explotación"},{"isCorrect":false,"rationale":"Los requisitos detallan lo que el sistema debe hacer, pero no guían al usuario en su manejo diario o resolución de dudas.","text":"Fichero de requisitos del sistema"}],"hint":"Piense en el documento más 'amigable' y didáctico orientado a la formación del consumidor del software.","question":"Según el material, ¿qué tipo de documentación es esencial para que un usuario resuelva dudas puntuales o aprenda a corregir errores comunes?"},{"answerOptions":[{"isCorrect":false,"rationale":"La alineación del contenido interno de un objeto se define con el atributo 'gravity', no con 'layout_gravity'.","text":"La posición de los elementos hijos dentro del propio componente."},{"isCorrect":false,"rationale":"La separación respecto a los bordes se define mediante los márgenes (layout_margin).","text":"La distancia de separación obligatoria con respecto a los bordes de la pantalla."},{"isCorrect":true,"rationale":"Este atributo permite alinear el componente (por ejemplo, al centro o a la derecha) respecto al espacio que le asigna el padre.","text":"La posición en la que debe situarse un elemento dentro de su contenedor padre."},{"isCorrect":false,"rationale":"El reparto proporcional de espacio se gestiona mediante el atributo 'layout_weight'.","text":"El peso relativo del componente para repartir el espacio sobrante en un LinearLayout."}],"hint":"Piense en cómo se posiciona el objeto 'hijo' en el escenario que le ofrece su 'padre'.","question":"¿Qué determina el atributo 'layout_gravity' en un componente de Android?"},{"answerOptions":[{"isCorrect":false,"rationale":"Las imágenes suelen estar en directorios separados; el archivo .hs es un descriptor XML de configuración.","text":"Almacenar exclusivamente las imágenes y gráficos utilizados en las páginas de ayuda."},{"isCorrect":false,"rationale":"JavaHelp no compila el código de la aplicación, sino que proporciona un visor para la documentación externa vinculada.","text":"Compilar el código fuente de la aplicación en un ejecutable de ayuda."},{"isCorrect":false,"rationale":"La ayuda sensible al contexto se gestiona mediante ID de mapas y llamadas desde el código Java, no solo en el archivo de configuración principal.","text":"Definir la lógica de programación para la ayuda sensible al contexto."},{"isCorrect":true,"rationale":"Este archivo es el núcleo del sistema JavaHelp, unificando los diferentes archivos de datos (mapa, índice, TOC) en un conjunto coherente.","text":"Actuar como contenedor de configuración que vincula el índice y la tabla de contenidos."}],"hint":"Este archivo es el 'puente' que permite que el sistema de ayuda reconozca todos sus componentes como una unidad.","question":"En el sistema JavaHelp, ¿qué función específica cumple el archivo 'help_set.hs' dentro de la estructura de ayuda?"},{"answerOptions":[{"isCorrect":false,"rationale":"Para la internacionalización se suelen usar archivos de recursos (.properties), no expresiones directas en los campos de texto.","text":"Traducir automáticamente el informe a diferentes idiomas según la localización del usuario."         let mode = 'quiz';

        function getStats() {
            const answered = state.filter((s) => s.selectedIndex !== null).length;
            const correct = state.filter((s, i) => s.selectedIndex !== null && quizData[i].answerOptions[s.selectedIndex].isCorrect).length;
            const wrong = state.filter((s, i) => s.selectedIndex !== null && !quizData[i].answerOptions[s.selectedIndex].isCorrect).length;
            const skipped = quizData.length - answered;
            const accuracy = answered > 0 ? Math.round((correct / answered) * 100) : 0;
            return { answered, correct, wrong, skipped, accuracy };
        }

        function shuffleAnswers() {
            quizData.forEach((q) => {
                for (let i = q.answerOptions.length - 1; i > 0; i -= 1) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [q.answerOptions[i], q.answerOptions[j]] = [q.answerOptions[j], q.answerOptions[i]];
                }
            });
        }

        function shuffleQuestions() {
            for (let i = quizData.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
            }
        }

        function resetState() {
            state = quizData.map(() => ({ selectedIndex: null, hintVisible: false }));

        function fmt(str) {
          if (!str) return str;
          return str
            .replace(/\$\$(.*?)\$\$/gs, function(_,m){return m;})
            .replace(/\$([^$<>]+?)\$/g, function(_,m){return m;})
            .replace(/\*\*(.*?)\*\*/g, function(_,m){return "<strong>"+m+"</strong>";})
            .replace(/\*(.*?)\*/g, function(_,m){return "<em>"+m+"</em>";})
            .replace(/`(.*?)`/g, function(_,m){return "<code>"+m+"</code>";})
        }
        function renderQuestion() {

                const isSelected = s.selectedIndex === idx;
                const statusClass = isSelected ? (opt.isCorrect ? 'correct' : 'incorrect') : '';

            prevBtn.disabled = currentIndex === 0;

                nextBtn.innerText = currentIndex === quizData.length - 1 ? 'Volver a resultados' : 'Siguiente';

                nextBtn.innerText = currentIndex === quizData.length - 1 ? 'Finalizar' : 'Siguiente';

        function selectOption(idx) {
            if (mode !== 'quiz') return;
            if (state[currentIndex].selectedIndex !== null) return; // Prevent re-selection
            state[currentIndex].selectedIndex = idx;

        function toggleHint() {
            if (mode === 'results') return;

        function saveWrongAnswers() {

            .map(function(s,i){return {s:s,i:i};})

  <button id="theme-toggle" title="Cambiar tema" style="position:fixed;top:8px;right:8px;background:var(--card);border:1px solid var(--stroke);border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,0.1);transition:transform 0.2s ease;z-index:100;">🌙</button>
  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.getElementById('theme-toggle').textContent = '☀️';
      }
      document.getElementById('theme-toggle').addEventListener('click', function() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
        this.textContent = isDark ? '🌙' : '☀️';
      });
    })();
  </script>
