<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotebookLM - Quiz Export</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

        :root {
            --bg: #f6f1e7;
            --bg-deep: #efe4d6;
            --ink: #171717;
            --muted: #5b5b5b;
            --accent: #d3542c;
            --accent-light: #ff8f5a;
            --accent-dark: #b14320;
            --teal: #1f6f78;
            --card: #fff7ef;
            --stroke: #e3d6c5;
            --shadow: 0 18px 40px rgba(23, 23, 23, 0.12);
            --radius-sm: 10px;
            --radius-md: 12px;
            --radius-lg: 14px;
            --radius-xl: 18px;
            --radius-2xl: 22px;
            --space-1: 6px;
            --space-2: 8px;
            --space-3: 10px;
            --space-4: 12px;
            --space-5: 14px;
            --space-6: 16px;
            --space-7: 18px;
            --space-8: 20px;
            --space-9: 24px;
            --space-10: 32px;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'IBM Plex Sans', sans-serif;
            --error: #b54832;
        }

        body {
            font-family: var(--font-body);
            background:
                radial-gradient(240px 140px at 10% -10%, #ffd2b9 0%, transparent 70%),
                radial-gradient(220px 160px at 90% 0%, #cfe7e6 0%, transparent 65%),
                linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
            color: var(--ink);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            width: 100%;
            max-width: 800px;
            padding: var(--space-10) var(--space-8);
            box-sizing: border-box;
            background: var(--card);
            border-radius: var(--radius-2xl);
            border: 1px solid var(--stroke);
            box-shadow: var(--shadow);
        }

        .progress-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .progress-text {
            color: var(--muted);
            font-size: 0.9em;
        }

        .status-bar {
            display: flex;
            gap: 16px;
            font-size: 0.9em;
            font-weight: 500;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-correct { color: var(--teal); }
        .status-wrong { color: var(--error); }

        .question-text {
            font-family: var(--font-display);
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .options-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-item {
            background-color: #fff;
            border: 1px solid var(--stroke);
            padding: var(--space-4) var(--space-6);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option-item:hover:not(.selected) {
            background-color: var(--card);
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .option-item.selected.correct {
            background-color: rgba(31, 111, 120, 0.12);
            border-color: var(--teal);
        }

        .option-item.selected.incorrect {
            background-color: rgba(181, 72, 50, 0.12);
            border-color: var(--error);
        }

        .option-item.revealed-correct {
            border-color: rgba(31, 111, 120, 0.5);
            box-shadow: inset 0 0 0 1px rgba(31, 111, 120, 0.16);
        }

        .option-label {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .feedback-state {
            font-weight: bold;
            font-size: 0.9em;
            display: none;
        }

        .selected .feedback-state {
            display: block;
        }

        .revealed-correct .feedback-state {
            display: block;
        }

        .correct .feedback-state { color: var(--teal); }
        .incorrect .feedback-state { color: var(--error); }
        .revealed-correct .feedback-state { color: var(--teal); }

        .rationale {
            font-size: 0.95em;
            color: var(--muted);
            margin-top: 4px;
            line-height: 1.5;
            display: none;
        }

        .selected .rationale {
            display: block;
        }

        .revealed-correct .rationale {
            display: block;
        }
        .hint-toggle {
            border: 1px solid var(--stroke);
            color: var(--muted);
            cursor: pointer;
            padding: var(--space-2) var(--space-6);
            border-radius: var(--radius-md);
            background-color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .hint-toggle:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .hint-content {
            margin-top: 32px;
            padding: var(--space-6);
            background-color: #fff;
            border: 1px solid var(--stroke);
            border-radius: var(--radius-lg);
            font-size: 0.95em;
            color: var(--muted);
            display: none;
            align-items: flex-start;
            gap: 16px;
        }

        .hint-content.active {
            display: flex;
        }

        .hint-icon-box {
            color: var(--accent-dark);
            font-size: 1.2em;
            margin-top: -2px;
        }

        .navigation {
            margin-top: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            border-radius: var(--radius-md);
            padding: var(--space-2) var(--space-7);
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-prev {
            background-color: #fff;
            color: var(--ink);
            border-color: var(--stroke);
        }

        .btn-prev:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn-next {
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            color: #fff;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .results-screen {
            display: flex;
            flex-direction: column;
            gap: var(--space-8);
        }

        .results-title {
            font-family: var(--font-display);
            font-size: 2.1em;
            margin: 0;
        }

        .results-subtitle {
            color: var(--muted);
            margin: 0;
            font-size: 1em;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-6);
        }

        .result-card {
            padding: var(--space-6);
            border-radius: var(--radius-xl);
            background: #fff;
            border: 1px solid var(--stroke);
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        .result-label {
            color: var(--muted);
            font-size: 0.95em;
        }

        .result-value {
            font-size: 2em;
            font-family: var(--font-display);
        }

        .result-metrics {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
            color: var(--muted);
            font-size: 0.95em;
        }

        .results-actions {
            display: flex;
            gap: var(--space-4);
            flex-wrap: wrap;
        }

        .btn-ghost {
            background-color: transparent;
            border: 1px solid var(--stroke);
            color: var(--ink);
        }

        .hidden { display: none; }

        @media (max-width: 900px) {
            .quiz-container {
                margin: var(--space-8);
                max-width: 100%;
            }
        }

        @media (max-width: 720px) {
            .quiz-container {
                padding: var(--space-8) var(--space-6);
            }

            .question-text {
                font-size: 1.3em;
            }

            .option-item {
                padding: var(--space-4);
            }
        }

        @media (max-width: 520px) {
            body {
                align-items: flex-start;
            }

            .quiz-container {
                margin: var(--space-6);
                padding: var(--space-7) var(--space-5);
            }

            .progress-container {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-3);
            }

            .navigation {
                flex-direction: column;
                align-items: stretch;
                gap: var(--space-4);
            }

            .nav-buttons {
                width: 100%;
            }

            .btn {
                width: 100%;
            }

            .hint-toggle {
                justify-content: space-between;
            }

            .results-actions {
                flex-direction: column;
            }
        }
    
    [data-theme="dark"] {
      --bg: #1a1612;
      --bg-deep: #141210;
      --ink: #f0ebe0;
      --muted: #9a9080;
      --accent: #e8673a;
      --accent-light: #ff9a6a;
      --accent-dark: #c45528;
      --teal: #2a9aa8;
      --card: #221e18;
      --stroke: #3a3028;
      --shadow: 0 18px 40px rgba(0,0,0,0.4);
      --error: #e06050;
    }
    [data-theme="dark"] body {
      background:
        radial-gradient(240px 140px at 10% -10%, #3a1a08 0%, transparent 70%),
        radial-gradient(220px 160px at 90% 0%, #0a2a2e 0%, transparent 65%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
    }
    [data-theme="dark"] .option-item { background-color: var(--card); }
    [data-theme="dark"] .hint-toggle,
    [data-theme="dark"] .hint-content,
    [data-theme="dark"] .btn-prev { background-color: var(--card); color: var(--ink); }
    [data-theme="dark"] .result-card { background: var(--card); }
    [data-theme="dark"] .btn-next {
      background: linear-gradient(90deg, #e8673a, #f28c5e);
      box-shadow: 0 4px 20px rgba(232, 103, 58, 0.35);
      color: #fff;
    }
    [data-theme="dark"] .btn-next:hover:not(:disabled) {
      box-shadow: 0 6px 24px rgba(232, 103, 58, 0.5);
    }
    
    /* quiz-mobile-v3 */
    @media (max-width: 640px) {
      body {
        height: 100dvh;
        overflow: hidden;
        align-items: flex-start;
        padding: 0;
      }
      .quiz-container {
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        margin: 0;
        border-radius: 0;
        border-left: none;
        border-right: none;
        border-top: none;
        padding-bottom: 0;
      }
      #quiz-content,
      #results-content {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        min-height: 0;
        padding-bottom: 8px;
      }
      #hint-box { flex-shrink: 0; }
      .navigation {
        flex-shrink: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        margin-top: 0;
        background: var(--card);
        border-top: 1px solid var(--stroke);
      }
    }
    </style>
</head>
<body>
    <div class="quiz-container">

    <div class="quiz-heading" style="margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--stroke)">
      <a href="../index.html" style="font-size:0.82em;color:var(--muted);text-decoration:none;font-family:var(--font-body)">← Índice</a>
      <h1 style="font-family:var(--font-display);font-size:1.1em;font-weight:700;color:var(--ink);margin-top:8px;padding-right:44px">Desarrollo de Interfaces · Quiz 1</h1>
    </div>
        <div id="quiz-content">
            <!-- Dynamic Content -->
        </div>
        <div id="results-content" class="hidden"></div>

        <div id="hint-box" class="hint-content">
            <div class="hint-icon-box">💡</div>
            <div id="hint-text"></div>
        </div>

        <div class="navigation">
            <button id="hint-toggle" class="hint-toggle">
                <span>Pista</span>
                <span id="hint-icon-arrow">▼</span>
            </button>
            <div class="nav-buttons">
                <button id="prev-btn" class="btn btn-prev">Anterior</button>
                <button id="next-btn" class="btn btn-next">Siguiente</button>
            </div>
        </div>
    </div>

    <script>
        let quizData = [{"answerOptions":[{"isCorrect":true,"rationale":"El mapa actúa como el motor de redireccionamiento interno del sistema, mientras que la vista es la capa visual de interacción que incluye el índice y buscador.","text":"El mapa de fichero asocia identificadores a URL, mientras que la vista de información presenta la interfaz de navegación al usuario."},{"isCorrect":false,"rationale":"Se invierten las funciones; los identificadores pertenecen al mapa para permitir la navegación lógica.","text":"La vista de información contiene los identificadores de los temas, mientras que el mapa de fichero es el glosario final."},{"isCorrect":false,"rationale":"Ambos conceptos son componentes estructurales del software de ayuda en formato digital.","text":"El mapa de fichero es exclusivo del soporte físico, mientras que la vista de información es para el soporte digital."},{"isCorrect":false,"rationale":"Esta es una confusión sobre formatos de archivo específicos de HLP y no define la arquitectura general de los sistemas de ayuda.","text":"La vista de información gestiona las tablas de contenido .cnt, mientras que el mapa de fichero genera los archivos RTF."}],"hint":"Considere cuál de los dos elementos actúa como un esquema de navegación interno frente al que interactúa directamente con el lector.","question":"¿Cuál es la distinción técnica principal entre el mapa de fichero y la vista de información en un sistema de ayuda digital?"},{"answerOptions":[{"isCorrect":false,"rationale":"El desarrollador debe declarar explícitamente el tipo de layout; no hay una asignación automática de lógica de distribución.","text":"Se activará por defecto el RelativeLayout para evitar el colapso."},{"isCorrect":false,"rationale":"Android no tiene un sistema de ordenación alfabética automática para la interfaz.","text":"Los elementos se distribuirán automáticamente siguiendo un orden alfabético."},{"isCorrect":false,"rationale":"El XML puede ser válido sin layouts complejos, pero el resultado visual será incorrecto.","text":"La aplicación no podrá compilarse por errores de sintaxis en el XML."},{"isCorrect":true,"rationale":"Los layouts son necesarios para definir dimensiones y posiciones; sin ellos, el sistema no sabe cómo distribuir el espacio.","text":"Los elementos ocuparían todo el contenedor, solapándose o perdiendo su posición pretendida."}],"hint":"Piense en la función de los Layouts como guías de distribución espacial.","question":"En el desarrollo con Android Studio, ¿qué sucede si un desarrollador no utiliza ningún objeto Layout para organizar sus componentes?"},{"answerOptions":[{"isCorrect":false,"rationale":"Es un fichero secundario de diseño que a veces se incluye en plantillas, pero no es el principal por defecto.","text":"content_main.xml"},{"isCorrect":false,"rationale":"Es el fichero de configuración global de la aplicación, pero no es la pantalla de inicio del desarrollador.","text":"AndroidManifest.xml"},{"isCorrect":false,"rationale":"Este es el fichero de diseño de la interfaz, pero no es el que el entorno muestra primero por defecto.","text":"activity_main.xml"},{"isCorrect":true,"rationale":"Android Studio abre por defecto la clase principal de la actividad (en Kotlin o Java) al cargar el proyecto.","text":"MainActivity.kt"}],"hint":"Piense en el nombre de la 'clase' que gestiona la actividad principal de la aplicación.","question":"En la instalación de Android Studio, ¿cuál es el fichero principal que se abre por defecto al iniciar un proyecto nuevo?"},{"answerOptions":[{"isCorrect":false,"rationale":"Esta herramienta se centra en formatos nativos de Windows (HLP/CHM), no en PDF.","text":"Help Workshop."},{"isCorrect":false,"rationale":"Aunque es un editor potente, la característica de exportación a PDF único se atribuye a Help Maker.","text":"Shalom Help Maker."},{"isCorrect":false,"rationale":"JavaHelp es un sistema para aplicaciones Java, no una herramienta de exportación documental a PDF.","text":"JavaHelp."},{"isCorrect":true,"rationale":"Se menciona específicamente que Help Maker permite contener todo en un único fichero exportable a PDF.","text":"Help Maker."}],"hint":"Es la herramienta que destaca por su capacidad de unificar todo el manual en un solo documento estándar de lectura.","question":"¿Qué herramienta gratuita se destaca por permitir exportar toda la documentación de ayuda en un único archivo PDF?"},{"answerOptions":[{"isCorrect":false,"rationale":"La vista 'Split' se refiere a la relación entre el diseño visual y su código XML subyacente.","text":"El código Kotlin y el código Java traducido."},{"isCorrect":false,"rationale":"Estas herramientas suelen estar en la parte inferior, no en la conmutación de visualización central.","text":"La consola de errores y el depurador."},{"isCorrect":false,"rationale":"El explorador es una zona fija a la izquierda, no el contenido central de 'Split'.","text":"Solo el explorador de proyectos."},{"isCorrect":true,"rationale":"La vista 'Split' permite ver simultáneamente el XML y la previsualización visual de la interfaz.","text":"Una combinación del código de desarrollo y el lienzo de diseño."}],"hint":"Traduzca el término inglés para entender qué hace con la pantalla principal.","question":"En el entorno Android Studio, ¿qué se visualiza específicamente en la zona 'Split' de la interfaz?"},{"answerOptions":[{"isCorrect":true,"rationale":"Este enfoque verifica primero los módulos base y sube en la jerarquía, necesitando 'drivers' o controladores para simular los niveles superiores.","text":"Comienzan con la evaluación de los niveles más bajos y requieren un controlador para coordinar entradas y salidas."},{"isCorrect":false,"rationale":"Esta descripción corresponde a las pruebas de integración descendente, específicamente en anchura.","text":"Se centran en el módulo principal y avanzan hacia los subordinados de forma lateral."},{"isCorrect":false,"rationale":"La evaluación global sin distinción de módulos es propia de las pruebas de sistema, no de integración escalonada.","text":"Evalúan todo el sistema de forma conjunta sin diferenciar entre los módulos internos."},{"isCorrect":false,"rationale":"Verificar solo el código interno es la definición de pruebas de caja blanca a nivel unitario.","text":"Verifican únicamente el código interno de las funciones de bajo nivel sin importar la interfaz."}],"hint":"Recuerde el sentido del flujo de verificación en la estructura jerárquica del software.","question":"En una estrategia de pruebas, ¿en qué consisten las pruebas de integración 'ascendentes'?"},{"answerOptions":[{"isCorrect":false,"rationale":"TableLayout distribuye elementos en una cuadrícula de filas y columnas, similar a una tabla HTML.","text":"TableLayout"},{"isCorrect":false,"rationale":"GridLayout utiliza una rejilla con índices específicos para posicionar elementos, permitiendo más de una dirección simultánea.","text":"GridLayout"},{"isCorrect":true,"rationale":"LinearLayout organiza sus hijos de forma secuencial, ya sea en una columna vertical o en una fila horizontal.","text":"LinearLayout"},{"isCorrect":false,"rationale":"RelativeLayout se basa en la posición de los elementos respecto a otros o al contenedor, no necesariamente en una línea.","text":"RelativeLayout"}],"hint":"Considere el nombre del layout que evoca una formación en línea recta.","question":"¿Qué distribución de Layout en Android es más adecuada si se desea alinear elementos uno tras otro en una sola dirección?"},{"answerOptions":[{"isCorrect":false,"rationale":"La sustitución de módulos de bajo nivel se realiza mediante 'stubs' en las pruebas de integración descendentes.","text":"Sustituir temporalmente a los módulos de bajo nivel que aún no han sido desarrollados."},{"isCorrect":false,"rationale":"Esto es competencia de las pruebas de seguridad, no de la coordinación de módulos en integración.","text":"Evaluar la seguridad de la aplicación frente a ataques de inyección de código SQL."},{"isCorrect":false,"rationale":"La corrección de errores de sintaxis es un proceso manual del desarrollador durante la depuración.","text":"Automatizar la corrección de errores de sintaxis detectados por el compilador."},{"isCorrect":true,"rationale":"Dado que los módulos superiores aún no están integrados, el controlador simula el entorno que recibiría los datos de los módulos inferiores.","text":"Encargarse de la coordinación de las salidas y entradas de los casos de prueba entre módulos."}],"hint":"Piense en la necesidad de un 'puente' que maneje los datos cuando el nivel superior jerárquico no está disponible.","question":"¿Cuál es el propósito de utilizar un controlador ('driver') en las pruebas de integración ascendentes?"},{"answerOptions":[{"isCorrect":false,"rationale":"No existe un organismo de certificación digital relevante con estas siglas en el contexto del material.","text":"FETA"},{"isCorrect":true,"rationale":"La Fábrica Nacional de Moneda y Timbre es una entidad reconocida para la validación de identidades digitales en España.","text":"FNMT"},{"isCorrect":false,"rationale":"ISO emite normas de calidad y estándares técnicos, pero no actúa como una autoridad de registro de certificados individuales.","text":"ISO"},{"isCorrect":false,"rationale":"TNT es generalmente reconocida como una empresa de logística o una cadena de televisión, no una autoridad certificadora.","text":"TNT"}],"hint":"Es la institución española encargada de la moneda y los certificados oficiales.","question":"¿Qué organismo es mencionado en el contexto de la emisión de certificados de firma digital para la seguridad de aplicaciones?"},{"answerOptions":[{"isCorrect":true,"rationale":"A diferencia de los errores de compilación o ejecución, la sintaxis es válida, por lo que el sistema no alerta de anomalías durante el proceso.","text":"Porque el programa se ejecuta sin emitir mensajes de error, pero entrega resultados incorrectos."},{"isCorrect":false,"rationale":"Esto describe a los errores de compilación (sintaxis), los cuales son detectados inmediatamente por el entorno de desarrollo.","text":"Porque bloquean el compilador e impiden la creación del archivo ejecutable."},{"isCorrect":false,"rationale":"Los eventos de hardware pueden fallar, pero la lógica del programa es independiente de si el input es físico o virtual.","text":"Porque solo ocurren cuando el usuario pulsa teclas físicas en un teclado hardware."},{"isCorrect":false,"rationale":"JarSigner se utiliza para la integridad y seguridad de archivos JAR, no para la detección de errores en la lógica algorítmica.","text":"Porque requieren el uso obligatorio de herramientas externas como JarSigner para ser identificados."}],"hint":"Considera qué sucede con el flujo del programa cuando el código es gramaticalmente perfecto pero el razonamiento es erróneo.","question":"De acuerdo con la estrategia de depuración de código, ¿por qué los errores de lógica son considerados los más complejos de detectar?"},{"answerOptions":[{"isCorrect":true,"rationale":"Es una herramienta ampliamente utilizada para empaquetar ejecutables, librerías y recursos en un único archivo .exe que guía al usuario en la instalación.","text":"Para la creación de asistentes de instalación profesionales y paquetes autoinstalables en entornos Windows."},{"isCorrect":false,"rationale":"La depuración se realiza en el IDE (Android Studio); Inno Setup no tiene funciones de análisis de código o lógica.","text":"Para depurar errores de lógica en aplicaciones móviles Android."},{"isCorrect":false,"rationale":"Inno Setup se ocupa del despliegue final del software, no de la generación interna de archivos de documentación.","text":"Para generar automáticamente la tabla de contenidos de un sistema JavaHelp."},{"isCorrect":false,"rationale":"La firma de archivos JAR se realiza con herramientas como JarSigner, no con compiladores de instalación.","text":"Para firmar digitalmente archivos JAR mediante certificados de seguridad."}],"hint":"Esta herramienta entr         let mode = 'quiz';

        function getStats() {
            const answered = state.filter((s) => s.selectedIndex !== null).length;
            const correct = state.filter((s, i) => s.selectedIndex !== null && quizData[i].answerOptions[s.selectedIndex].isCorrect).length;
            const wrong = state.filter((s, i) => s.selectedIndex !== null && !quizData[i].answerOptions[s.selectedIndex].isCorrect).length;
            const skipped = quizData.length - answered;
            const accuracy = answered > 0 ? Math.round((correct / answered) * 100) : 0;
            return { answered, correct, wrong, skipped, accuracy };
        }

        function shuffleAnswers() {
            quizData.forEach((q) => {
                for (let i = q.answerOptions.length - 1; i > 0; i -= 1) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [q.answerOptions[i], q.answerOptions[j]] = [q.answerOptions[j], q.answerOptions[i]];
                }
            });
        }

        function shuffleQuestions() {
            for (let i = quizData.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
            }
        }

        function resetState() {
            state = quizData.map(() => ({ selectedIndex: null, hintVisible: false }));

        function fmt(str) {
          if (!str) return str;
          return str
            .replace(/\$\$(.*?)\$\$/gs, function(_,m){return m;})
            .replace(/\$([^$<>]+?)\$/g, function(_,m){return m;})
            .replace(/\*\*(.*?)\*\*/g, function(_,m){return "<strong>"+m+"</strong>";})
            .replace(/\*(.*?)\*/g, function(_,m){return "<em>"+m+"</em>";})
            .replace(/`(.*?)`/g, function(_,m){return "<code>"+m+"</code>";})
        }
        function renderQuestion() {

                const isSelected = s.selectedIndex === idx;
                const statusClass = isSelected ? (opt.isCorrect ? 'correct' : 'incorrect') : '';

                nextBtn.innerText = currentIndex === quizData.length - 1 ? 'Volver a resultados' : 'Siguiente';

                nextBtn.innerText = currentIndex === quizData.length - 1 ? 'Finalizar' : 'Siguiente';

            document.getElementById('hint-icon-arrow').innerText = s.hintVisible ? '▲' : '▼';

        function selectOption(idx) {
            if (mode !== 'quiz') return;
            if (state[currentIndex].selectedIndex !== null) return; // Prevent re-selection
            state[currentIndex].selectedIndex = idx;
            renderQuestion();
        }

        function toggleHint() {
            if (mode === 'results') return;
            state[currentIndex].hintVisible = !state[currentIndex].hintVisible;

  <button id="theme-toggle" title="Cambiar tema" style="position:fixed;top:8px;right:8px;background:var(--card);border:1px solid var(--stroke);border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,0.1);transition:transform 0.2s ease;z-index:100;">🌙</button>
  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.getElementById('theme-toggle').textContent = '☀️';
      }
      document.getElementById('theme-toggle').addEventListener('click', function() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
        this.textContent = isDark ? '🌙' : '☀️';
      });
    })();
  </script>
