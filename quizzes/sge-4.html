<html lang="en">
<head>

    <title>SGE - 8 a 15 - NotebookLM - Quiz Export</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

        :root {
            --bg: #f6f1e7;
            --bg-deep: #efe4d6;
            --ink: #171717;
            --muted: #5b5b5b;
            --accent: #d3542c;
            --accent-light: #ff8f5a;
            --accent-dark: #b14320;
            --teal: #1f6f78;
            --card: #fff7ef;
            --stroke: #e3d6c5;
            --shadow: 0 18px 40px rgba(23, 23, 23, 0.12);
            --radius-sm: 10px;
            --radius-md: 12px;
            --radius-lg: 14px;
            --radius-xl: 18px;
            --radius-2xl: 22px;
            --space-1: 6px;
            --space-2: 8px;
            --space-3: 10px;
            --space-4: 12px;
            --space-5: 14px;
            --space-6: 16px;
            --space-7: 18px;
            --space-8: 20px;
            --space-9: 24px;
            --space-10: 32px;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'IBM Plex Sans', sans-serif;
            --error: #b54832;
        }

        body {
            font-family: var(--font-body);
            background:
                radial-gradient(240px 140px at 10% -10%, #ffd2b9 0%, transparent 70%),
                radial-gradient(220px 160px at 90% 0%, #cfe7e6 0%, transparent 65%),
                linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
            color: var(--ink);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            width: 100%;
            max-width: 800px;
            padding: var(--space-10) var(--space-8);
            box-sizing: border-box;
            background: var(--card);
            border-radius: var(--radius-2xl);
            border: 1px solid var(--stroke);
            box-shadow: var(--shadow);
        }

        .progress-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .progress-text {
            color: var(--muted);
            font-size: 0.9em;
        }

        .status-bar {
            display: flex;
            gap: 16px;
            font-size: 0.9em;
            font-weight: 500;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-correct { color: var(--teal); }
        .status-wrong { color: var(--error); }

        .question-text {
            font-family: var(--font-display);
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .options-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-item {
            background-color: #fff;
            border: 1px solid var(--stroke);
            padding: var(--space-4) var(--space-6);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option-item:hover:not(.selected) {
            background-color: var(--card);
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .option-item.selected.correct {
            background-color: rgba(31, 111, 120, 0.12);
            border-color: var(--teal);
        }

        .option-item.selected.incorrect {
            background-color: rgba(181, 72, 50, 0.12);
            border-color: var(--error);
        }

        .option-item.revealed-correct {
            border-color: rgba(31, 111, 120, 0.5);
            box-shadow: inset 0 0 0 1px rgba(31, 111, 120, 0.16);
        }

        .option-label {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .feedback-state {
            font-weight: bold;
            font-size: 0.9em;
            display: none;
        }

        .selected .feedback-state {
            display: block;
        }

        .revealed-correct .feedback-state {
            display: block;
        }

        .correct .feedback-state { color: var(--teal); }
        .incorrect .feedback-state { color: var(--error); }
        .revealed-correct .feedback-state { color: var(--teal); }

        .rationale {
            font-size: 0.95em;
            color: var(--muted);
            margin-top: 4px;
            line-height: 1.5;
            display: none;
        }

        .selected .rationale {
            display: block;
        }

        .revealed-correct .rationale {
            display: block;
        }
        .hint-toggle {
            border: 1px solid var(--stroke);
            color: var(--muted);
            cursor: pointer;
            padding: var(--space-2) var(--space-6);
            border-radius: var(--radius-md);
            background-color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .hint-toggle:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .hint-content {
            margin-top: 32px;
            padding: var(--space-6);
            background-color: #fff;
            border: 1px solid var(--stroke);
            border-radius: var(--radius-lg);
            font-size: 0.95em;
            color: var(--muted);
            display: none;
            align-items: flex-start;
            gap: 16px;
        }

        .hint-content.active {
            display: flex;
        }

        .hint-icon-box {
            color: var(--accent-dark);
            font-size: 1.2em;
            margin-top: -2px;
        }

        .navigation {
            margin-top: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            border-radius: var(--radius-md);
            padding: var(--space-2) var(--space-7);
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-prev {
            background-color: #fff;
            color: var(--ink);
            border-color: var(--stroke);
        }

        .btn-prev:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn-next {
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            color: #fff;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .results-screen {
            display: flex;
            flex-direction: column;
            gap: var(--space-8);
        }

        .results-title {
            font-family: var(--font-display);
            font-size: 2.1em;
            margin: 0;
        }

        .results-subtitle {
            color: var(--muted);
            margin: 0;
            font-size: 1em;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-6);
        }

        .result-card {
            padding: var(--space-6);
            border-radius: var(--radius-xl);
            background: #fff;
            border: 1px solid var(--stroke);
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        .result-label {
            color: var(--muted);
            font-size: 0.95em;
        }

        .result-value {
            font-size: 2em;
            font-family: var(--font-display);
        }

        .result-metrics {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
            color: var(--muted);
            font-size: 0.95em;
        }

        .results-actions {
            display: flex;
            gap: var(--space-4);
            flex-wrap: wrap;
        }

        .btn-ghost {
            background-color: transparent;
            border: 1px solid var(--stroke);
            color: var(--ink);
        }

        .hidden { display: none; }

        @media (max-width: 900px) {
            .quiz-container {
                margin: var(--space-8);
                max-width: 100%;
            }
        }

        @media (max-width: 720px) {
            .quiz-container {
                padding: var(--space-8) var(--space-6);
            }

            .question-text {
                font-size: 1.3em;
            }

            .option-item {
                padding: var(--space-4);
            }
        }

        @media (max-width: 520px) {
            body {
                align-items: flex-start;
            }

            .quiz-container {
                margin: var(--space-6);
                padding: var(--space-7) var(--space-5);
            }

            .progress-container {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-3);
            }

            .navigation {
                flex-direction: column;
                align-items: stretch;
                gap: var(--space-4);
            }

            .nav-buttons {
                width: 100%;
            }

            .btn {
                width: 100%;
            }

            .hint-toggle {
                justify-content: space-between;
            }

            .results-actions {
                flex-direction: column;
            }
        }
    </style>

ra documentos externos.","text":"Generar un informe de errores en formato PDF"}],"hint":"Es una medida de seguridad procedimental para evitar corromper la base de datos con datos mal estructurados.","question":"Al importar productos desde un fichero Excel al PdV, ¿cuál es la función primordial del botón 'Test'?"},{"answerOptions":[{"isCorrect":false,"rationale":"Eliminar registros históricos rompería la trazabilidad contable y de inventario necesaria para una auditoría.","text":"Eliminar la línea del pedido original de la base de datos"},{"isCorrect":false,"rationale":"Aunque es técnicamente posible, no es recomendable para usuarios finales y puede presentar conflictos legales en ciertas jurisdicciones.","text":"Realizar la devolución exclusivamente desde el backend"},{"isCorrect":false,"rationale":"Se debe actuar sobre el registro del producto original para que el stock de dicho artículo se actualice correctamente.","text":"Crear un nuevo producto llamado 'Devolución'"},{"isCorrect":true,"rationale":"Esta acción genera un movimiento de inventario inverso y prepara el sistema para realizar un reembolso económico al cliente.","text":"Indicar la cantidad como $-1$ en la interfaz del PdV (frontend)"}],"hint":"Considera la acción numérica que representaría la entrada de un producto que previamente salió.","question":"En Odoo, si un cliente desea devolver un producto en el PdV físico, ¿cuál es el procedimiento recomendado por el manual?"},{"answerOptions":[{"isCorrect":false,"rationale":"La sincronización es un proceso automático del sistema, evitando la duplicidad de trabajo manual.","text":"Se deben introducir manualmente en el backend después"},{"isCorrect":false,"rationale":"Un bloqueo total impediría la actividad comercial, por lo que el sistema utiliza almacenamiento local temporal.","text":"El sistema se bloquea hasta que la conexión sea estable"},{"isCorrect":false,"rationale":"La cancelación automática supondría una pérdida de ingresos y de información valiosa para la empresa.","text":"Las ventas se cancelan automáticamente por seguridad"},{"isCorrect":true,"rationale":"Odoo está diseñado para permitir la continuidad operativa en modo offline, asegurando que los datos no se pierdan.","text":"Se almacenan en memoria y se sincronizan al recuperar la conexión"}],"hint":"El sistema utiliza las capacidades de almacenamiento del navegador para garantizar la resiliencia.","question":"¿Qué sucede con las ventas realizadas en el PdV si se pierde la conexión a internet?"},{"answerOptions":[{"isCorrect":false,"rationale":"Aunque existan conectores externos, la funcionalidad base depende de la configuración interna de contabilidad del PdV.","text":"El módulo de Facturación Electrónica externa"},{"isCorrect":false,"rationale":"Esta opción imprime tickets simples de venta, no necesariamente facturas detalladas vinculadas a un cliente.","text":"La opción de 'Impresión automática del recibo'"},{"isCorrect":false,"rationale":"Los permisos de usuario no habilitan funciones del sistema que no han sido previamente configuradas en el módulo.","text":"El permiso de 'Administrador de Ventas' para el cajero"},{"isCorrect":true,"rationale":"Activar esta opción vincula las ventas del PdV con el módulo contable para generar documentos fiscales legales.","text":"El checkbox de Contabilidad en la configuración del PdV"}],"hint":"Busca la relación directa entre el punto de venta y el área encargada de los registros financieros.","question":"Para poder imprimir facturas a solicitud del cliente en el Punto de Venta, ¿qué ajuste específico debe activarse?"},{"answerOptions":[{"isCorrect":false,"rationale":"La depuración es tarea del intérprete o de un IDE como PyCharm, no de un gestor de paquetes.","text":"Depurar errores de sintaxis en tiempo real"},{"isCorrect":false,"rationale":"Python es interpretado; pip no transforma el código en binarios, sino que organiza las dependencias necesarias.","text":"Compilar el código fuente en un ejecutable binario"},{" eas en los centros de producción.","text":"En proceso"},{"isCorrect":true,"rationale":"Este cambio de estado indica que la orden es oficial y que el sistema debe empezar a reservar o verificar materiales.","text":"Confirmado"},{"isCorrect":false,"rationale":"La planificación es un paso posterior que asigna fechas y recursos específicos tras la confirmación de la orden.","text":"Planificado"},{"isCorrect":false,"rationale":"Este es el estado final que indica que el producto ha sido terminado y el stock actualizado.","text":"Hecho"}],"hint":"Es el paso que convierte una intención de fabricación en un compromiso firme del sistema.","question":"En el flujo de trabajo de una Orden de Producción, ¿cuál es el estado inmediatamente posterior a 'Borrador' tras pulsar 'Marcar por realizar'?"},{"answerOptions":[{"isCorrect":false,"rationale":"Una operación solo pasa a 'Preparado' cuando todos los requisitos previos (materiales y pasos anteriores) se han cumplido.","text":"Preparado"},{"isCorrect":false,"rationale":"Las órdenes de trabajo de una ruta confirmada no están en borrador, sino integradas en el flujo de ejecución.","text":"En borrador"},{"isCorrect":false,"rationale":"La operación sigue siendo válida y necesaria, simplemente está en pausa lógica por la secuencia definida.","text":"Cancelado"},{"isCorrect":true,"rationale":"Odoo mantiene bloqueadas las operaciones dependientes hasta que la fase anterior se marca como terminada.","text":"Esperando a otra orden de trabajo"}],"hint":"Refleja la dependencia lógica de una cadena de montaje donde un paso debe terminar para que empiece el siguiente.","question":"Si una ruta de producción tiene dos operaciones secuenciales (ensamblado y pintura), ¿en qué estado se encuentra la segunda operación mientras la primera está en ejecución?"},{"answerOptions":[{"isCorrect":false,"rationale":"Ambos conceptos pertenecen exclusivamente al proceso interno de transformación de un producto fabricado.","text":"Los componentes son para productos comprados y la ruta para productos vendidos"},{"isCorrect":false,"rationale":"Aunque se puede fabricar sin rutas complejas, un producto fabricado siempre requiere una definición de su estructura.","text":"La ruta es opcional y los componentes son obligatorios para todos los productos"},{"isCorrect":false,"rationale":"Son elementos de coste de producción, no tienen relación directa con la logística de entrega o política de precios finales.","text":"Los componentes definen el precio de venta y la ruta el coste de transporte"},{"isCorrect":true,"rationale":"La Lista de Materiales combina el 'qué' (materias primas) con el 'cómo' (procedimientos en centros de trabajo).","text":"Los componentes son los materiales físicos y la ruta define los pasos y tiempos de trabajo"}],"hint":"Uno se refiere a la materia y el otro a la acción o proceso.","question":"Al configurar un producto en Odoo para ser fabricado, ¿cuál es la diferencia principal entre 'Componentes' y 'Ruta de producción'?"},{"answerOptions":[{"isCorrect":true,"rationale":"La palabra clave 'def' (de 'define') precede al nombre de la función y sus parámetros en la sintaxis de Python.","text":"def"},{"isCorrect":false,"rationale":"A diferencia de JavaScript o PHP, Python utiliza la abreviatura 'def' en lugar de la palabra completa 'function'.","text":"function"},{"isCorrect":false,"rationale":"'__init__' es un método especial dentro de las clases, pero no es la palabra reservada para definir funciones generales.","text":"init"},{"isCorrect":false,"rationale":"'class' se utiliza para la definición de estructuras de objetos (clases), no para funciones aisladas.","text":"class"}],"hint":"Es una abreviatura de tres letras que indica la definición de un bloque de código reutilizable.","question":"En Python, ¿cuál es la palabra reservada que se utiliza específicamente para definir el inicio de una función?"},{"answerOptions":[{"isCorrect":true,"rationale":"Esta función mejora la seguridad financiera al permitir detectar discrepancias entre el dinero físico y las ventas registradas.","text":"Obliga a realizar una apertura y un cierre de caja registrando el saldo inicial y final"},{"isCorrect":false,"rationale":"El control de efectivo supervisa el flujo de dinero, no altera la política de precios de los productos.","text":"Permite redondear los precios al alza automáticamente"},{"isCorrect":false,"rationale":"El control de efectivo es complementario a otros métodos de pago; no los excluye.","text":"Desactiva los pagos mediante tarjeta bancaria"},{"isCorrect":false,"rationale":"Es una herramienta de control interno de la tienda, no un sistema de comunicación fiscal automática.","text":"Envía automáticamente un informe diario a Hacienda"}],"hint":"Se trata de un mecanismo de arqueo para asegurar que las cuentas 'cuadren' al final del día.","question":"¿Cuál es la consecuencia directa de marcar el checkbox 'Control de efectivo' en la configuración del PdV?"},{"answerOptions":[{"isCorrect":false,"rationale":"Este botón termina la sesión del usuario, pero deja la sesión del PdV en un estado intermedio pendiente de validación contable.","text":"Pulsar el botón 'Close' en la esquina superior derecha"},{"isCorrect":false,"rationale":"La impresión es un acto para el cliente; la contabilidad requiere una validación interna de los registros del sistema.","text":"Imprimir el ticket de cada cliente"},{"isCorrect":true,"rationale":"Cerrar la sesión en la interfaz no es suficiente; se debe confirmar el cierre para que Odoo genere los apuntes contables definitivos.","text":"Validar y contabilizar los asientos de cierre"},{"isCorrect":false,"rationale":"El hardware no tiene impacto directo en el procesamiento de los datos lógicos y financieros dentro del ERP.","text":"Apagar el terminal TPV físicamente"}],"hint":"Es el proceso administrativo que transforma las transacciones del día en libros contables oficiales.","question":"Dentro del flujo operativo del PdV, ¿cuál es el último paso necesario para ermite, por ejemplo, transformar una cadena de texto que contiene números en un valor entero para realizar cálculos.","text":"El proceso de convertir un tipo de dato en otro"},{"isCorrect":false,"rationale":"La gestión de memoria (recolección de basura) es automática en Python y no se denomina casting.","text":"La eliminación de variables de la memoria para optimizar recursos"}],"hint":"Imagina cambiar la 'etiqueta' de un dato para que el ordenador lo trate de forma distinta (ej: de texto a número).","question":"En el contexto de Python, ¿qué es el 'casting'?"},{"answerOptions":[{"isCorrect":false,"rationale":"Los impuestos se definen en campos contables específicos, no en una cadena de texto de referencia.","text":"El porcentaje de IVA aplicado al producto"},{"isCorrect":false,"rationale":"Las fechas de caducidad requieren la activación de lotes y números de serie, manejándose en registros de stock individuales.","text":"La fecha de caducidad del lote importado"},{"isCorrect":false,"rationale":"La información del proveedor se gestiona en la pestaña de 'Compra' del producto, no en la referencia interna.","text":"La dirección física del proveedor principal"},{"isCorrect":true,"rationale":"Facilita a los empleados localizar productos sin depender únicamente del nombre comercial, que puede ser largo o ambiguo.","text":"Un código alfanumérico (SKU) para identificación rápida y búsqueda interna"}],"hint":"Es como el 'DNI' del producto dentro de la empresa para agilizar la operativa.","question":"¿Qué información crítica aporta el campo 'Internal Reference' en un fichero de importación de Odoo?"},{"answerOptions":[{"isCorrect":false,"rationale":"La validación de materiales es un paso logístico previo, no marca el inicio de la labor de transformación física.","text":"Validar la recepción de los materiales en el almacén"},{"isCorrect":false,"rationale":"La impresión es meramente informativa; el control de tiempos requiere interactuar con el flujo de estados de la aplicación.","text":"Imprimir la lista de materiales (BOM)"},{"isCorrect":false,"rationale":"Odoo no suele estar conectado directamente al interruptor físico de las máquinas; requiere la acción lógica en el software.","text":"Encender la maquinaria vinculada al centro de trabajo"},{"isCorrect":true,"rationale":"Esto cambia el estado a 'En proceso' y permite registrar desviaciones entre el tiempo planificado y el real.","text":"Pulsar el botón 'Empezar a trabajar' en la orden de trabajo"}],"hint":"Es el clic que indica que la mano de obra ha comenzado efectivamente su tarea.","question":"Dentro de un centro de producción, ¿qué acción debe realizar el trabajador en Odoo para que el sistema empiece a cronometrar el tiempo real de fabricación?"},{"answerOptions":[{"isCorrect":false,"rationale":"El peso del producto se define en valores numéricos en la ficha técnica, no depende de archivos digitales adjuntos.","text":"Para calcular el peso total del producto sumando el peso del archivo"},{"isCorrect":false,"rationale":"El registro de propiedad intelectual se hace ante organismos oficiales, no mediante adjuntos en un ERP de gestión interna.","text":"Para registrar legalmente el diseño industrial del producto"},{"isCorrect":false,"rationale":"Las instrucciones de fabricación son internas y no tienen relación con los documentos comerciales de venta.","text":"Para enviar automáticamente la factura al cliente final"},{"isCorrect":true,"rationale":"Garantiza que el proceso se realice de forma estandarizada y reduce errores en la línea de montaje.","text":"Para proporcionar instrucciones visuales y pasos técnicos a los operarios"}],"hint":"Piensa en el beneficio para el trabajador que está físicamente montando la mesa.","question":"En el caso práctico de la empresa de muebles, ¿para qué sirve adjuntar un PDF en la operación de 'Ensamblado' de una ruta?"},{"answerOptions":[{"isCorrect":true,"rationale":"Facilita identificar cuellos de botella y optimizar el uso de recursos específicos para cada tipo de tarea.","text":"Permite monitorizar la carga de trabajo y eficiencia de distintos departamentos por separado"},{"isCorrect":false,"rationale":"Toda la empresa debe funcionar bajo la misma instancia de base de datos para mantener la integridad de la información.","text":"Permite usar versiones diferentes de Odoo para cada habitación de la fábrica"},{"isCorrect":false,"rationale":"El IVA se calcula sobre el valor final del producto o servicio, independientemente de cuántas fases de fabricación tenga.","text":"Reduce el coste del IVA al repartir el trabajo en varias fases"},{"isCorrect":false,"rationale":"La segmentación busca eficiencia operativa, no el aislamiento social de los empleados.","text":"Evita que los trabajadores de distintos turnos se comuniquen entre sí"}],"hint":"Tiene que ver con el análisis detallado de dónde se invierte el tiempo y el dinero en la fábrica.","question":"¿Cuál es la principal ventaja de utilizar centros de producción diferenciados (ej: Assembly Line y Paint Line)?"}];
        let currentIndex = 0;
        let mode = 'quiz';
        let state = quizData.map(() => ({ selectedIndex: null, hintVisible: false }));

        function getStats() {
            const answered = state.filter((s) => s.selectedIndex !== null).length;
            const correct = state.filter((s, i) => s.selectedIndex !== null && quizData[i].answerOptions[s.selectedIndex].isCorrect).length;
            const wrong = state.filter((s, i) => s.selectedIndex !== null && !quizData[i].answerOptions[s.selectedIndex].isCorrect).length;
            const skipped = quizData.length - answered;
            const accuracy = answered > 0 ? Math.round((correct / answered) * 100) : 0;
            return { answered, correct, wrong, skipped, accuracy };
        }

        function shuffleAnswers() {
            quizData.forEach((q) => {
                for (let i = q.answerOptions.length - 1; i > 0; i -= 1) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [q.answerOptions[i], q.answerOptions[j]] = [q.answerOptions[j], q.answerOptions[i]];
                }
            });
        }

        function shuffleQuestions() {
            for (let i = quizData.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
            }
        }

        function resetState() {
            state = quizData.map(() => ({ selectedIndex: null, hintVisible: false }));
        }

        function renderQuestion() {
            const q = quizData[currentIndex];
            const s = state[currentIndex];
            const content = document.getElementById('quiz-content');
            const results = document.getElementById('results-content');
            const hintBox = document.getElementById('hint-box');
            const nav = document.querySelector('.navigation');
            const nextBtn = document.getElementById('next-btn');
            const prevBtn = document.getElementById('prev-btn');

            let optionsHtml = '';
            const correctIndex = q.answerOptions.findIndex((o) => o.isCorrect);
            const selectedCorrect = s.selectedIndex !== null && q.answerOptions[s.selectedIndex].isCorrect;
            q.answerOptions.forEach((opt, idx) => {
                const isSelected = s.selectedIndex === idx;
                const statusClass = isSelected ? (opt.isCorrect ? 'correct' : 'incorrect') : '';
                const selectedClass = isSelected ? 'selected' : '';
                const revealCorrect = (s.selectedIndex !== null && !selectedCorrect && opt.isCorrect) || (mode === 'review' && opt.isCorrect);
                const revealClass = revealCorrect ? 'revealed-correct' : '';

                optionsHtml += `
                    <li class="option-item ${selectedClass} ${statusClass} ${revealClass}" onclick="selectOption(${idx})">
                        <div class="option-label">
                            <span>${String.fromCharCode(65 + idx)}. ${opt.text}</span>
                        </div>
                        <div class="feedback-state">
                            ${opt.isCorrect ? '✓ Correcto' : '✕ Incorrecto'}
                        </div>
                        ${opt.rationale ? '<div class="rationale">' + opt.rationale + '</div>' : ''}
                    </li>
                `;
            });

            const stats = getStats();

            content.innerHTML = `
                <div class="progress-container">
                    <div class="progress-text">${currentIndex + 1} / ${quizData.length}</div>
                    <div class="status-bar">
                        <div class="status-item status-correct">
                            <span>✓</span>
                            <span>${stats.correct}</span>
                        </div>
                        <div class="status-item status-wrong">
                            <span>✕</span>
                            <span>${stats.wrong}</span>
                        </div>
                    </div>
                </div>
                <div class="question-text">${q.question}</div>
                <ul class="options-list">
                    ${optionsHtml}
                </ul>
            `;

            // Update Pista Box
            const hintText = document.getElementById('hint-text');
            hintText.innerText = q.hint || 'No hay pista disponible para esta pregunta.';
            if (s.hintVisible) {
                hintBox.classList.add('active');
            } else {
                hintBox.classList.remove('active');
            }

            results.classList.add('hidden');
            content.classList.remove('hidden');
            hintBox.classList.remove('hidden');
            nav.classList.remove('hidden');

            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = false;
            if (mode === 'review') {
                nextBtn.innerText = currentIndex === quizData.length - 1 ? 'Volver a resultados' : 'Siguiente';
            } else {
                nextBtn.innerText = currentIndex === quizData.length - 1 ? 'Finalizar' : 'Siguiente';
            }
            document.getElementById('hint-icon-arrow').innerText = s.hintVisible ? '▲' : '▼';
        }

        function selectOption(idx) {
            if (mode !== 'quiz') return;
            if (state[currentIndex].selectedIndex !== null) return; // Prevent re-selection
            state[currentIndex].selectedIndex = idx;
            renderQuestion();
        }

        function toggleHint() {
            if (mode === 'results') return;
            state[currentIndex].hintVisible = !state[currentIndex].hintVisible;
            renderQuestion();
        }

        function renderResults() {
            const stats = getStats();
            const content = document.getElementById('quiz-content');
            const results = document.getElementById('results-content');
            const hintBox = document.getElementById('hint-box');
            const nav = document.querySelector('.navigation');

            const score = `${stats.correct} / ${quizData.length}`;

            results.innerHTML = `
                <div class="results-screen">
                    <div>
                        <h1 class="results-title">¡Lo lograste! Quiz completado.</h1>
                        <p class="results-subtitle">Revisa tu puntuación o inténtalo de nuevo.</p>
                    </div>
                    <div class="results-grid">
                        <div class="result-card">
                            <div class="result-label">Puntuación</div>
                            <div class="result-value">${score}</div>
                        </div>
                        <div class="result-card">
                            <div class="result-label">Precisión</div>
                            <div class="result-value">${stats.accuracy}%</div>
                        </div>
                        <div class="result-card">
                            <div class="result-metrics">
                                <div>Correctas <strong>${stats.correct}</strong></div>
                                <div>Incorrectas <strong>${stats.wrong}</strong></div>
                                <div>Omitidas <strong>${stats.skipped}</strong></div>
                            </div>
                        </div>
                    </div>
                    <div class="results-actions">
                        <button id="review-btn" class="btn btn-ghost">Revisar Quiz</button>
                        <button id="retake-btn" class="btn btn-next">Repetir Quiz</button>
                    </div>
                </div>
            `;

            content.classList.add('hidden');
            results.classList.remove('hidden');
            hintBox.classList.add('hidden');
            nav.classList.add('hidden');

            document.getElementById('review-btn').onclick = () => {
                mode = 'review';
                currentIndex = 0;
                renderQuestion();
            };

            document.getElementById('retake-btn').onclick = () => {
                mode = 'quiz';
                currentIndex = 0;
                shuffleQuestions();
                shuffleAnswers();
                resetState();
                renderQuestion();
            };
        }

        document.getElementById('prev-btn').onclick = () => {
            if (mode === 'results') return;
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        };

        document.getElementById('next-btn').onclick = () => {
            if (mode === 'results') return;
            if (mode === 'review') {
                if (currentIndex < quizData.length - 1) {
                    currentIndex++;
                    renderQuestion();
                } else {
                    mode = 'results';
                    renderResults();
                }
                return;
            }
            if (currentIndex < quizData.length - 1) {
                currentIndex++;
                renderQuestion();
            } else {
                mode = 'results';
                renderResults();
            }
        };

        document.getElementById('hint-toggle').onclick = toggleHint;

        renderQuestion();
    </script>
