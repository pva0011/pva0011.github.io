<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotebookLM - Quiz Export</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

        :root {
            --bg: #f6f1e7;
            --bg-deep: #efe4d6;
            --ink: #171717;
            --muted: #5b5b5b;
            --accent: #d3542c;
            --accent-light: #ff8f5a;
            --accent-dark: #b14320;
            --teal: #1f6f78;
            --card: #fff7ef;
            --stroke: #e3d6c5;
            --shadow: 0 18px 40px rgba(23, 23, 23, 0.12);
            --radius-sm: 10px;
            --radius-md: 12px;
            --radius-lg: 14px;
            --radius-xl: 18px;
            --radius-2xl: 22px;
            --space-1: 6px;
            --space-2: 8px;
            --space-3: 10px;
            --space-4: 12px;
            --space-5: 14px;
            --space-6: 16px;
            --space-7: 18px;
            --space-8: 20px;
            --space-9: 24px;
            --space-10: 32px;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'IBM Plex Sans', sans-serif;
            --error: #b54832;
        }

        body {
            font-family: var(--font-body);
            background:
                radial-gradient(240px 140px at 10% -10%, #ffd2b9 0%, transparent 70%),
                radial-gradient(220px 160px at 90% 0%, #cfe7e6 0%, transparent 65%),
                linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
            color: var(--ink);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            width: 100%;
            max-width: 800px;
            padding: var(--space-10) var(--space-8);
            box-sizing: border-box;
            background: var(--card);
            border-radius: var(--radius-2xl);
            border: 1px solid var(--stroke);
            box-shadow: var(--shadow);
        }

        .progress-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .progress-text {
            color: var(--muted);
            font-size: 0.9em;
        }

        .status-bar {
            display: flex;
            gap: 16px;
            font-size: 0.9em;
            font-weight: 500;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-correct { color: var(--teal); }
        .status-wrong { color: var(--error); }

        .question-text {
            font-family: var(--font-display);
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .options-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-item {
            background-color: #fff;
            border: 1px solid var(--stroke);
            padding: var(--space-4) var(--space-6);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option-item:hover:not(.selected) {
            background-color: var(--card);
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .option-item.selected.correct {
            background-color: rgba(31, 111, 120, 0.12);
            border-color: var(--teal);
        }

        .option-item.selected.incorrect {
            background-color: rgba(181, 72, 50, 0.12);
            border-color: var(--error);
        }

        .option-item.revealed-correct {
            border-color: rgba(31, 111, 120, 0.5);
            box-shadow: inset 0 0 0 1px rgba(31, 111, 120, 0.16);
        }

        .option-label {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .feedback-state {
            font-weight: bold;
            font-size: 0.9em;
            display: none;
        }

        .selected .feedback-state {
            display: block;
        }

        .revealed-correct .feedback-state {
            display: block;
        }

        .correct .feedback-state { color: var(--teal); }
        .incorrect .feedback-state { color: var(--error); }
        .revealed-correct .feedback-state { color: var(--teal); }

        .rationale {
            font-size: 0.95em;
            color: var(--muted);
            margin-top: 4px;
            line-height: 1.5;
            display: none;
        }

        .selected .rationale {
            display: block;
        }

        .revealed-correct .rationale {
            display: block;
        }
        .hint-toggle {
            border: 1px solid var(--stroke);
            color: var(--muted);
            cursor: pointer;
            padding: var(--space-2) var(--space-6);
            border-radius: var(--radius-md);
            background-color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .hint-toggle:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .hint-content {
            margin-top: 32px;
            padding: var(--space-6);
            background-color: #fff;
            border: 1px solid var(--stroke);
            border-radius: var(--radius-lg);
            font-size: 0.95em;
            color: var(--muted);
            display: none;
            align-items: flex-start;
            gap: 16px;
        }

        .hint-content.active {
            display: flex;
        }

        .hint-icon-box {
            color: var(--accent-dark);
            font-size: 1.2em;
            margin-top: -2px;
        }

        .navigation {
            margin-top: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            border-radius: var(--radius-md);
            padding: var(--space-2) var(--space-7);
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-prev {
            background-color: #fff;
            color: var(--ink);
            border-color: var(--stroke);
        }

        .btn-prev:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn-next {
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            color: #fff;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .results-screen {
            display: flex;
            flex-direction: column;
            gap: var(--space-8);
        }

        .results-title {
            font-family: var(--font-display);
            font-size: 2.1em;
            margin: 0;
        }

        .results-subtitle {
            color: var(--muted);
            margin: 0;
            font-size: 1em;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-6);
        }

        .result-card {
            padding: var(--space-6);
            border-radius: var(--radius-xl);
            background: #fff;
            border: 1px solid var(--stroke);
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        .result-label {
            color: var(--muted);
            font-size: 0.95em;
        }

        .result-value {
            font-size: 2em;
            font-family: var(--font-display);
        }

        .result-metrics {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
            color: var(--muted);
            font-size: 0.95em;
        }

        .results-actions {
            display: flex;
            gap: var(--space-4);
            flex-wrap: wrap;
        }

        .btn-ghost {
            background-color: transparent;
            border: 1px solid var(--stroke);
            color: var(--ink);
        }

        .hidden { display: none; }

        @media (max-width: 900px) {
            .quiz-container {
                margin: var(--space-8);
                max-width: 100%;
            }
        }

        @media (max-width: 720px) {
            .quiz-container {
                padding: var(--space-8) var(--space-6);
            }

            .question-text {
                font-size: 1.3em;
            }

            .option-item {
                padding: var(--space-4);
            }
        }

        @media (max-width: 520px) {
            body {
                align-items: flex-start;
            }

            .quiz-container {
                margin: var(--space-6);
                padding: var(--space-7) var(--space-5);
            }

            .progress-container {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-3);
            }

            .navigation {
                flex-direction: column;
                align-items: stretch;
                gap: var(--space-4);
            }

            .nav-buttons {
                width: 100%;
            }

            .btn {
                width: 100%;
            }

            .hint-toggle {
                justify-content: space-between;
            }

            .results-actions {
                flex-direction: column;
            }
        }
    
    [data-theme="dark"] {
      --bg: #1a1612;
      --bg-deep: #141210;
      --ink: #f0ebe0;
      --muted: #9a9080;
      --accent: #e8673a;
      --accent-light: #ff9a6a;
      --accent-dark: #c45528;
      --teal: #2a9aa8;
      --card: #221e18;
      --stroke: #3a3028;
      --shadow: 0 18px 40px rgba(0,0,0,0.4);
      --error: #e06050;
    }
    [data-theme="dark"] body {
      background:
        radial-gradient(240px 140px at 10% -10%, #3a1a08 0%, transparent 70%),
        radial-gradient(220px 160px at 90% 0%, #0a2a2e 0%, transparent 65%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
    }
    [data-theme="dark"] .option-item { background-color: var(--card); }
    [data-theme="dark"] .hint-toggle,
    [data-theme="dark"] .hint-content,
    [data-theme="dark"] .btn-prev { background-color: var(--card); color: var(--ink); }
    [data-theme="dark"] .result-card { background: var(--card); }
    [data-theme="dark"] .btn-next {
      background: linear-gradient(90deg, #e8673a, #f28c5e);
      box-shadow: 0 4px 20px rgba(232, 103, 58, 0.35);
      color: #fff;
    }
    [data-theme="dark"] .btn-next:hover:not(:disabled) {
      box-shadow: 0 6px 24px rgba(232, 103, 58, 0.5);
    }
    
    /* quiz-mobile-v3 */
    @media (max-width: 640px) {
      body {
        height: 100dvh;
        overflow: hidden;
        align-items: flex-start;
        padding: 0;
      }
      .quiz-container {
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        margin: 0;
        border-radius: 0;
        border-left: none;
        border-right: none;
        border-top: none;
        padding-bottom: 0;
      }
      #quiz-content,
      #results-content {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        min-height: 0;
        padding-bottom: 8px;
      }
      #hint-box { flex-shrink: 0; }
      .navigation {
        flex-shrink: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        margin-top: 0;
        background: var(--card);
        border-top: 1px solid var(--stroke);
      }
    }
    </style>
</head>
<body>
    <div class="quiz-container">

    <div class="quiz-heading" style="margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--stroke)">
      <a href="../index.html" style="font-size:0.82em;color:var(--muted);text-decoration:none;font-family:var(--font-body)">← Índice</a>
      <h1 style="font-family:var(--font-display);font-size:1.1em;font-weight:700;color:var(--ink);margin-top:8px;padding-right:44px">Itinerario Personal para la Empleabilidad · Quiz 5</h1>
    </div>
        <div id="quiz-content">
            <!-- Dynamic Content -->
        </div>
        <div id="results-content" class="hidden"></div>

        <div id="hint-box" class="hint-content">
            <div class="hint-icon-box">💡</div>
            <div id="hint-text"></div>
        </div>

        <div class="navigation">
            <button id="hint-toggle" class="hint-toggle">
                <span>Pista</span>
                <span id="hint-icon-arrow">▼</span>
            </button>
            <div class="nav-buttons">
                <button id="prev-btn" class="btn btn-prev">Anterior</button>
                <button id="next-btn" class="btn btn-next">Siguiente</button>
            </div>
        </div>
    </div>

    <script>
        let quizData = [{"answerOptions":[{"isCorrect":false,"rationale":"La clasificación contable se basa en el horizonte temporal de permanencia y no en la cuantía absoluta de la inversión.","text":"El valor monetario de mercado, siendo el activo no corriente siempre más costoso."},{"isCorrect":false,"rationale":"Ambas categorías de activos pueden contener elementos tangibles e intangibles según la normativa contable.","text":"La naturaleza tangible o intangible de los bienes que componen el recurso."},{"isCorrect":true,"rationale":"El activo corriente se vincula al ciclo de explotación anual, mientras que el no corriente representa inversiones estructurales permanentes.","text":"El tiempo estimado para su conversión en efectivo o su consumo operativo."},{"isCorrect":false,"rationale":"Aunque es recomendable financiar activos fijos con recursos a largo plazo, la clasificación del activo depende de su liquidez, no de su origen de fondos.","text":"La fuente de financiación utilizada obligatoriamente para su adquisición inicial."}],"hint":"Considera el horizonte temporal de un año como criterio divisorio estándar.","question":"¿Cuál es la principal diferencia conceptual entre el activo corriente y el activo no corriente en el balance de situación?"},{"answerOptions":[{"isCorrect":true,"rationale":"Un valor inferior a $1$ indica que el activo corriente no alcanza para cubrir las deudas exigibles en el mismo periodo.","text":"Existe un riesgo elevado de suspensión de pagos por falta de recursos líquidos a corto plazo."},{"isCorrect":false,"rationale":"El ratio de liquidez relaciona activos y pasivos corrientes, no describe la composición del patrimonio neto.","text":"La empresa depende exclusivamente de su patrimonio neto para financiar sus operaciones."},{"isCorrect":false,"rationale":"El exceso de liquidez se daría con valores superiores a $2$, no inferiores a $1$.","text":"La empresa tiene un exceso de capital ocioso que debería ser invertido para mejorar la rentabilidad."},{"isCorrect":false,"rationale":"El rango óptimo para la liquidez general se sitúa entre $1,5$ y $2$.","text":"La situación financiera es óptima y equilibrada para afrontar deudas inmediatas."}],"hint":"Compara el valor con el rango de referencia de $1,5$ a $2$.","question":"Si una empresa presenta un ratio de liquidez de $0,8$, ¿cuál es la interpretación técnica más precisa según los valores óptimos establecidos?"},{"answerOptions":[{"isCorrect":true,"rationale":"Son recursos que no tienen apariencia física pero generan beneficios económicos futuros a largo plazo.","text":"Activo no corriente intangible."},{"isCorrect":false,"rationale":"Representan una inversión (activo), no una fuente de financiación propia aportada por socios.","text":"Patrimonio neto o fondos propios."},{"isCorrect":false,"rationale":"Los activos representan derechos y bienes, mientras que los pasivos representan obligaciones y deudas.","text":"Pasivo fijo o a largo plazo."},{"isCorrect":false,"rationale":"Las patentes no se destinan a la venta inmediata dentro del ciclo operativo normal de un año.","text":"Activo corriente realizable."}],"hint":"Se trata de bienes inmateriales destinados a permanecer en la empresa más de un año.","question":"¿En qué categoría del balance deben clasificarse las 'patentes y marcas comerciales'?"},{"answerOptions":[{"isCorrect":false,"rationale":"Las cuentas por cobrar forman parte del 'Realizable' y sí se incluyen en el ratio de tesorería.","text":"Las cuentas por cobrar, ya que el cobro no está garantizado al 100%."},{"isCorrect":true,"rationale":"El inventario requiere ser vendido y cobrado antes de convertirse en efectivo, lo que lo hace menos líquido que el disponible y el realizable.","text":"Las existencias o inventarios, debido a su menor grado de liquidez inmediata."},{"isCorrect":false,"rationale":"Los préstamos bancarios a corto plazo figuran en el denominador (pasivo corriente), no en el numerador.","text":"Los préstamos bancarios, por ser una obligación y no un recurso."},{"isCorrect":false,"rationale":"El patrimonio neto no forma parte del activo corriente, por lo que su exclusión no define este ratio.","text":"El patrimonio neto, para evitar duplicidades en la estructura financiera."}],"hint":"Piensa en qué elemento del activo corriente requiere un proceso de venta previo para ser dinero.","question":"El ratio de tesorería se calcula mediante la fórmula $\\frac{Realizable + Disponible}{Pasivo\\ corriente}$. ¿Qué componente se excluye del activo corriente para este cálculo y por qué?"},{"answerOptions":[{"isCorrect":false,"rationale":"El ratio de endeudamiento total no distingue entre plazos de deuda, solo mide el volumen total frente al patrimonio.","text":"La calidad de la deuda es excelente porque casi todo es a largo plazo."},{"isCorrect":false,"rationale":"La liquidez mide la capacidad de pago a corto plazo, mientras que el endeudamiento mide la solvencia estructural.","text":"La empresa está en una situación de liquidez técnica perfecta."},{"isCorrect":true,"rationale":"Un valor superior al rango $0,4$ - $0,6$ indica una descapitalización o excesivo peso de las deudas en la estructura financiera.","text":"La empresa tiene una dependencia excesiva de la financiación ajena frente a sus recursos propios."},{"isCorrect":false,"rationale":"Si el ratio es $0,9$, el pasivo representa el $90\\%$ de la estructura de capital, por lo que el patrimonio es muy inferior.","text":"El patrimonio neto es superior al total de las deudas con terceros."}],"hint":"Considera que el rango óptimo es $0,4$ a $0,6$.","question":"Un ratio de endeudamiento situado en $0,9$ sugiere que:"},{"answerOptions":[{"isCorrect":false,"rationale":"La maquinaria es un activo no corriente, no una obligación de pago (pasivo).","text":"Maquinaria de alta precisión utilizada en la cadena de montaje."},{"isCorrect":false,"rationale":"Las reservas forman parte del patrimonio neto o fondos propios, no de las deudas con terceros.","text":"Reserva legal constituida con los beneficios del ejercicio anterior."},{"isCorrect":true,"rationale":"Representa una obligación de pago con un vencimiento inferior a un año.","text":"Deudas con proveedores por compra de materias primas a pagar en 90 días."},{"isCorrect":false,"rationale":"Al superar el año de vencimiento, se clasifica como pasivo no corriente o pasivo fijo.","text":"Préstamo hipotecario para la adquisición de un local a devolver en 15 años."}],"hint":"Busca una obligación de pago con terceros cuyo vencimiento sea a corto plazo.","question":"¿Cuál de las siguientes partidas constituye un 'Pasivo Circulante'?"},{"answerOptions":[{"isCorrect":true,"rationale":"Refleja la parte de los activos de la empresa que pertenece realmente a los propietarios tras deducir todas las deudas.","text":"La diferencia entre el valor total de los activos y el total de las obligaciones con terceros."},{"isCorrect":false,"rationale":"Eso define el 'Disponible' dentro del activo corriente.","text":"La suma de todo el dinero en caja y cuentas bancarias disponible hoy mismo."},{"isCorrect":false,"rationale":"Las deudas con entidades financieras forman parte del pasivo exigible.","text":"El conjunto de deudas que la empresa ha contraído con entidades financieras."},{"isCorrect":false,"rationale":"Esto constituye el 'Realizable' dentro del activo corriente.","text":"El total de facturas pendientes de cobro por parte de los clientes."}],"hint":"Se le conoce también como capital contable o fondos propios.","question":"¿Qué representa el concepto de 'Patrimonio Neto' en la estructura económico-financiera?"},{"answerOptions":[{"isCorrect":false,"rationale":"Los gastos operativos forman parte del capital de trabajo o circulante, no del activo fijo.","text":"Gastos operativos diarios como salarios y suministros de oficina."},{"isCorrect":false,"rationale":"Las aportaciones de los socios son fuentes de financiación propia, no inversiones en activos específicos.","text":"Aportaciones iniciales de los socios que no requieren devolución."},{"isCorrect":false,"rationale":"Los recursos de rápida conversión a efectivo son activos circulantes o corrientes.","text":"Recursos que se convierten en efectivo en un periodo inferior a los seis meses."},{"isCorrect":true,"rationale":"Son elementos estructurales que no están destinados a la venta y permanecen largo tiempo en la organización.","text":"Bienes con una vida útil prolongada necesarios para la producción de bienes o servicios."}],"hint":"Tienen una permanencia en la empresa superior al año fiscal.","question":"Dentro del plan de inversión, ¿cómo se definen los 'activos fijos'?"},{"answerOptions":[{"isCorrect":false,"rationale":"Este rango corresponde al ratio de tesorería y la definición es incorrecta.","text":"$0,8$ - $1,2$; mide la relación entre activos tangibles y activos intangibles."},{"isCorrect":false,"rationale":"Ese rango corresponde al ratio de endeudamiento.","text":"$0,4$ - $0,6$; mide el porcentaje de beneficios reinvertidos en la empresa."},{"isCorrect":false,"rationale":"Este rango y definición corresponden al ratio de liquidez general.","text":"$1,5$ - $2,0$; mide la solvencia total de la empresa frente a todos sus acreedores."},{"isCorrect":true,"rationale":"Evalúa si la empresa puede afrontar sus deudas más urgentes sin depender de cobros o ventas futuras.","text":"$0,2$ - $0,3$; mide la capacidad de pago inmediata con el dinero efectivo en caja y bancos."}],"hint":"Es el ratio de liquidez más restrictivo, pues solo considera el dinero 'contante y sonante'.","question":"El ratio de disponibilidad relaciona el 'Disponible' con el pasivo corriente. ¿Cuál es su valor óptimo y qué mide?"},{"answerOptions":[{"isCorrect":false,"rationale":"Esa operación define el patrimonio neto en el balance de situación.","text":"Calcular la diferencia entre los activos totales y los pasivos totales a una fecha fija."},{"isCorrect":false,"rationale":"Esa es la función del plan de tesorería o presupuesto d imonio neto, sino que compara deudas a corto plazo frente al total de deudas.","text":"El patrimonio neto es insuficiente para cubrir las deudas a largo plazo."},{"isCorrect":true,"rationale":"El ratio $\\frac{Pasivo\\ Corriente}{Pasivo\\ Total}$ indica qué porcentaje de la deuda debe devolverse en menos de un año.","text":"La mayor parte de su exigible vence a corto plazo, lo que aumenta la presión sobre la liquidez."},{"isCorrect":false,"rationale":"Un valor de $0,8$ indica lo contrario: que solo el $20\\%$ de la deuda es a largo plazo.","text":"La empresa ha logrado refinanciar su deuda para pagarla en periodos muy prolongados."},{"isCorrect":false,"rationale":"En este ratio, valores altos indican mayor riesgo de liquidez inmediata, no mayor calidad crediticia.","text":"La deuda es de muy alta calidad porque el ratio es superior a $0,5$."}],"hint":"Relaciona el pasivo corriente con el pasivo total. El óptimo es de $0,2$ a $0,5$.","question":"Si una empresa tiene un ratio de 'Calidad de la Deuda' de $0,8$, se concluye que:"},{"answerOptions":[{"isCorrect":false,"rationale":"Esa definición corresponde al Retorno de la Inversión (ROI).","text":"El tiempo total que se tarda en recuperar la inversión inicial realizada."},{"isCorrect":true,"rationale":"Es el umbral a partir del cual la empresa deja de tener pérdidas y empieza a generar beneficios.","text":"El volumen de ventas necesario para que los ingresos igualen a los costes totales."},{"isCorrect":false,"rationale":"Esa situación describe un ratio de liquidez igual a $1$, no el punto muerto operativo.","text":"El momento en que el activo corriente iguala exactamente al pasivo corriente."},{"isCorrect":false,"rationale":"La aportación de socios es una medida de capitalización, no un indicador de eficiencia operativa de ventas.","text":"La cantidad de dinero que los socios deben aportar para evitar la quiebra."}],"hint":"Es el nivel de actividad donde el beneficio neto es exactamente cero.","question":"¿Qué representa el 'Punto de Equilibrio' o Punto Muerto en un análisis de viabilidad?"},{"answerOptions":[{"isCorrect":false,"rationale":"Generalmente estos gastos se consumen dentro del ciclo operativo de un año.","text":"Activo no corriente."},{"isCorrect":false,"rationale":"Son desembolsos (gastos), no entradas de dinero (ingresos).","text":"Ingresos no operativos."},{"isCorrect":false,"rationale":"No es una deuda, ya que el dinero ya ha salido de la empresa para cubrir el compromiso.","text":"Pasivo corriente."},{"isCorrect":true,"rationale":"Aunque es un gasto, al estar pagado por adelantado representa un derecho a recibir un servicio durante el ejercicio actual.","text":"Activo corriente."}],"hint":"Representan un recurso o derecho que se consumirá en el corto plazo.","question":"¿Cómo se clasifican los 'Gastos pagados por anticipado' (como un seguro anual pagado en enero)?"},{"answerOptions":[{"isCorrect":true,"rationale":"Permite cuantificar la rentabilidad obtenida por cada unidad monetaria invertida en el proyecto.","text":"$\\frac{Beneficio - Inversión}{Inversión} \\times 100$."},{"isCorrect":false,"rationale":"Esto calcula el beneficio neto absoluto, no la rentabilidad porcentual de la inversión.","text":"$Ingresos\\ Totales - Gastos\\ Totales$."},{"isCorrect":false,"rationale":"Esta es una variante del ratio de endeudamiento que mide el apalancamiento.","text":"$\\frac{Pasivo}{Patrimonio\\ Neto}$."},{"isCorrect":false,"rationale":"Esta fórmula se utiliza para calcular el fondo de maniobra o capital de trabajo.","text":"$Activo\\ Corriente - Pasivo\\ Corriente$."}],"hint":"Relaciona el beneficio obtenido con el capital inicialmente desembolsado.","question":"¿Cuál es la fórmula correcta para calcular el Retorno de la Inversión (ROI)?"},{"answerOptions":[{"isCorrect":false,"rationale":"Este valor solo contempla las existencias, ignorando la tesorería disponible.","text":"$60.000 €$."},{"isCorrect":false,"rationale":"Este valor solo suma el efectivo y el banco, ignoran ral."},{"isCorrect":false,"rationale":"Un hecho económico puede ser tanto un gasto como un ingreso; no implica necesariamente 'ahorro'.","text":"Que supone un ahorro significativo de costes para la organización."}],"hint":"Tiene que ver con la alteración del balance o los resultados.","question":"Según el material, ¿qué significa que un hecho sea 'económico' en contabilidad?"},{"answerOptions":[{"isCorrect":false,"rationale":"El rango óptimo para la tesorería es de $0,8$ a $1,2$.","text":"La empresa se encuentra en el rango óptimo de tesorería."},{"isCorrect":false,"rationale":"Este ratio no analiza el endeudamiento a largo plazo, sino la liquidez de corto plazo.","text":"El endeudamiento a largo plazo es demasiado bajo."},{"isCorrect":true,"rationale":"Al superar el límite superior de $1,2$, se entiende que hay recursos ociosos en caja o cuentas por cobrar.","text":"La empresa tiene un exceso de liquidez inmediata que podría estar restando rentabilidad."},{"isCorrect":false,"rationale":"Al ser mayor que $1$, la empresa tiene más que suficiente para pagar sus deudas corrientes.","text":"Existe un grave peligro de no poder pagar a los proveedores este mes."}],"hint":"Compara el resultado con el rango de referencia $0,8$ - $1,2$.","question":"Si el ratio de tesorería es de $1,5$, ¿cuál sería la conclusión más lógica?"},{"answerOptions":[{"isCorrect":false,"rationale":"Los sueldos son gastos operativos, mientras que la inversión se centra en activos y gastos de constitución.","text":"Calcular exclusivamente el sueldo de los directivos durante el primer año."},{"isCorrect":false,"rationale":"La política de precios es parte de la estrategia de marketing (Precio), no de la inversión inicial.","text":"Definir los precios de venta al público de los productos terminados."},{"isCorrect":true,"rationale":"Incluye activos fijos, gastos legales, administrativos y de instalación necesarios para comenzar a operar.","text":"Desglosar todos los costes asociados con la puesta en marc             let optionsHtml = '';
            const correctIndex = q.answerOptions.findIndex((o) => o.isCorrect);
            const selectedCorrect = s.selectedIndex !== null && q.answerOptions[s.selectedIndex].isCorrect;
            q.answerOptions.forEach((opt, idx) => {
                const isSelected = s.selectedIndex === idx;
                const statusClass = isSelected ? (opt.isCorrect ? 'correct' : 'incorrect') : '';
                const selectedClass = isSelected ? 'selected' : '';
                const revealCorrect = (s.selectedIndex !== null && !selectedCorrect && opt.isCorrect) || (mode === 'review' && opt.isCorrect);
                const revealClass = revealCorrect ? 'revealed-correct' : '';

                optionsHtml += `
                    <li class="option-item ${selectedClass} ${statusClass} ${revealClass}" onclick="selectOption(${idx})">
                        <div class="option-label">
                            <span>${String.fromCharCode(65 + idx)}. ${fmt(opt.text)}</span>
                        </div>
                        <div class="feedback-state">
                            ${opt.isCorrect ? '✓ Correcto' : '✕ Incorrecto'}
                        </div>
                        ${opt.rationale ? '<div class="rationale">' + fmt(opt.rationale) + '</div>' : ''}
                    </li>
                `;
            });

            const stats = getStats();

            content.innerHTML = `
                <div class="progress-container">
                    <div class="progress-text">${currentIndex + 1} / ${quizData.length}</div>
                    <div class="status-bar">
                        <div class="status-item status-correct">
                            <span>✓</span>
                            <span>${stats.correct}</span>
                        </div>
                        <div class="status-item status-wrong">
                            <span>✕</span>
                            <span>${stats.wrong}</span>
                        </div>
                    </div>
                </div>
                <div class="question-text">${fmt(q.question)}</div>
                <ul class="options-list">
                    ${optionsHtml}
                </ul>
            `;

            // Update Pista Box
            const hintText = document.getElementById('hint-text');
            hintText.innerText = fmt(q.hint) || 'No hay pista disponible para esta pregunta.';
            if (s.hintVisible) {
                hintBox.classList.add('active');
            } else {
                hintBox.classList.remove('active');
            }

            results.classList.add('hidden');
            content.classList.remove('hidden');
            hintBox.classList.remove('hidden');
            nav.classList.remove('hidden');

            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = false;
            if (mode === 'review') {
                nextBtn.innerText = currentIndex === quizData.length - 1 ? 'Volver a resultados' : 'Siguiente';
            } else {
                nextBtn.innerText = currentIndex === quizData.length - 1 ? 'Finalizar' : 'Siguiente';
            }
            document.getElementById('hint-icon-arrow').innerText = s.hintVisible ? '▲' : '▼';
        }

        function selectOption(idx) {
            if (mode !== 'quiz') return;
            if (state[currentIndex].selectedIndex !== null) return; // Prevent re-selection
            state[currentIndex].selectedIndex = idx;
            renderQuestion();
        }

        function toggleHint() {
            if (mode === 'results') return;
            state[currentIndex].hintVisible = !state[currentIndex].hintVisible;
            renderQuestion();
        }


        function saveWrongAnswers() {
          var wrongQuestions = state
            .map(function(s,i){return {s:s,i:i};})
            .filter(function(x){return x.s.selectedIndex !== null && !quizData[x.i].answerOptions[x.s.selectedIndex].isCorrect;})
            .map(function(x){return quizData[x.i].question;});
          var key = 'wrong:' + window.location.pathname.split('/').pop();
          if (wrongQuestions.length > 0) {
            localStorage.setItem(key, JSON.stringify(wrongQuestions));
          } else {
            localStorage.removeItem(key);
          }
          return wrongQuestions;
        }
        function renderResults() {
            const stats = getStats();
            const content = document.getElementById('quiz-content');
            const results = document.getElementById('results-content');
            const hintBox = document.getElementById('hint-box');
            const nav = document.querySelector('.navigation');

            const score = `${stats.correct} / ${quizData.length}`;

            results.innerHTML = `
                <div class="results-screen">
                    <div>
                        <h1 class="results-title">¡Lo lograste! Quiz completado.</h1>
                        <p class="results-subtitle">Revisa tu puntuación o inténtalo de nuevo.</p>
                    </div>
                    <div class="results-grid">
                        <div class="result-card">
                            <div class="result-label">Puntuación</div>
                            <div class="result-value">${score}</div>
                        </div>
                        <div class="result-card">
                            <div class="result-label">Precisión</div>
                            <div class="result-value">${stats.accuracy}%</div>
                        </div>
                        <div class="result-card">
                            <div class="result-metrics">
                                <div>Correctas <strong>${stats.correct}</strong></div>
                                <div>Incorrectas <strong>${stats.wrong}</strong></div>
                                <div>Omitidas <strong>${stats.skipped}</strong></div>
                            </div>
                        </div>
                    </div>
                    <div class="results-actions"><button id="retake-wrong-btn" class="btn btn-ghost" style="display:none">Repasar errores (<span id="wrong-count">0</span>)</button>
                        <button id="review-btn" class="btn btn-ghost">Revisar Quiz</button>
                        <button id="retake-btn" class="btn btn-next">Repetir Quiz</button>
                    </div>
                </div>
            `;

            content.classList.add('hidden');
            results.classList.remove('hidden');
            hintBox.classList.add('hidden');
            nav.classList.add('hidden');


            var wrongQuestions = saveWrongAnswers();
            var retakeWrongBtn = document.getElementById('retake-wrong-btn');
            if (wrongQuestions.length > 0) {
              document.getElementById('wrong-count').textContent = wrongQuestions.length;
              retakeWrongBtn.style.display = '';
            }
            (function() {
              var fname = window.location.pathname.split('/').pop();
              var backLink = document.querySelector('.quiz-heading a[href*="index.html"]');
              if (backLink) {
                var h = '#wrong=' + fname + ':' + wrongQuestions.length;
                backLink.href = backLink.href.split('#')[0] + h;
              }
            })();
            document.getElementById('retake-wrong-btn').onclick = function() {
              if (wrongQuestions.length === 0) return;
              mode = 'quiz';
              currentIndex = 0;
              var wrongSet = new Set(wrongQuestions);
              quizData = originalQuizData.filter(function(q){return wrongSet.has(q.question);});
              shuffleAnswers();
              resetState();
              renderQuestion();
            };

            var wrongQuestions = saveWrongAnswers();
            var retakeWrongBtn = document.getElementById('retake-wrong-btn');
            if (wrongQuestions.length > 0) {
              document.getElementById('wrong-count').textContent = wrongQuestions.length;
              retakeWrongBtn.style.display = '';
            }
            (function() {
              var fname = window.location.pathname.split('/').pop();
              var backLink = document.querySelector('.quiz-heading a[href*="index.html"]');
              if (backLink) {
                var h = '#wrong=' + fname + ':' + wrongQuestions.length;
                backLink.href = backLink.href.split('#')[0] + h;
              }
            })();
            document.getElementById('retake-wrong-btn').onclick = function() {
              if (wrongQuestions.length === 0) return;
              mode = 'quiz';
              currentIndex = 0;
              var wrongSet = new Set(wrongQuestions);
              quizData = originalQuizData.filter(function(q){return wrongSet.has(q.question);});
              shuffleAnswers();
              resetState();
              renderQuestion();
            };
            document.getElementById('review-btn').onclick = () => {
                mode = 'review';
                currentIndex = 0;
                renderQuestion();
            };

            document.getElementById('retake-btn').onclick = () => {
                mode = 'quiz';
                currentIndex = 0;
                shuffleQuestions();
                shuffleAnswers();
                resetState();
                renderQuestion();
            };
        }

        document.getElementById('prev-btn').onclick = () => {
            if (mode === 'results') return;
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        };

        document.getElementById('next-btn').onclick = () => {
            if (mode === 'results') return;
            if (mode === 'review') {
                if (currentIndex < quizData.length - 1) {
                    currentIndex++;
                    renderQuestion();
                } else {
                    mode = 'results';
                    renderResults();
                }
                return;
            }
            if (currentIndex < quizData.length - 1) {
                currentIndex++;
                renderQuestion();
            } else {
                mode = 'results';
                renderResults();
            }
        };

        document.getElementById('hint-toggle').onclick = toggleHint;

        renderQuestion();
    </script>

  <button id="theme-toggle" title="Cambiar tema" style="position:fixed;top:8px;right:8px;background:var(--card);border:1px solid var(--stroke);border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,0.1);transition:transform 0.2s ease;z-index:100;">🌙</button>
  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.getElementById('theme-toggle').textContent = '☀️';
      }
      document.getElementById('theme-toggle').addEventListener('click', function() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
        this.textContent = isDark ? '🌙' : '☀️';
      });
    })();
  </script>
</body>
</html>
