            --radius-xl: 18px;
            --radius-2xl: 22px;
            --space-1: 6px;
            --space-2: 8px;
            --space-3: 10px;
            --space-4: 12px;
            --space-5: 14px;
            --space-6: 16px;
            --space-7: 18px;

        body {
            font-family: var(--font-body);
            background:

                radial-gradient(220px 160px at 90% 0%, #cfe7e6 0%, transparent 65%),

            color: var(--ink);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            width: 100%;
            max-width: 800px;
            padding: var(--space-10) var(--space-8);
            box-sizing: border-box;
            background: var(--card);
            border-radius: var(--radius-2xl);
            border: 1px solid var(--stroke);
            box-shadow: var(--shadow);
        }

        .progress-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .progress-text {
            color: var(--muted);
            font-size: 0.9em;
        }

        .status-bar {
            display: flex;
            gap: 16px;
            font-size: 0.9em;
            font-weight: 500;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-correct { color: var(--teal); }
        .status-wrong { color: var(--error); }

        .question-text {
            font-family: var(--font-display);
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .options-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-item {
            background-color: #fff;
            border: 1px solid var(--stroke);
            padding: var(--space-4) var(--space-6);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option-item:hover:not(.selected) {
            background-color: var(--card);
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .option-item.selected.correct {
            background-color: rgba(31, 111, 120, 0.12);
            border-color: var(--teal);
        }

        .option-item.selected.incorrect {
            background-color: rgba(181, 72, 50, 0.12);
            border-color: var(--error);
        }

        .option-item.revealed-correct {
            border-color: rgba(31, 111, 120, 0.5);
            box-shadow: inset 0 0 0 1px rgba(31, 111, 120, 0.16);
        }

        .option-label {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .feedback-state {
            font-weight: bold;
            font-size: 0.9em;
            display: none;
        }

        .selected .feedback-state {
            display: block;
        }

        .revealed-correct .feedback-state {
            display: block;
        }

        .correct .feedback-state { color: var(--teal); }
        .incorrect .feedback-state { color: var(--error); }
        .revealed-correct .feedback-state { color: var(--teal); }

        .rationale {
            font-size: 0.95em;
            color: var(--muted);
            margin-top: 4px;
            line-height: 1.5;
            display: none;
        }

        .selected .rationale {
            display: block;
        }

        .revealed-correct .rationale {
            display: block;
        }
        .hint-toggle {
            border: 1px solid var(--stroke);
            color: var(--muted);
            cursor: pointer;
            padding: var(--space-2) var(--space-6);
            border-radius: var(--radius-md);
            background-color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .hint-toggle:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .hint-content {
            margin-top: 32px;
            padding: var(--space-6);
            background-color: #fff;
            border: 1px solid var(--stroke);
            border-radius: var(--radius-lg);
            font-size: 0.95em;
            color: var(--muted);
            display: none;
            align-items: flex-start;
            gap: 16px;
        }

        .hint-content.active {
            display: flex;
        }

        .hint-icon-box {
            color: var(--accent-dark);
            font-size: 1.2em;
            margin-top: -2px;
        }

        .navigation {
            margin-top: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            border-radius: var(--radius-md);
            padding: var(--space-2) var(--space-7);
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-prev {
            background-color: #fff;
            color: var(--ink);
            border-color: var(--stroke);
        }

        .btn-prev:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn-next {
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            color: #fff;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .results-screen {
            display: flex;
            flex-direction: column;
            gap: var(--space-8);
        }

        .results-title {
            font-family: var(--font-display);
            font-size: 2.1em;
            margin: 0;
        }

        .results-subtitle {
            color: var(--muted);
            margin: 0;
            font-size: 1em;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-6);
        }

        .result-card {
            padding: var(--space-6);
            border-radius: var(--radius-xl);
            background: #fff;
            border: 1px solid var(--stroke);
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        .result-label {
            color: var(--muted);
            font-size: 0.95em;
        }

        .result-value {
            font-size: 2em;
            font-family: var(--font-display);
        }

        .result-metrics {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
            color: var(--muted);
            font-size: 0.95em;
        }

        .results-actions {
            display: flex;
            gap: var(--space-4);
            flex-wrap: wrap;
        }

        .btn-ghost {
            background-color: transparent;
            border: 1px solid var(--stroke);
            color: var(--ink);
        }

        .hidden { display: none; }

        @media (max-width: 900px) {
            .quiz-container {
                margin: var(--space-8);
                max-width: 100%;
            }
        }

        @media (max-width: 720px) {
            .quiz-container {
                padding: var(--space-8) var(--space-6);
            }

            .question-text {
                font-size: 1.3em;
            }

            .option-item {
                padding: var(--space-4);
            }
        }

        @media (max-width: 520px) {
            body {
                align-items: flex-start;
            }

            .quiz-container {
                margin: var(--space-6);
                padding: var(--space-7) var(--space-5);
            }

            .progress-container {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-3);
            }

            .navigation {
                flex-direction: column;
                align-items: stretch;
                gap: var(--space-4);
            }

            .nav-buttons {
                width: 100%;
            }

            .btn {
                width: 100%;
            }

            .hint-toggle {
                justify-content: space-between;
            }

            .results-actions {
                flex-direction: column;
            }
        }
    </style>

:"El Service Broker (UDDI) solo sirve para localizar servicios, no para ejecutar la lógica de atención al cliente.","text":"En el Service Broker."},{"isCorrect":false,"rationale":"Aunque el cliente puede usar hilos para su GUI, la concurrencia para servir a múltiples usuarios reside en el servidor.","text":"En el cliente."},{"isCorrect":false,"rationale":"El hardware de red solo encamina paquetes; la lógica de concurrencia de la aplicación pertenece al software del servidor.","text":"En el Gateway de la red local."}],"hint":"El procesamiento pesado y la atención múltiple son tareas centralizadas.","question":"En el desarrollo de aplicaciones concurrentes en Java, ¿en qué componente se deben ejecutar las hebras que atienden a los múltiples clientes de forma simultánea?"},{"answerOptions":[{"isCorrect":false,"rationale":"Permitir el acceso remoto es la función básica y principal para la que fue diseñado FTP.","text":"No permite la conexión de usuarios de forma remota."},{"isCorrect":false,"rationale":"Al contrario, FTP es conocido por su alta velocidad precisamente al evitar el sobrecoste de la encriptación.","text":"Su velocidad de transferencia es extremadamente lenta comparada con HTTP."},{"isCorrect":false,"rationale":"FTP es un estándar de la pila TCP/IP y funciona globalmente a través de Internet.","text":"Solo funciona en redes locales y no a través de Internet."},{"isCorrect":true,"rationale":"La falta de cifrado permite que cualquier intercepción en la red capture los datos y contraseñas fácilmente.","text":"Transmite toda la información, incluyendo credenciales, en formato de texto plano."}],"hint":"Tiene que ver con la forma en que los datos viajan por el cable.","question":"¿Cuál es la principal desventaja del protocolo FTP tradicional en términos de seguridad?"},{"answerOptions":[{"isCorrect":false,"rationale":"Esto es solo una parte del rendimiento del cliente, ignorando el cuello de botella del servidor y la red.","text":"Únicamente el tiempo que tarda el cliente en renderizar la interfaz gráfica."},{"isCorrect":false,"rationale":"La extensión del código no es una métrica directa del tiempo de ejecución o respuesta en red.","text":"El número total de líneas de código del programa servidor."},{"isCorrect":true,"rationale":"El usuario percibe el retraso total, que incluye tanto el cálculo interno del servidor como el viaje de los datos.","text":"El tiempo de proceso del servidor sumado al tiempo de transmisión en la red."},{"isCorrect":false,"rationale":"El arranque del hardware es un evento puntual, no una medida del rendimiento de cada transacción del servicio.","text":"Solo el tiempo de inicio de la máquina donde se aloja el servidor."}],"hint":"Es una medida compuesta por el trabajo computacional y el transporte físico.","question":"Para monitorizar correctamente el 'tiempo de respuesta' de un servicio web, ¿qué factores se deben considerar según la teoría de sistemas distribuidos?"},{"answerOptions":[{"isCorrect":false,"rationale":"FTPS es una adaptación de FTP para usar SSL/TLS, no una evolución del protocolo de encriptación en sí.","text":"FTPS"},{"isCorrect":true,"rationale":"Transport Layer Security (TLS) es el sucesor estandarizado y más seguro del antiguo protocolo SSL.","text":"TLS"},{"isCorrect":false,"rationale":"HTTPS es simplemente el uso de HTTP sobre una capa de seguridad (SSL o TLS).","text":"HTTPS"},{"isCorrect":false,"rationale":"SSH es un protocolo independiente diseñado para acceso remoto seguro, no una evolución de SSL.","text":"SSH"}],"hint":"Sus siglas suelen aparecer juntas como SSL/X.","question":"¿Qué protocolo surgió como una evolución directa para corregir y mejorar el protocolo SSL?"},{"answerOptions":[{"isCorrect":false,"rationale":"GlassFish es un servidor de aplicaciones desarrollado originalmente por Sun/Oracle, no por OASIS.","text":"Crear el software GlassFish para su integración en el IDE NetBeans."},{"isCorrect":false,"rationale":"La gestión de IPs es responsabilidad de otras entidades (como IANA/ICANN), no de OASIS.","text":"Gestionar la asignación de todas las direcciones IP de tipo IPv4 en Internet."},{"isCorrect":true,"rationale":"OASIS es un consorcio dedicado a impulsar estándares abiertos para la interoperabilidad global.","text":"Producir normas internacionales para la arquitectura orientada a servicios (SOA) y la seguridad web."},{"isCorrect":false,"rationale":"OASIS define estándares, no desarrolla componentes específicos de bibliotecas de lenguajes como Java.","text":"Desarrollar exclusivamente el navegador web integrado en la biblioteca Java SWING."}],"hint":"Es un organismo de estandarización enfocado en la convergencia de tecnologías abiertas.","question":"¿Cuál es la función principal de la organización OASIS en el ámbito de los servicios web?"},{"answerOptions":[{"isCorrect":false,"rationale":"La clase `URL` se usa para representar direcciones, no es la base de la implementación del cliente FTP.","text":"URL"},{"isCorrect":false,"rationale":"FTP utiliza conexiones orientadas a flujo (TCP), mientras que `DatagramSocket` se usa para UDP.","text":"DatagramSocket"},{"isCorrect":true,"rationale":"Como la mayoría de clientes de protocolos de red en Java, hereda la funcionalidad básica de comunicación por sockets.","text":"SocketClient"},{"isCorrect":false,"rationale":"Un cliente no suele heredar de un servidor; son roles distintos en la arquitectura.","text":"FTPServer"}],"hint":"Casi todos los clientes de red de alto nivel se basan en una clase genérica para la gestión de conexiones.","question":"En la jerarquía de clases de Java para servicios de red, ¿de qué clase hereda directamente la clase `FTPClient`?"},{"answerOptions":[{"isCorrect":false,"rationale":"Esto describe a un sistema de '1 capa', no de 3.","text":"Que el cliente y el servidor deben ejecutarse obligatoriamente en el mismo ordenador físico."},{"isCorrect":false,"rationale":"Los sistemas P2P se consideran generalmente sistemas de 'n capas' por su alta descentralización.","text":"El uso exclusivo de protocolos P2P como BitTorrent o Bitcoin."},{"isCorrect":true,"rationale":"El modelo de 3 capas separa la lógica de presentación, la lógica de negocio y el almacenamiento de datos.","text":"La introducción de un servidor intermedio (de aplicaciones) entre el cliente y el servidor de datos."},{"isCorrect":false,"rationale":"El número de capas no altera la necesidad de mecanismos de control de errores en los protocolos de transporte.","text":"La eliminación de los mensajes ACK para aumentar la velocidad de procesamiento."}],"hint":"Piensa en añadir un intermediario para mejorar la escalabilidad y seguridad.","question":"¿Qué característica define a un sistema de '3 capas' (3-tiers) frente a uno de '2 capas'?"},{"answerOptions":[{"isCorrect":false,"rationale":"La clase `Cipher` se utiliza para tareas de encriptación y desencriptación, no para representar direcciones web.","text":"Cipher"},{"isCorrect":false,"rationale":"Las páginas web (HTTP) utilizan TCP, por lo que una clase UDP sería incompatible e incorrecta para esta tarea.","text":"SocketUDP"},{"isCorrect":false,"rationale":"Esta clase se utiliza para el envío de paquetes de datos discretos en protocolos no orientados a conexión.","text":"DatagramPacket"},{"isCorrect":true,"rationale":"La clase `URL` en Java encapsula un Localizador de Recursos Uniforme y permite su manipulación y apertura.","text":"URL"}],"hint":"Sus siglas significan 'Uniform Resource Locator'.","question":"Al programar un cliente HTTP en Java, ¿cuál es la clase adecuada para representar una dirección de una página web como $https://www.medac.es$?"},{"answerOptions":[{"isCorrect":false,"rationale":"La seguridad física y lógica de los servidores es responsabilidad de los administradores del servidor.","text":"Son los únicos encargados de garantizar la seguridad física de los servidores."},{"isCorrect":false,"rationale":"Es el servidor quien debe estar a la espera (rol pasivo), no el cliente.","text":"Deben estar permanentemente encendidos esperando conexiones entrantes del servidor."},{"isCorrect":true,"rationale":"El flujo de comunicación siempre comienza con una solicitud del lado del cliente hacia el servidor.","text":"Son ellos quienes inician la comunicación enviando peticiones cuando las necesitan."},{"isCorrect":false,"rationale":"El procesamiento pesado es responsabilidad del servidor; los clientes suelen ser 'ligeros'.","text":"Realizan la mayor parte del procesamiento pesado de los datos centralizados."}],"hint":"Se refiere a quién da el primer paso en la transacción.","question":"En el modelo Cliente/Servidor, se dice que los clientes tienen un 'rol activo' porque:"},{"answerOptions":[{"isCorrect":false,"rationale":"HTTP es independiente del lenguaje; se pueden usar servlets o servicios Java sin problemas.","text":"Porque no permite la ejecución de código Java en el servidor."},{"isCorrect":false,"rationale":"HTTP puede transferir cualquier tipo de recurso identificado por una URL.","text":"Porque solo puede transferir texto plano y nunca archivos binarios o imágenes."},{"isCorrect":false,"rationale":"Toda comunicación sobre TCP/IP, incluido HTTP, requiere obligatoriamente una dirección IP de destino.","text":"Porque no requiere una dirección IP para localizar al servidor remoto."},{"isCorrect":true,"rationale":"Cada petición se procesa de forma independiente sin guardar un contexto histórico nativo en el protocolo.","text":"Porque no recuerda ninguna información de conexiones o peticiones anteriores una vez cerrada la transacción."}],"hint":"Analiza la capacidad del servidor para 'reconocer' a un usuario que vuelve a conectar inmediatamente.","question":"¿Por qué se considera que el protocolo HTTP 'no tiene estado' (stateless)?"},{"answerOptions":[{"isCorrect":false,"rationale":"La compilación la realiza el compilador de Java (javac) integrado en el IDE o el JDK.","text":"Compilar el código fuente Java en lenguaje de máquina para mejorar el rendimiento."},{"isCorrect":false,"rationale":"GlassFish implementa los estándares SOAP, no los sustituye.","text":"Sustituir al protocolo SOAP para el intercambio de mensajes XML."},{"isCorrect":false,"rationale":"GlassFish es un servidor de aplicaciones web, no un servidor DNS.","text":"Proporcionar exclusivamente una base de datos distribuida para el almacenamiento de nombres DNS."},{"isCorrect":true,"rationale":"GlassFish es un servidor de aplicaciones compatible con Java EE que proporciona el entorno necesario para ejecutar servicios web.","text":"Actuar como el contenedor o servidor de aplicaciones donde se desplegará y ejecutará el servicio web."}],"hint":"Es el software que 'hospeda' tu proyecto para que sea accesible desde la red.","question":"En la creación de un servicio web SOAP en Java con NetBeans, ¿cuál es el propósito de utilizar el servidor GlassFish?"},{"answerOptions":[{"isCorrect":true,"rationale":"Esta clase proporciona la funcionalidad necesaria para aplicar algoritmos criptográficos a la información.","text":"Realizar operaciones de encriptación y desencriptación de datos."},{"isCorrect":false,"rationale":"La gestión de colas y concurrencia se realiza mediante hilos y estructuras de control de flujo, no con `Cipher`.","text":"Gestionar la cola de peticiones concurrentes en un servidor de alta carga."},{"isCorrect":false,"rationale":"Las conversiones matemáticas son lógica de negocio definida por el programador, no una función de una clase de seguridad.","text":"Convertir automáticamente pulgadas a centímetros en servicios SOAP."},{"isCorrect":false,"rationale":"La resolución DNS es gestionada por clases de red como `InetAddress`, no por la API de criptografía.","text":"Resolver de forma recursiva los nombres de dominio DNS en una red local."}],"hint":"Se relaciona directamente con la protección del contenido de los mensajes.","question":"Según el material, ¿cuál es la principal función de la clase `Cipher` disponible en la biblioteca de Java?"},{"answerOptions":[{"isCorrect":false,"rationale":"ISO establece estándares globales en múltiples ámbitos, pero la web tiene al W3C como su organismo de referencia técnica.","text":"ISO"},{"isCorrect":false,"rationale":"Aunque es una organización importante, el W3C es la mencionada específicamente para la evolución de los estándares web citados.","text":"IEEE"},{"isCorrect":false,"rationale":"OASIS se centra más en la convergencia de estándares abiertos industriales como SOA, pero el W3C es el pionero de los protocolos base.","text":"OASIS"},{"isCorrect":true,"rationale":"El Consorcio para la World Wide Web (W3C) es el encargado de estandarizar los protocolos básicos de la web.","text":"W3C"}],"hint":"Acrónimo de World Wide Web Consortium.","question":"En el desarrollo de servicios web, ¿qué organización fundó en $1994$ el objetivo de llevar Internet a su máximo potencial mediante protocolos como HTML, XML y SOAP?"},{"answerOptions":[{"isCorrect":false,"rationale":"Al contrario, los hilos son fundamentales para gestionar sockets de forma concurrente.","text":"Debido a que el uso de hilos (threads) es incompatible con la comunicación por sockets."},{"isCorrect":false,"rationale":"TCP no tiene ese límite tan bajo; la restricción suele venir de los recursos del sistema o de la configuración del software.","text":"Porque el protocolo TCP solo permite un máximo de $10$ conexiones simultáneas por hardware."},{"isCorrect":true,"rationale":"Limitar las peticiones asegura que cada cliente reciba una atención de calidad y que el servidor no colapse por falta de memoria o CPU.","text":"Para evitar la sobrecarga del servidor y garantizar que los recursos del sistema no se agoten."},{"isCorrect":false,"rationale":"La limitación de peticiones es independiente del puerto de comunicación utilizado.","text":"Para obligar a los clientes a utilizar el puerto $80$ exclusivamente."}],"hint":"Se trata de una medida de prevención para mantener la estabilidad del servicio.","question":"Al realizar una aplicación cliente/servidor concurrente, ¿por qué es conveniente establecer un número máximo de peticiones de clientes?"}];
        let currentIndex = 0;
        let mode = 'quiz';
        let state = quizData.map(() => ({ selectedIndex: null, hintVisible: false }));

        function getStats() {
            const answered = state.filter((s) => s.selectedIndex !== null).length;
            const correct = state.filter((s, i) => s.selectedIndex !== null && quizData[i].answerOptions[s.selectedIndex].isCorrect).length;
            const wrong = state.filter((s, i) => s.selectedIndex !== null && !quizData[i].answerOptions[s.selectedIndex].isCorrect).length;
            const skipped = quizData.length - answered;
            const accuracy = answered > 0 ? Math.round((correct / answered) * 100) : 0;
            return { answered, correct, wrong, skipped, accuracy };
        }

        function shuffleAnswers() {
            quizData.forEach((q) => {
                for (let i = q.answerOptions.length - 1; i > 0; i -= 1) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [q.answerOptions[i], q.answerOptions[j]] = [q.answerOptions[j], q.answerOptions[i]];
                }
            });
        }

        function shuffleQuestions() {
            for (let i = quizData.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
            }
        }

        function resetState() {
            state = quizData.map(() => ({ selectedIndex: null, hintVisible: false }));
        }

        function renderQuestion() {
            const q = quizData[currentIndex];
            const s = state[currentIndex];
            const content = document.getElementById('quiz-content');
            const results = document.getElementById('results-content');
            const hintBox = document.getElementById('hint-box');
            const nav = document.querySelector('.navigation');
            const nextBtn = document.getElementById('next-btn');
            const prevBtn = document.getElementById('prev-btn');

            let optionsHtml = '';
            const correctIndex = q.answerOptions.findIndex((o) => o.isCorrect);
            const selectedCorrect = s.selectedIndex !== null && q.answerOptions[s.selectedIndex].isCorrect;
            q.answerOptions.forEach((opt, idx) => {
                const isSelected = s.selectedIndex === idx;
                const statusClass = isSelected ? (opt.isCorrect ? 'correct' : 'incorrect') : '';
                const selectedClass = isSelected ? 'selected' : '';
                const revealCorrect = (s.selectedIndex !== null && !selectedCorrect && opt.isCorrect) || (mode === 'review' && opt.isCorrect);
                const revealClass = revealCorrect ? 'revealed-correct' : '';

                optionsHtml += `
                    <li class="option-item ${selectedClass} ${statusClass} ${revealClass}" onclick="selectOption(${idx})">
                        <div class="option-label">
                            <span>${String.fromCharCode(65 + idx)}. ${opt.text}</span>
                        </div>
                        <div class="feedback-state">
                            ${opt.isCorrect ? '✓ Correcto' : '✕ Incorrecto'}
                        </div>
                        ${opt.rationale ? '<div class="rationale">' + opt.rationale + '</div>' : ''}
                    </li>
                `;
            });

            const stats = getStats();

            content.innerHTML = `
                <div class="progress-container">
                    <div class="progress-text">${currentIndex + 1} / ${quizData.length}</div>
                    <div class="status-bar">
                        <div class="status-item status-correct">
                            <span>✓</span>
                            <span>${stats.correct}</span>
                        </div>
                        <div class="status-item status-wrong">
                            <span>✕</span>
                            <span>${stats.wrong}</span>
                        </div>
                    </div>
                </div>
                <div class="question-text">${q.question}</div>
                <ul class="options-list">
                    ${optionsHtml}
                </ul>
            `;

            // Update Pista Box
            const hintText = document.getElementById('hint-text');
            hintText.innerText = q.hint || 'No hay pista disponible para esta pregunta.';
            if (s.hintVisible) {
                hintBox.classList.add('active');
            } else {
                hintBox.classList.remove('active');
            }

            results.classList.add('hidden');
            content.classList.remove('hidden');
            hintBox.classList.remove('hidden');
            nav.classList.remove('hidden');

            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = false;
            if (mode === 'review') {
                nextBtn.innerText = currentIndex === quizData.length - 1 ? 'Volver a resultados' : 'Siguiente';
            } else {
                nextBtn.innerText = currentIndex === quizData.length - 1 ? 'Finalizar' : 'Siguiente';
            }
            document.getElementById('hint-icon-arrow').innerText = s.hintVisible ? '▲' : '▼';
        }

        function selectOption(idx) {
            if (mode !== 'quiz') return;
            if (state[currentIndex].selectedIndex !== null) return; // Prevent re-selection
            state[currentIndex].selectedIndex = idx;
            renderQuestion();
        }

        function toggleHint() {
            if (mode === 'results') return;
            state[currentIndex].hintVisible = !state[currentIndex].hintVisible;
            renderQuestion();
        }

        function renderResults() {
            const stats = getStats();
            const content = document.getElementById('quiz-content');
            const results = document.getElementById('results-content');
            const hintBox = document.getElementById('hint-box');
            const nav = document.querySelector('.navigation');

            const score = `${stats.correct} / ${quizData.length}`;

            results.innerHTML = `
                <div class="results-screen">
                    <div>
                        <h1 class="results-title">¡Lo lograste! Quiz completado.</h1>
                        <p class="results-subtitle">Revisa tu puntuación o inténtalo de nuevo.</p>
                    </div>
                    <div class="results-grid">
                        <div class="result-card">
                            <div class="result-label">Puntuación</div>
                            <div class="result-value">${score}</div>
                        </div>
                        <div class="result-card">
                            <div class="result-label">Precisión</div>
                            <div class="result-value">${stats.accuracy}%</div>
                        </div>
                        <div class="result-card">
                            <div class="result-metrics">
                                <div>Correctas <strong>${stats.correct}</strong></div>
                                <div>Incorrectas <strong>${stats.wrong}</strong></div>
                                <div>Omitidas <strong>${stats.skipped}</strong></div>
                            </div>
                        </div>
                    </div>
                    <div class="results-actions">
                        <button id="review-btn" class="btn btn-ghost">Revisar Quiz</button>
                        <button id="retake-btn" class="btn btn-next">Repetir Quiz</button>
                    </div>
                </div>
            `;

            content.classList.add('hidden');
            results.classList.remove('hidden');
            hintBox.classList.add('hidden');
            nav.classList.add('hidden');

            document.getElementById('review-btn').onclick = () => {
                mode = 'review';
                currentIndex = 0;
                renderQuestion();
            };

            document.getElementById('retake-btn').onclick = () => {
                mode = 'quiz';
                currentIndex = 0;
                shuffleQuestions();
                shuffleAnswers();
                resetState();
                renderQuestion();
            };
        }

        document.getElementById('prev-btn').onclick = () => {
            if (mode === 'results') return;
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        };

        document.getElementById('next-btn').onclick = () => {
            if (mode === 'results') return;
            if (mode === 'review') {
                if (currentIndex < quizData.length - 1) {
                    currentIndex++;
                    renderQuestion();
                } else {
                    mode = 'results';
                    renderResults();
                }
                return;
            }
            if (currentIndex < quizData.length - 1) {
                currentIndex++;
                renderQuestion();
            } else {
                mode = 'results';
                renderResults();
            }
        };

        document.getElementById('hint-toggle').onclick = toggleHint;

        renderQuestion();
    </script>
</body>
