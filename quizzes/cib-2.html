    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

        :root {
            --bg: #f6f1e7;
            --bg-deep: #efe4d6;
            --ink: #171717;
            --muted: #5b5b5b;
            --accent: #d3542c;
            --accent-light: #ff8f5a;
            --accent-dark: #b14320;
            --teal: #1f6f78;
            --card: #fff7ef;

            --radius-sm: 10px;
            --radius-md: 12px;
            --radius-lg: 14px;
            --radius-xl: 18px;
            --radius-2xl: 22px;
            --space-1: 6px;
            --space-2: 8px;
            --space-3: 10px;
            --space-4: 12px;
            --space-5: 14px;
            --space-6: 16px;
            --space-7: 18px;
            --space-8: 20px;
            --space-9: 24px;
            --space-10: 32px;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'IBM Plex Sans', sans-serif;
            --error: #b54832;
        }

        body {
            font-family: var(--font-body);
            background:
                radial-gradient(240px 140px at 10% -10%, #ffd2b9 0%, transparent 70%),
                radial-gradient(220px 160px at 90% 0%, #cfe7e6 0%, transparent 65%),
                linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
            color: var(--ink);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            width: 100%;
            max-width: 800px;
            padding: var(--space-10) var(--space-8);
            box-sizing: border-box;
            background: var(--card);
            border-radius: var(--radius-2xl);
            border: 1px solid var(--stroke);
            box-shadow: var(--shadow);
        }

        .progress-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .progress-text {
            color: var(--muted);
            font-size: 0.9em;
        }

        .status-bar {
            display: flex;
            gap: 16px;
            font-size: 0.9em;
            font-weight: 500;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-correct { color: var(--teal); }
        .status-wrong { color: var(--error); }

        .question-text {
            font-family: var(--font-display);
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .options-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-item {
            background-color: #fff;
            border: 1px solid var(--stroke);
            padding: var(--space-4) var(--space-6);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option-item:hover:not(.selected) {
            background-color: var(--card);
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .option-item.selected.correct {
            background-color: rgba(31, 111, 120, 0.12);
            border-color: var(--teal);
        }

        .option-item.selected.incorrect {
            background-color: rgba(181, 72, 50, 0.12);
            border-color: var(--error);
        }

        .option-item.revealed-correct {
            border-color: rgba(31, 111, 120, 0.5);
            box-shadow: inset 0 0 0 1px rgba(31, 111, 120, 0.16);
        }

        .option-label {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .feedback-state {
            font-weight: bold;
            font-size: 0.9em;
            display: none;
        }

        .selected .feedback-state {
            display: block;
        }

        .revealed-correct .feedback-state {
            display: block;
        }

        .correct .feedback-state { color: var(--teal); }
        .incorrect .feedback-state { color: var(--error); }
        .revealed-correct .feedback-state { color: var(--teal); }

        .rationale {
            font-size: 0.95em;
            color: var(--muted);
            margin-top: 4px;
            line-height: 1.5;
            display: none;
        }

        .selected .rationale {
            display: block;
        }

        .revealed-correct .rationale {
            display: block;
        }
        .hint-toggle {
            border: 1px solid var(--stroke);
            color: var(--muted);
            cursor: pointer;
            padding: var(--space-2) var(--space-6);
            border-radius: var(--radius-md);
            background-color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .hint-toggle:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .hint-content {
            margin-top: 32px;
            padding: var(--space-6);
            background-color: #fff;
            border: 1px solid var(--stroke);
            border-radius: var(--radius-lg);
            font-size: 0.95em;
            color: var(--muted);
            display: none;
            align-items: flex-start;
            gap: 16px;
        }

        .hint-content.active {
            display: flex;
        }

        .hint-icon-box {
            color: var(--accent-dark);
            font-size: 1.2em;
            margin-top: -2px;
        }

        .navigation {
            margin-top: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            border-radius: var(--radius-md);
            padding: var(--space-2) var(--space-7);
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-prev {
            background-color: #fff;
            color: var(--ink);
            border-color: var(--stroke);
        }

        .btn-prev:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn-next {
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            color: #fff;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .results-screen {
            display: flex;
            flex-direction: column;
            gap: var(--space-8);
        }

        .results-title {
            font-family: var(--font-display);
            font-size: 2.1em;
            margin: 0;
        }

        .results-subtitle {
            color: var(--muted);
            margin: 0;
            font-size: 1em;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-6);
        }

        .result-card {
            padding: var(--space-6);
            border-radius: var(--radius-xl);
            background: #fff;
            border: 1px solid var(--stroke);
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        .result-label {
            color: var(--muted);
            font-size: 0.95em;
        }

        .result-value {
            font-size: 2em;
            font-family: var(--font-display);
        }

        .result-metrics {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
            color: var(--muted);
            font-size: 0.95em;
        }

        .results-actions {
            display: flex;
            gap: var(--space-4);
            flex-wrap: wrap;
        }

        .btn-ghost {
            background-color: transparent;
            border: 1px solid var(--stroke);
            color: var(--ink);
        }

        .hidden { display: none; }

        @media (max-width: 900px) {
            .quiz-container {
                margin: var(--space-8);
                max-width: 100%;
            }
        }

        @media (max-width: 720px) {
            .quiz-container {
                padding: var(--space-8) var(--space-6);
            }

            .question-text {
                font-size: 1.3em;
            }

            .option-item {
                padding: var(--space-4);
            }
        }

        @media (max-width: 520px) {
            body {
                align-items: flex-start;
            }

            .quiz-container {
                margin: var(--space-6);
                padding: var(--space-7) var(--space-5);
            }

            .progress-container {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-3);
            }

            .navigation {
                flex-direction: column;
                align-items: stretch;
                gap: var(--space-4);
            }

            .nav-buttons {
                width: 100%;
            }

            .btn {
                width: 100%;
            }

            .hint-toggle {
                justify-content: space-between;
            }

            .results-actions {
                flex-direction: column;
            }
        }

    <script>
        const quizData = [{"answerOptions":[{"isCorrect":false,"rationale":"RADIUS utiliza precisamente conexiones UDP en el puerto 1812 por defecto.","text":"RADIUS es incompatible con conexiones UDP, prefiriendo el puerto 1812 sobre TCP."},{"isCorrect":false,"rationale":"Diameter es el protocolo que permite que cada nodo actúe como cliente o servidor en un modelo peer-to-peer.","text":"RADIUS utiliza una arquitectura peer-to-peer mientras que Diameter es puramente cliente-servidor."},{"isCorrect":true,"rationale":"A diferencia de RADIUS, Diameter permite una comunicación bidireccional entre nodos y requiere cifrado de nivel de transporte o red.","text":"Diameter implementa un modelo peer-to-peer y se apoya en IPsec o TLS para su seguridad."},{"isCorrect":false,"rationale":"Diameter está basado en RADIUS pero es una evolución diseñada específicamente para soportar redes modernas e IP móvil.","text":"Diameter es una versión antigua de RADIUS que no soporta aplicaciones de IP móvil."}],"hint":"Piense en la jerarquía de los nodos y en cómo gestionan la seguridad del túnel de autenticación.","question":"¿Cuál es la principal diferencia técnica en la arquitectura de comunicación entre los protocolos RADIUS y Diameter?"},{"answerOptions":[{"isCorrect":true,"rationale":"Esta configuración de doble barrera asegura que un compromiso en la zona pública no otorgue acceso directo a la red corporativa.","text":"La disposición de dos cortafuegos donde uno protege la red interna de la DMZ y otro la DMZ del exterior."},{"isCorrect":false,"rationale":"Depender de un solo dispositivo físico crea un punto único de fallo y debilidad estructural.","text":"El uso de un solo rúter fronterizo que gestiona todas las VLAN mediante software."},{"isCorrect":false,"rationale":"La DMZ es un componente fundamental de las arquitecturas perimetrales para servicios públicos.","text":"La eliminación total de la DMZ para evitar puntos de exposición externa."},{"isCorrect":false,"rationale":"La arquitectura de subred se refiere a la topología de red y dispositivos de filtrado, no solo a la protección de endpoints.","text":"La integración de antivirus en tiempo real exclusivamente en los dispositivos finales."}],"hint":"Reflexione sobre el número de barreras físicas o lógicas necesarias para aislar completamente los datos críticos.","question":"En el contexto de la seguridad perimetral, ¿qué caracteriza a una 'arquitectura fuerte de subred protegida'?"},{"answerOptions":[{"isCorrect":false,"rationale":"La versión gratuita también incluye capacidades de escaneo que podrían comprometer la disponibilidad del servicio.","text":"Utilizar la versión gratuita de Nessus, ya que no incluye scripts de explotación."},{"isCorrect":false,"rationale":"NMAP identifica puertos, pero no previene por sí solo que los exploits de Nessus afecten la estabilidad del servicio.","text":"Ejecutar el escaneo exclusivamente mediante la herramienta NMAP integrada."},{"isCorrect":false,"rationale":"Aunque es una buena práctica, la configuración específica dentro de la herramienta es el modo 'unsafe test'.","text":"Realizar el escaneo únicamente sobre máquinas virtuales en modo espejo."},{"isCorrect":true,"rationale":"El modo unsafe intenta explotar vulnerabilidades de forma agresiva, lo que puede provocar denegación de servicio en sistemas inestables.","text":"Activar el modo 'safe check' o desactivar el modo 'unsafe test' antes de iniciar el proceso."}],"hint":"La herramienta permite elegir entre una auditoría de configuración pasiva o una prueba de explotación activa.","question":"Al realizar un escaneo con Nessus, ¿qué precaución técnica se recomienda para evitar que los servicios del servidor objetivo se corrompan o caigan?"},{"answerOptions":[{"isCorrect":true,"rationale":"SSTP utiliza HTTPS (puerto 443), lo que facilita el paso por firewalls, pero es un protocolo propietario de Microsoft con soporte limitado en otros sistemas.","text":"SSTP"},{"isCorrect":false,"rationale":"IKEv2 es valorado por su velocidad y cifrado, pero no utiliza túneles HTTPS estándar para evadir firewalls de forma nativa como otros.","text":"IKEv2"},{"isCorrect":false,"rationale":"OpenVPN es altamente compatible con casi todos los sistemas operativos, a diferencia del protocolo descrito.","text":"OpenVPN"},{"isCorrect":false,"rationale":"Este protocolo es propenso a ser bloqueado por firewalls que no permiten el tráfico de protocolos de túnel específicos.","text":"L2TP/IPsec"}],"hint":"Este protocolo suele estar integrado nativamente en el ecosistema de Microsoft y utiliza el puerto 443.","question":"¿Qué protocolo de acceso remoto VPN destaca por evitar los cortafuegos mediante el uso de protocolos web estándar, pero presenta dificultades de compatibilidad fuera de Windows?"},{"answerOptions":[{"isCorrect":false,"rationale":"La recopilación de información o reconocimiento es una de las fases iniciales, previa al análisis.","text":"Recopilación de información"},{"isCorrect":false,"rationale":"El informe es la fase final del ciclo de vida del test de intrusión.","text":"Elaboración del informe"},{"isCorrect":true,"rationale":"Una vez identificadas las debilidades en la fase de análisis, el pentester intenta validar su impacto real mediante la explotación.","text":"Explotación"},{"isCorrect":false,"rationale":"La escalada de privilegios ocurre después de haber logrado el acceso inicial mediante la explotación exitosa.","text":"Escalada de privilegios"}],"hint":"Es el momento en el que se intenta confirmar si la vulnerabilidad teórica puede ser aprovechada realmente.","question":"Dentro de las fases de un test de intrusión (pentesting), ¿cuál es el paso inmediatamente posterior al análisis de vulnerabilidades?"},{"answerOptions":[{"isCorrect":false,"rationale":"Nikto es un escáner ligero y automático, no está diseñado para la interceptación y modificación manual de paquetes.","text":"Nikto"},{"isCorrect":true,"rationale":"Funciona como un proxy que permite al auditor ver, retener y alterar los datos que viajan entre el navegador y el servidor.","text":"Burp Suite"},{"isCorrect":false,"rationale":"Wireshark analiza el tráfico de red a nivel de protocolos, pero no está optimizado para modificar peticiones web en tiempo real como un proxy.","text":"Wireshark"},{"isCorrect":false,"rationale":"SQLMap se especializa en la automatización de la detección y explotación de inyecciones SQL.","text":"SQLMap"}],"hint":"Esta herramienta actúa como un 'intermediario' (proxy) entre el cliente y la aplicación web.","question":"¿Qué herramienta de seguridad web es fundamental para interceptar y modificar peticiones HTTP/HTTPS de forma manual durante una auditoría?"},{"answerOptions":[{"isCorrect":false,"rationale":"El comando especifica 'incoming', afectando solo al tráfico que intenta entrar al sistema.","text":"Denegar todas las conexiones que el servidor intente establecer hacia internet."},{"isCorrect":true,"rationale":"Es una práctica de bastionado esencial para cerrar todos los puertos excepto aquellos que se autoricen explícitamente después.","text":"Establecer una política de seguridad de 'denegación por defecto' para todo el tráfico entrante."},{"isCorrect":false,"rationale":"El comando 'disable' apagaría el firewall; 'default deny' lo mantiene activo pero restrictivo.","text":"Desactivar el firewall para permitir el mantenimiento del sistema."},{"isCorrect":false,"rationale":"Para borrar reglas se utilizarían comandos de reset o delete, no la definición de una política por defecto.","text":"Borrar todas las reglas de filtrado existentes en el cortafuegos."}],"hint":"Es la base del principio de mínimo privilegio aplicado a las comunicaciones de red.","question":"En el bastionado de un sistema operativo Linux, ¿cuál es el propósito de ejecutar el comando 'sudo ufw default deny incoming'?"},{"answerOptions":[{"isCorrect":true,"rationale":"No se puede proteger lo que no se conoce; la CMDB permite mapear los activos para evaluar su nivel de riesgo.","text":"Servir como un inventario actualizado de todos los activos tecnológicos de la organización."},{"isCorrect":false,"rationale":"El filtrado de tráfico es competencia de los firewalls e IPS, no de una base de datos de configuración.","text":"Bloquear el tráfico de red basado en la reputación de la dirección IP."},{"isCorrect":false,"rationale":"La CMDB provee los datos, pero no es la herramienta que realiza el análisis de riesgos o informes normativos por sí sola.","text":"Generar informes de cumplimiento basados exclusivamente en el estándar ISO 27005."},{"isCorrect":false,"rationale":"Esa es la función de herramientas como SQLMap o escáneres de aplicaciones web.","text":"Detectar automáticamente inyecciones de código en aplicaciones web."}],"hint":"Se trata de una herramienta de gestión que centraliza la información sobre el hardware y software existente.","question":"¿Cuál es la función principal de una CMDB (Configuration Management Database) en la fase de identificación de riesgos?"},{"answerOptions":[{"isCorrect":true,"rationale":"Esta separación permite una gestión más granular y segura de los accesos a los dispositivos de comunicaciones.","text":"TACACS+ separa los servicios de autenticación, autorización y registro de forma independiente."},{"isCorrect":false,"rationale":"La documentación no especifica un cambio de protocolo de transporte, sino de la estructura de servicios.","text":"TACACS+ utiliza UDP mientras que el original usaba TCP."},{"isCorrect":false,"rationale":"TACACS es históricamente asociado a Cisco, mientras que LDAP fue el mencionado para Windows Server 2008.","text":"TACACS+ fue desarrollado por Microsoft para Windows Server 2008."},{"isCorrect":false,"rationale":"El material indica explícitamente que TACACS+ es un protocolo nuevo e incompatible con la versión anterior.","text":"TACACS+ es una actualización compatible hacia atrás que permite usar los mismos servidores antiguos."}],"hint":"Considere la modularidad de los servicios AAA (Autenticación, Autorización y Auditoría) en la nueva versión.","question":"¿Qué diferencia al protocolo TACACS+ de su predecesor TACACS según la documentación técnica proporcionada?"},{"answerOptions":[{"isCorrect":false,"rationale":"Aunque es importante para el negocio, la razón crítica de seguridad y ética es la legitimidad legal de la acción.","text":"Para asegurar que el pentester reciba el pago acordado al finalizar el informe."},{"isCorrect":true,"rationale":"Sin un acuerdo explícito que defina qué sistemas se pueden tocar, la actividad podría considerarse hacking ilegal independientemente de la intención.","text":"Porque define el marco legal, el alcance y protege al auditor de posibles repercusiones penales por acceso no autorizado."},{"isCorrect":false,"rationale":"La autorización no afecta el comportamiento técnico de las defensas automáticas, que deben ser probadas en su estado real.","text":"Para garantizar que el antivirus del cliente no bloquee las herramientas de ataque."},{"isCorrect":false,"rationale":"Un test de intrusión debe realizarse, por lo general, contra las defensas activas para ser una prueba realista.","text":"Para que los empleados de la empresa sepan que deben apagar los cortafuegos durante la prueba."}],"hint":"Piense en la delgada línea legal que separa a un profesional de seguridad de un atacante malintencionado.","question":"En el contexto de hacking ético, ¿por qué es crítico obtener una 'autorización formal y por escrito' antes de iniciar un test de intrusión?"},{"answerOptions":[{"isCorrect":false,"rationale":"La interfaz de gestión es una preferencia de administración, no un factor de rendimiento del túnel VPN.","text":"La inclusión de una interfaz de configuración basada en comandos (CLI) en lugar de web."},{"isCorrect":true,"rationale":"El cifrado y encapsulación de datos VPN requieren recursos de CPU significativos que afectan directamente la velocidad de navegación de los usuarios remotos.","text":"La velocidad del servicio sión.","text":"No haber pagado la licencia profesional de Burp Suite."},{"isCorrect":true,"rationale":"Realizar pruebas de penetración en entornos reales sin permiso es una actividad ilegal, independientemente de la intención de ayudar.","text":"Aplicar sus conocimientos técnicos sin tener una autorización formal de la institución."},{"isCorrect":false,"rationale":"Documentar fallos es una parte esencial del hacking ético; el error radica en la falta de autorización previa.","text":"Documentar los fallos encontrados en un informe técnico."}],"hint":"La ética en ciberseguridad se basa en el consentimiento explícito del propietario del sistema.","question":"De acuerdo con los casos prácticos presentados, ¿cuál es un error ético crítico que cometió el alumno Diego al probar la seguridad de su residencia?"}];
        let currentIndex = 0;
        let mode = 'quiz';
        let state = quizData.map(() => ({ selectedIndex: null, hintVisible: false }));

        function getStats() {
            const answered = state.filter((s) => s.selectedIndex !== null).length;
            const correct = state.filter((s, i) => s.selectedIndex !== null && quizData[i].answerOptions[s.selectedIndex].isCorrect).length;
            const wrong = state.filter((s, i) => s.selectedIndex !== null && !quizData[i].answerOptions[s.selectedIndex].isCorrect).length;
            const skipped = quizData.length - answered;
            const accuracy = answered > 0 ? Math.round((correct / answered) * 100) : 0;
            return { answered, correct, wrong, skipped, accuracy };
        }

        function shuffleAnswers() {
            quizData.forEach((q) => {
                for (let i = q.answerOptions.length - 1; i > 0; i -= 1) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [q.answerOptions[i], q.answerOptions[j]] = [q.answerOptions[j], q.answerOptions[i]];
                }
            });
        }

        function shuffleQuestions() {
            for (let i = quizData.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
            }
        }

        function resetState() {
            state = quizData.map(() => ({ selectedIndex: null, hintVisible: false }));
        }


        function fmt(str) {
          if (!str) return str;
          return str
            .replace(/\.*?)\\/gs, '$1')
            .replace(/\([^]+?)\/g, '1')
            .replace(/\\\((.*?)\\/gs, '$1')
            .replace(/\\(.*?)\\/gs, '$1')
            .replace(/\<em>\</em>(.<em>?)\</em>\*/g, '<strong>$1</strong>')
            .replace(/\<em>(.</em>?)\*/g, '<em>$1</em>')
            .replace(/<code>(.*?)</code>/g, '<code>$1</code>');
        }
        function renderQuestion() {
            const q = quizData[currentIndex];
            const s = state[currentIndex];
            const content = document.getElementById('quiz-content');
            const results = document.getElementById('results-content');
            const hintBox = document.getElementById('hint-box');
            const nav = document.querySelector('.navigation');
            const nextBtn = document.getElementById('next-btn');
            const prevBtn = document.getElementById('prev-btn');

            let optionsHtml = '';
            const correctIndex = q.answerOptions.findIndex((o) => o.isCorrect);
            const selectedCorrect = s.selectedIndex !== null && q.answerOptions[s.selectedIndex].isCorrect;
            q.answerOptions.forEach((opt, idx) => {
                const isSelected = s.selectedIndex === idx;
                const statusClass = isSelected ? (opt.isCorrect ? 'correct' : 'incorrect') : '';
                const selectedClass = isSelected ? 'selected' : '';
                const revealCorrect = (s.selectedIndex !== null && !selectedCorrect && opt.isCorrect) || (mode === 'review' && opt.isCorrect);
                const revealClass = revealCorrect ? 'revealed-correct' : '';

                optionsHtml += `
                    <li class="option-item {selectedClass} {statusClass} {revealClass}" onclick="selectOption({idx})">
                        <div class="option-label">
                            <span>{String.fromCharCode(65 + idx)}. {opt.text}</span>
                        </div>
                        <div class="feedback-state">
                            ${opt.isCorrect ? '✓ Correcto' : '✕ Incorrecto'}
                        </div>
                        ${opt.rationale ? '<div class="rationale">' + opt.rationale + '</div>' : ''}
                    </li>
                `;
            });

            const stats = getStats();

            content.innerHTML = `
                <div class="progress-container">
                    <div class="progress-text">{currentIndex + 1} / {quizData.length}</div>
                    <div class="status-bar">
                        <div class="status-item status-correct">
                            <span>✓</span>
                            <span>${stats.correct}</span>
                        </div>
                        <div class="status-item status-wrong">
                            <span>✕</span>
                            <span>${stats.wrong}</span>
                        </div>
                    </div>
                </div>
                <div class="question-text">${fmt(q.question)}</div>
                <ul class="options-list">
                    ${optionsHtml}
                </ul>
            `;

            // Update Pista Box
            const hintText = document.getElementById('hint-text');
            hintText.innerText = fmt(q.hint) || 'No hay pista disponible para esta pregunta.';
            if (s.hintVisible) {
                hintBox.classList.add('active');
            } else {
                hintBox.classList.remove('active');
            }

            results.classList.add('hidden');
            content.classList.remove('hidden');
            hintBox.classList.remove('hidden');
            nav.classList.remove('hidden');

            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = false;
            if (mode === 'review') {
                nextBtn.innerText = currentIndex === quizData.length - 1 ? 'Volver a resultados' : 'Siguiente';
            } else {
                nextBtn.innerText = currentIndex === quizData.length - 1 ? 'Finalizar' : 'Siguiente';
            }
            document.getElementById('hint-icon-arrow').innerText = s.hintVisible ? '▲' : '▼';
        }

        function selectOption(idx) {
            if (mode !== 'quiz') return;
            if (state[currentIndex].selectedIndex !== null) return; // Prevent re-selection
            state[currentIndex].selectedIndex = idx;
            renderQuestion();
        }

        function toggleHint() {
            if (mode === 'results') return;
            state[currentIndex].hintVisible = !state[currentIndex].hintVisible;
            renderQuestion();
        }

        function renderResults() {
            const stats = getStats();
            const content = document.getElementById('quiz-content');
            const results = document.getElementById('results-content');
            const hintBox = document.getElementById('hint-box');
            const nav = document.querySelector('.navigation');

            const score = <code>{stats.correct} / {quizData.length}</code>;

            results.innerHTML = `
                <div class="results-screen">
                    <div>
                        <h1 class="results-title">¡Lo lograste! Quiz completado.</h1>
                        <p class="results-subtitle">Revisa tu puntuación o inténtalo de nuevo.</p>
                    </div>
                    <div class="results-grid">
                        <div class="result-card">
                            <div class="result-label">Puntuación</div>
                            <div class="result-value">${score}</div>
                        </div>
                        <div class="result-card">
                            <div class="result-label">Precisión</div>
                            <div class="result-value">${stats.accuracy}%</div>
                        </div>
                        <div class="result-card">
                            <div class="result-metrics">
                                <div>Correctas <strong>${stats.correct}</strong></div>
                                <div>Incorrectas <strong>${stats.wrong}</strong></div>
                                <div>Omitidas <strong>${stats.skipped}</strong></div>
                            </div>
                        </div>
                    </div>
                    <div class="results-actions">
                        <button id="review-btn" class="btn btn-ghost">Revisar Quiz</button>
                        <button id="retake-btn" class="btn btn-next">Repetir Quiz</button>
                    </div>
                </div>
            `;

            content.classList.add('hidden');
            results.classList.remove('hidden');
            hintBox.classList.add('hidden');
            nav.classList.add('hidden');

            document.getElementById('review-btn').onclick = () => {
                mode = 'review';
                currentIndex = 0;
                renderQuestion();
            };

            document.getElementById('retake-btn').onclick = () => {
                mode = 'quiz';
                currentIndex = 0;
                shuffleQuestions();
                shuffleAnswers();
                resetState();
                renderQuestion();
            };
        }

        document.getElementById('prev-btn').onclick = () => {
            if (mode === 'results') return;
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        };

        document.getElementById('next-btn').onclick = () => {
            if (mode === 'results') return;
            if (mode === 'review') {
                if (currentIndex < quizData.length - 1) {
                    currentIndex++;
                    renderQuestion();
                } else {
                    mode = 'results';
                    renderResults();
                }
                return;
            }
            if (currentIndex < quizData.length - 1) {
                currentIndex++;
                renderQuestion();
            } else {
                mode = 'results';
                renderResults();
            }
        };

        document.getElementById('hint-toggle').onclick = toggleHint;

        renderQuestion();
    </script>

  <button id="theme-toggle" title="Cambiar tema" style="position:fixed;top:8px;right:8px;background:var(--card);border:1px solid var(--stroke);border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,0.1);transition:transform 0.2s ease;z-index:100;">🌙</button>
  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.getElementById('theme-toggle').textContent = '☀️';
      }
      document.getElementById('theme-toggle').addEventListener('click', function() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
        this.textContent = isDark ? '🌙' : '☀️';
      });
    })();
  </script>
</body>
