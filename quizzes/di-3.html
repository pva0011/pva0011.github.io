<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotebookLM - Quiz Export</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

        :root {
            --bg: #f6f1e7;
            --bg-deep: #efe4d6;
            --ink: #171717;
            --muted: #5b5b5b;
            --accent: #d3542c;
            --accent-light: #ff8f5a;
            --accent-dark: #b14320;
            --teal: #1f6f78;
            --card: #fff7ef;
            --stroke: #e3d6c5;
            --shadow: 0 18px 40px rgba(23, 23, 23, 0.12);
            --radius-sm: 10px;
            --radius-md: 12px;
            --radius-lg: 14px;
            --radius-xl: 18px;
            --radius-2xl: 22px;
            --space-1: 6px;
            --space-2: 8px;
            --space-3: 10px;
            --space-4: 12px;
            --space-5: 14px;
            --space-6: 16px;
            --space-7: 18px;
            --space-8: 20px;
            --space-9: 24px;
            --space-10: 32px;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'IBM Plex Sans', sans-serif;
            --error: #b54832;
        }

        body {
            font-family: var(--font-body);
            background:
                radial-gradient(240px 140px at 10% -10%, #ffd2b9 0%, transparent 70%),
                radial-gradient(220px 160px at 90% 0%, #cfe7e6 0%, transparent 65%),
                linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
            color: var(--ink);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            width: 100%;
            max-width: 800px;
            padding: var(--space-10) var(--space-8);
            box-sizing: border-box;
            background: var(--card);
            border-radius: var(--radius-2xl);
            border: 1px solid var(--stroke);
            box-shadow: var(--shadow);
        }

        .progress-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .progress-text {
            color: var(--muted);
            font-size: 0.9em;
        }

        .status-bar {
            display: flex;
            gap: 16px;
            font-size: 0.9em;
            font-weight: 500;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-correct { color: var(--teal); }
        .status-wrong { color: var(--error); }

        .question-text {
            font-family: var(--font-display);
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .options-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-item {
            background-color: #fff;
            border: 1px solid var(--stroke);
            padding: var(--space-4) var(--space-6);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option-item:hover:not(.selected) {
            background-color: var(--card);
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .option-item.selected.correct {
            background-color: rgba(31, 111, 120, 0.12);
            border-color: var(--teal);
        }

        .option-item.selected.incorrect {
            background-color: rgba(181, 72, 50, 0.12);
            border-color: var(--error);
        }

        .option-item.revealed-correct {
            border-color: rgba(31, 111, 120, 0.5);
            box-shadow: inset 0 0 0 1px rgba(31, 111, 120, 0.16);
        }

        .option-label {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .feedback-state {
            font-weight: bold;
            font-size: 0.9em;
            display: none;
        }

        .selected .feedback-state {
            display: block;
        }

        .revealed-correct .feedback-state {
            display: block;
        }

        .correct .feedback-state { color: var(--teal); }
        .incorrect .feedback-state { color: var(--error); }
        .revealed-correct .feedback-state { color: var(--teal); }

        .rationale {
            font-size: 0.95em;
            color: var(--muted);
            margin-top: 4px;
            line-height: 1.5;
            display: none;
        }

        .selected .rationale {
            display: block;
        }

        .revealed-correct .rationale {
            display: block;
        }
        .hint-toggle {
            border: 1px solid var(--stroke);
            color: var(--muted);
            cursor: pointer;
            padding: var(--space-2) var(--space-6);
            border-radius: var(--radius-md);
            background-color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .hint-toggle:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .hint-content {
            margin-top: 32px;
            padding: var(--space-6);
            background-color: #fff;
            border: 1px solid var(--stroke);
            border-radius: var(--radius-lg);
            font-size: 0.95em;
            color: var(--muted);
            display: none;
            align-items: flex-start;
            gap: 16px;
        }

        .hint-content.active {
            display: flex;
        }

        .hint-icon-box {
            color: var(--accent-dark);
            font-size: 1.2em;
            margin-top: -2px;
        }

        .navigation {
            margin-top: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            border-radius: var(--radius-md);
            padding: var(--space-2) var(--space-7);
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-prev {
            background-color: #fff;
            color: var(--ink);
            border-color: var(--stroke);
        }

        .btn-prev:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn-next {
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            color: #fff;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .results-screen {
            display: flex;
            flex-direction: column;
            gap: var(--space-8);
        }

        .results-title {
            font-family: var(--font-display);
            font-size: 2.1em;
            margin: 0;
        }

        .results-subtitle {
            color: var(--muted);
            margin: 0;
            font-size: 1em;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-6);
        }

        .result-card {
            padding: var(--space-6);
            border-radius: var(--radius-xl);
            background: #fff;
            border: 1px solid var(--stroke);
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        .result-label {
            color: var(--muted);
            font-size: 0.95em;
        }

        .result-value {
            font-size: 2em;
            font-family: var(--font-display);
        }

        .result-metrics {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
            color: var(--muted);
            font-size: 0.95em;
        }

        .results-actions {
            display: flex;
            gap: var(--space-4);
            flex-wrap: wrap;
        }

        .btn-ghost {
            background-color: transparent;
            border: 1px solid var(--stroke);
            color: var(--ink);
        }

        .hidden { display: none; }

        @media (max-width: 900px) {
            .quiz-container {
                margin: var(--space-8);
                max-width: 100%;
            }
        }

        @media (max-width: 720px) {
            .quiz-container {
                padding: var(--space-8) var(--space-6);
            }

            .question-text {
                font-size: 1.3em;
            }

            .option-item {
                padding: var(--space-4);
            }
        }

        @media (max-width: 520px) {
            body {
                align-items: flex-start;
            }

            .quiz-container {
                margin: var(--space-6);
                padding: var(--space-7) var(--space-5);
            }

            .progress-container {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-3);
            }

            .navigation {
                flex-direction: column;
                align-items: stretch;
                gap: var(--space-4);
            }

            .nav-buttons {
                width: 100%;
            }

            .btn {
                width: 100%;
            }

            .hint-toggle {
                justify-content: space-between;
            }

            .results-actions {
                flex-direction: column;
            }
        }
    
    [data-theme="dark"] {
      --bg: #1a1612;
      --bg-deep: #141210;
      --ink: #f0ebe0;
      --muted: #9a9080;
      --accent: #e8673a;
      --accent-light: #ff9a6a;
      --accent-dark: #c45528;
      --teal: #2a9aa8;
      --card: #221e18;
      --stroke: #3a3028;
      --shadow: 0 18px 40px rgba(0,0,0,0.4);
      --error: #e06050;
    }
    [data-theme="dark"] body {
      background:
        radial-gradient(240px 140px at 10% -10%, #3a1a08 0%, transparent 70%),
        radial-gradient(220px 160px at 90% 0%, #0a2a2e 0%, transparent 65%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
    }
    [data-theme="dark"] .option-item { background-color: var(--card); }
    [data-theme="dark"] .hint-toggle,
    [data-theme="dark"] .hint-content,
    [data-theme="dark"] .btn-prev { background-color: var(--card); color: var(--ink); }
    [data-theme="dark"] .result-card { background: var(--card); }
    [data-theme="dark"] .btn-next {
      background: linear-gradient(90deg, #e8673a, #f28c5e);
      box-shadow: 0 4px 20px rgba(232, 103, 58, 0.35);
      color: #fff;
    }
    [data-theme="dark"] .btn-next:hover:not(:disabled) {
      box-shadow: 0 6px 24px rgba(232, 103, 58, 0.5);
    }
    
    /* quiz-mobile-v3 */
    @media (max-width: 640px) {
      body {
        height: 100dvh;
        overflow: hidden;
        align-items: flex-start;
        padding: 0;
      }
      .quiz-container {
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        margin: 0;
        border-radius: 0;
        border-left: none;
        border-right: none;
        border-top: none;
        padding-bottom: 0;
      }
      #quiz-content,
      #results-content {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        min-height: 0;
        padding-bottom: 8px;
      }
      #hint-box { flex-shrink: 0; }
      .navigation {
        flex-shrink: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        margin-top: 0;
        background: var(--card);
        border-top: 1px solid var(--stroke);
      }
    }
    </style>
</head>
<body>
    <div class="quiz-container">

    <div class="quiz-heading" style="margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--stroke)">
      <a href="../index.html" style="font-size:0.82em;color:var(--muted);text-decoration:none;font-family:var(--font-body)">← Índice</a>
      <h1 style="font-family:var(--font-display);font-size:1.1em;font-weight:700;color:var(--ink);margin-top:8px;padding-right:44px">Desarrollo de Interfaces · Quiz 3</h1>
    </div>
        <div id="quiz-content">
            <!-- Dynamic Content -->
        </div>
        <div id="results-content" class="hidden"></div>

        <div id="hint-box" class="hint-content">
            <div class="hint-icon-box">💡</div>
            <div id="hint-text"></div>
        </div>

        <div class="navigation">
            <button id="hint-toggle" class="hint-toggle">
                <span>Pista</span>
                <span id="hint-icon-arrow">▼</span>
            </button>
            <div class="nav-buttons">
                <button id="prev-btn" class="btn btn-prev">Anterior</button>
                <button id="next-btn" class="btn btn-next">Siguiente</button>
            </div>
        </div>
    </div>

    <script>
        let quizData = [{"answerOptions":[{"isCorrect":true,"rationale":"La especificidad y brevedad de una guía de referencia es suficiente para cubrir la totalidad de una herramienta con funcionalidades limitadas.","text":"En aplicaciones muy sencillas donde los procedimientos son directos y concretos."},{"isCorrect":false,"rationale":"En aplicaciones complejas, la guía de referencia es solo un complemento del manual de usuario, no un sustituto.","text":"Cuando la aplicación es extremadamente compleja y requiere fragmentación."},{"isCorrect":false,"rationale":"Incluso para expertos, la complejidad de la aplicación dicta la necesidad de manuales más extensos que una simple guía.","text":"Cuando el perfil del usuario es exclusivamente de diseño o soporte técnico."},{"isCorrect":false,"rationale":"El soporte no determina si la guía puede actuar como manual único.","text":"Solo cuando se incluye en formato físico y digital simultáneamente."}],"hint":"Piense en la relación entre la complejidad del software y el detalle de la documentación necesaria.","question":"De acuerdo con las pautas de diseño, ¿cuándo se considera que una guía de referencia puede constituir por sí misma un manual completo?"},{"answerOptions":[{"isCorrect":true,"rationale":"La gravedad controla la alineación (centrado, arriba, derecha, etc.) del elemento respecto al espacio que le otorga su padre.","text":"Determina la posición en la que debe situarse un elemento dentro de su contenedor."},{"isCorrect":false,"rationale":"La 'gravedad' en layouts no tiene relación con la física de procesamiento de hardware.","text":"Determina el peso del componente para la aceleración de hardware."},{"isCorrect":false,"rationale":"Esa es la función de los márgenes o posiciones específicas en RelativeLayout, no de la gravedad.","text":"Establece la distancia absoluta en píxeles respecto al borde superior."},{"isCorrect":false,"rationale":"El orden de navegación se gestiona mediante otros atributos de enfoque, no mediante el layout_gravity.","text":"Define el orden de tabulación para la navegación por teclado."}],"hint":"Piense en cómo se 'alinea' un objeto dentro de una caja más grande.","question":"¿Cuál es la función del atributo android:layout_gravity en un componente de interfaz Android?"},{"answerOptions":[{"isCorrect":true,"rationale":"Es el componente estándar en Android para representar listas desplegables y se encuentra en la carpeta Containers.","text":"Spinner."},{"isCorrect":false,"rationale":"Se usa para selección múltiple de opciones visibles, no para desplegables.","text":"CheckBox."},{"isCorrect":false,"rationale":"Este componente es un conmutador de dos estados.","text":"ToggleButton."},{"isCorrect":false,"rationale":"Su función principal es la entrada de texto por parte del usuario.","text":"TextField."}],"hint":"Piense en el término en inglés para algo que 'gira' o 'despliega' opciones.","question":"¿Qué elemento de la paleta de Android permite implementar un menú desplegable?"},{"answerOptions":[{"isCorrect":false,"rationale":"Solo define el ancho del elemento, no la lógica de apilamiento del contenedor.","text":"android:layout_width"},{"isCorrect":false,"rationale":"Este atributo controla la posición dentro del espacio asignado, no la dirección del layout.","text":"android:layout_gravity"},{"isCorrect":false,"rationale":"Define la separación entre elementos o bordes, no la dirección del flujo.","text":"android:layout_margin"},{"isCorrect":true,"rationale":"Aunque no se detalla el nombre exacto en el texto del extracto, se menciona que el layout permite alinear en dirección vertical u horizontal.","text":"android:orientation"}],"hint":"Piense en el concepto de 'rumbo' o 'sentido' que toman los componentes al ser añadidos.","question":"Al utilizar un LinearLayout en Android, ¿qué atributo define si los elementos se apilan uno al lado del otro o uno debajo del otro?"},{"answerOptions":[{"isCorrect":false,"rationale":"Los ficheros .gid eran característicos del formato HLP, no del estándar CHM.","text":"Requieren obligatoriamente ficheros .gid para almacenar información extra."},{"isCorrect":false,"rationale":"La fusión de ficheros es una característica técnica que también estaba presente en otros formatos mediante herramientas de compilación.","text":"Son los únicos que permiten fusionar varios ficheros de ayuda en uno solo."},{"isCorrect":true,"rationale":"El formato CHM (Compiled HTML Help) sustituyó al formato basado en RTF para aprovechar las capacidades del lenguaje web.","text":"Utilizan HTML para generar el contenido de la ayuda."},{"isCorrect":false,"rationale":"CHM se basa en estándares web como HTML, no en lenguajes de programación de bajo nivel para su contenido.","text":"Utilizan un lenguaje propietario similar a C++ para la visualización."}],"hint":"Considere el cambio de tecnología de documentos enriquecidos (RTF) hacia estándares web.","question":"En el contexto de los formatos de ayuda, ¿qué caracteriza a los ficheros de tipo CHM frente a los antiguos HLP?"},{"answerOptions":[{"isCorrect":false,"rationale":"La velocidad de procesamiento es una métrica técnica evaluada en las pruebas de rendimiento, no en las de usuario.","text":"La velocidad a la que el compilador procesa las solicitudes del usuario."},{"isCorrect":false,"rationale":"La sintaxis interna es competencia de las pruebas de caja blanca realizadas por desarrolladores.","text":"La correcta sintaxis de las funciones internas del algoritmo de autenticación."},{"isCorrect":true,"rationale":"La observación directa permite identificar problemas de usabilidad e intuición que los expertos podrían pasar por alto.","text":"La forma de interacción de los usuarios reales con el producto objeto del test."},{"isCorrect":false,"rationale":"Esto corresponde a pruebas de seguridad y de volumen, fuera del ámbito del DCU.","text":"La integridad de los datos almacenados en el servidor tras un acceso masivo."}],"hint":"Focalícese en el comportamiento humano frente a la interfaz gráfica.","question":"De acuerdo con el Diseño Centrado en el Usuario (DCU), ¿qué aspecto es vital observar durante un test de usuario?"},{"answerOptions":[{"isCorrect":false,"rationale":"Ambos formatos requieren generalmente un proceso de extracción antes de que el software pueda ejecutarse o instalarse.","text":"TAR permite la instalación directa sin extracción previa, a diferencia de TGZ."},{"isCorrect":true,"rationale":"TAR solo agrupa archivos; TGZ aplica un algoritmo de reducción de tamaño sobre el paquete resultante.","text":"TAR es un formato sin compresión, mientras que TGZ está comprimido con gunzip."},{"isCorrect":false,"rationale":"Ambos formatos son comunes en sistemas tipo Unix/Linux para la distribución de fuentes y binarios.","text":"TGZ es exclusivo para sistemas Windows y TAR para sistemas basados en Debian."},{"isCorrect":false,"rationale":"Ni TAR ni TGZ son gestores de paquetes con resolución de dependencias automática; son formatos de archivado.","text":"TGZ utiliza un sistema de gestión de paquetes con base de datos, similar a RPM."}],"hint":"Piense en el proceso de reducción de espacio en disco frente a la simple agrupación de archivos.","question":"En el empaquetado de aplicaciones, ¿cuál es la diferencia técnica entre un archivo TAR y un archivo TGZ?"},{"answerOptions":[{"isCorrect":false,"rationale":"Esto corresponde a una medición base de rendimiento, no a una prueba de volumen de datos.","text":"Evaluación del tiempo de respuesta del sistema en condiciones de uso mínimo."},{"isCorrect":true,"rationale":"Las pruebas de volumen se centran específicamente en el manejo de bases de datos o archivos masivos para verificar la estabilidad.","text":"Evaluación de la capacidad de procesamiento ante la llegada de una cantidad grande de datos."},{"isCorrect":false,"rationale":"La respuesta ante un incremento de peticiones (usuarios) se clasifica como prueba de capacidad o carga.","text":"Evaluación de la velocidad de procesamiento ante una sobrecarga de peticiones de red."},{"isCorrect":false,"rationale":"Esto es característico de las pruebas de estrés, que buscan el punto de ruptura y recuperación del software.","text":"Evaluación de la capacidad de recuperación del sistema tras un fallo crítico del servidor."}],"hint":"Diferencie entre la cantidad de usuarios (carga) y la cantidad de información procesada.","question":"¿Qué característica define a las pruebas de 'volumen' dentro de una estrategia de evaluación?"},{"answerOptions":[{"isCorrect":true,"rationale":"Detectar un fallo cuando el usuario ya tiene la app obliga a repetir ciclos completos de diseño, implementación y despliegue, encareciendo el proyecto.","text":"El coste de solucionar los errores en producción es exponencialmente mayor que en fases tempranas."},{"isCorrect":false,"rationale":"La versión beta ocurre precisamente antes de la producción definitiva para asegurar la calidad final.","text":"Es imposible crear una versión beta si no se ha pasado por la fase de producción primero."},{"isCorrect":false,"rationale":"La certificación digital depende de la identidad del autor, no de la calidad o ausencia de fases de prueba.","text":"La aplicación perderá automáticamente su certificado de firma digital de la FNMT."},{"isCorrect":false,"rationale":"El compilador es una herramienta técnica que no tiene consciencia de la metodología de trabajo del equipo.","text":"El compilador de Java dejará de funcionar permanentemente si detecta que no se han hecho pruebas."}],"hint":"Considere el impacto económico de descubrir fallos cuando el producto ya está en manos del cliente.","question":"¿Cuál es el principal inconveniente de omitir la fase de evaluación en el desarrollo de un proyecto de software?"},{"answerOptions":[{"isCorrect":true,"rationale":"Esta zona está dedicada a la gestión de archivos del proyecto y a herramientas de diagnóstico y seguimiento del estado del código.","text":"El acceso a repositorios, buscador, advertencias y puntos de ruptura (breakpoints)."},{"isCorrect":false,"rationale":"La configuración de atributos suele encontrarse en el inspector de atributos, generalmente situado en la zona derecha.","text":"La configuración de los colores del sistema y el modo día/noche."},{"isCorrect":false,"rationale":"El diseño visual se realiza en la zona central o mediante el Storyboard/SwiftUI Preview en el área principal de trabajo.","text":"El lienzo de diseño visual donde se arrastran los botones y etiquetas."},{"isCorrect":false,"rationale":"Estos controles se ubican en la barra de herramientas superior de Xcode, junto al selector de dispositivo.","text":"Los botones de ejecución y parada de la aplicación simulada."}],"hint":"Esta área se conoce a menudo como el Navegador del Proyecto y contiene diversas pestañas de utilidad estructural.","question":"En el entorno Xcode para iOS, ¿qué elementos se encuentran típicamente en la 'Zona Izquierda' de la interfaz?"},{"answerOptions":[{"isCorrect":false,"rationale":"Pueden compartir la misma fuente de datos o usar una distinta; la flexibilidad es una de sus ventajas.","text":"Deben obtenerse obligatoriamente de una fuente de datos diferente a la del informe principal."},{"isCorrect":false,"rationale":"Son una práctica recomendada para organizar datos complejos y múltiples consultas de forma estructurada.","text":"Su uso no es recomendable debido a que sobrecargan el procesador de gráficos del cliente."},{"isCorrect":false,"rationale":"Los subinformes funcionan independientemente del formato de salida (PDF, HTML, etc.) una vez que el motor los procesa.","text":"Solo pueden visualizarse si el informe principal se exporta en formato XML."},{"isCorrect":true,"rationale":"Un subinforme es, en esencia, un objeto principal con existencia propia que se incrusta para organizar consultas complejas en un solo documento.","text":"Son informes independientes que pueden contener sus propios encabezados, pies de página e incluso otros subinformes."}],"hint":"Consi ar el botón."},{"isCorrect":false,"rationale":"La vinculación se hace en el código Java/Kotlin o mediante el atributo 'onClick' en el XML.","text":"Vincular el botón con un método OnClickListener."},{"isCorrect":true,"rationale":"Este atributo decide si el icono aparece directamente en la barra o se oculta en el menú 'overflow' si no hay espacio.","text":"Determinar cómo se representa el icono de acción (siempre visible, en el menú desplegable, etc.)."}],"hint":"Se refiere a la visibilidad y ubicación del icono en la interfaz superior.","question":"¿Cuál es la utilidad del atributo 'showAsAction' al crear botones en la barra de acciones de Android?"},{"answerOptions":[{"isCorrect":false,"rationale":"La cantidad debe adaptarse a la complejidad, pero 3 es un límite arbitrario demasiado bajo.","text":"Exactamente 3 menús siempre."},{"isCorrect":false,"rationale":"El exceso de opciones (parálisis por análisis) es contraproducente incluso para usuarios expertos.","text":"No hay límite, cuantos más menús mejor para el usuario técnico."},{"isCorrect":true,"rationale":"Superar este número dificulta que el usuario localice rápidamente las opciones y memorice la estructura.","text":"Entre 7 y 10 menús máximo."},{"isCorrect":false,"rationale":"Puede resultar insuficiente para aplicaciones con funcionalidades medias.","text":"Entre 2 y 5 menús."}],"hint":"Busca un equilibrio de 'un dígito' alto.","question":"En el diseño de menús, ¿cuál es el rango recomendado para no sobrecargar cognitivamente al usuario?"},{"answerOptions":[{"isCorrect":false,"rationale":"Al contrario, son más fáciles de corregir antes de que otros módulos dependan de ellos.","text":"Porque los errores detectados al principio son más difíciles de arreglar."},{"isCorrect":true,"rationale":"Un error detectado en producción puede costar hasta 100 veces más que uno detectado en la fase de diseño o desarrollo inicial.","text":"Porque el coste de solucionar un error aumenta de forma exponencial a medida que el proyecto avanza."},{"isCorrect":false,"rationale":"El compilador funciona siempre, pero el coste humano y logístico de los cambios es lo que varía.","text":"Porque el compilador no funciona en las fases finales del proyecto."},{"isCorrect":false,"rationale":"Encontrar errores en producción daña la reputación y confianza del usuario en el producto.","text":"Porque los usuarios finales prefieren encontrar los errores ellos mismos en la fase Beta."}],"hint":"Considera el impacto económico y el tiempo de corrección.","question":"¿Por qué es crítico detectar errores en las primeras fases del proyecto según la relación de costes?"}];

        let mode = 'quiz';

        function getStats() {
            const answered = state.filter((s) => s.selectedIndex !== null).length;
            const correct = state.filter((s, i) => s.selectedIndex !== null && quizData[i].answerOptions[s.selectedIndex].isCorrect).length;
            const wrong = state.filter((s, i) => s.selectedIndex !== null && !quizData[i].answerOptions[s.selectedIndex].isCorrect).length;
            const skipped = quizData.length - answered;
            const accuracy = answered > 0 ? Math.round((correct / answered) * 100) : 0;
            return { answered, correct, wrong, skipped, accuracy };
        }

        function shuffleAnswers() {
            quizData.forEach((q) => {
                for (let i = q.answerOptions.length - 1; i > 0; i -= 1) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [q.answerOptions[i], q.answerOptions[j]] = [q.answerOptions[j], q.answerOptions[i]];
                }
            });
        }

        function shuffleQuestions() {
            for (let i = quizData.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
            }
        }

        function resetState() {

        function fmt(str) {
          if (!str) return str;
          return str
            .replace(/\$\$(.*?)\$\$/gs, function(_,m){return m;})
            .replace(/\$([^$<>]+?)\$/g, function(_,m){return m;})
            .replace(/\*\*(.*?)\*\*/g, function(_,m){return "<strong>"+m+"</strong>";})
            .replace(/\*(.*?)\*/g, function(_,m){return "<em>"+m+"</em>";})
            .replace(/`(.*?)`/g, function(_,m){return "<code>"+m+"</code>";})
        }
        function renderQuestion() {

                const isSelected = s.selectedIndex === idx;

                nextBtn.innerText = currentIndex === quizData.length - 1 ? 'Volver a resultados' : 'Siguiente';

                nextBtn.innerText = currentIndex === quizData.length - 1 ? 'Finalizar' : 'Siguiente';

        function selectOption(idx) {
            if (mode !== 'quiz') return;

        function toggleHint() {

  <button id="theme-toggle" title="Cambiar tema" style="position:fixed;top:8px;right:8px;background:var(--card);border:1px solid var(--stroke);border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,0.1);transition:transform 0.2s ease;z-index:100;">🌙</button>
  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.getElementById('theme-toggle').textContent = '☀️';
      }
      document.getElementById('theme-toggle').addEventListener('click', function() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
        this.textContent = isDark ? '🌙' : '☀️';
      });
    })();
  </script>
