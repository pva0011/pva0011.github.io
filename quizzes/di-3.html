<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desarrollo de Interface - 8 a 15 - NotebookLM - Quiz Export</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

        :root {
            --bg: #f6f1e7;
            --bg-deep: #efe4d6;
            --ink: #171717;
            --muted: #5b5b5b;
            --accent: #d3542c;
            --accent-light: #ff8f5a;
            --accent-dark: #b14320;
            --teal: #1f6f78;
            --card: #fff7ef;
            --stroke: #e3d6c5;
            --shadow: 0 18px 40px rgba(23, 23, 23, 0.12);
            --radius-sm: 10px;
            --radius-md: 12px;
            --radius-lg: 14px;
            --radius-xl: 18px;
            --radius-2xl: 22px;
            --space-1: 6px;
            --space-2: 8px;
            --space-3: 10px;
            --space-4: 12px;
            --space-5: 14px;
            --space-6: 16px;
            --space-7: 18px;
            --space-8: 20px;
            --space-9: 24px;
            --space-10: 32px;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'IBM Plex Sans', sans-serif;
            --error: #b54832;
        }

        body {
            font-family: var(--font-body);
            background:
                radial-gradient(240px 140px at 10% -10%, #ffd2b9 0%, transparent 70%),
                radial-gradient(220px 160px at 90% 0%, #cfe7e6 0%, transparent 65%),
                linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
            color: var(--ink);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            width: 100%;
            max-width: 800px;
            padding: var(--space-10) var(--space-8);
            box-sizing: border-box;
            background: var(--card);
            border-radius: var(--radius-2xl);
            border: 1px solid var(--stroke);
            box-shadow: var(--shadow);
        }

        .progress-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .progress-text {
            color: var(--muted);
            font-size: 0.9em;
        }

        .status-bar {
            display: flex;
            gap: 16px;
            font-size: 0.9em;
            font-weight: 500;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-correct { color: var(--teal); }
        .status-wrong { color: var(--error); }

        .question-text {
            font-family: var(--font-display);
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .options-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-item {
            background-color: #fff;
            border: 1px solid var(--stroke);
            padding: var(--space-4) var(--space-6);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option-item:hover:not(.selected) {
            background-color: var(--card);
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .option-item.selected.correct {
            background-color: rgba(31, 111, 120, 0.12);
            border-color: var(--teal);
        }

        .option-item.selected.incorrect {
            background-color: rgba(181, 72, 50, 0.12);
            border-color: var(--error);
        }

        .option-item.revealed-correct {
            border-color: rgba(31, 111, 120, 0.5);
            box-shadow: inset 0 0 0 1px rgba(31, 111, 120, 0.16);
        }

        .option-label {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .feedback-state {
            font-weight: bold;
            font-size: 0.9em;
            display: none;
        }

        .selected .feedback-state {
            display: block;
        }

        .revealed-correct .feedback-state {
            display: block;
        }

        .correct .feedback-state { color: var(--teal); }
        .incorrect .feedback-state { color: var(--error); }
        .revealed-correct .feedback-state { color: var(--teal); }

        .rationale {
            font-size: 0.95em;
            color: var(--muted);
            margin-top: 4px;
            line-height: 1.5;
            display: none;
        }

        .selected .rationale {
            display: block;
        }

        .revealed-correct .rationale {
            display: block;
        }
        .hint-toggle {
            border: 1px solid var(--stroke);
            color: var(--muted);
            cursor: pointer;
            padding: var(--space-2) var(--space-6);
            border-radius: var(--radius-md);
            background-color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .hint-toggle:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .hint-content {
            margin-top: 32px;
            padding: var(--space-6);
            background-color: #fff;
            border: 1px solid var(--stroke);
            border-radius: var(--radius-lg);
            font-size: 0.95em;
            color: var(--muted);
            display: none;
            align-items: flex-start;
            gap: 16px;
        }

        .hint-content.active {
            display: flex;
        }

        .hint-icon-box {
            color: var(--accent-dark);
            font-size: 1.2em;
            margin-top: -2px;
        }

        .navigation {
            margin-top: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            border-radius: var(--radius-md);
            padding: var(--space-2) var(--space-7);
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-prev {
            background-color: #fff;
            color: var(--ink);
            border-color: var(--stroke);
        }

        .btn-prev:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn-next {
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            color: #fff;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .results-screen {
            display: flex;
            flex-direction: column;
            gap: var(--space-8);
        }

        .results-title {
            font-family: var(--font-display);
            font-size: 2.1em;
            margin: 0;
        }

        .results-subtitle {
            color: var(--muted);
            margin: 0;
            font-size: 1em;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-6);
        }

        .result-card {
            padding: var(--space-6);
            border-radius: var(--radius-xl);
            background: #fff;
            border: 1px solid var(--stroke);
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        .result-label {
            color: var(--muted);
            font-size: 0.95em;
        }

        .result-value {
            font-size: 2em;
            font-family: var(--font-display);
        }

        .result-metrics {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
            color: var(--muted);
            font-size: 0.95em;
        }

        .results-actions {
            display: flex;
            gap: var(--space-4);
            flex-wrap: wrap;
        }

        .btn-ghost {
            background-color: transparent;
            border: 1px solid var(--stroke);
            color: var(--ink);
        }

        .hidden { display: none; }

        @media (max-width: 900px) {
            .quiz-container {
                margin: var(--space-8);
                max-width: 100%;
            }
        }

        @media (max-width: 720px) {
            .quiz-container {
                padding: var(--space-8) var(--space-6);
            }

            .question-text {
                font-size: 1.3em;
            }

            .option-item {
                padding: var(--space-4);
            }
        }

        @media (max-width: 520px) {
            body {
                align-items: flex-start;
            }

            .quiz-container {
                margin: var(--space-6);
                padding: var(--space-7) var(--space-5);
            }

            .progress-container {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-3);
            }

            .navigation {
                flex-direction: column;
                align-items: stretch;
                gap: var(--space-4);
            }

            .nav-buttons {
                width: 100%;
            }

            .btn {
                width: 100%;
            }

            .hint-toggle {
                justify-content: space-between;
            }

            .results-actions {
                flex-direction: column;
            }
        }
    
    [data-theme="dark"] {
      --bg: #1a1612;
      --bg-deep: #141210;
      --ink: #f0ebe0;
      --muted: #9a9080;
      --accent: #e8673a;
      --accent-light: #ff9a6a;
      --accent-dark: #c45528;
      --teal: #2a9aa8;
      --card: #221e18;
      --stroke: #3a3028;
      --shadow: 0 18px 40px rgba(0,0,0,0.4);
      --error: #e06050;
    }
    [data-theme="dark"] body {
      background:
        radial-gradient(240px 140px at 10% -10%, #3a1a08 0%, transparent 70%),
        radial-gradient(220px 160px at 90% 0%, #0a2a2e 0%, transparent 65%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
    }
    [data-theme="dark"] .option-item { background-color: var(--card); }
    [data-theme="dark"] .hint-toggle,
    [data-theme="dark"] .hint-content,
    [data-theme="dark"] .btn-prev { background-color: var(--card); color: var(--ink); }
    [data-theme="dark"] .result-card { background: var(--card); }
    [data-theme="dark"] .btn-next {
      background: linear-gradient(90deg, #e8673a, #f28c5e);
      box-shadow: 0 4px 20px rgba(232, 103, 58, 0.35);
      color: #fff;
    }
    [data-theme="dark"] .btn-next:hover:not(:disabled) {
      box-shadow: 0 6px 24px rgba(232, 103, 58, 0.5);
    }
    
    /* quiz-mobile-v3 */
    @media (max-width: 640px) {
      body {
        height: 100dvh;
        overflow: hidden;
        align-items: flex-start;
        padding: 0;
      }
      .quiz-container {
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        margin: 0;
        border-radius: 0;
        border-left: none;
        border-right: none;
        border-top: none;
        padding-bottom: 0;
      }
      #quiz-content,
      #results-content {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        min-height: 0;
        padding-bottom: 8px;
      }
      #hint-box { flex-shrink: 0; }
      .navigation {
        flex-shrink: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        margin-top: 0;
        background: var(--card);
        border-top: 1px solid var(--stroke);
      }
    }
    </style>
</head>
<body>
    <div class="quiz-container">

    <div class="quiz-heading" style="margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--stroke)">
      <a href="../index.html" style="font-size:0.82em;color:var(--muted);text-decoration:none;font-family:var(--font-body)">← Índice</a>
      <h1 style="font-family:var(--font-display);font-size:1.1em;font-weight:700;color:var(--ink);margin-top:8px;padding-right:44px">Desarrollo de Interfaces · Quiz 3</h1>
    </div>
        <div id="quiz-content">
            <!-- Dynamic Content -->
        </div>
        <div id="results-content" class="hidden"></div>

        <div id="hint-box" class="hint-content">
            <div class="hint-icon-box">💡</div>
            <div id="hint-text"></div>
        </div>

        <div class="navigation">
            <button id="hint-toggle" class="hint-toggle">
                <span>Pista</span>
                <span id="hint-icon-arrow">▼</span>
            </button>
            <div class="nav-buttons">
                <button id="prev-btn" class="btn btn-prev">Anterior</button>
                <button id="next-btn" class="btn btn-next">Siguiente</button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [{"answerOptions":[{"isCorrect":true,"rationale":"El mapa de fichero actúa como un esquema de navegación que vincula lógicamente los temas con su ubicación física o digital.","text":"Asociar identificadores de temas con las URL donde se encuentra el contenido."},{"isCorrect":false,"rationale":"Los gráficos suelen gestionarse en archivos específicos de recursos y no definen el mapa de navegación del sistema.","text":"Almacenar los gráficos de tipo .shg utilizados en la representación visual."},{"isCorrect":false,"rationale":"La compilación es un proceso técnico realizado por herramientas como Help Workshop, no una parte estructural del fichero de ayuda.","text":"Compilar los archivos RTF para transformarlos en un formato ejecutable de Windows."},{"isCorrect":false,"rationale":"Esta descripción corresponde a la vista de información, que es la parte de la interfaz que el usuario final manipula directamente.","text":"Mostrar al usuario un índice visual con buscador de términos y glosario."}],"hint":"Piense en la relación entre la organización lógica de los temas y su acceso técnico.","question":"¿Cuál es la función principal del 'mapa de fichero' en un sistema de ayuda digital según la documentación de interfaces?"},{"answerOptions":[{"isCorrect":false,"rationale":"CHM se basa en estándares web como HTML, no en lenguajes de programación de bajo nivel para su contenido.","text":"Utilizan un lenguaje propietario similar a C++ para la visualización."},{"isCorrect":false,"rationale":"Los ficheros .gid eran característicos del formato HLP, no del estándar CHM.","text":"Requieren obligatoriamente ficheros .gid para almacenar información extra."},{"isCorrect":true,"rationale":"El formato CHM (Compiled HTML Help) sustituyó al formato basado en RTF para aprovechar las capacidades del lenguaje web.","text":"Utilizan HTML para generar el contenido de la ayuda."},{"isCorrect":false,"rationale":"La fusión de ficheros es una característica técnica que también estaba presente en otros formatos mediante herramientas de compilación.","text":"Son los únicos que permiten fusionar varios ficheros de ayuda en uno solo."}],"hint":"Considere el cambio de tecnología de documentos enriquecidos (RTF) hacia estándares web.","question":"En el contexto de los formatos de ayuda, ¿qué caracteriza a los ficheros de tipo CHM frente a los antiguos HLP?"},{"answerOptions":[{"isCorrect":false,"rationale":"La reducción de tamaño mediante compilación es una característica clásica de Help Workshop.","text":"Incluye un compilador que reduce el tamaño de los ficheros .hlp automáticamente."},{"isCorrect":true,"rationale":"Help Maker destaca por centralizar la información en un solo archivo, facilitando la distribución en formato PDF.","text":"Permite exportar toda la documentación en un único fichero PDF."},{"isCorrect":false,"rationale":"Para aplicaciones Java se utiliza específicamente el sistema JavaHelp, no Help Maker.","text":"Es la única herramienta capaz de generar ficheros de ayuda para Java."},{"isCorrect":false,"rationale":"El uso de archivos .cnt es propio de herramientas que gestionan formatos HLP o HPJ.","text":"Permite crear mapas de navegación mediante hipervínculos dinámicos en archivos .cnt."}],"hint":"Piense en la facilidad de portabilidad y el formato de documento universal.","question":"¿Cuál es una ventaja distintiva de utilizar la herramienta 'Help Maker' en comparación con otras utilidades de documentación?"},{"answerOptions":[{"isCorrect":false,"rationale":"Las tablas de contenido se ubican habitualmente al inicio, funcionando como el índice de un libro.","text":"Debe situarse exclusivamente al final del documento para no distraer al lector."},{"isCorrect":false,"rationale":"Una regla fundamental del diseño de TOC es que no debe duplicarse la información para evitar redundancias innecesarias.","text":"Se debe duplicar la información clave en varios niveles para reforzar el aprendizaje."},{"isCorrect":false,"rationale":"En formatos digitales, el número de página es opcional y depende estrictamente del diseño del desarrollador.","text":"Es obligatorio que cada entrada de la tabla incluya el número de página físico."},{"isCorrect":true,"rationale":"La autonomía de los títulos permite al usuario navegar eficientemente sin ambigüedades sobre el contenido de cada sección.","text":"Los títulos deben ser lo suficientemente claros para no requerir documentación adicional."}],"hint":"Piense en la capacidad de los encabezados para comunicar el propósito de la sección de forma independiente.","question":"Según las pautas de diseño de una tabla de contenidos (TOC), ¿qué requisito es fundamental para asegurar la claridad del usuario?"},{"answerOptions":[{"isCorrect":false,"rationale":"Los fallos sintácticos son errores de compilación; los de ejecución ocurren con sintaxis correcta pero operaciones inválidas.","text":"El error de ejecución se debe a fallos sintácticos, mientras que el de lógica es por operaciones matemáticas."},{"isCorrect":false,"rationale":"Solo los errores de sintaxis o de compilación detienen el proceso de creación del ejecutable.","text":"El error de lógica impide que el programa se compile por completo."},{"isCorrect":false,"rationale":"Los errores de ejecución ocurren durante la actividad del programa, no durante su fase de traducción o compilación.","text":"El error de ejecución es siempre producido por el compilador al detectar variables no inicializadas."},{"isCorrect":true,"rationale":"Los errores de lógica producen resultados inesperados sin interrumpir el programa con avisos del sistema, lo que dificulta su detección.","text":"El error de lógica no devuelve mensajes de error, mientras que el de ejecución sí."}],"hint":"Considere cuál de los dos tipos es más 'silencioso' y difícil de rastrear por el programador.","question":"¿Qué diferencia fundamental existe entre un error de ejecución y un error de lógica durante la depuración de código?"},{"answerOptions":[{"isCorrect":false,"rationale":"La evaluación global sin distinción de módulos es propia de las pruebas de sistema, no de integración escalonada.","text":"Evalúan todo el sistema de forma conjunta sin diferenciar entre los módulos internos."},{"isCorrect":false,"rationale":"Esta descripción corresponde a las pruebas de integración descendente, específicamente en anchura.","text":"Se centran en el módulo principal y avanzan hacia los subordinados de forma lateral."},{"isCorrect":false,"rationale":"Verificar solo el código interno es la definición de pruebas de caja blanca a nivel unitario.","text":"Verifican únicamente el código interno de las funciones de bajo nivel sin importar la interfaz."},{"isCorrect":true,"rationale":"Este enfoque verifica primero los módulos base y sube en la jerarquía, necesitando 'drivers' o controladores para simular los niveles superiores.","text":"Comienzan con la evaluación de los niveles más bajos y requieren un controlador para coordinar entradas y salidas."}],"hint":"Recuerde el sentido del flujo de verificación en la estructura jerárquica del software.","question":"En una estrategia de pruebas, ¿en qué consisten las pruebas de integración 'ascendentes'?"},{"answerOptions":[{"isCorrect":false,"rationale":"Este fenómeno se conoce como regresión remota o a distancia.","text":"Errores que aparecen solo al integrar partes del programa que funcionaban bien por separado."},{"isCorrect":false,"rationale":"Las pruebas de regresión se enfocan en fallos funcionales tras cambios, no en errores de compilación sintáctica.","text":"Pruebas que se ejecutan automáticamente cada vez que se detecta un error de sintaxis."},{"isCorrect":true,"rationale":"Estas pruebas revelan fallos preexistentes que estaban ocultos y que se hacen visibles al alterar otras partes del sistema.","text":"Cambios en el código muestran errores que no tienen relación directa con las modificaciones realizadas."},{"isCorrect":false,"rationale":"Ese tipo de fallos se clasifica como pruebas de regresión locales.","text":"Se localizan errores producidos estrictamente por la última modificación de una variable local."}],"hint":"Piense en errores que ya estaban allí pero que necesitaban un cambio de contexto para manifestarse.","question":"Dentro de las pruebas de regresión, ¿cómo se define el tipo 'desenmascarada' o 'al descubierto'?"},{"answerOptions":[{"isCorrect":false,"rationale":"La velocidad de procesamiento es una métrica técnica evaluada en las pruebas de rendimiento, no en las de usuario.","text":"La velocidad a la que el compilador procesa las solicitudes del usuario."},{"isCorrect":false,"rationale":"Esto corresponde a pruebas de seguridad y de volumen, fuera del ámbito del DCU.","text":"La integridad de los datos almacenados en el servidor tras un acceso masivo."},{"isCorrect":false,"rationale":"La sintaxis interna es competencia de las pruebas de caja blanca realizadas por desarrolladores.","text":"La correcta sintaxis de las funciones internas del algoritmo de autenticación."},{"isCorrect":true,"rationale":"La observación directa permite identificar problemas de usabilidad e intuición que los expertos podrían pasar por alto.","text":"La forma de interacción de los usuarios reales con el producto objeto del test."}],"hint":"Focalícese en el comportamiento humano frente a la interfaz gráfica.","question":"De acuerdo con el Diseño Centrado en el Usuario (DCU), ¿qué aspecto es vital observar durante un test de usuario?"},{"answerOptions":[{"isCorrect":true,"rationale":"La versión alfa busca errores en un entorno controlado, mientras que la beta busca fallos en el entorno real de uso del cliente.","text":"La versión alfa se prueba internamente en las oficinas de desarrollo; la beta por clientes ajenos al desarrollo."},{"isCorrect":false,"rationale":"Tanto la alfa como la beta suelen ser versiones casi completas del producto integral.","text":"La versión alfa incluye solo la interfaz; la beta incluye el código de back-end completo."},{"isCorrect ction"}],"hint":"Busque el término técnico que denota una respuesta afirmativa en la construcción del objeto builder.","question":"En el diseño de diálogos en Android, ¿qué método se utiliza para configurar la acción del botón de confirmación positiva?"},{"answerOptions":[{"isCorrect":false,"rationale":"JavaHelp es un sistema implementado en Java, no solo un lenguaje de marcado similar a HTML.","text":"JavaHelp"},{"isCorrect":false,"rationale":"RTF es un formato de texto enriquecido, muy distinto estructuralmente del lenguaje de etiquetas HTML.","text":"RTF"},{"isCorrect":false,"rationale":"HPJ es un archivo de proyecto para Help Workshop, no un lenguaje de presentación de información final.","text":"HPJ"},{"isCorrect":true,"rationale":"IPF es un formato clásico para sistemas de ayuda que aprovecha etiquetas de marcado similares a las de la web.","text":"IPF (Information Presentation Facility)"}],"hint":"Sus siglas significan 'Facilidad de Presentación de Información'.","question":"Según el material, ¿qué formato de ayuda digital utiliza un lenguaje muy similar al HTML y se usa para ayuda en línea e hipertexto?"}];
        let currentIndex = 0;
        let mode = 'quiz';
        let state = quizData.map(() => ({ selectedIndex: null, hintVisible: false }));

        function getStats() {
            const answered = state.filter((s) => s.selectedIndex !== null).length;
            const correct = state.filter((s, i) => s.selectedIndex !== null && quizData[i].answerOptions[s.selectedIndex].isCorrect).length;
            const wrong = state.filter((s, i) => s.selectedIndex !== null && !quizData[i].answerOptions[s.selectedIndex].isCorrect).length;
            const skipped = quizData.length - answered;
            const accuracy = answered > 0 ? Math.round((correct / answered) * 100) : 0;
            return { answered, correct, wrong, skipped, accuracy };
        }

        function shuffleAnswers() {
            quizData.forEach((q) => {
                for (let i = q.answerOptions.length - 1; i > 0; i -= 1) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [q.answerOptions[i], q.answerOptions[j]] = [q.answerOptions[j], q.answerOptions[i]];
                }
            });
        }

        function shuffleQuestions() {
            for (let i = quizData.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
            }
        }

        function resetState() {
            state = quizData.map(() => ({ selectedIndex: null, hintVisible: false }));
        }

        function renderQuestion() {
            const q = quizData[currentIndex];
            const s = state[currentIndex];
            const content = document.getElementById('quiz-content');
            const results = document.getElementById('results-content');
            const hintBox = document.getElementById('hint-box');
            const nav = document.querySelector('.navigation');
            const nextBtn = document.getElementById('next-btn');
            const prevBtn = document.getElementById('prev-btn');

            let optionsHtml = '';
            const correctIndex = q.answerOptions.findIndex((o) => o.isCorrect);
            const selectedCorrect = s.selectedIndex !== null && q.answerOptions[s.selectedIndex].isCorrect;
            q.answerOptions.forEach((opt, idx) => {
                const isSelected = s.selectedIndex === idx;
                const statusClass = isSelected ? (opt.isCorrect ? 'correct' : 'incorrect') : '';
                const selectedClass = isSelected ? 'selected' : '';
                const revealCorrect = (s.selectedIndex !== null && !selectedCorrect && opt.isCorrect) || (mode === 'review' && opt.isCorrect);
                const revealClass = revealCorrect ? 'revealed-correct' : '';

                optionsHtml += `
                    <li class="option-item ${selectedClass} ${statusClass} ${revealClass}" onclick="selectOption(${idx})">
                        <div class="option-label">
                            <span>${String.fromCharCode(65 + idx)}. ${opt.text}</span>
                        </div>
                        <div class="feedback-state">
                            ${opt.isCorrect ? '✓ Correcto' : '✕ Incorrecto'}
                        </div>
                        ${opt.rationale ? '<div class="rationale">' + opt.rationale + '</div>' : ''}
                    </li>
                `;
            });

            const stats = getStats();

            content.innerHTML = `
                <div class="progress-container">

                            <span>✓</span>
                            <span>${stats.correct}</span>
                        </div>
                        <div class="status-item status-wrong">
                            <span>✕</span>
                            <span>${stats.wrong}</span>
                        </div>
                    </div>
                </div>
                <div class="question-text">${q.question}</div>
                <ul class="options-list">
                    ${optionsHtml}
                </ul>
            `;

            // Update Pista Box
            const hintText = document.getElementById('hint-text');
            hintText.innerText = q.hint || 'No hay pista disponible para esta pregunta.';
            if (s.hintVisible) {
                hintBox.classList.add('active');
            } else {
                hintBox.classList.remove('active');
            }

            results.classList.add('hidden');
            content.classList.remove('hidden');
            hintBox.classList.remove('hidden');
            nav.classList.remove('hidden');

            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = false;
            if (mode === 'review') {
                nextBtn.innerText = currentIndex === quizData.length - 1 ? 'Volver a resultados' : 'Siguiente';
            } else {
                nextBtn.innerText = currentIndex === quizData.length - 1 ? 'Finalizar' : 'Siguiente';
            }
            document.getElementById('hint-icon-arrow').innerText = s.hintVisible ? '▲' : '▼';
        }

        function selectOption(idx) {
            if (mode !== 'quiz') return;
            if (state[currentIndex].selectedIndex !== null) return; // Prevent re-selection
            state[currentIndex].selectedIndex = idx;
            renderQuestion();
        }

        function toggleHint() {
            if (mode === 'results') return;
            state[currentIndex].hintVisible = !state[currentIndex].hintVisible;
            renderQuestion();
        }

        function renderResults() {
            const stats = getStats();
            const content = document.getElementById('quiz-content');
            const results = document.getElementById('results-content');
            const hintBox = document.getElementById('hint-box');
            const nav = document.querySelector('.navigation');

            const score = `${stats.correct} / ${quizData.length}`;

            results.innerHTML = `
                <div class="results-screen">
                    <div>
                        <h1 class="results-title">¡Lo lograste! Quiz completado.</h1>
                        <p class="results-subtitle">Revisa tu puntuación o inténtalo de nuevo.</p>
                    </div>
                    <div class="results-grid">
                        <div class="result-card">
                            <div class="result-label">Puntuación</div>
                            <div class="result-value">${score}</div>
                        </div>
                        <div class="result-card">
                            <div class="result-label">Precisión</div>
                            <div class="result-value">${stats.accuracy}%</div>
                        </div>
                        <div class="result-card">
                            <div class="result-metrics">
                                <div>Correctas <strong>${stats.correct}</strong></div>
                                <div>Incorrectas <strong>${stats.wrong}</strong></div>
                                <div>Omitidas <strong>${stats.skipped}</strong></div>
                            </div>
                        </div>
                    </div>
                    <div class="results-actions">
                        <button id="review-btn" class="btn btn-ghost">Revisar Quiz</button>
                        <button id="retake-btn" class="btn btn-next">Repetir Quiz</button>
                    </div>
                </div>
            `;

            content.classList.add('hidden');
            results.classList.remove('hidden');
            hintBox.classList.add('hidden');
            nav.classList.add('hidden');

            document.getElementById('review-btn').onclick = () => {
                mode = 'review';
                currentIndex = 0;
                renderQuestion();
            };

            document.getElementById('retake-btn').onclick = () => {
                mode = 'quiz';
                currentIndex = 0;
                shuffleQuestions();
                shuffleAnswers();
                resetState();
                renderQuestion();
            };
        }

        document.getElementById('prev-btn').onclick = () => {
            if (mode === 'results') return;
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        };

        document.getElementById('next-btn').onclick = () => {
            if (mode === 'results') return;
            if (mode === 'review') {
                if (currentIndex < quizData.length - 1) {
                    currentIndex++;
                    renderQuestion();
                } else {
                    mode = 'results';
                    renderResults();
                }
                return;
            }
            if (currentIndex < quizData.length - 1) {
                currentIndex++;
                renderQuestion();
            } else {
                mode = 'results';
                renderResults();
            }
        };

        document.getElementById('hint-toggle').onclick = toggleHint;

        renderQuestion();
    </script>

  <button id="theme-toggle" title="Cambiar tema" style="position:fixed;top:8px;right:8px;background:var(--card);border:1px solid var(--stroke);border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,0.1);transition:transform 0.2s ease;z-index:100;">🌙</button>
  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.getElementById('theme-toggle').textContent = '☀️';
      }
      document.getElementById('theme-toggle').addEventListener('click', function() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
        this.textContent = isDark ? '🌙' : '☀️';
      });
    })();
  </script>
</body>
</html>
