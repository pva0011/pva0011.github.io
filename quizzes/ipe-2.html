<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotebookLM - Quiz Export</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

        :root {
            --bg: #f6f1e7;
            --bg-deep: #efe4d6;
            --ink: #171717;
            --muted: #5b5b5b;
            --accent: #d3542c;
            --accent-light: #ff8f5a;
            --accent-dark: #b14320;
            --teal: #1f6f78;
            --card: #fff7ef;
            --stroke: #e3d6c5;
            --shadow: 0 18px 40px rgba(23, 23, 23, 0.12);
            --radius-sm: 10px;
            --radius-md: 12px;
            --radius-lg: 14px;
            --radius-xl: 18px;
            --radius-2xl: 22px;
            --space-1: 6px;
            --space-2: 8px;
            --space-3: 10px;
            --space-4: 12px;
            --space-5: 14px;
            --space-6: 16px;
            --space-7: 18px;
            --space-8: 20px;
            --space-9: 24px;
            --space-10: 32px;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'IBM Plex Sans', sans-serif;
            --error: #b54832;
        }

        body {
            font-family: var(--font-body);
            background:
                radial-gradient(240px 140px at 10% -10%, #ffd2b9 0%, transparent 70%),
                radial-gradient(220px 160px at 90% 0%, #cfe7e6 0%, transparent 65%),
                linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
            color: var(--ink);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            width: 100%;
            max-width: 800px;
            padding: var(--space-10) var(--space-8);
            box-sizing: border-box;
            background: var(--card);
            border-radius: var(--radius-2xl);
            border: 1px solid var(--stroke);
            box-shadow: var(--shadow);
        }

        .progress-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .progress-text {
            color: var(--muted);
            font-size: 0.9em;
        }

        .status-bar {
            display: flex;
            gap: 16px;
            font-size: 0.9em;
            font-weight: 500;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-correct { color: var(--teal); }
        .status-wrong { color: var(--error); }

        .question-text {
            font-family: var(--font-display);
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .options-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-item {
            background-color: #fff;
            border: 1px solid var(--stroke);
            padding: var(--space-4) var(--space-6);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option-item:hover:not(.selected) {
            background-color: var(--card);
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .option-item.selected.correct {
            background-color: rgba(31, 111, 120, 0.12);
            border-color: var(--teal);
        }

        .option-item.selected.incorrect {
            background-color: rgba(181, 72, 50, 0.12);
            border-color: var(--error);
        }

        .option-item.revealed-correct {
            border-color: rgba(31, 111, 120, 0.5);
            box-shadow: inset 0 0 0 1px rgba(31, 111, 120, 0.16);
        }

        .option-label {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .feedback-state {
            font-weight: bold;
            font-size: 0.9em;
            display: none;
        }

        .selected .feedback-state {
            display: block;
        }

        .revealed-correct .feedback-state {
            display: block;
        }

        .correct .feedback-state { color: var(--teal); }
        .incorrect .feedback-state { color: var(--error); }
        .revealed-correct .feedback-state { color: var(--teal); }

        .rationale {
            font-size: 0.95em;
            color: var(--muted);
            margin-top: 4px;
            line-height: 1.5;
            display: none;
        }

        .selected .rationale {
            display: block;
        }

        .revealed-correct .rationale {
            display: block;
        }
        .hint-toggle {
            border: 1px solid var(--stroke);
            color: var(--muted);
            cursor: pointer;
            padding: var(--space-2) var(--space-6);
            border-radius: var(--radius-md);
            background-color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .hint-toggle:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .hint-content {
            margin-top: 32px;
            padding: var(--space-6);
            background-color: #fff;
            border: 1px solid var(--stroke);
            border-radius: var(--radius-lg);
            font-size: 0.95em;
            color: var(--muted);
            display: none;
            align-items: flex-start;
            gap: 16px;
        }

        .hint-content.active {
            display: flex;
        }

        .hint-icon-box {
            color: var(--accent-dark);
            font-size: 1.2em;
            margin-top: -2px;
        }

        .navigation {
            margin-top: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            border-radius: var(--radius-md);
            padding: var(--space-2) var(--space-7);
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-prev {
            background-color: #fff;
            color: var(--ink);
            border-color: var(--stroke);
        }

        .btn-prev:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn-next {
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            color: #fff;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(23, 23, 23, 0.12);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .results-screen {
            display: flex;
            flex-direction: column;
            gap: var(--space-8);
        }

        .results-title {
            font-family: var(--font-display);
            font-size: 2.1em;
            margin: 0;
        }

        .results-subtitle {
            color: var(--muted);
            margin: 0;
            font-size: 1em;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-6);
        }

        .result-card {
            padding: var(--space-6);
            border-radius: var(--radius-xl);
            background: #fff;
            border: 1px solid var(--stroke);
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        .result-label {
            color: var(--muted);
            font-size: 0.95em;
        }

        .result-value {
            font-size: 2em;
            font-family: var(--font-display);
        }

        .result-metrics {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
            color: var(--muted);
            font-size: 0.95em;
        }

        .results-actions {
            display: flex;
            gap: var(--space-4);
            flex-wrap: wrap;
        }

        .btn-ghost {
            background-color: transparent;
            border: 1px solid var(--stroke);
            color: var(--ink);
        }

        .hidden { display: none; }

        @media (max-width: 900px) {
            .quiz-container {
                margin: var(--space-8);
                max-width: 100%;
            }
        }

        @media (max-width: 720px) {
            .quiz-container {
                padding: var(--space-8) var(--space-6);
            }

            .question-text {
                font-size: 1.3em;
            }

            .option-item {
                padding: var(--space-4);
            }
        }

        @media (max-width: 520px) {
            body {
                align-items: flex-start;
            }

            .quiz-container {
                margin: var(--space-6);
                padding: var(--space-7) var(--space-5);
            }

            .progress-container {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-3);
            }

            .navigation {
                flex-direction: column;
                align-items: stretch;
                gap: var(--space-4);
            }

            .nav-buttons {
                width: 100%;
            }

            .btn {
                width: 100%;
            }

            .hint-toggle {
                justify-content: space-between;
            }

            .results-actions {
                flex-direction: column;
            }
        }
    
    [data-theme="dark"] {
      --bg: #1a1612;
      --bg-deep: #141210;
      --ink: #f0ebe0;
      --muted: #9a9080;
      --accent: #e8673a;
      --accent-light: #ff9a6a;
      --accent-dark: #c45528;
      --teal: #2a9aa8;
      --card: #221e18;
      --stroke: #3a3028;
      --shadow: 0 18px 40px rgba(0,0,0,0.4);
      --error: #e06050;
    }
    [data-theme="dark"] body {
      background:
        radial-gradient(240px 140px at 10% -10%, #3a1a08 0%, transparent 70%),
        radial-gradient(220px 160px at 90% 0%, #0a2a2e 0%, transparent 65%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
    }
    [data-theme="dark"] .option-item { background-color: var(--card); }
    [data-theme="dark"] .hint-toggle,
    [data-theme="dark"] .hint-content,
    [data-theme="dark"] .btn-prev { background-color: var(--card); color: var(--ink); }
    [data-theme="dark"] .result-card { background: var(--card); }
    [data-theme="dark"] .btn-next {
      background: linear-gradient(90deg, #e8673a, #f28c5e);
      box-shadow: 0 4px 20px rgba(232, 103, 58, 0.35);
      color: #fff;
    }
    [data-theme="dark"] .btn-next:hover:not(:disabled) {
      box-shadow: 0 6px 24px rgba(232, 103, 58, 0.5);
    }
    
    /* quiz-mobile-v3 */
    @media (max-width: 640px) {
      body {
        height: 100dvh;
        overflow: hidden;
        align-items: flex-start;
        padding: 0;
      }
      .quiz-container {
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        margin: 0;
        border-radius: 0;
        border-left: none;
        border-right: none;
        border-top: none;
        padding-bottom: 0;
      }
      #quiz-content,
      #results-content {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        min-height: 0;
        padding-bottom: 8px;
      }
      #hint-box { flex-shrink: 0; }
      .navigation {
        flex-shrink: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        margin-top: 0;
        background: var(--card);
        border-top: 1px solid var(--stroke);
      }
    }
    </style>
</head>
<body>
    <div class="quiz-container">

    <div class="quiz-heading" style="margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--stroke)">
      <a href="../index.html" style="font-size:0.82em;color:var(--muted);text-decoration:none;font-family:var(--font-body)">← Índice</a>
      <h1 style="font-family:var(--font-display);font-size:1.1em;font-weight:700;color:var(--ink);margin-top:8px;padding-right:44px">Itinerario Personal para la Empleabilidad · Quiz 2</h1>
    </div>
        <div id="quiz-content">
            <!-- Dynamic Content -->
        </div>
        <div id="results-content" class="hidden"></div>

        <div id="hint-box" class="hint-content">
            <div class="hint-icon-box">💡</div>
            <div id="hint-text"></div>
        </div>

        <div class="navigation">
            <button id="hint-toggle" class="hint-toggle">
                <span>Pista</span>
                <span id="hint-icon-arrow">▼</span>

                <button id="prev-btn" class="btn btn-prev">Anterior</button>
                <button id="next-btn" class="btn btn-next">Siguiente</button>
            </div>
        </div>

    <script>
        let quizData = [{"answerOptions":[{"isCorrect":true,"rationale":"El autónomo tiene responsabilidad ilimitada frente a las deudas, a diferencia de las sociedades mercantiles donde la responsabilidad se restringe a la aportación inicial.","text":"El empresario individual responde con todo su patrimonio personal, mientras que el socio de la S.L. solo responde con el capital aportado."},{"isCorrect":false,"rationale":"El autónomo tiene responsabilidad ilimitada y tributa por el IRPF, no por el Impuesto de Sociedades.","text":"Ambos poseen responsabilidad limitada, pero el autónomo tributa por el Impuesto de Sociedades."},{"isCorrect":false,"rationale":"Independientemente del capital mínimo de 1 €, la característica fundamental de la S.L. es la limitación de la responsabilidad al capital aportado.","text":"El socio de la S.L. responde de manera solidaria con su patrimonio personal si el capital es inferior a 3.000 €."},{"isCorrect":false,"rationale":"La S.L. sí tiene un capital mínimo de 1 € y su responsabilidad es precisamente limitada, no ilimitada.","text":"La S.L. no requiere un capital mínimo legal, lo que obliga a los socios a responder de forma ilimitada."}],"hint":"Reflexiona sobre quién arriesga sus bienes personales en caso de deudas del negocio.","question":"¿Cuál es la principal diferencia en la responsabilidad patrimonial entre un empresario individual y un socio de una Sociedad de Responsabilidad Limitada (S.L.)?"},{"answerOptions":[{"isCorrect":true,"rationale":"Esta fase se centra específicamente en identificar nuevas aplicaciones o mercados para un producto que ya existe.","text":"Proponer otros usos"},{"isCorrect":false,"rationale":"Reorganizar trata sobre el orden de los procesos o la estructura interna, no sobre la aplicación externa del producto.","text":"Reorganizar"},{"isCorrect":false,"rationale":"Sustituir se refiere a cambiar componentes o materiales del producto, no a buscar nuevos mercados.","text":"Sustituir"},{"isCorrect":false,"rationale":"Adaptar implica ajustar funcionalidades para un nuevo público, mientras que proponer otros usos busca aplicaciones externas al propósito original.","text":"Adaptar"}],"hint":"Se trata de la 'P' en el acrónimo, enfocada en la versatilidad del mercado.","question":"En el método SCAMPER, ¿qué acción se está realizando cuando buscamos encontrar nuevos segmentos de clientes que puedan beneficiarse de un producto actual?"},{"answerOptions":[{"isCorrect":false,"rationale":"Aunque tributa por sociedades, su capital mínimo suele fijarse en los estatutos y se basa en la participación democrática, no necesariamente en 60.000 €.","text":"Sociedad Cooperativa"},{"isCorrect":true,"rationale":"La S.A. es la forma jurídica diseñada para grandes capitales y exige un mínimo de 60.000 € para su constitución.","text":"Sociedad Anónima (S.A.)"},{"isCorrect":false,"rationale":"La sociedad civil no tiene un capital mínimo legal establecido y la responsabilidad de sus socios suele ser ilimitada.","text":"Sociedad Civil con objeto mercantil"},{"isCorrect":false,"rationale":"La S.L. solo requiere un capital mínimo de 1 €, siendo más adecuada para PYMES.","text":"Sociedad de Responsabilidad Limitada (S.L.)"}],"hint":"Esta forma es común en empresas de gran tamaño cuyas acciones pueden negociarse en bolsa.","question":"Si una empresa decide tributar a través del Impuesto de Sociedades y requiere un capital social mínimo de 60.000 €, ¿qué forma jurídica debe adoptar?"},{"answerOptions":[{"isCorrect":true,"rationale":"En esta etapa se procesa la información de la fase de empatía para concretar el problema específico que se intentará resolver.","text":"Definir"},{"isCorrect":false,"rationale":"Idear es el paso posterior a la definición, donde se buscan soluciones al problema ya concretado.","text":"Idear"},{"isCorrect":false,"rationale":"Empatizar es la fase de recolección de datos y observación, previa a la síntesis del problema.","text":"Empatizar"},{"isCorrect":false,"rationale":"Testear es la validación final con usuarios, no la síntesis inicial del problema.","text":"Testear"}],"hint":"Es el paso necesario antes de empezar a generar múltiples soluciones creativas.","question":"Dentro del proceso de Design Thinking, ¿en qué fase se sintetiza la información recopilada para establecer un punto de vista claro sobre el problema?"},{"answerOptions":[{"isCorrect":true,"rationale":"Este bloque representa la red de proveedores y socios que optimizan el modelo de negocio y reducen riesgos.","text":"Alianzas clave"},{"isCorrect":false,"rationale":"Los recursos clave son los activos físicos, intelectuales o humanos propios, no las entidades externas asociadas.","text":"Recursos clave"},{"isCorrect":false,"rationale":"Este bloque define el vínculo con los compradores, no con los socios o proveedores.","text":"Relación con el cliente"},{"isCorrect":false,"rationale":"Los canales definen cómo se entrega la propuesta de valor, no quiénes son los socios estratégicos.","text":"Canales de distribución"}],"hint":"Piensa en las colaboraciones externas indispensables para operar.","question":"En el modelo Canvas, ¿cuál de los bloques se encarga de identificar a los socios y proveedores estratégicos que ayudan a que el negocio funcione?"},{"answerOptions":[{"isCorrect":false,"rationale":"El liderazgo transaccional se basa en premios y castigos por tareas dadas, no en la libertad para innovar proyectos propios.","text":"Liderazgo transaccional"},{"isCorrect":false,"rationale":"El emprendimiento por necesidad ocurre cuando alguien inicia un negocio por falta de empleo, no dentro de una empresa establecida.","text":"Emprendimiento por necesidad"},{"isCorrect":false,"rationale":"El benchmarking es una comparación con la competencia, no una iniciativa de innovación interna de los empleados.","text":"Benchmarking"},{"isCorrect":true,"rationale":"El intraemprendimiento implica que los empleados adopten comportamientos emprendedores para innovar dentro de su propia organización.","text":"Intraemprendimiento"}],"hint":"Es el término que une 'emprender' con estar 'dentro' de una organización.","question":"Una empresa que permite a sus empleados dedicar parte de su jornada a proyectos de pasión para mejorar procesos internos está fomentando el:"},{"answerOptions":[{"isCorrect":false,"rationale":"El precio define el valor monetario, aunque la logística influya en los costes, no es el bloque encargado de gestionarla.","text":"Precio"},{"isCorrect":true,"rationale":"La distribución o 'plaza' abarca toda la logística necesaria para que el producto llegue efectivamente al consumidor.","text":"Distribución (Plaza)"},{"isCorrect":false,"rationale":"La promoción se ocupa de dar a conocer el producto, no de su almacenamiento o transporte.","text":"Promoción"},{"isCorrect":false,"rationale":"El producto se centra en el diseño, envase y calidad, no en cómo se mueve físicamente hacia el cliente.","text":"Producto"}],"hint":"Se refiere al camino que recorre el producto hasta el cliente.","question":"¿A qué elemento del Marketing Mix (4P) pertenecen la gestión de inventarios y la ubicación de los puntos de venta?"},{"answerOptions":[{"isCorrect":false,"rationale":"Esto explora las preocupaciones internas, no las fuentes externas que originan esa información.","text":"¿Qué piensa y siente?"},{"isCorrect":true,"rationale":"Esta sección recopila las influencias externas, como amigos, familia o medios de comunicación, que impactan al usuario.","text":"¿Qué escucha el usuario?"},{"isCorrect":false,"rationale":"Se centra en el comportamiento público del usuario, no en los mensajes que recibe de su entorno.","text":"¿Qué dice y hace?"},{"isCorrect":false,"rationale":"Esta parte se refiere al entorno visual y lo que percibe en el mercado, no específicamente a las influencias de comunicación.","text":"¿Qué ve el usuario?"}],"hint":"Busca el sentido relacionado con percibir mensajes y opiniones de otros.","question":"En un Mapa de Empatía, ¿qué sección analiza las fuentes de información que consulta el usuario y quiénes influyen en sus decisiones?"},{"answerOptions":[{"isCorrect":false,"rationale":"Dos socios son suficientes para una Comunidad de Bienes o Sociedad Civil, pero no para una Cooperativa.","text":"2"},{"isCorrect":true,"rationale":"La ley española establece un mínimo de tres socios para formar una cooperativa, reforzando su carácter de colaboración mutua.","text":"3"},{"isCorrect":false,"rationale":"Aunque es un número común en organizaciones grandes, el mínimo legal para la constitución de una cooperativa es tres.","text":"5"},{"isCorrect":false,"rationale":"Solo las sociedades unipersonales o los autónomos permiten un único socio inicial.","text":"1"}],"hint":"Es un número impar pequeño que fomenta la toma de decisiones democrática.","question":"¿Cuál es el número mínimo de socios requeridos para constituir una Sociedad Cooperativa en España?"},{"answerOptions":[{"isCorrect":true,"rationale":"El estado general de la economía y las tasas de empleo influyen directamente en la disposición de los individuos para iniciar negocios.","text":"Situación económica del entorno"},{"isCorrect":false,"rationale":"Este factor se refiere a la disponibilidad de capital y préstamos, no a las tendencias del mercado laboral.","text":"Acceso a recursos y financiamiento"},{"isCorrect":false,"rationale":"La capacitación es un factor personal relacionado con habilidades, no un factor macroeconómico del entorno.","text":"Capacitación empresarial (EET)"},{"isCorrect":false,"rationale":"El marco regulatorio trata sobre leyes e impuestos, no sobre el estado del empleo en la región.","text":"Marco regulatorio"}],"hint":"Se trata del contexto exterior que rodea al emprendedor antes de empezar.","question":"En relación con los factores económicos, ¿qué aspecto analiza las tendencias del mercado laboral y la disponibilidad de empleo al decidir emprender?"},{"answerOptions":[{"isCorrect":false,"rationale":"No se puede recopilar información s         let mode = 'quiz';

        function getStats() {
            const answered = state.filter((s) => s.selectedIndex !== null).length;
            const correct = state.filter((s, i) => s.selectedIndex !== null && quizData[i].answerOptions[s.selectedIndex].isCorrect).length;
            const wrong = state.filter((s, i) => s.selectedIndex !== null && !quizData[i].answerOptions[s.selectedIndex].isCorrect).length;
            const skipped = quizData.length - answered;
            const accuracy = answered > 0 ? Math.round((correct / answered) * 100) : 0;
            return { answered, correct, wrong, skipped, accuracy };
        }

        function shuffleAnswers() {
            quizData.forEach((q) => {
                for (let i = q.answerOptions.length - 1; i > 0; i -= 1) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [q.answerOptions[i], q.answerOptions[j]] = [q.answerOptions[j], q.answerOptions[i]];
                }
            });
        }

        function shuffleQuestions() {
            for (let i = quizData.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
            }
        }

        function resetState() {

        function fmt(str) {
          if (!str) return str;
          return str
            .replace(/\$\$(.*?)\$\$/gs, function(_,m){return m;})
            .replace(/\$([^$<>]+?)\$/g, function(_,m){return m;})
            .replace(/\*\*(.*?)\*\*/g, function(_,m){return "<strong>"+m+"</strong>";})
            .replace(/\*(.*?)\*/g, function(_,m){return "<em>"+m+"</em>";})
            .replace(/`(.*?)`/g, function(_,m){return "<code>"+m+"</code>";})
        }

            const hintText = document.getElementById('hint-text');
            hintText.innerText = fmt(q.hint) || 'No hay pista disponible para esta pregunta.';
            if (s.hintVisible) {
                hintBox.classList.add('active');
            } else {
                hintBox.classList.remove('active');
            }

            results.classList.add('hidden');
            content.classList.remove('hidden');
            hintBox.classList.remove('hidden');
            nav.classList.remove('hidden');

            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = false;
            if (mode === 'review') {
                nextBtn.innerText = currentIndex === quizData.length - 1 ? 'Volver a resultados' : 'Siguiente';
            } else {
                nextBtn.innerText = currentIndex === quizData.length - 1 ? 'Finalizar' : 'Siguiente';
            }
            document.getElementById('hint-icon-arrow').innerText = s.hintVisible ? '▲' : '▼';
        }

        function selectOption(idx) {
            if (mode !== 'quiz') return;
            if (state[currentIndex].selectedIndex !== null) return; // Prevent re-selection
            state[currentIndex].selectedIndex = idx;
            renderQuestion();
        }

        function toggleHint() {
            if (mode === 'results') return;
            state[currentIndex].hintVisible = !state[currentIndex].hintVisible;
            renderQuestion();
        }


        function saveWrongAnswers() {
          var wrongQuestions = state
            .map(function(s,i){return {s:s,i:i};})
            .filter(function(x){return x.s.selectedIndex !== null && !quizData[x.i].answerOptions[x.s.selectedIndex].isCorrect;})
            .map(function(x){return quizData[x.i].question;});
          var key = 'wrong:' + window.location.pathname.split('/').pop();
          if (wrongQuestions.length > 0) {
            localStorage.setItem(key, JSON.stringify(wrongQuestions));
          } else {
            localStorage.removeItem(key);
          }
          return wrongQuestions;
        }
        function renderResults() {
            const stats = getStats();
            const content = document.getElementById('quiz-content');
            const results = document.getElementById('results-content');
            const hintBox = document.getElementById('hint-box');
            const nav = document.querySelector('.navigation');

            const score = `${stats.correct} / ${quizData.length}`;

            results.innerHTML = `
                <div class="results-screen">
                    <div>
                        <h1 class="results-title">¡Lo lograste! Quiz completado.</h1>
                        <p class="results-subtitle">Revisa tu puntuación o inténtalo de nuevo.</p>
                    </div>
                    <div class="results-grid">
                        <div class="result-card">
                            <div class="result-label">Puntuación</div>
                            <div class="result-value">${score}</div>
                        </div>
                        <div class="result-card">
                            <div class="result-label">Precisión</div>
                            <div class="result-value">${stats.accuracy}%</div>
                        </div>
                        <div class="result-card">
                            <div class="result-metrics">
                                <div>Correctas <strong>${stats.correct}</strong></div>
                                <div>Incorrectas <strong>${stats.wrong}</strong></div>
                                <div>Omitidas <strong>${stats.skipped}</strong></div>
                            </div>
                        </div>
                    </div>
                    <div class="results-actions"><button id="retake-wrong-btn" class="btn btn-ghost" style="display:none">Repasar errores (<span id="wrong-count">0</span>)</button>
                        <button id="review-btn" class="btn btn-ghost">Revisar Quiz</button>
                        <button id="retake-btn" class="btn btn-next">Repetir Quiz</button>
                    </div>
                </div>
            `;

            content.classList.add('hidden');
            results.classList.remove('hidden');
            hintBox.classList.add('hidden');
            nav.classList.add('hidden');


            var wrongQuestions = saveWrongAnswers();
            var retakeWrongBtn = document.getElementById('retake-wrong-btn');
            if (wrongQuestions.length > 0) {
              document.getElementById('wrong-count').textContent = wrongQuestions.length;
              retakeWrongBtn.style.display = '';
            }
            (function() {
              var fname = window.location.pathname.split('/').pop();
              var backLink = document.querySelector('.quiz-heading a[href*="index.html"]');
              if (backLink) {
                var h = '#wrong=' + fname + ':' + wrongQuestions.length;
                backLink.href = backLink.href.split('#')[0] + h;
              }
            })();
            document.getElementById('retake-wrong-btn').onclick = function() {
              if (wrongQuestions.length === 0) return;

              shuffleAnswers();
              resetState();
              renderQuestion();
            };

            var wrongQuestions = saveWrongAnswers();

              document.getElementById('wrong-count').textContent = wrongQuestions.length;
              retakeWrongBtn.style.display = '';
            }

              if (backLink) {

                backLink.href = backLink.href.split('#')[0] + h;
              }
            })();
            document.getElementById('retake-wrong-btn').onclick = function() {
              if (wrongQuestions.length === 0) return;

              var wrongSet = new Set(wrongQuestions);
              quizData = originalQuizData.filter(function(q){return wrongSet.has(q.question);});
              shuffleAnswers();
              resetState();
              renderQuestion();
            };

            if (wrongQuestions.length > 0) {
              document.getElementById('wrong-count').textContent = wrongQuestions.length;
              retakeWrongBtn.style.display = '';
            }

              var backLink = document.querySelector('.quiz-heading a[href*="index.html"]');
              if (backLink) {
                var h = '#wrong=' + fname + ':' + wrongQuestions.length;
                backLink.href = backLink.href.split('#')[0] + h;
              }
            })();
            document.getElementById('retake-wrong-btn').onclick = function() {
              if (wrongQuestions.length === 0) return;
              mode = 'quiz';
              currentIndex = 0;
              var wrongSet = new Set(wrongQuestions);
              quizData = originalQuizData.filter(function(q){return wrongSet.has(q.question);});
              shuffleAnswers();
              resetState();
              renderQuestion();
            };
            document.getElementById('review-btn').onclick = () => {
                mode = 'review';
                currentIndex = 0;
                renderQuestion();
            };

            document.getElementById('retake-btn').onclick = () => {
                mode = 'quiz';
                currentIndex = 0;
                shuffleQuestions();
                shuffleAnswers();
                resetState();
                renderQuestion();
            };
        }

        document.getElementById('prev-btn').onclick = () => {
            if (mode === 'results') return;
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        };

        document.getElementById('next-btn').onclick = () => {
            if (mode === 'results') return;
            if (mode === 'review') {
                if (currentIndex < quizData.length - 1) {
                    currentIndex++;
                    renderQuestion();
                } else {
                    mode = 'results';
                    renderResults();
                }
                return;
            }
            if (currentIndex < quizData.length - 1) {
                currentIndex++;
                renderQuestion();
            } else {
                mode = 'results';
                renderResults();
            }
        };

        document.getElementById('hint-toggle').onclick = toggleHint;

        renderQuestion();
    </script>

  <button id="theme-toggle" title="Cambiar tema" style="position:fixed;top:8px;right:8px;background:var(--card);border:1px solid var(--stroke);border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,0.1);transition:transform 0.2s ease;z-index:100;">🌙</button>
  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.getElementById('theme-toggle').textContent = '☀️';
      }
      document.getElementById('theme-toggle').addEventListener('click', function() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
        this.textContent = isDark ? '🌙' : '☀️';
      });
    })();
  </script>
